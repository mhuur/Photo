<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Devis Photo</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,sans-serif;background:#fafafa;color:#222}
  #app{display:flex;min-height:100vh}
  .sb{width:220px;background:#1f2937;color:#e5e7eb;display:flex;flex-direction:column}
  .sb h1{font-size:13px;padding:18px 16px 10px;margin:0;opacity:.7;letter-spacing:.05em;text-transform:uppercase}
  .sb button.tab{display:block;width:100%;background:none;border:0;color:inherit;padding:10px 16px;text-align:left;cursor:pointer;font:inherit;font-size:14px}
  .sb button.tab:hover{background:#111827}
  .sb button.tab.active{background:#111827;color:#fff;border-left:3px solid #3b82f6;padding-left:13px}
  .sb .user{margin-top:auto;padding:12px 16px;font-size:12px;opacity:.75;border-top:1px solid #374151}
  .sb .user a{color:inherit}
  main{flex:1;padding:24px 32px;max-width:1100px}
  h2{margin-top:0}
  h3{margin-top:24px;margin-bottom:8px;font-size:13px;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #e5e7eb;padding-bottom:4px}
  .row{display:flex;gap:12px;margin-bottom:8px;flex-wrap:wrap}
  .field{display:flex;flex-direction:column;flex:1;min-width:160px}
  .field.sm{max-width:140px}
  .field label{font-size:12px;color:#6b7280;margin-bottom:4px}
  .field input,.field textarea,.field select{padding:8px 10px;border:1px solid #d1d5db;border-radius:6px;font:inherit;background:#fff}
  .field textarea{min-height:60px;resize:vertical}
  .btn{background:#3b82f6;color:#fff;border:0;padding:10px 16px;border-radius:6px;cursor:pointer;font:inherit}
  .btn:hover{background:#2563eb}
  .btn.ghost{background:#fff;color:#374151;border:1px solid #d1d5db}
  .btn.ghost:hover{background:#f3f4f6}
  .login{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px}
  .saved{font-size:12px;color:#10b981;margin-left:12px;font-weight:normal}
  .empty{background:#fff;border:1px dashed #d1d5db;border-radius:8px;padding:32px;text-align:center;color:#9ca3af;font-size:14px}
  .totals{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:14px 18px;margin-top:24px}
  .totals .line{display:flex;justify-content:space-between;padding:5px 0;font-size:14px}
  .totals .line.total{border-top:1px solid #e5e7eb;margin-top:6px;padding-top:10px;font-weight:600;font-size:16px}
  .totals .line.muted{color:#6b7280;font-size:13px}
  .hint{font-size:11px;color:#9ca3af;margin:-4px 0 8px}
  table.hist{width:100%;border-collapse:collapse;background:#fff;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;margin-top:8px;font-size:13px}
  table.hist th{background:#f9fafb;text-align:left;padding:10px 12px;font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #e5e7eb;font-weight:600}
  table.hist td{padding:6px 8px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
  table.hist tr:last-child td{border-bottom:0}
  table.hist input,table.hist select{width:100%;padding:6px 8px;border:1px solid transparent;border-radius:4px;font:inherit;font-size:13px;background:transparent}
  table.hist input:hover,table.hist select:hover{border-color:#e5e7eb}
  table.hist input:focus,table.hist select:focus{outline:none;border-color:#3b82f6;background:#fff}
  table.hist td.amount input{text-align:right;font-variant-numeric:tabular-nums}
  table.hist td.actions{text-align:center;width:36px}
  table.hist td.actions button{background:none;border:0;color:#9ca3af;cursor:pointer;font-size:16px;padding:4px 6px;border-radius:4px}
  table.hist td.actions button:hover{background:#fee2e2;color:#dc2626}
  table.hist tfoot td{padding:10px 12px;border-top:1px solid #e5e7eb;background:#f9fafb;font-weight:600;font-size:13px;text-align:right;font-variant-numeric:tabular-nums}
  table.hist tfoot td:first-child{text-align:left}
  table.hist tfoot tr.grandtotal td{background:#f3f4f6;font-size:14px;border-top:2px solid #d1d5db}
  table.hist tbody tr.subtotal td{padding:8px 12px;background:#f9fafb;font-weight:600;font-size:13px;border-top:1px solid #e5e7eb;text-align:right;font-variant-numeric:tabular-nums}
  table.hist tbody tr.subtotal td:first-child{text-align:left}
  td.statut select{font-weight:600}
  td.statut[data-s="envoye"]   select{color:#1d4ed8;background:#dbeafe}
  td.statut[data-s="attente"]  select{color:#b45309;background:#fef3c7}
  td.statut[data-s="paye"]     select{color:#047857;background:#d1fae5}
  td.statut[data-s="annule"]   select{color:#6b7280;background:#f3f4f6;text-decoration:line-through}
  .toolbar{display:flex;gap:8px;align-items:center;margin:14px 0 4px;flex-wrap:wrap}
  .toolbar .spacer{flex:1}
  .toolbar .search{flex:1;min-width:200px;max-width:340px;padding:8px 12px;border:1px solid #d1d5db;border-radius:6px;font:inherit;background:#fff}
  .toolbar .search:focus{outline:none;border-color:#3b82f6}
  table.hist tr.cli-row.clickable{cursor:pointer}
  table.hist tr.cli-row.clickable:hover td{background:#f9fafb}
  table.hist tr.cli-row.clickable.expanded td{background:#eff6ff}
  table.hist tr.cli-detail td{background:#f9fafb;padding:0;border-bottom:1px solid #e5e7eb}
  .cli-panel{padding:14px 18px}
  .cli-info{display:flex;gap:14px;padding:4px 0;font-size:13px}
  .cli-label{min-width:130px;color:#6b7280;font-size:11px;text-transform:uppercase;letter-spacing:.04em;align-self:center}
  .cli-actions{display:flex;gap:8px;margin-top:12px}
  .stats{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 4px}
  .stat{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:10px 14px;font-size:12px;color:#6b7280;min-width:120px}
  .stat strong{display:block;font-size:18px;color:#111827;font-weight:600;margin-top:2px;font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<div id="app"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyCYavugjWaUfm9wP3qnaU9flIBCFTDfiq4",
  authDomain: "devis-photo-5b23e.firebaseapp.com",
  projectId: "devis-photo-5b23e",
  storageBucket: "devis-photo-5b23e.firebasestorage.app",
  messagingSenderId: "422228820869",
  appId: "1:422228820869:web:c0daf3af59494e844cfaec"
});
const auth = firebase.auth();
const db = firebase.firestore();

const CATALOG = [
  { k:"shoot_solo_dehors",   l:"Shoot solo - Dehors",                       p:124 },
  { k:"shoot_solo_prive",    l:"Shoot solo - Lieu privé",                   p:136 },
  { k:"shoot_solo_studio",   l:"Shoot solo - Studio",                       p:162 },
  { k:"corporate",           l:"Corporate / Commerce local",                p:92  },
  { k:"shoot_duo_dehors",    l:"Shoot duo - Dehors",                        p:125 },
  { k:"shoot_duo_prive",     l:"Shoot duo - Lieu privé",                    p:181 },
  { k:"shoot_duo_studio",    l:"Shoot duo - Studio",                        p:143 },
  { k:"shoot_groupe_dehors", l:"Shoot groupe - Dehors",                     p:181 },
  { k:"shoot_groupe_prive",  l:"Shoot groupe - Lieu privé",                 p:207 },
  { k:"shoot_groupe_studio", l:"Shoot groupe - Studio",                     p:258 },
  { k:"concert",             l:"Shoot concert",                             p:222 },
  { k:"mariage",             l:"Mariage photo",                             p:181 },
  { k:"tournage_short",      l:"Tournage vidéo - Short réseaux sociaux",     p:156 },
  { k:"clip",                l:"Tournage - Clip musical",                   p:284 },
  { k:"captation",           l:"Captations vidéo + photo + ITW",             p:181 }
];

const SK = "devis-photo-data-v2";
const DEFAULT_S = {
  mission: {
    ref: "", dateEmission: "", dateValidite: "",
    object: "", objectDate: "", objectLieu: "",
    client: { num: "", name: "", contact: "", address: "", phone: "", email: "" },
    prep:        { hours: "0", rate: "" },
    prod:        { hours: "0", rate: "" },
    postprod:    { hours: "0", rate: "" },
    deplacement: { km: "0", peages: "0", trajetH: "0", ticket: "0" },
    autres:      { desc: "", montant: "0" },
    remisePct: "0",
    notes: ""
  },
  devis:    {},
  suivi:    { entries: [] },
  clients:  { entries: [] },
  compta:   {},
  abonnements: { entries: [] },
  investissements: { entries: [] },
  bugs:     {}
};
let S = JSON.parse(localStorage.getItem(SK) || "null") || JSON.parse(JSON.stringify(DEFAULT_S));
if (!S.suivi || !Array.isArray(S.suivi.entries)) S.suivi = { ...DEFAULT_S.suivi };
if (!S.clients || !Array.isArray(S.clients.entries)) S.clients = { ...DEFAULT_S.clients };
if (!S.abonnements || !Array.isArray(S.abonnements.entries)) S.abonnements = { ...DEFAULT_S.abonnements };
if (!S.investissements || !Array.isArray(S.investissements.entries)) S.investissements = { ...DEFAULT_S.investissements };
let user = null;
let tab = "mission";
let cloudT = null;

const TABS = [
  ["mission", "Mission"],
  ["devis",   "Devis"],
  ["suivi",   "Suivi"],
  ["clients", "Clients"],
  ["compta",  "Compta"],
  ["bugs",    "Correction & Bugs"]
];

const app = document.getElementById("app");
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const num = v => { const n = parseFloat(String(v).replace(",", ".")); return isFinite(n) ? n : 0; };
const fmt = v => num(v).toFixed(2).replace(".", ",") + " €";

function save() {
  localStorage.setItem(SK, JSON.stringify(S));
  clearTimeout(cloudT);
  cloudT = setTimeout(saveToCloud, 800);
}

async function saveToCloud() {
  if (!user) return;
  try {
    await db.collection("users").doc(user.uid).set({
      mission: S.mission,
      devis:   S.devis,
      suivi:   S.suivi,
      clients: S.clients,
      compta:  S.compta,
      abonnements: S.abonnements,
      investissements: S.investissements,
      bugs:    S.bugs
    }, { merge: true });
    const e = document.getElementById("savedFlash");
    if (e) { e.textContent = "Enregistré"; setTimeout(() => { if (e && e.textContent === "Enregistré") e.textContent = ""; }, 1500); }
  } catch (err) { console.error("saveToCloud", err); }
}

async function loadFromCloud() {
  if (!user) return;
  try {
    const snap = await db.collection("users").doc(user.uid).get();
    if (snap.exists) {
      const d = snap.data();
      if (d.mission) {
        const m = d.mission, dm = DEFAULT_S.mission;
        S.mission = {
          ...dm, ...m,
          client:      { ...dm.client,      ...(m.client      || {}) },
          prep:        { ...dm.prep,        ...(m.prep        || {}) },
          prod:        { ...dm.prod,        ...(m.prod        || {}) },
          postprod:    { ...dm.postprod,    ...(m.postprod    || {}) },
          deplacement: { ...dm.deplacement, ...(m.deplacement || {}) },
          autres:      { ...dm.autres,      ...(m.autres      || {}) }
        };
      }
      if (d.devis)   S.devis   = Object.assign({}, DEFAULT_S.devis,   d.devis);
      if (d.suivi)   S.suivi   = { ...DEFAULT_S.suivi, ...d.suivi, entries: Array.isArray(d.suivi.entries) ? d.suivi.entries : [] };
      if (d.clients) S.clients = { ...DEFAULT_S.clients, ...d.clients, entries: Array.isArray(d.clients.entries) ? d.clients.entries : [] };
      if (d.compta)  S.compta  = Object.assign({}, DEFAULT_S.compta,  d.compta);
      if (d.abonnements) S.abonnements = { ...DEFAULT_S.abonnements, ...d.abonnements, entries: Array.isArray(d.abonnements.entries) ? d.abonnements.entries : [] };
      if (d.investissements) S.investissements = { ...DEFAULT_S.investissements, ...d.investissements, entries: Array.isArray(d.investissements.entries) ? d.investissements.entries : [] };
      if (d.bugs)    S.bugs    = Object.assign({}, DEFAULT_S.bugs,    d.bugs);
      localStorage.setItem(SK, JSON.stringify(S));
    }
  } catch (err) { console.error("loadFromCloud", err); }
  render();
}

function upd(path, val) {
  const keys = path.split(".");
  let o = S;
  for (let i = 0; i < keys.length - 1; i++) o = o[keys[i]];
  o[keys[keys.length - 1]] = val;
  save();
  if (path.startsWith("mission.prep") || path.startsWith("mission.prod") || path.startsWith("mission.postprod") || path.startsWith("mission.deplacement") || path.startsWith("mission.autres") || path === "mission.remisePct") {
    refreshTotals();
  }
}
window.upd = upd;

function pickObject(k) {
  S.mission.object = k;
  const item = CATALOG.find(c => c.k === k);
  if (item) S.mission.prod.rate = String(item.p);
  save();
  render();
}
window.pickObject = pickObject;

function totals() {
  const d = S.mission;
  const prep = num(d.prep.hours) * num(d.prep.rate);
  const prod = num(d.prod.hours) * num(d.prod.rate);
  const post = num(d.postprod.hours) * num(d.postprod.rate);
  const depl = num(d.deplacement.km) * 0.40 + num(d.deplacement.peages) + num(d.deplacement.trajetH) * 40 + num(d.deplacement.ticket);
  const autres = num(d.autres.montant);
  const subtotal = prep + prod + post + depl + autres;
  const remise = subtotal * num(d.remisePct) / 100;
  const total = subtotal - remise;
  return { prep, prod, post, depl, autres, subtotal, remise, total, acompte: total * 0.30, reste: total * 0.70 };
}

function refreshTotals() {
  const t = totals();
  const el = document.getElementById("totals");
  if (el) el.innerHTML = totalsHtml(t);
}

function totalsHtml(t) {
  return `
    <div class="line muted"><span>Préparation</span><span>${fmt(t.prep)}</span></div>
    <div class="line muted"><span>Shooting / production</span><span>${fmt(t.prod)}</span></div>
    <div class="line muted"><span>Post-production</span><span>${fmt(t.post)}</span></div>
    <div class="line muted"><span>Frais de déplacement</span><span>${fmt(t.depl)}</span></div>
    <div class="line muted"><span>Autres</span><span>${fmt(t.autres)}</span></div>
    <div class="line"><span>Sous-total</span><span>${fmt(t.subtotal)}</span></div>
    <div class="line muted"><span>Remise (${esc(S.mission.remisePct)} %)</span><span>−${fmt(t.remise)}</span></div>
    <div class="line total"><span>Total HT</span><span>${fmt(t.total)}</span></div>
    <div class="line muted"><span>Acompte 30 %</span><span>${fmt(t.acompte)}</span></div>
    <div class="line muted"><span>Reste 70 %</span><span>${fmt(t.reste)}</span></div>
    <div class="line muted" style="font-size:11px;color:#9ca3af;margin-top:6px">TVA non applicable, art. 293 B du CGI</div>
  `;
}

function render() {
  if (!user) {
    app.innerHTML = `<div class="login"><h1>Devis Photo</h1><button class="btn" onclick="signIn()">Se connecter avec Google</button></div>`;
    return;
  }
  const renderers = { mission: rMS, devis: rDV, suivi: rSV, clients: rCL, compta: rCP, bugs: rBG };
  const view = (renderers[tab] || (() => ""))();
  app.innerHTML = `
    <aside class="sb">
      <h1>Devis Photo</h1>
      ${TABS.map(([k,l]) => `<button class="tab ${tab===k?"active":""}" onclick="setTab('${k}')">${esc(l)}</button>`).join("")}
      <div class="user">${esc(user.email)}<br><a href="#" onclick="signOut();return false">Déconnexion</a></div>
    </aside>
    <main>${view}</main>`;
}

function rMS() {
  const d = S.mission;
  const t = totals();
  return `
    <h2>Mission <span id="savedFlash" class="saved"></span></h2>

    <h3>Devis</h3>
    <div class="row">
      <div class="field"><label>Référence</label><input value="${esc(d.ref)}" oninput="upd('mission.ref', this.value)" placeholder="DEVIS-116-2026-04-25"></div>
      <div class="field sm"><label>Date d'émission</label><input type="date" value="${esc(d.dateEmission)}" oninput="upd('mission.dateEmission', this.value)"></div>
      <div class="field sm"><label>Validité</label><input type="date" value="${esc(d.dateValidite)}" oninput="upd('mission.dateValidite', this.value)"></div>
    </div>

    <h3>Client</h3>
    <div class="row">
      <div class="field sm"><label>N° Client</label><input value="${esc(d.client.num)}" oninput="upd('mission.client.num', this.value)"></div>
      <div class="field"><label>Nom / Société</label><input value="${esc(d.client.name)}" oninput="upd('mission.client.name', this.value)"></div>
      <div class="field"><label>Contact</label><input value="${esc(d.client.contact)}" oninput="upd('mission.client.contact', this.value)"></div>
    </div>
    <div class="row">
      <div class="field"><label>Adresse</label><input value="${esc(d.client.address)}" oninput="upd('mission.client.address', this.value)"></div>
      <div class="field"><label>Téléphone</label><input value="${esc(d.client.phone)}" oninput="upd('mission.client.phone', this.value)"></div>
      <div class="field"><label>Email</label><input type="email" value="${esc(d.client.email)}" oninput="upd('mission.client.email', this.value)"></div>
    </div>

    <h3>Prestation</h3>
    <div class="row">
      <div class="field"><label>Type de prestation</label>
        <select onchange="pickObject(this.value)">
          <option value="">— choisir —</option>
          ${CATALOG.map(c => `<option value="${c.k}" ${d.object===c.k?"selected":""}>${esc(c.l)} (${c.p} €)</option>`).join("")}
        </select>
      </div>
      <div class="field sm"><label>Date prestation</label><input type="date" value="${esc(d.objectDate)}" oninput="upd('mission.objectDate', this.value)"></div>
      <div class="field"><label>Lieu</label><input value="${esc(d.objectLieu)}" oninput="upd('mission.objectLieu', this.value)"></div>
    </div>
    <div class="hint">Choisir une prestation pré-remplit automatiquement le P.U. shooting avec le tarif arrondi du catalogue.</div>

    <h3>Lignes</h3>
    <div class="row">
      <div class="field sm"><label>Préparation (h)</label><input type="number" step="0.25" value="${esc(d.prep.hours)}" oninput="upd('mission.prep.hours', this.value)"></div>
      <div class="field sm"><label>P.U. préparation</label><input type="number" step="0.01" value="${esc(d.prep.rate)}" oninput="upd('mission.prep.rate', this.value)"></div>
      <div class="field sm"><label>Shooting (h)</label><input type="number" step="0.25" value="${esc(d.prod.hours)}" oninput="upd('mission.prod.hours', this.value)"></div>
      <div class="field sm"><label>P.U. shooting</label><input type="number" step="0.01" value="${esc(d.prod.rate)}" oninput="upd('mission.prod.rate', this.value)"></div>
      <div class="field sm"><label>Post-prod (h)</label><input type="number" step="0.25" value="${esc(d.postprod.hours)}" oninput="upd('mission.postprod.hours', this.value)"></div>
      <div class="field sm"><label>P.U. post-prod</label><input type="number" step="0.01" value="${esc(d.postprod.rate)}" oninput="upd('mission.postprod.rate', this.value)"></div>
    </div>

    <h3>Déplacement</h3>
    <div class="row">
      <div class="field sm"><label>Distance (km)</label><input type="number" step="0.1" value="${esc(d.deplacement.km)}" oninput="upd('mission.deplacement.km', this.value)"></div>
      <div class="field sm"><label>Péages (€)</label><input type="number" step="0.01" value="${esc(d.deplacement.peages)}" oninput="upd('mission.deplacement.peages', this.value)"></div>
      <div class="field sm"><label>Temps trajet (h)</label><input type="number" step="0.25" value="${esc(d.deplacement.trajetH)}" oninput="upd('mission.deplacement.trajetH', this.value)"></div>
      <div class="field sm"><label>Ticket TC (€)</label><input type="number" step="0.01" value="${esc(d.deplacement.ticket)}" oninput="upd('mission.deplacement.ticket', this.value)"></div>
    </div>
    <div class="hint">Indemnité km : 0,40 € · Valorisation temps trajet : 40 €/h</div>

    <h3>Autres &amp; remise</h3>
    <div class="row">
      <div class="field"><label>Description « autres »</label><input value="${esc(d.autres.desc)}" oninput="upd('mission.autres.desc', this.value)"></div>
      <div class="field sm"><label>Montant (€)</label><input type="number" step="0.01" value="${esc(d.autres.montant)}" oninput="upd('mission.autres.montant', this.value)"></div>
      <div class="field sm"><label>Remise (%)</label><input type="number" step="0.1" value="${esc(d.remisePct)}" oninput="upd('mission.remisePct', this.value)"></div>
    </div>

    <h3>Notes</h3>
    <div class="row"><div class="field"><textarea oninput="upd('mission.notes', this.value)">${esc(d.notes)}</textarea></div></div>

    <div class="totals" id="totals">${totalsHtml(t)}</div>
  `;
}

function rDV() {
  return `
    <h2>Devis <span id="savedFlash" class="saved"></span></h2>
    <div class="empty">Onglet Devis — à remplir au prochain tour.</div>`;
}

const STATUTS = [
  ["envoye",  "Envoyé"],
  ["attente", "En attente"],
  ["paye",    "Payé"],
  ["annule",  "Annulé"]
];

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

function suiviAdd() {
  const m = S.mission;
  const cat = CATALOG.find(c => c.k === m.object);
  const totalAmount = totals().total.toFixed(2);
  const hoursTotal = num(m.prep.hours) + num(m.prod.hours) + num(m.postprod.hours);

function suiviImport() {
  const existing = new Set(S.suivi.entries.map(e => (e.date || "") + "|" + (e.client || "")));
  const toImport = SUIVI_SEED.filter(s => !existing.has(s.date + "|" + s.client));
  if (toImport.length === 0) {
    alert("Toutes les prestations de l'Excel sont déjà importées.");
    return;
  }
  if (!confirm(`Importer ${toImport.length} prestation(s) depuis l'Excel ?`)) return;
  for (const s of toImport) S.suivi.entries.push({ id: uid(), ...s });
  save();
  render();
}
window.suiviImport = suiviImport;


function suiviDel(id) {
  S.suivi.entries = S.suivi.entries.filter(e => e.id !== id);
  save();
  render();
}
window.suiviDel = suiviDel;

function suiviUpd(id, field, val) {
  const e = S.suivi.entries.find(x => x.id === id);
  if (!e) return;
  e[field] = val;
  save();
}
window.suiviUpd = suiviUpd;

function suiviStatut(id, val, td) {
  suiviUpd(id, "statut", val);
  if (td) td.dataset.s = val;
  refreshSuiviStats();
}
window.suiviStatut = suiviStatut;

function suiviStats() {
  const by = { envoye: 0, attente: 0, paye: 0, annule: 0 };
  let total = 0;
  for (const e of S.suivi.entries) {
    const m = num(e.montant);
    by[e.statut] = (by[e.statut] || 0) + m;
    total += m;
  }
  return { by, total, count: S.suivi.entries.length };
}

function suiviStatsHtml(s) {
  return `
    <div class="stat">Prestations<strong>${s.count}</strong></div>
    <div class="stat">Payé<strong>${fmt(s.by.paye)}</strong></div>
    <div class="stat">En attente<strong>${fmt(s.by.attente)}</strong></div>
    <div class="stat">Envoyé<strong>${fmt(s.by.envoye)}</strong></div>
    <div class="stat">Total facturé<strong>${fmt(s.by.paye + s.by.attente + s.by.envoye)}</strong></div>
  `;
}

function refreshSuiviStats() {
  const el = document.getElementById("suiviStats");
  if (el) el.innerHTML = suiviStatsHtml(suiviStats());
}

function rSV() {
  const entries = S.suivi.entries;
  const stats = suiviStats();
  const rows = entries.map(e => `
    <tr>
      <td><input type="date" value="${esc(e.date)}" oninput="suiviUpd('${e.id}','date',this.value)"></td>
      <td><input value="${esc(e.ref)}" oninput="suiviUpd('${e.id}','ref',this.value)" placeholder="DEVIS-…"></td>
      <td><input value="${esc(e.client)}" oninput="suiviUpd('${e.id}','client',this.value)" placeholder="Client"></td>
      <td><input value="${esc(e.prestation)}" oninput="suiviUpd('${e.id}','prestation',this.value)" placeholder="Prestation"></td>
      <td class="amount"><input type="number" step="0.01" value="${esc(e.montant)}" oninput="suiviUpd('${e.id}','montant',this.value); refreshSuiviStats()"></td>
      <td class="statut" data-s="${esc(e.statut)}">
        <select onchange="suiviStatut('${e.id}', this.value, this.parentNode)">
          ${STATUTS.map(([k,l]) => `<option value="${k}" ${e.statut===k?"selected":""}>${esc(l)}</option>`).join("")}
        </select>
      </td>
      <td class="actions"><button title="Supprimer" onclick="if(confirm('Supprimer cette ligne ?'))suiviDel('${e.id}')">×</button></td>
    </tr>
  `).join("");

  return `
    <h2>Suivi <span id="savedFlash" class="saved"></span></h2>

    <div class="stats" id="suiviStats">${suiviStatsHtml(stats)}</div>

    <div class="toolbar">
      <button class="btn" onclick="suiviAdd()">+ Ajouter une prestation</button>
      <button class="btn ghost" onclick="suiviImport()">Importer depuis l'Excel (${SUIVI_SEED.length})</button>
      <span class="spacer"></span>
      <span class="hint" style="margin:0">« Ajouter » pré-remplit la ligne avec la mission en cours. L'import ignore les doublons (date + client).</span>
    </div>

    ${entries.length === 0 ? `<div class="empty">Aucune prestation enregistrée. Cliquez sur « + Ajouter une prestation » pour commencer.</div>` : `
    <table class="hist">
      <thead>
        <tr>
          <th style="width:130px">Date</th>
          <th style="width:160px">Référence</th>
          <th>Client</th>
          <th>Prestation</th>
          <th style="width:110px;text-align:right">Montant</th>
          <th style="width:130px">Statut</th>
          <th></th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`}
  `;
}

let clientsExpanded = null;
let clientsEditing = null;

function clientsAdd() {
  const c = S.mission.client;
  const id = uid();
  S.clients.entries.unshift({
    id,
    num:        c.num     || "",
    name:       c.name    || "",
    contact:    c.contact || "",
    address:    c.address || "",
    cityPostal: "",
    phone:      c.phone   || "",
    email:      c.email   || "",
    rencontre:  ""
  });
  clientsExpanded = id;
  clientsEditing  = id;
  save();
  render();
}
window.clientsAdd = clientsAdd;

function clientsToggle(id) {
  if (clientsExpanded === id) {
    clientsExpanded = null;
    clientsEditing  = null;
  } else {
    clientsExpanded = id;
    clientsEditing  = null;
  }
  render();
}
window.clientsToggle = clientsToggle;

function clientsEdit(id) {
  clientsExpanded = id;
  clientsEditing  = id;
  render();
}
window.clientsEdit = clientsEdit;

function clientsEditDone() {
  clientsEditing = null;
  render();
}
window.clientsEditDone = clientsEditDone;

function clientsFilter(q) {
  const term = (q || "").trim().toLowerCase();
  const list = document.getElementById("clientsList");
  const noRes = document.getElementById("clientsNoResults");
  if (!list) return;
  let visible = 0;
  list.querySelectorAll("tr.cli-row").forEach(tr => {
    const hay = (tr.dataset.search || "").toLowerCase();
    const show = !term || hay.includes(term);
    tr.style.display = show ? "" : "none";
    const detail = tr.nextElementSibling;
    if (detail && detail.classList.contains("cli-detail")) {
      detail.style.display = show ? "" : "none";
    }
    if (show) visible++;
  });
  if (noRes) {
    if (term && visible === 0) {
      noRes.querySelectorAll(".term").forEach(el => el.textContent = q);
      noRes.style.display = "";
      list.style.display = "none";
    } else {
      noRes.style.display = "none";
      list.style.display = "";
    }
  }
}
window.clientsFilter = clientsFilter;

function clientsCreateFromSearch() {
  const inp = document.getElementById("clientsSearchInput");

  if (!name) return;
  const id = uid();
  S.clients.entries.unshift({
    id, num: "", name,
    contact: "", address: "", cityPostal: "", phone: "", email: "", rencontre: ""
  });
  clientsExpanded = id;
  clientsEditing  = id;
  if (inp) inp.value = "";
  save();
  render();
}
window.clientsCreateFromSearch = clientsCreateFromSearch;

        </div>
      ` : `
        <div class="cli-info"><span class="cli-label">Adresse</span><span>${esc(e.address) || "—"}</span></div>
        <div class="cli-info"><span class="cli-label">CP - Ville</span><span>${esc(e.cityPostal) || "—"}</span></div>
        <div class="cli-info"><span class="cli-label">Rencontré via</span><span>${esc(e.rencontre) || "—"}</span></div>
        <div class="cli-actions">
          <button class="btn" onclick="clientsEdit('${e.id}')">Modifier</button>
          <button class="btn ghost" onclick="clientsToggle('${e.id}')">Fermer</button>
        </div>
      `;
      detail = `<tr class="cli-detail"><td colspan="6"><div class="cli-panel">${body}</div></td></tr>`;
    }

    return summary + detail;
  }).join("");

  return `
    <h2>Clients <span id="savedFlash" class="saved"></span></h2>

    <div class="toolbar">
      <button class="btn" onclick="clientsAdd()">+ Ajouter un client</button>
      <input id="clientsSearchInput" class="search" type="text" placeholder="Rechercher…" oninput="clientsFilter(this.value)" autocomplete="off">
    </div>

    <div id="clientsNoResults" class="empty" style="display:none">
      Aucun contact ne correspond à « <span class="term"></span> ».
      <div style="margin-top:12px"><button class="btn" onclick="clientsCreateFromSearch()">+ Créer un contact « <span class="term"></span> »</button></div>
    </div>

    ${entries.length === 0 ? `<div class="empty">Aucun client enregistré. Cliquez sur « + Ajouter un client » pour commencer.</div>` : `
    <table class="hist" id="clientsList">
      <thead>
        <tr>
          <th style="width:80px">N°</th>
          <th>Nom / Société</th>
          <th>Contact</th>
          <th style="width:140px">Téléphone</th>
          <th style="width:220px">Email</th>
          <th></th>
        </tr>
      </thead>
      <tbody>${rowsHtml}</tbody>
    </table>`}
  `;
}

const MOIS_FR = ["janv.","févr.","mars","avr.","mai","juin","juil.","août","sept.","oct.","nov.","déc."];

function bilanCompute() {
  const byMonth = {};
  for (const e of S.suivi.entries) {
    const date = e.date || "";
    if (date.length < 7) continue;
    const ym = date.slice(0, 7);
    if (!byMonth[ym]) byMonth[ym] = { heures:0, paiement:0, ca:0, salaire:0, ursaf:0, tresorerie:0, frais:0 };
    const b = byMonth[ym];
    const paid = e.statut === "paye";
    if (paid) {
      b.heures     += num(e.heures);
      b.paiement   += num(e.paiement != null && e.paiement !== "" ? e.paiement : e.montant);
      b.ca         += num(e.ca       != null && e.ca       !== "" ? e.ca       : e.montant);
      b.salaire    += num(e.salaire);
      b.tresorerie += num(e.tresorerie);
      b.frais      += num(e.frais);
    }
    b.ursaf += num(e.ursaf);
  }
  const months = Object.keys(byMonth).sort((a, b) => b.localeCompare(a));
  return months.map(ym => {
    const b = byMonth[ym];
    return { ym, ...b, totalPro: b.ursaf + b.tresorerie + b.frais };
  });
}

function bilanRender() {
  const data = bilanCompute();
  if (data.length === 0) return { body: "", foot: "" };

  const monthLabel = ym => {
    const [y, m] = ym.split("-");
    return `${MOIS_FR[parseInt(m, 10) - 1]} ${y}`;
  };
  const cellH = v => `<td style="text-align:right;font-variant-numeric:tabular-nums;padding-right:14px">${num(v).toFixed(2).replace(".", ",")}</td>`;
  const cell  = v => `<td style="text-align:right;font-variant-numeric:tabular-nums;padding-right:14px">${fmt(v)}</td>`;

  const annual = {};
  const grand = { heures:0, paiement:0, ca:0, salaire:0, totalPro:0, ursaf:0, tresorerie:0, frais:0 };
  for (const r of data) {
    const y = r.ym.slice(0, 4);
    if (!annual[y]) annual[y] = { heures:0, paiement:0, ca:0, salaire:0, totalPro:0, ursaf:0, tresorerie:0, frais:0 };
    for (const k of Object.keys(grand)) { annual[y][k] += r[k]; grand[k] += r[k]; }
  }

  const rows = [];
  for (let i = 0; i < data.length; i++) {
    const r = data[i];
    const y = r.ym.slice(0, 4);
    rows.push(`
      <tr>
        <td>${esc(monthLabel(r.ym))}</td>
        ${cellH(r.heures)}
        ${cell(r.paiement)}
        ${cell(r.ca)}
        ${cell(r.salaire)}
        ${cell(r.totalPro)}
        ${cell(r.ursaf)}
        ${cell(r.tresorerie)}
        ${cell(r.frais)}
      </tr>
    `);
    const next = data[i + 1];
    if (!next || next.ym.slice(0, 4) !== y) {
      const a = annual[y];
      rows.push(`
        <tr class="subtotal">
          <td>Sous-total ${esc(y)}</td>
          ${cellH(a.heures)}
          ${cell(a.paiement)}
          ${cell(a.ca)}
          ${cell(a.salaire)}
          ${cell(a.totalPro)}
          ${cell(a.ursaf)}
          ${cell(a.tresorerie)}
          ${cell(a.frais)}
        </tr>
      `);
    }
  }

  const foot = `
    <tr class="grandtotal">
      <td>Total général</td>
      ${cellH(grand.heures)}
      ${cell(grand.paiement)}
      ${cell(grand.ca)}
      ${cell(grand.salaire)}
      ${cell(grand.totalPro)}
      ${cell(grand.ursaf)}
      ${cell(grand.tresorerie)}
      ${cell(grand.frais)}
    </tr>
  `;

  return { body: rows.join(""), foot };
}

function rCP() {
  const abEntries = S.abonnements.entries;
  const abRows = abEntries.map(e => `
    <tr>
      <td><input value="${esc(e.libelle)}" oninput="editAbonnement('${e.id}','libelle',this.value)" placeholder="Libellé"></td>
      <td class="amount"><input type="number" step="0.01" value="${esc(e.annuel)}" oninput="editAbonnement('${e.id}','annuel',this.value); refreshAbonnementMensuel('${e.id}')"></td>
      <td class="amount" id="ab-mens-${e.id}" style="text-align:right;color:#6b7280;font-variant-numeric:tabular-nums;padding-right:14px">${fmt(num(e.annuel) / 12)}</td>
      <td class="actions"><button title="Supprimer" onclick="if(confirm('Supprimer cet abonnement ?'))deleteAbonnement('${e.id}')">×</button></td>
    </tr>
  `).join("");

  const invEntries = [...S.investissements.entries].sort((a, b) => (b.date || "").localeCompare(a.date || ""));
  const invRows = invEntries.map(e => `
    <tr>
      <td><input type="date" value="${esc(e.date)}" oninput="editInvestissement('${e.id}','date',this.value)"></td>
      <td><input value="${esc(e.descriptif)}" oninput="editInvestissement('${e.id}','descriptif',this.value)" placeholder="Descriptif"></td>
      <td class="amount"><input type="number" step="0.01" value="${esc(e.prix)}" oninput="editInvestissement('${e.id}','prix',this.value)"></td>
      <td class="actions"><button title="Supprimer" onclick="if(confirm('Supprimer cet investissement ?'))deleteInvestissement('${e.id}')">×</button></td>
    </tr>
  `).join("");

  const bilan = bilanRender();

  return `
    <h2>Compta <span id="savedFlash" class="saved"></span></h2>

    <h3>Abonnements professionnels</h3>
    <div class="toolbar">
      <button class="btn" onclick="addAbonnement()">+ Ajouter un abonnement</button>
    </div>
    <table class="hist">
      <thead>
        <tr>
          <th>Libellé</th>
          <th style="width:170px;text-align:right">Coût annuel (€)</th>
          <th style="width:170px;text-align:right">Coût mensuel (€)</th>
          <th style="width:36px"></th>
        </tr>
      </thead>
      <tbody>${abRows}</tbody>
    </table>

    <h3>Investissements et achats ponctuels</h3>
    <div class="toolbar">
      <button class="btn" onclick="addInvestissement()">+ Ajouter un investissement</button>
    </div>
    <table class="hist">
      <thead>
        <tr>
          <th style="width:130px">Date</th>
          <th>Descriptif</th>
          <th style="width:140px;text-align:right">Prix (€)</th>
          <th style="width:36px"></th>
        </tr>
      </thead>
      <tbody>${invRows}</tbody>
    </table>

    <h3>Bilan mensuel (calculé automatiquement depuis Suivi)</h3>
    <table class="hist">
      <thead>
        <tr>
          <th style="width:110px">Mois</th>
          <th style="text-align:right">Heures</th>
          <th style="text-align:right">Paiement</th>
          <th style="text-align:right">CA</th>
          <th style="text-align:right">Salaire (Perso)</th>
          <th style="text-align:right">Total vers (Pro)</th>
          <th style="text-align:right">URSAF (Pro)</th>
          <th style="text-align:right">Trésorerie (Pro)</th>
          <th style="text-align:right">Frais débours. (Pro)</th>
        </tr>
      </thead>
      <tbody>${bilan.body}</tbody>
      ${bilan.foot ? `<tfoot>${bilan.foot}</tfoot>` : ""}
    </table>
  `;
}
