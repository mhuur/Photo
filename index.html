// ▼ rFacturePreview — preview facture (opts: acompte/solde)
function rFacturePreview(opts) {
  // opts: { paidEntries: [{label, amount, date}] } — list of paid échéances. If null, treats as draft (paid=0).
  const d = S.mission;
  const t = totals();
  const hasClient = !!(d.client && (d.client.id || d.client.name));
  const hasContent = (d.lignes || []).length > 0;
  if (!hasClient || !hasContent) {
    return `<div class="devis-preview"><div class="dp-empty">La facture sera disponible une fois le devis rempli (client + au moins une ligne).<br><span style="font-size:13px;color:var(--text-dim)">Pour générer une facture avec un montant payé, va dans Suivi et marque les échéances comme payées.</span></div></div>`;
  }
  const sel = d.client.id ? S.clients.entries.find(x => x.id === d.client.id) : null;
  const cli = sel || d.client;
  const ref = (d.ref || "DEVIS-…-…").replace(/^DEVIS/, "FACTURE");

  const tarifH = t.tarifHEff || t.tarifH;
  const cat = (S.tarifs.catalog || DEFAULT_CATALOG).find(c => c.k === d.object);

  // Build line items HTML (same as devis, without débours)
  let linesHtml = "";
  for (const l of (d.lignes || [])) {
    if (l.type === "heures") {
      const h = num(l.duree) * (l.unit === "j" ? HOURS_PER_DAY : 1);
      const amount = h * tarifH;
      linesHtml += `<div class="dp-line">
        <div class="lbl">${esc(l.intitule || "(Sans intitulé)")}${l.description ? `<div class="desc">${esc(l.description)}</div>` : ""}</div>
        <div class="qty">${num(l.duree).toFixed(2).replace(".",",")} ${l.unit === "j" ? "jour(s) × 8h" : "h"} × ${tarifH.toFixed(2).replace(".",",")} €/h</div>
        <div class="amt">${fmt(amount)}</div>
      </div>`;
    } else if (l.type === "materiel" && l.devis !== "debours") {
      linesHtml += `<div class="dp-line">
        <div class="lbl">${esc(l.intitule || "(Sans intitulé)")}<div class="desc">${l.description ? esc(l.description) : "Matériel"}</div></div>
        <div class="qty"></div>
        <div class="amt">${fmt(num(l.prix))}</div>
      </div>`;
    }
  }
  // Déplacement line if mode is "principal"
  const deplDevisMode = t.effectiveDeplMode || "principal";
  if (deplDevisMode === "principal" && t.depl > 0) {
    linesHtml += `<div class="dp-line">
      <div class="lbl">Déplacement</div>
      <div class="qty"></div>
      <div class="amt">${fmt(t.depl)}</div>
    </div>`;
  }

  // Payment summary
  const paidEntries = (opts && Array.isArray(opts.paidEntries)) ? opts.paidEntries : [];
  const totalPaid = r2(paidEntries.reduce((s, p) => s + num(p.amount), 0));
  const restant = r2(t.total - totalPaid);
  const fullyPaid = restant <= 0.01;

  return `<div class="devis-preview" id="facturePreview">
    <div class="dp-top-row">
      ${d.logoUrl ? `<div class="dp-logo-wrap"><img src="${esc(d.logoUrl)}" alt="Logo" class="dp-logo"></div>` : `<div class="dp-logo-spacer"></div>`}
      <div class="dp-doc-ref" style="color:var(--success)">${esc(ref)}</div>
    </div>
    <div class="dp-header-grid">
      ${(() => {
        const inner = genHeaderEmetteur(S.identite, d.photographe);
        if (inner.trim()) return `<div class="dp-header-left">${inner}</div>`;
        return `<div class="dp-header-left empty">Renseigner ton identité dans l'onglet « Profil ».</div>`;
      })()}
      <div class="dp-header-right">
        <div class="dp-meta-block">
          <div>Émission : <strong>${dateFR(d.dateEmission) || "—"}</strong></div>
        </div>
        <div class="dp-client-block">
          <span class="name">${esc(cli.name || "(Sélectionner un client)")}</span>
          ${cli.address ? `<div>${esc(cli.address)}</div>` : ""}
          ${cli.cityPostal ? `<div>${esc(cli.cityPostal)}</div>` : ""}
        </div>
      </div>
    </div>

    <div class="dp-doc-title" style="color:var(--success)">FACTURE</div>

    ${cat ? `<div class="dp-section">
      <h4>Prestation</h4>
      <div class="dp-client"><div class="name">${esc(cat.l)}</div></div>
    </div>` : ""}

    <div class="dp-section">
      <h4>Détail</h4>
      ${linesHtml || `<div class="dp-empty" style="padding:14px">Aucune ligne.</div>`}
    </div>

    <div class="dp-totals">
      <div class="dp-line"><span class="lbl">Sous-total</span><span class="amt">${fmt(t.subtotal)}</span></div>
      ${t.remise > 0 ? `<div class="dp-line"><span class="lbl">Remise (${num(d.remisePct).toString().replace(".",",")} %)</span><span class="amt">−${fmt(t.remise)}</span></div>` : ""}
      <div class="dp-line grand"><span class="lbl">Total HT</span><span class="amt">${fmt(t.total)}</span></div>
      <div class="dp-totals-tva">${esc(tvaMention(S.identite))}</div>
    </div>

    <div class="dp-receipt">
      <h4>Récapitulatif paiement</h4>
      ${paidEntries.length > 0 ? `<div class="dp-receipt-list">
        ${paidEntries.map(p => `<div class="dp-receipt-line">
          <span class="lbl">${esc(p.label)}${p.date ? ` — <span class="dim">${esc(p.date)}</span>` : ""}</span>
          <span class="amt">${fmt(p.amount)}</span>
        </div>`).join("")}
      </div>` : ""}
      <div class="dp-receipt-line total"><span class="lbl">Total payé</span><span class="amt" style="color:var(--success)">${fmt(totalPaid)}</span></div>
      <div class="dp-receipt-line restant ${fullyPaid ? 'paid' : ''}"><span class="lbl">${fullyPaid ? "✓ Soldée" : "Reste à payer"}</span><span class="amt" style="color:${fullyPaid ? 'var(--success)' : 'var(--warning)'}">${fmt(restant)}</span></div>
    </div>


    <div class="dp-actions">
      <button class="btn ghost" onclick="window.print()">🖨️ Imprimer</button>
    </div>
  </div>`;
}

function cliPickEnsurePortal() {
  let p = document.getElementById("cliPickPortal");
  if (!p) {
    p = document.createElement("div");
    p.id = "cliPickPortal";
    document.body.appendChild(p);
  }
  return p;
}

function cliPickPositionPortal() {
  const inp = document.getElementById("cliPickInput");
  const p = cliPickEnsurePortal();
  if (!inp) return;
  const r = inp.getBoundingClientRect();
  p.style.top = (r.bottom + 4) + "px";
  p.style.left = r.left + "px";
  p.style.width = r.width + "px";
}

function cliPickRenderPortal() {
  const p = cliPickEnsurePortal();
  const q = cliPickQuery.trim().toLowerCase();
  const matches = q ? S.clients.entries.filter(e =>
    (e.name||"").toLowerCase().includes(q) ||
    (e.num||"").toLowerCase().includes(q) ||
    (e.contact||"").toLowerCase().includes(q) ||
    (e.email||"").toLowerCase().includes(q)
  ).slice(0, 200) : S.clients.entries.slice(0, 200);
  const showCreate = q && !S.clients.entries.some(e => (e.name||"").toLowerCase() === q);
  const html =
    (matches.length === 0 && !showCreate ? `<div class="empty">${q ? "Aucun client trouvé. Tape un nom puis « Créer »…" : "Aucun client enregistré. Tape pour créer le premier."}</div>` : "") +
    matches.map(e => `<div class="item" onmousedown="cliPickSelect('${e.id}')"><span class="num">${esc(e.num || "—")}</span>${esc(e.name || "(sans nom)")}</div>`).join("") +
    (showCreate ? `<div class="create" onmousedown="cliPickStartCreate()">+ Créer le client « ${esc(cliPickQuery)} »</div>` : (S.clients.entries.length === 0 ? `<div class="create" onmousedown="cliPickStartCreate()">+ Créer un nouveau client</div>` : ""));
  p.innerHTML = html;
}

function cliPickShowDropdown() {
  const p = cliPickEnsurePortal();
  cliPickRenderPortal();
  cliPickPositionPortal();
  p.classList.add("open");
}
window.cliPickShowDropdown = cliPickShowDropdown;

function cliPickHideDropdown() {
  setTimeout(() => {
    const p = document.getElementById("cliPickPortal");

  }, 180);
}

function cliPickSearch(v) {

}
window.cliPickSearch = cliPickSearch;

function cliPickSelect(id) {
  const e = S.clients.entries.find(x => x.id === id);
  if (!e) return;
  const validContacts = (e.contacts || []).filter(c => c.name || c.phone || c.email);
  const onlyContact = validContacts.length === 1 ? validContacts[0] : null;
  S.mission.client = {
    id: e.id, num: e.num || "", name: e.name || "",
    contact: e.contact || "", address: e.address || "", cityPostal: e.cityPostal || "",
    phone: e.phone || "", email: e.email || "",
    contactId: onlyContact ? onlyContact.id : "",
    contactSelected: onlyContact ? (onlyContact.name || "") : "",
    phoneSelected: onlyContact ? (onlyContact.phone || "") : "",
    emailSelected: onlyContact ? (onlyContact.email || "") : ""
  };
  // If 2+ contacts, open the modal so user picks explicitly
  contactPickerModalOpen = validContacts.length > 1;
  recomputeRef();
  cliPickQuery = "";
  cliPickCreating = false;
  save();
  render();
}
window.cliPickSelect = cliPickSelect;

function cliPickReset() {
  S.mission.client = { id:"", num:"", name:"", contact:"", address:"", phone:"", email:"" };
  recomputeRef();
  cliPickQuery = "";
  cliPickCreating = false;
  save();
  render();
}
window.cliPickReset = cliPickReset;

function cliPickStartCreate() {
  cliPickCreating = true;
  cliPickDraft = { num:"", name: cliPickQuery || "", contact:"", address:"", cityPostal:"", phone:"", email:"", rencontre:"" };
  render();
}
window.cliPickStartCreate = cliPickStartCreate;

function cliPickCancelCreate() {

function cliPickDraftSet(field, val) {

function cliPickSaveCreate() {
  if (!cliPickDraft.name.trim()) { alert("Le nom du client est obligatoire."); return; }
  const id = uid();
  const cd = cliPickDraft;
  const contacts = (cd.contact || cd.phone || cd.email)
    ? [{ id: uid(), name: cd.contact || "", phone: cd.phone || "", email: cd.email || "" }]

  const entry = { id, ...cd, contacts };

  };

let bugQ = "";

function bugAdd() {

function bugToggleValid(id) {
  const it = (S.bugs.items || []).find(x => x.id === id);
  if (!it) return;
  it.validated = !it.validated;
  save();
  render();
}
window.bugToggleValid = bugToggleValid;

function bugUpdateText(id, v) {
  const it = (S.bugs.items || []).find(x => x.id === id);
  if (!it) return;
  it.text = v;
  save();
}
window.bugUpdateText = bugUpdateText;

function bugAddStep(id) {
  const it = (S.bugs.items || []).find(x => x.id === id);
  if (!it) return;
  if (!Array.isArray(it.steps)) it.steps = [];
  it.steps.push("");
  save();
  render();
  requestAnimationFrame(() => {
    const els = document.querySelectorAll(`[data-bug-step^="${id}-"]`);
    if (els.length) els[els.length - 1].focus();
  });
}
window.bugAddStep = bugAddStep;

function bugUpdateStep(id, idx, v) {
  const it = (S.bugs.items || []).find(x => x.id === id);
  if (!it || !Array.isArray(it.steps)) return;
  it.steps[idx] = v;
  save();
}
window.bugUpdateStep = bugUpdateStep;

function bugDelStep(id, idx) {
  const it = (S.bugs.items || []).find(x => x.id === id);
  if (!it || !Array.isArray(it.steps)) return;
  it.steps.splice(idx, 1);
  save();
  render();
}
window.bugDelStep = bugDelStep;

function bugBuildText() {
  const items = ((S.bugs && S.bugs.items) || []).filter(it => !it.validated && (it.text || "").trim());
  if (!items.length) return "";
  let txt = "";
  items.forEach((it, i) => {
    txt += `${i + 1}. ${(it.text || "").trim()}\n`;
    (it.steps || []).forEach(s => {
      const st = (s || "").trim();
      if (st) txt += `   - ${st}\n`;
    });
  });
  return txt.trimEnd();
}

function bugCopy() {
  const txt = bugBuildText();
  const btn = document.getElementById("bug-copy-btn");
  if (!txt) {
    if (btn) {
      const old = btn.textContent;
      btn.textContent = "Aucune action en cours";
      setTimeout(() => { btn.textContent = old; }, 1500);
    }
    return;
  }
  const done = () => {
    if (btn) {
      const old = btn.textContent;
      btn.textContent = "✓ Copié !";
      btn.classList.add("copied");
      setTimeout(() => { btn.textContent = old; btn.classList.remove("copied"); }, 1800);
    }
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(txt).then(done).catch(() => bugCopyFallback(txt, done));
  } else {
    bugCopyFallback(txt, done);
  }
}
window.bugCopy = bugCopy;

function bugCopyFallback(txt, done) {
  try {
    const ta = document.createElement("textarea");
    ta.value = txt;
    ta.style.position = "fixed";
    ta.style.left = "-9999px";
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    done();
  } catch (e) {
    prompt("Copie manuellement :", txt);
  }
}

// ============ PAIEMENT INFO HELPER ============
// Given a (devis, paiementType, marge%, urssaf%, amount), return a structured explanation
// of what this combination means: who invoices, marge possibility, URSSAF impact, when to use it.
// ============ PAIEMENT INFO HELPER ============
// Compute the "displayed amount" for a materiel ligne (or transport amount), with URSSAF
// compensation and marge avance baked in when applicable.
//
// FORMULA (inverse / true URSSAF compensation):
//   step 1 — apply avance markup:    baseAvance = base × (1 + avance%)
//   step 2 — apply URSSAF inverse:   total = baseAvance / (1 - urssaf%)
//
// Result: charging `total` to the client, after URSSAF takes its share, the photographer
// nets exactly `baseAvance` (i.e., the original price + their avance margin).
//
// Returns { amount, breakdown, hasMarkup, baseAmount, avanceAmt, urssafAmt }.
function ligneDisplayInfo(devis, paiementType, basePrix, margeAvancePct, margeUrssafPct, clientFacing) {
  const base = r2(num(basePrix));
  const isDebours = devis === "debours";
  // Débours items: no markup, no URSSAF (hors CA)
  if (isDebours) {
    return { amount: base, breakdown: "", hasMarkup: false, baseAmount: base, avanceAmt: 0, urssafAmt: 0 };
  }
  const isAvance = paiementType === "avance";
  const avancePct = num(margeAvancePct);
  const urssafPct = num(margeUrssafPct);
  // Step 1: avance markup (only for Avance items)
  const baseAvance = isAvance ? r2(base * (1 + avancePct / 100)) : base;
  // Step 2: URSSAF inverse compensation (always, on Principal items)
  const urssafFactor = 1 - urssafPct / 100;
  const total = (urssafFactor > 0) ? r2(baseAvance / urssafFactor) : baseAvance;
  const avanceAmt = r2(baseAvance - base);
  const urssafAmt = r2(total - baseAvance);
  const hasMarkup = (urssafAmt > 0 || avanceAmt > 0);
  // Build breakdown:
  //   - clientFacing=true (devis preview): hide all markup details (URSSAF + avance) — client just sees the final amount.
  //   - clientFacing=false (form): show full breakdown for the photographer.
  let breakdown = "";
  if (hasMarkup && !clientFacing) {
    const parts = [`${num(base).toFixed(2).replace(".", ",")} €`];
    if (avanceAmt > 0) parts.push(`+ ${avancePct.toString().replace(".", ",")} % avance`);
    if (urssafAmt > 0) parts.push(`+ URSSAF ${urssafPct.toString().replace(".", ",")} %`);
    breakdown = parts.join(" ");
  }
  return { amount: total, breakdown, hasMarkup, baseAmount: base, avanceAmt, urssafAmt };
}

function paiementInfoFor(devis, paiementType, margeAvancePct, margeUrssafPct, lineAmount) {
  const isDebours = devis === "debours";
  const isAcompte = paiementType === "acompte";
  const isAvance = paiementType === "avance";
  const isFactDirect = paiementType === "fact-direct";

  if (!isDebours && isAcompte) {
    const urssafPct = num(margeUrssafPct);
    const urssafFactor = 1 - urssafPct / 100;
    const final = (urssafFactor > 0) ? r2(lineAmount / urssafFactor) : lineAmount;
    const urssafAmt = r2(final - lineAmount);
    return {
      title: "Principal + Acompte",
      facture: "Le fournisseur te facture à ton nom.",
      marge: "0 % · 0,00 €",
      urssaf: `${urssafPct.toString().replace(".", ",")} % · ${fmt(urssafAmt)}`,
      quand: "Tu veux que le client paie cette dépense via l'acompte à la commande, pour ne pas avancer ta trésorerie."
    };
  }
  if (!isDebours && isAvance) {
    const avancePct = num(margeAvancePct);
    const urssafPct = num(margeUrssafPct);
    const baseAvance = r2(lineAmount * (1 + avancePct / 100));
    const urssafFactor = 1 - urssafPct / 100;
    const final = (urssafFactor > 0) ? r2(baseAvance / urssafFactor) : baseAvance;
    const avanceAmt = r2(baseAvance - lineAmount);
    const urssafAmt = r2(final - baseAvance);
    return {
      title: "Principal + Avance",
      facture: "Le fournisseur te facture à ton nom. Tu avances la dépense.",
      marge: `${avancePct.toString().replace(".", ",")} % · ${fmt(avanceAmt)}`,
      urssaf: `${urssafPct.toString().replace(".", ",")} % · ${fmt(urssafAmt)}`,
      quand: "Tu avances ta trésorerie. La marge avance te rémunère pour le risque, la compensation URSSAF couvre les cotisations sur cette ligne."
    };
  }
  if (isDebours) {
    // v1.39+ : seul Débours+Fact.Direct subsiste (Acompte supprimé)
    return {
      title: "Débours",
      facture: "Le fournisseur facture directement ton client final (mandat de débours requis, art. 267 II CGI). Tu n'interviens pas dans le paiement.",
      marge: "0 % · 0,00 €",
      urssaf: `0 % · 0,00 € (hors CA, hors URSSAF)`,
      quand: "Le client paie le fournisseur en direct. La ligne est juste indicative sur le devis. Idéal quand le fournisseur accepte de facturer ton client final."
    };
  }
  // Should not happen but safe fallback
  return {
    title: "Combinaison invalide",
    facture: "—", marge: "—", urssaf: "—", quand: "Choisis une combinaison valide.",
    warn: true
  };
}

// ============ TOOLTIP MECHANISM ============
// On (i) hover, build content from current state and show a positioned tooltip.
// Values reflect the current S.mission state, not a stale render — fresh on every hover.
let _paiementTooltipEl = null;
function _ensureTooltipEl() {
  if (_paiementTooltipEl) return _paiementTooltipEl;
  const el = document.createElement("div");
  el.className = "paiement-tooltip-wrap";
  el.style.display = "none";
  document.body.appendChild(el);
  _paiementTooltipEl = el;
  return el;
}

window.showPaiementInfo = function(evt, kind, id) {
  const el = _ensureTooltipEl();
  let info = null;
  const m = S.mission || {};
  const p = m.paiement || {};
  const isDeclared = m.declare !== false;
  const margeAvance = isDeclared ? num(p.margeAvance ?? 0) : 0;
  const margeUrssaf = isDeclared ? num(m.urssafPct ?? 22) : 0;
  if (kind === "ligne") {
    const l = S.mission.lignes.find(x => x.id === id);
    if (l && l.type === "materiel") {
      info = paiementInfoFor(l.devis, l.paiementType, margeAvance, margeUrssaf, r2(num(l.prix)));
    }
  } else if (kind === "depl") {
    const ts = totals();
    info = paiementInfoFor(S.mission.deplacement.devis, S.mission.deplacement.paiementType, margeAvance, margeUrssaf, ts.depl);
  }
  if (!info) { el.style.display = "none"; return; }
  el.innerHTML = renderPaiementInfo(info);
  el.style.display = "block";
  // Position relative to the (i) icon
  const target = evt.currentTarget || evt.target;
  const rect = target.getBoundingClientRect();
  const tooltipW = 380;
  const margin = 12;
  let left = rect.right + 8;
  if (left + tooltipW > window.innerWidth - margin) left = Math.max(margin, rect.left - tooltipW - 8);
  let top = rect.top - 4;
  // Wait one frame to measure tooltip height for vertical positioning
  requestAnimationFrame(() => {
    const h = el.offsetHeight;
    if (top + h > window.innerHeight - margin) top = Math.max(margin, window.innerHeight - h - margin);
    el.style.top = top + "px";
  });
  el.style.left = left + "px";
  el.style.top = top + "px";
};
window.hidePaiementInfo = function() {
  if (_paiementTooltipEl) _paiementTooltipEl.style.display = "none";
};

// Tooltip Remise — réutilise le même portail (position:fixed dans body)
// pour éviter tout problème de clipping (overflow:hidden des sections accordéon).
window.showRemiseInfo = function(evt) {

    const h = el.offsetHeight;
    if (top + h > window.innerHeight - margin) top = Math.max(margin, window.innerHeight - h - margin);
    el.style.top = top + "px";

};

// Round to 2 decimals, killing IEEE-754 float garbage
function r2(v) { return Math.round((+v + Number.EPSILON) * 100) / 100; }

// Format a stored ref (e.g. "DEVIS-12-2026-04-26") into a human-readable display
// ("Devis n° 12-2026-04-26" / "Débours n° ..." / "Facture n° ...").
// Storage keeps the raw form for backward compat, display always uses this.
function formatRef(ref, type) {
  const labels = { devis: "Devis", debours: "Débours", facture: "Facture" };
  const label = labels[type] || "Devis";
  if (!ref || ref === "DEVIS-…-…") return `${label} n° …`;
  const stripped = ref.replace(/^(DEVIS|DEBOURS|FACTURE)-/i, "");
  return `${label} n° ${stripped}`;
}

// ▼ totals — calcul HT/TVA/TTC, brut/net, débours, marge avance
function totals() {
  const d = S.mission;
  // Hourly rate logic. The catalog price `cat.p` is the photographer's gross billed price
  // (CA déclaré, URSSAF incluse). For French auto-entrepreneur, URSSAF = X% du CA :
  //   net before matos = gross × (1 - URSSAF%)
  //   gross = net / (1 - URSSAF%)
  // Au black, the photographer can pass the URSSAF saved as a discount to the client:
  //   tarif au black = gross × (1 - URSSAF%) — équivalent net
  const cat = (S.tarifs.catalog || DEFAULT_CATALOG).find(c => c.k === d.object);
  const _baseTotal = cat ? num(cat.p) : 0;
  const _isDecTot = d.declare !== false;
  const _urssafFactorTot = 1 - (num(d.urssafPct ?? 22)) / 100; // e.g., 0.78 for 22%
  // Tarif horaire :
  //   - Déclaré : tarif catalogue tel quel (gross facturé)
  //   - Au black "taux fixe" : même prix que déclaré (photographe garde l'URSSAF)
  //   - Au black "taux réduit" : prix réduit (= net déclaré, le client économise l'URSSAF)
  const _blackMode = d.blackMode || "reduit";
  const tarifH = _isDecTot
    ? _baseTotal
    : (_baseTotal > 0
        ? (_blackMode === "fixe" ? _baseTotal : r2(_baseTotal * _urssafFactorTot))
        : 0);
  const HOURS_PER_DAY = 8;
  // Marge rates: au black ⇒ no compensation (everything raw).
  // URSSAF rate read from the unique source of truth (mission.urssafPct).
  const margeAvancePct = _isDecTot ? num(d.paiement?.margeAvance ?? 0) : 0;
  const margeUrssafPct = _isDecTot ? num(d.urssafPct ?? 22) : 0;
  // First pass: walk lignes — accumulate hours and per-line final amounts.
  // For Principal items, use ligneDisplayInfo() to compute the final (post-URSSAF, post-avance)
  // amount with the inverse formula. The sum is what the client owes.
  let totalHeures = 0, materielPrincipalFinal = 0, debours = 0;
  // totalAcompteMateriel: base-price sum of acompte items (used for acompte suggestion %).
  // totalAvanceBase: base-price sum of avance items (for hint texts).
  // totalFactDirect: separate bucket — fact-direct items don't enter HT or débours.
  // totalAvanceMontant + totalUrssafMontant: derived sums of markup amounts (for hints/tooltips).
  let totalAcompteMateriel = 0, totalAvanceBase = 0, totalFactDirect = 0;
  let totalAvanceMontant = 0, totalUrssafMontant = 0, totalPrincipalBase = 0;
  const heuresHList = [];
  for (const l of d.lignes || []) {
    if (l.type === "heures") {
      const h = num(l.duree) * (l.unit === "j" ? HOURS_PER_DAY : 1);
      totalHeures = r2(totalHeures + h);
      heuresHList.push(h);
    } else if (l.type === "cession") {
      const p = r2(num(l.prix));
      materielPrincipalFinal = r2(materielPrincipalFinal + p);
      totalPrincipalBase = r2(totalPrincipalBase + p);
      totalAcompteMateriel = r2(totalAcompteMateriel + p);
    } else if (l.type === "materiel") {
      const p = r2(num(l.prix));
      if (l.devis === "debours") {
        // Débours: hors CA, no markup. Acompte → débours bucket; Fact.Direct → its own bucket.
        if (l.paiementType === "fact-direct") {
          totalFactDirect = r2(totalFactDirect + p);
        } else {
          debours = r2(debours + p);
          if (l.paiementType === "acompte") totalAcompteMateriel = r2(totalAcompteMateriel + p);
        }
      } else {
        // Principal: apply the markup formula (avance first, then URSSAF inverse)
        const info = ligneDisplayInfo(l.devis, l.paiementType, l.prix, margeAvancePct, margeUrssafPct, false);
        materielPrincipalFinal = r2(materielPrincipalFinal + info.amount);
        totalPrincipalBase = r2(totalPrincipalBase + p);
        totalAvanceMontant = r2(totalAvanceMontant + info.avanceAmt);
        totalUrssafMontant = r2(totalUrssafMontant + info.urssafAmt);
        if (l.paiementType === "acompte") totalAcompteMateriel = r2(totalAcompteMateriel + p);
        if (l.paiementType === "avance") totalAvanceBase = r2(totalAvanceBase + p);
      }
    }
  }
  // Déplacement — round each component
  const mode = d.deplacement.mode || "voiture";
  const tauxKm = num(d.deplacement.tauxKm) || 0.40;
  const trajet = r2(num(d.deplacement.trajetH) * 40);
  const depl = mode === "voiture"
    ? r2(r2(num(d.deplacement.km) * tauxKm) + r2(num(d.deplacement.peages)) + trajet)
    : r2(r2(num(d.deplacement.ticket)) + trajet);
  const deplMode = d.deplacement.devis || "principal";
  const deplAfficheMode = d.deplacement.afficheMode || "afficher";
  const deplGoesToDebours = deplMode === "debours";
  const deplGoesToPrincipal = deplMode === "principal";
  // "Lisser dans taux horaire" mode: bake déplacement into hourly rate (only meaningful when Principal + hours exist)
  const deplLisser = deplGoesToPrincipal && deplAfficheMode === "lisser" && totalHeures > 0;
  // Apply markup to déplacement when Principal (works for BOTH voiture and transport)
  let deplFinal = depl;
  if (depl > 0 && deplGoesToPrincipal) {
    const dInfo = ligneDisplayInfo("principal", d.deplacement.paiementType, depl, margeAvancePct, margeUrssafPct, false);
    deplFinal = dInfo.amount;
    totalPrincipalBase = r2(totalPrincipalBase + depl);
    totalAvanceMontant = r2(totalAvanceMontant + dInfo.avanceAmt);
    totalUrssafMontant = r2(totalUrssafMontant + dInfo.urssafAmt);
    if (d.deplacement.paiementType === "acompte") totalAcompteMateriel = r2(totalAcompteMateriel + depl);
    if (d.deplacement.paiementType === "avance") totalAvanceBase = r2(totalAvanceBase + depl);
  } else if (depl > 0 && deplGoesToDebours) {
    if (d.deplacement.paiementType === "fact-direct") {
      totalFactDirect = r2(totalFactDirect + depl);
    } else if (d.deplacement.paiementType === "acompte") {
      totalAcompteMateriel = r2(totalAcompteMateriel + depl);
    }
  }
  // Effective hourly rate (with déplacement baked in if "lisser" mode — uses FINAL amount with markup)
  let tarifHEff = tarifH;
  let deplPerHour = 0;
  if (deplLisser && deplFinal > 0) {
    deplPerHour = r2(deplFinal / totalHeures);
    tarifHEff = r2(tarifH + deplPerHour);
  }
  // Heures amount (per-ligne rounding for stable totals)
  let heuresAmount = 0;
  for (const h of heuresHList) {
    heuresAmount = r2(heuresAmount + r2(h * tarifHEff));
  }
  const lignesAmount = r2(heuresAmount + materielPrincipalFinal);
  if (deplGoesToDebours && d.deplacement.paiementType !== "fact-direct") debours = r2(debours + depl);
  const autres = 0;
  // Subtotal: heures (which includes lisser depl baked into tarifH) + materiel principal (final) +
  //           déplacement final IF Principal+Afficher (separate line in devis)
  // - Principal+Afficher: depl shown as separate line, added to subtotal
  // - Principal+Lisser+hours: depl baked into tarifH, NOT in subtotal separately (heuresAmount already includes it)
  // - Principal+Lisser+0 hours: degenerate case — show as separate line (otherwise depl disappears)
  const deplShownAsLine = deplGoesToPrincipal && (deplAfficheMode === "afficher" || (deplAfficheMode === "lisser" && totalHeures === 0));
  const effectiveDeplMode = deplShownAsLine ? "principal" : (deplLisser ? "lisser" : deplMode);
  const subtotal = r2(lignesAmount + (deplShownAsLine ? deplFinal : 0));
  const remise = r2(subtotal * num(d.remisePct) / 100);
  const total = r2(subtotal - remise);
  // Acompte suggested %: max(30, totalAcompteMateriel/total*100)
  const acompteSuggestedPct = total > 0
    ? Math.max(30, Math.ceil(totalAcompteMateriel / total * 100))
    : 30;
  // Échéances breakdown (% of total)
  const echeances = (d.echeances || []).map(e => ({
    id: e.id, label: e.label, pct: num(e.pct), amount: r2(total * num(e.pct) / 100)
  }));
  const echeancesTotal = r2(echeances.reduce((s, e) => s + num(e.pct), 0));
  return {
    lignes: lignesAmount, debours, depl, autres, totalFactDirect,
    subtotal, remise, total, totalHeures,
    tarifH, tarifHEff, deplPerHour, deplMode, effectiveDeplMode,
    acompte: r2(total * 0.30), reste: r2(total * 0.70),
    echeances, echeancesTotal,
    totalAcompteMateriel, totalAvance: totalAvanceBase, totalPrincipalBase,
    margeAvancePct, margeAvanceAmount: totalAvanceMontant,
    margeUrssafPct, margeUrssafAmount: totalUrssafMontant,
    acompteSuggestedPct,
    prep: 0, prod: lignesAmount, post: 0
  };
}

function rTauxBreakdown() {
  // Inline breakdown shown under "Temps de trajet" when "Lisser dans taux horaire" mode is active.
  const d = S.mission;
  const isLisser = (d.deplacement.devis || "principal") === "principal" && (d.deplacement.afficheMode || "afficher") === "lisser";
  if (!isLisser) return "";

  const b = tarifBreakdown(true);

}

  const totalRow = document.getElementById("echTotalRow");

  const warnEl = document.getElementById("echWarn");
  if (totalRow && totalPct) {
    const pctSum = t2.echeancesTotal;

// Detect if a value is rich HTML or plain text
function isRichHtml(s) {
  if (!s) return false;
  return /<\/?(p|div|span|br|b|i|u|strong|em|ul|ol|li|font|h[1-6])\b/i.test(s);
}

// Convert plain text → safe HTML (preserve newlines as <br>)
function plainToHtml(s) {
  if (!s) return "";
  return esc(s).replace(/\n/g, "<br>");
}

// Used for read-only preview (in Mission and devis): outputs HTML
// If value already contains HTML tags, render as-is. Else convert plain → HTML.
function richDisplayHtml(s) {
  if (!s) return "";
  return isRichHtml(s) ? s : plainToHtml(s);
}

// ============ CGV (structured sections) ============
// Each CGV is composed of an optional preamble paragraph + an array of {id, title, body} sections.
// renderCgvSections() turns this data into the HTML used in the devis preview / printed output.
function renderCgvSections(preambule, sections) {
  const safePreamb = (preambule || "").trim().replace(/\n+/g, " ");
  const list = Array.isArray(sections) ? sections : [];
  const validSections = list.filter(s => s && (s.title || s.body));
  if (!safePreamb && validSections.length === 0) return "";
  let html = "";
  if (safePreamb) {
    html += `<p class="cgv-paragraph">${esc(safePreamb)}</p>`;
  }
  validSections.forEach((s, i) => {
    const title = (s.title || "").trim();
    const body = (s.body || "").trim().replace(/\n+/g, " ");
    // Auto-add a period after the title if missing (juridical convention: "1. Title. Body...")
    const titleDisplay = title && !/[.!?:]$/.test(title) ? title + "." : title;
    const titlePart = title
      ? `<strong class="cgv-section-title">${i + 1}. ${esc(titleDisplay)}</strong> `
      : `<strong class="cgv-section-title">${i + 1}.</strong> `;
    html += `<p class="cgv-section">${titlePart}${esc(body)}</p>`;
  });
  return html;
}

// parseCgvText: one-shot migration helper that turns legacy free-text CGV into {preambule, sections[]}.
// Used at app load to migrate existing data, and never called again afterwards.
function parseCgvText(rawText) {
  if (!rawText || !String(rawText).trim()) return { preambule: "", sections: [] };
  let text = String(rawText)
    .replace(/<\/p>\s*<p[^>]*>/gi, "\n\n")
    .replace(/<br\s*\/?>/gi, "\n")
    .replace(/<\/?p[^>]*>/gi, "")
    .replace(/&nbsp;/g, " ");
  text = text.replace(/\r\n?/g, "\n").trim();
  const paragraphs = text.split(/\n\s*\n/).map(p => p.trim()).filter(Boolean);
  const sections = [];
  const preambleParts = [];
  let foundFirstSection = false;
  for (const p of paragraphs) {
    const numMatch = p.match(/^(\d+)\.\s+([\s\S]+)$/);
    if (numMatch) {
      foundFirstSection = true;
      const rest = numMatch[2];
      let title, body;
      const newlineIdx = rest.indexOf("\n");
      if (newlineIdx > 0 && newlineIdx <= 80) {
        title = rest.substring(0, newlineIdx).trim();
        body = rest.substring(newlineIdx + 1).trim();
      } else {
        const sentMatch = rest.match(/^([^.\n]{2,80})\.\s+([\s\S]+)$/);
        if (sentMatch) {
          title = sentMatch[1].trim();
          body = sentMatch[2].trim();
        } else {
          title = rest.length <= 80 ? rest.replace(/\.$/, "").trim() : rest.substring(0, 60).trim() + "…";
          body = rest.length <= 80 ? "" : rest;
        }
      }
      sections.push({ id: uid(), title, body });
    } else if (!foundFirstSection) {
      // Preamble (only paragraphs before the first numbered section count as preamble)
      preambleParts.push(p);
    } else {
      // Unnumbered paragraph after sections — append to last section's body
      if (sections.length > 0) {
        sections[sections.length - 1].body = (sections[sections.length - 1].body || "") + "\n\n" + p;
      } else {
        preambleParts.push(p);
      }
    }
  }
  return { preambule: preambleParts.join("\n\n"), sections };
}

// CRUD handlers (no full re-render on every keystroke — render only on add/remove/move)
window.cgvSectionAdd = function() {
  if (!Array.isArray(S.mission.cgvSections)) S.mission.cgvSections = [];
  S.mission.cgvSections.push({ id: uid(), title: "", body: "" });
  save();
  render();
};
window.cgvSectionUpdate = function(id, field, val) {
  const s = (S.mission.cgvSections || []).find(x => x.id === id);
  if (!s) return;
  s[field] = val;
  save();
  // No render — would lose focus in input/textarea
};
window.cgvSectionRemove = function(id) {
  const s = (S.mission.cgvSections || []).find(x => x.id === id);
  if (!s) return;
  const label = s.title ? `« ${s.title} »` : "cette section";
  if (!confirm(`Supprimer ${label} ?`)) return;
  S.mission.cgvSections = (S.mission.cgvSections || []).filter(x => x.id !== id);
  save();
  render();
};
window.cgvSectionMoveUp = function(id) {
  const sections = S.mission.cgvSections || [];
  const i = sections.findIndex(x => x.id === id);
  if (i <= 0) return;
  [sections[i - 1], sections[i]] = [sections[i], sections[i - 1]];
  save();
  render();
};
window.cgvSectionMoveDown = function(id) {
  const sections = S.mission.cgvSections || [];
  const i = sections.findIndex(x => x.id === id);
  if (i < 0 || i >= sections.length - 1) return;
  [sections[i + 1], sections[i]] = [sections[i], sections[i + 1]];
  save();
  render();
};

window.textEditorOpen = function(field) {

      range.selectNodeContents(ed);

      sel.removeAllRanges();

// Compute the suggested PDF filename for the currently open print modal
// ▼ computePrintFilename — nom de fichier PDF (devis/débours/facture)
function computePrintFilename() {
  let dv = null, kind = "Devis";
  if (typeof viewDevisModal !== "undefined" && viewDevisModal) {
    dv = S.suivi.devis && S.suivi.devis[viewDevisModal.devisId];
    kind = (viewDevisModal.view === "debours") ? "Débours" : "Devis";
  } else if (typeof viewFactureModal !== "undefined" && viewFactureModal) {
    dv = S.suivi.devis && S.suivi.devis[viewFactureModal.devisId];
    kind = "Facture";
  } else if (typeof activePreviewTab !== "undefined" && activePreviewTab === "debours") {
    // Printing the débours tab from Mission preview
    kind = "Débours";
  }
  if (!dv) {
    // Fallback: building from current mission
    const m = S.mission || {};
    const cli = (m.client && (m.client.name || "Client")) || "Client";
    const ref = m.ref || "DEVIS";
    const refClean = ref.replace(/^(DEVIS|DEBOURS|FACTURE)-?/i, "");
    return sanitizeFilename(`${cli} - ${kind} ${refClean}`);
  }
  // Try to get prestation from the first suivi entry of this devis
  const devisId = (viewDevisModal && viewDevisModal.devisId) || (viewFactureModal && viewFactureModal.devisId);
  const firstEntry = (S.suivi.entries || []).find(e => e.devisId === devisId);
  const prestation = (firstEntry && firstEntry.prestation) || "";
  const client = dv.snapshotClient || "Client";
  const ref = dv.ref || "DEVIS";
  // Strip "DEVIS-" prefix from ref to be more readable: "14-2026-04-26"
  const refClean = ref.replace(/^(DEVIS|DEBOURS|FACTURE)-?/i, "");
  let name = `${client} - ${kind} ${refClean}`;
  if (prestation) name += ` - ${prestation}`;
  return sanitizeFilename(name);
}

function sanitizeFilename(s) {
  // Strip illegal chars, collapse whitespace
  return String(s)
    .replace(/[<>:"/\\|?*\x00-\x1f]/g, "")
    .replace(/\s+/g, " ")
    .trim()
    .slice(0, 120);
}

// Show a one-time print tip, then trigger print with custom filename
let printTipShown = false;
let savedDocumentTitle = "";

function _doPrint() {
  // Set a temporary title that browsers use as default PDF filename
  savedDocumentTitle = document.title;
  const newTitle = computePrintFilename();
  document.title = newTitle;
  // Restore on afterprint (or fallback timeout)
  const restore = () => {
    if (savedDocumentTitle) document.title = savedDocumentTitle;
    savedDocumentTitle = "";
    window.removeEventListener("afterprint", restore);
  };
  window.addEventListener("afterprint", restore);
  setTimeout(restore, 8000); // safety fallback
  window.print();
}

window.printWithTip = function() {
  if (printTipShown) {
    setTimeout(_doPrint, 50);
    return;
  }
  printTipShown = true;
  printTipModalOpen = true;
  render();
};
window.printTipDismiss = function(proceed) {
  printTipModalOpen = false;
  render();
  if (proceed) setTimeout(_doPrint, 100);
};

// ▼ rViewFactureModal — modal Suivi : visu/impression facture
function rViewFactureModal() {
  if (!viewFactureModal) return "";
  const devisId = viewFactureModal.devisId;
  const dv = S.suivi.devis && S.suivi.devis[devisId];
  const lignes = (S.suivi.entries || []).filter(e => e.devisId === devisId);
  const refRaw = (dv && dv.ref) || devisId;
  const factureRef = formatRef(refRaw, "facture");
  // Compute totals — la vérité du paiement est portée par entry.statut === "termine"
  const totalDevis = lignes.reduce((s, e) => s + num(e.montant), 0);
  const paidLines = lignes.filter(e => entryStatut(e) === "termine");
  const totalPaid = paidLines.reduce((s, e) => s + num(e.montant), 0);
  const restant = r2(totalDevis - totalPaid);
  const fullyPaid = restant <= 0.01 && totalPaid > 0;
  let snapshot = (dv && dv.snapshotHtml) || "";
  // Inject current logo if absent from older snapshots
  const currentLogo = (S.mission && S.mission.logoUrl) || "";
  if (snapshot && currentLogo && !snapshot.includes('class="dp-logo"')) {
    snapshot = `<div class="dp-logo-wrap"><img src="${esc(currentLogo)}" alt="Logo" class="dp-logo"></div>${snapshot}`;
  }
  const client = (dv && dv.snapshotClient) || (lignes[0] && lignes[0].client) || "—";
  const when = (dv && dv.snapshotAt) ? new Date(dv.snapshotAt).toLocaleString("fr-FR") : null;

  // Build receipt section
  const receiptHtml = `<div class="dp-receipt" style="margin:18px 0 0">
    <h4>Récapitulatif paiement</h4>
    ${paidLines.length > 0 ? `<div class="dp-receipt-list">
      ${paidLines.map(p => `<div class="dp-receipt-line">
        <span class="lbl">${esc(p.echeance || "Paiement")}</span>
        <span class="amt">${fmt(p.montant)}</span>
      </div>`).join("")}
    </div>` : `<div class="dp-receipt-line"><span class="lbl dim" style="font-style:italic">Aucune échéance n'est marquée comme payée pour l'instant.</span></div>`}
    <div class="dp-receipt-line total"><span class="lbl">Total payé</span><span class="amt" style="color:var(--success)">${fmt(totalPaid)}</span></div>
    <div class="dp-receipt-line restant ${fullyPaid ? 'paid' : ''}"><span class="lbl">${fullyPaid ? "✓ Soldée" : "Reste à payer"}</span><span class="amt" style="color:${fullyPaid ? 'var(--success)' : 'var(--warning)'}">${fmt(restant)}</span></div>
  </div>`;

  // Build the facture body: snapshot HTML with the ref swapped from "Devis"/"DEVIS" → "Facture"/"FACTURE"
  let body;
  if (snapshot) {
    const snapshotFacture = snapshot
      .replace(/(<div class="ref"[^>]*>)([\s\S]*?)(<\/div>)/, (m, a, content, end) => {
        // Replace either old format ("DEVIS-...") or new format ("Devis n° ...")
        const newContent = content
          .replace(/^DEVIS\b/, "FACTURE")
          .replace(/^Devis\b/, "Facture");
        return `${a}${newContent}${end}`;
      });
    body = `<div class="devis-preview view-devis-snapshot">${snapshotFacture}${receiptHtml}</div>`;
  } else {
    body = `<div class="empty" style="padding:40px;text-align:center">
      Aucun snapshot devis disponible.<br><span style="font-size:13px;color:var(--text-dim)">La facture est générée à partir du snapshot du devis émis. Émets d'abord le devis depuis l'onglet Devis (« + Enregistrer dans Suivi »).</span>
    </div>`;
  }

  return `<div class="modal-overlay" onclick="if(event.target===this)viewFactureClose()">
    <div class="modal-card modal-card-lg">
      <div class="modal-title" style="color:var(--success)">🧾 ${esc(factureRef)} — ${esc(client)}</div>
      ${when ? `<div class="modal-sub">Devis émis le ${esc(when)} · ${paidLines.length}/${lignes.length} échéance${lignes.length > 1 ? "s" : ""} payée${paidLines.length > 1 ? "s" : ""}</div>` : ""}
      ${body}
      <div class="modal-actions">
        ${snapshot ? `<button class="btn ghost" onclick="printWithTip()">🖨️ Imprimer</button>` : ""}
        <button class="btn" onclick="viewFactureClose()">Fermer</button>
      </div>
    </div>
  </div>`;
}

// ============ REMISE COMPUTATION ============
// Compute remise max recommandée (with 10% safety margin) + détail des coûts.
// Returns { totalSansRemise, urssafActuelle, coutsReels: {matos, deplReel, avances, total},
//           margeBrute, margeAvecSecurite, remiseMaxPct, currentRemiseAmount, currentNet,
//           currentMargeApresRemise, isOverMax, declared }
function computeRemiseInfo() {
  const d = S.mission;
  const t = totals();
  const declared = d.declare !== false;
  const urssafFactor = declared ? (1 - num(d.urssafPct ?? 22) / 100) : 1; // au black: pas d'URSSAF
  // Coût matos horaire (depuis Frais & Tarifs) × heures totales
  let matosCost = 0;
  try {
    const tm = tauxMatos();
    matosCost = r2((tm.tauxAvecSecurite || 0) * t.totalHeures);
  } catch (e) { matosCost = 0; }
  // Déplacement réel (toujours le coût brut, jamais avec URSSAF/marge)
  // C'est ce que tu paies vraiment (essence, billets) indépendamment du mode
  const deplReel = t.depl || 0;
  // Sommes avancées (matériel + transport en mode Avance) — incompressible
  let avances = 0;
  for (const l of (d.lignes || [])) {
    if (l.type === "materiel" && l.devis !== "debours" && l.paiementType === "avance") {
      avances = r2(avances + r2(num(l.prix)));
    }
    if (l.type === "materiel" && l.devis !== "debours" && l.paiementType === "acompte") {
      // Aussi incompressible : tu dois le payer au fournisseur
      avances = r2(avances + r2(num(l.prix)));
    }
  }
  if ((d.deplacement.mode === "transports") && t.depl > 0 && (d.deplacement.devis || "principal") === "principal") {
    // Le déplacement réel est déjà compté dans deplReel ci-dessus, on ne double-compte pas
  }
  const totalSansRemise = t.subtotal; // total HT avant remise
  const urssafActuelle = r2(totalSansRemise * (1 - urssafFactor));
  const netActuel = r2(totalSansRemise * urssafFactor);
  // Coûts réels totaux : ce que tu DOIS dépenser (matos + déplacement + sommes avancées)
  const coutsReels = r2(matosCost + deplReel + avances);
  const margeBrute = r2(netActuel - coutsReels);
  // Marge en % du total HT (= proportion qui te reste après tous les coûts)
  const margeBrutePct = totalSansRemise > 0 ? r2(margeBrute / totalSansRemise * 100) : 0;
  // Calcul de la remise max (point mort exact, marge = 0):
  //   netApresRemise = totalSansRemise × (1-r) × urssafFactor
  //   margeApresRemise = netApresRemise - coutsReels >= 0
  //   ⟹ (1-r) >= coutsReels / (totalSansRemise × urssafFactor)
  //   ⟹ r <= 1 - coutsReels / (totalSansRemise × urssafFactor)
  let remiseMaxPct = 0;
  if (totalSansRemise > 0 && urssafFactor > 0) {
    const seuil = coutsReels / (totalSansRemise * urssafFactor);
    remiseMaxPct = Math.max(0, Math.floor((1 - seuil) * 100));
  }
  // Calculs au taux de remise actuel
  const currentRemisePct = num(d.remisePct);
  const currentRemiseAmount = r2(totalSansRemise * currentRemisePct / 100);
  const currentNet = r2((totalSansRemise - currentRemiseAmount) * urssafFactor);
  const currentMargeApresRemise = r2(currentNet - coutsReels);
  const isOverMax = currentRemisePct > remiseMaxPct;
  return {
    declared,
    totalSansRemise,
    urssafActuelle,
    netActuel,
    coutsReels: { matos: matosCost, deplReel, avances, total: coutsReels },
    margeBrute,
    margeBrutePct,
    remiseMaxPct,
    currentRemisePct,
    currentRemiseAmount,
    currentNet,
    currentMargeApresRemise,
    isOverMax,
    totalHeures: t.totalHeures
  };
}

// Refresh the max attribute on the Remise input, without re-rendering the form
// (so input focus and caret are preserved). Called from refreshTotals().
// La tooltip elle-même est rebuild dynamiquement à chaque hover (showRemiseInfo),
// donc plus besoin de la rafraîchir ici.
function refreshRemiseTooltip() {
  const ri = computeRemiseInfo();
  const inp = document.querySelector(".remise-input-wrap input");
  if (inp) {
    inp.setAttribute("max", String(ri.remiseMaxPct));
    inp.setAttribute("oninput", `updRemise(this.value, ${ri.remiseMaxPct})`);
    // If the current value now exceeds the new max (e.g. user added more cost items), clamp it
    if (num(inp.value) > ri.remiseMaxPct) {
      inp.value = String(ri.remiseMaxPct);
      S.mission.remisePct = String(ri.remiseMaxPct);
      save();
    }
  }
}

function tarifBreakdown(includeDepl) {
  // Compute per-hour breakdown: Net / +Déplacement / +Matériel / +URSSAF / =Tarif facturé
  // includeDepl=true → also include deplacement spread (only effective if mode is "taux")
  //
  // CORRECT URSSAF FORMULA:
  // For French auto-entrepreneur, URSSAF cotisation = X % du CA. So:
  //   gross billed = CA, URSSAF prélevée = gross × X%, net = gross × (1 - X%).
  // Au black: the photographer can give a discount to the client equal to the URSSAF saved,
  //   so tarif au black = gross × (1 - X%).
  const d = S.mission;
  const declared = d.declare !== false;
  const cat = (S.tarifs.catalog || DEFAULT_CATALOG).find(c => c.k === d.object);
  if (!cat || !d.object) return null;
  const tm = tauxMatos();
  const final = num(cat.p);
  if (final <= 0) return null;
  const urssafPct = num(d.urssafPct ?? 22);
  const urssafFactor = 1 - urssafPct / 100; // e.g., 0.78 for 22%
  const blackMode = d.blackMode || "reduit";
  const matos = tm.tauxAvecSecurite;
  const t = totals();
  const dpH = (includeDepl && t.deplMode === "taux" && t.totalHeures > 0) ? t.deplPerHour : 0;
  // Tarif facturé per hour:
  //   declared      : final + dpH
  //   black "fixe"  : final + dpH (same as declared, photographer keeps the URSSAF)
  //   black "reduit": final × (1-urssaf%) + dpH (discount = URSSAF saved)
  const tarifApplique = declared
    ? r2(final + dpH)
    : (blackMode === "fixe"
        ? r2(final + dpH)
        : r2(r2(final * urssafFactor) + dpH));
  // URSSAF amount: declared = X% of (final + dpH); au black = X% of theoretical CA (= what they save)
  const urssafAmount = r2((final + dpH) * urssafPct / 100);
  // Net per hour after matos (and minus dpH which is a real cost):
  //   declared      : (final + dpH) × (1-urssaf%) - matos - dpH
  //   black "fixe"  : final - matos                  (no URSSAF; dpH already invoiced separately)
  //   black "reduit": final × (1-urssaf%) - matos    (no URSSAF; same net as declared)
  const net = declared
    ? r2(r2((final + dpH) * urssafFactor) - matos - dpH)
    : (blackMode === "fixe"
        ? r2(final - matos)
        : r2(r2(final * urssafFactor) - matos));
  return { net, matos, deplPerHour: dpH, urssafAmount, tarifApplique, declared, blackMode, hasDepl: dpH > 0 };
}

function tarifBreakdownHtml(b) {
  if (!b) return "";
  const showD = b.hasDepl;

// DEVIS v2 — Helpers : drag-reorder, section summaries, validation,
//                      snapshot dirty detection. Logique pure sauf event handlers.

// ----------------------------------------------------------------------------
// SECTION SUMMARIES — pures, pas d'accès DOM. Génèrent les chips compacts
// affichés dans les en-têtes d'accordéon ("3 lignes · 850 €").
// ----------------------------------------------------------------------------
function devisSectionSummaries() {
  const d = S.mission;
  const t = totals();

  // 1. Identification & client
  const cliName = (d.client && d.client.name) ||
    (d.client && d.client.id && (S.clients.entries.find(c => c.id === d.client.id) || {}).name) || "";
  const idSummary = cliName
    ? `<span class="amt">${esc(cliName)}</span>`
    : `<span class="warn">Aucun client</span>`;

  // 2. Prestations — compte des lignes facturables (heures + matériel principal)
  const lignesFact = (d.lignes || []).filter(l =>
    l.type === "heures" || (l.type === "materiel" && l.devis !== "debours")
  ).length;
  const prestaSummary = lignesFact > 0
    ? `<span>${lignesFact} ligne${lignesFact > 1 ? "s" : ""}</span><span class="dot"></span><span class="amt">${fmt(t.lignes)}</span>`
    : `<span class="warn">Aucune prestation</span>`;

  // 3. Déplacement & débours
  const deplDevis = d.deplacement.devis || "principal";
  const deboursLignes = (d.lignes || []).filter(l => l.type === "materiel" && l.devis === "debours").length;
  const deplBits = [];
  if (t.depl > 0) deplBits.push(deplDevis === "debours" ? `Débours ${fmt(t.depl)}` : `Trajet ${fmt(t.depl)}`);
  if (deboursLignes > 0) deplBits.push(`${deboursLignes} matériel${deboursLignes > 1 ? "s" : ""} débours`);
  const deplSummary = deplBits.length ? `<span class="amt">${esc(deplBits.join(" · "))}</span>` : `<span>Pas de déplacement</span>`;

  // 4. Ajustements — remise + URSSAF
  const remisePct = num(d.remisePct);
  const ri = computeRemiseInfo();
  const remiseClass = remisePct > ri.remiseMaxPct ? "warn" : (remisePct > 0 ? "amt" : "");
  const adjBits = [];
  if (remisePct > 0) adjBits.push(`<span class="${remiseClass}">${remisePct.toString().replace(".",",")}% remise</span>`);
  if (d.declare !== false) adjBits.push(`<span>URSSAF ${num(d.urssafPct ?? 22).toString().replace(".",",")}%</span>`);
  const adjSummary = adjBits.length ? adjBits.join('<span class="dot"></span>') : `<span>Par défaut</span>`;

  // 5. Modalités — somme des % + IBAN
  const pctSum = t.echeancesTotal;
  const ok100 = pctSum === 100;
  const echBit = ok100
    ? `<span class="amt">${(d.echeances || []).length} échéance${(d.echeances || []).length > 1 ? "s" : ""}</span>`
    : `<span class="err">${pctSum.toString().replace(".",",")}% (≠100)</span>`;
  const ibanBit = (S.identite && S.identite.bank && S.identite.bank.iban) ? `<span>IBAN ✓</span>` : `<span class="warn">IBAN manquant</span>`;
  const modSummary = `${echBit}<span class="dot"></span>${ibanBit}`;

  // 6. Conditions & signature — sections CGV
  const cgvCount = (d.cgvSections || []).filter(s => s && (s.title || s.body)).length;
  const condSummary = cgvCount > 0
    ? `<span class="amt">${cgvCount} section${cgvCount > 1 ? "s" : ""} CGV</span>`
    : `<span class="warn">CGV vides</span>`;

  return {
    identification: idSummary,
    prestations:    prestaSummary,
    deplacement:    deplSummary,
    ajustements:    adjSummary,
    modalites:      modSummary,
    conditions:     condSummary
  };
}

// Refresh in place — appelée par refreshTotals() après chaque oninput
function refreshDevisHeaders() {
  const sums = devisSectionSummaries();
  for (const key of Object.keys(sums)) {
    const el = document.querySelector(`.edit-section[data-edit-section="${key}"] .edit-section-summary`);
    if (el) el.innerHTML = sums[key];
  }
  // Met à jour aussi le footer de la preview pane (validation + dirty)
  const status = document.querySelector(".devis-pane-footer");
  if (status) status.innerHTML = rDevisPaneFooterInner();
}

// ----------------------------------------------------------------------------
// VALIDATION — pure. Renvoie { errors, warnings, ok } pour le bandeau preview.
// ----------------------------------------------------------------------------
// ▼ validateDevis — règles de validation avant archivage
function validateDevis() {
  const d = S.mission;
  const t = totals();
  const errors = [];
  const warnings = [];

  if (!d.ref || d.ref === "DEVIS-…-…") errors.push("Référence du devis manquante");
  const cliName = (d.client && d.client.name) ||
    (d.client && d.client.id && (S.clients.entries.find(c => c.id === d.client.id) || {}).name);
  if (!cliName) errors.push("Aucun client sélectionné");

  const lignesFact = (d.lignes || []).filter(l =>
    l.type === "heures" || (l.type === "materiel" && l.devis !== "debours")
  );
  if (lignesFact.length === 0 && t.depl <= 0) errors.push("Aucune prestation facturable");

  if (t.echeancesTotal !== 100) {
    errors.push(`Les échéances totalisent ${t.echeancesTotal.toString().replace(".",",")} % (doit être 100 %)`);
  }

  // Warnings non-bloquants
  const ri = computeRemiseInfo();
  if (num(d.remisePct) > ri.remiseMaxPct) {
    warnings.push(`Remise ${num(d.remisePct)}% > marge max recommandée (${ri.remiseMaxPct}%)`);
  }
  if (!(S.identite && S.identite.bank && S.identite.bank.iban)) warnings.push("IBAN non renseigné dans Profil");

  return { errors, warnings, ok: errors.length === 0 };
}

// ----------------------------------------------------------------------------
// SNAPSHOT DIRTY — détecte si le devis a divergé du dernier snapshot Suivi.
// Hash léger : JSON.stringify(mission). Stocké dans suivi.devis[id].snapshotHash
// (cf. Patch F dans suiviAdd).
// ----------------------------------------------------------------------------
function devisHash() {
  return JSON.stringify(S.mission);
}
function devisCurrentSuiviEntry() {
  const ref = S.mission.ref;
  if (!ref || !S.suivi || !S.suivi.devis) return null;
  for (const [id, snap] of Object.entries(S.suivi.devis)) {
    if (snap && snap.ref === ref) return { id, snap };
  }
  return null;
}
function devisIsDirty() {
  const e = devisCurrentSuiviEntry();
  if (!e) return false; // pas encore enregistré → pas "dirty", c'est juste neuf
  return !e.snap.snapshotHash || e.snap.snapshotHash !== devisHash();
}

window.suiviUpdateSnapshot = function() {
  const e = devisCurrentSuiviEntry();
  if (!e) return;
  if (!confirm("Enregistrer les modifications ? L'ancienne version dans Suivi sera remplacée.")) return;
  const m = S.mission;
  const t = totals();

  // 1. Mise à jour du snapshot devis
  const previewEl = document.getElementById("devisPreview");
  if (previewEl) {
    const clone = previewEl.cloneNode(true);
    clone.querySelectorAll(".dp-actions").forEach(n => n.remove());
    e.snap.snapshotHtml = clone.innerHTML;
  }
  // 2. Mise à jour du snapshot débours (rendu à la volée)
  try {
    const deboursHtml = rDeboursPreview();
    if (deboursHtml && !deboursHtml.includes("dp-empty")) {
      const tmp = document.createElement("div");
      tmp.innerHTML = deboursHtml;
      const deboursEl = tmp.querySelector("#deboursPreview") || tmp.firstElementChild;
      if (deboursEl) {
        deboursEl.querySelectorAll(".dp-actions").forEach(n => n.remove());
        e.snap.snapshotDeboursHtml = deboursEl.innerHTML;
      }
    } else {
      e.snap.snapshotDeboursHtml = "";
    }
  } catch (err) { console.warn("Snapshot débours failed", err); }

  e.snap.snapshotAt = new Date().toISOString();
  e.snap.snapshotTotal = t.total;
  e.snap.snapshotDebours = t.debours || 0;
  e.snap.snapshotHash = devisHash();

  // 3. Vérifie qu'il y a bien des entries Suivi pour ce devis. Si tout a été
  // supprimé manuellement (ou si le devis a été enregistré avec un ancien flux
  // qui ne créait pas d'entries), on les recrée pour que le devis apparaisse
  // dans la liste Suivi.
  const existingEntries = S.suivi.entries.filter(en => en.devisId === e.id);
  if (existingEntries.length === 0) {
    const cat = (S.tarifs.catalog || DEFAULT_CATALOG).find(c => c.k === m.object);
    const hoursTotal = (m.lignes || []).filter(l => l.type === "heures")
      .reduce((s, l) => s + num(l.duree) * (l.unit === "j" ? HOURS_PER_DAY : 1), 0);
    const date = m.objectDate || new Date().toISOString().slice(0, 10);
    const client = m.client.name || "";
    const prestation = cat ? cat.l : "";
    const mkLine = (echeance, montant, heures) => ({
      id: uid(), devisId: e.id, date, client, prestation,
      montant: montant.toFixed(2),
      heures:  heures.toFixed(2),
      echeance,
      paiement: montant.toFixed(2),
      ca: montant.toFixed(2),
      salaire: "0", ursaf: "0", tresorerie: "0", frais: "0",
      commentaires: "", statut: "envoye"
    });
    const acompte = mkLine("Acompte 30 %", t.acompte, hoursTotal * 0.30);
    const reste   = mkLine("Reste à payer 70 %", t.reste, hoursTotal * 0.70);
    S.suivi.entries.unshift(acompte, reste);
  }

  save();
  render();
};

// ----------------------------------------------------------------------------
// DRAG-REORDER des lignes (heures + matériel principal séparément).
// HTML5 natif. Au drop : reorder S.mission.lignes, save, re-render partiel
// de la liste concernée seulement (focus préservé partout ailleurs).
// ----------------------------------------------------------------------------
let _dragLigneId = null;
window.devisDragStart = function(ev, id) {
  _dragLigneId = id;
  ev.dataTransfer.effectAllowed = "move";
  ev.dataTransfer.setData("text/plain", id); // requis par Firefox
  const wrap = ev.currentTarget.closest(".lg-row-wrap");
  if (wrap) wrap.classList.add("dragging");
};
window.devisDragEnd = function(ev) {
  const wrap = ev.currentTarget.closest(".lg-row-wrap");
  if (wrap) wrap.classList.remove("dragging");
  document.querySelectorAll(".lg-row-wrap.drag-over").forEach(el => el.classList.remove("drag-over"));
  _dragLigneId = null;
};
window.devisDragOver = function(ev) {
  if (!_dragLigneId) return;
  ev.preventDefault();
  ev.dataTransfer.dropEffect = "move";
  const wrap = ev.currentTarget.closest(".lg-row-wrap");
  if (!wrap || wrap.dataset.id === _dragLigneId) return;
  document.querySelectorAll(".lg-row-wrap.drag-over").forEach(el => el.classList.remove("drag-over"));
  wrap.classList.add("drag-over");
};
window.devisDrop = function(ev, targetId) {
  ev.preventDefault();
  const srcId = _dragLigneId;
  if (!srcId || srcId === targetId) return;
  const lignes = S.mission.lignes || [];
  const srcIdx = lignes.findIndex(l => l.id === srcId);
  const tgtIdx = lignes.findIndex(l => l.id === targetId);
  if (srcIdx < 0 || tgtIdx < 0) return;
  // Contrainte : on ne reorder qu'au sein du même type (heures ↔ heures, matériel ↔ matériel)
  if (lignes[srcIdx].type !== lignes[tgtIdx].type) return;
  const [moved] = lignes.splice(srcIdx, 1);
  const newTgtIdx = lignes.findIndex(l => l.id === targetId);
  lignes.splice(newTgtIdx, 0, moved);
  save();
  // Re-render partiel : seule la liste concernée
  const containerId = moved.type === "heures" ? "lgListHeures" : "lgListMateriel";
  const container = document.getElementById(containerId);
  if (container) {
    const filtered = (S.mission.lignes || []).filter(l =>
      l.type === moved.type && (moved.type === "heures" ? true : l.devis !== "debours")
    );
    container.innerHTML = filtered.length
      ? filtered.map(l => rLigneDraggable(l)).join("")
      : `<div class="lg-empty">Aucune ligne</div>`;
  }
  refreshTotals();
};

// rLigne wrapper qui ajoute le handle de drag — sans modifier rLigne() existant.
// Insère un span .lg-drag juste après l'ouverture de .lg-row, et rend le row draggable.
function rLigneDraggable(l) {
  const inner = rLigne(l);
  return inner.replace(
    /<div class="lg-row">/,
    `<div class="lg-row" draggable="true"
      ondragstart="devisDragStart(event,'${l.id}')"
      ondragend="devisDragEnd(event)"
      ondragover="devisDragOver(event)"
      ondrop="devisDrop(event,'${l.id}')">
      <span class="lg-drag" title="Glisser pour réordonner">⋮⋮</span>`
  );
}

// ============================================================================
// rMS — formulaire en accordéon (6 sections), preview pleine largeur en dessous.
// Le moteur de calcul (totals), la persistance (upd/save), la preview

// sont réutilisés tels quels.
// ============================================================================
// ▼ rMS — RENDERER onglet Mission/Devis
function rMS() {
  // Au premier rendu après un load, on ouvre les 2 sections les plus utilisées.
  // Une fois que l'user a touché à n'importe quelle section v2, on respecte son choix.
  const v2Keys = ["identification","prestations","deplacement","ajustements","modalites","conditions"];
  const noneTouched = v2Keys.every(k => _editSectionOpen[k] === undefined);
  if (noneTouched) {

  }

  return `

    ${rDevisAccordion()}
    ${rPreviewTabs()}
    <div class="devis-pane-footer">${rDevisPaneFooterInner()}</div>
    ${rContactPickerModal()}
  `;
}

function rDevisAccordion() {
  const sums = devisSectionSummaries();

}

function rEditSectionRaw(key, title, summaryHtml, bodyHtml, headerActionHtml = "") {
  const open = !!_editSectionOpen[key];
  return `<div class="edit-section ${open ? 'open' : ''}" data-edit-section="${key}">
    <button type="button" class="edit-section-header" onclick="editSectionToggle('${key}')" aria-expanded="${open}">

      <span class="edit-section-title">${esc(title)}</span>
      <span class="edit-section-summary" data-summary="${key}">${summaryHtml}</span>
      ${headerActionHtml}

    <div class="edit-section-body" ${open ? '' : 'hidden'}>${bodyHtml}</div>
  </div>`;
}

// ============================================================================
// SUIVI v2 — Modèle de statuts à deux niveaux
// ----------------------------------------------------------------------------
// STATUTS_PRIN  : statut principal du devis (4 valeurs visibles + refusé)
//                 dérivé à la volée depuis les statuts de ligne existants
// attentePaiement : flag transversal superposable, dérivé sur la même base
// ============================================================================

const STATUTS = [
  ["envoye",   "En attente d'acceptation"],
  ["en_cours", "En cours"],
  ["attente",  "Paiement en attente"],
  ["termine",  "Soldée"],
  ["refuse",   "Refusé"],
  ["annule",   "Annulé"]
];
// Mapping legacy : conversions silencieuses des anciens statuts.
// - "paye"    → ancien synonyme de "termine"
// - "accepte" → fusionné avec "attente" (refonte Suivi : un seul état post-acceptation)
const STATUT_LEGACY = { paye: "termine", accepte: "attente" };

function entryStatut(e) { const s = e && e.statut; return STATUT_LEGACY[s] || s || "envoye"; }
function statutLabel(k) { const s = STATUTS.find(x => x[0] === k); return s ? s[1] : k; }

function pastille(statut) {
  const k = STATUT_LEGACY[statut] || statut || "envoye";
  return `<span class="pst" data-s="${esc(k)}" title="${esc(statutLabel(k))}"></span>`;
}

// Dérive le statut principal d'un devis à partir des statuts de ses lignes.
// "en_cours" = devis accepté avec un mix de lignes en attente et soldées.
// "refuse" / "annule" : agrégés au niveau devis (jamais mixé en pratique).
function devisPrincipal(lignes) {
  if (!lignes.length) return "envoye";
  const ss = lignes.map(entryStatut);
  if (ss.some(s => s === "refuse"))         return "refuse";
  if (ss.some(s => s === "annule"))         return "annule";
  if (ss.every(s => s === "termine"))       return "termine";
  if (ss.every(s => s === "envoye"))        return "envoye";
  return "en_cours";
}

// Flag transversal : le devis a-t-il une ligne livrée non payée ?
function devisAttentePaiement(lignes) {
  return lignes.some(e => entryStatut(e) === "attente");
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

function entryRefSet(e, val) {
  if (!S.suivi.devis) S.suivi.devis = {};
  if (!e.devisId) e.devisId = uid();
  if (!S.suivi.devis[e.devisId]) S.suivi.devis[e.devisId] = { ref: "" };
  S.suivi.devis[e.devisId].ref = val;
}

// Cleans a raw client string from Suivi entries. Excel-imported names look like "#116 Euphorbia"
// or "#114 Influenci". This strips the "#NUM " prefix and tries to match an existing client
// fiche by num or name. Returns the canonical client name (from S.clients.entries) when
// matched, or the cleaned raw name as a fallback.
function cleanClientLabel(rawClient) {
  if (!rawClient) return "";
  const raw = String(rawClient).trim();
  // Match leading "#NUM" pattern (with optional space after)
  const m = raw.match(/^#(\d+)\s*(.*)$/);
  let num = "";
  let name = raw;
  if (m) {
    num = m[1];
    name = m[2].trim() || raw;
  }
  // Try to find a matching client fiche
  if (S.clients && Array.isArray(S.clients.entries)) {
    let found = null;
    if (num) {
      found = S.clients.entries.find(c => (c.num || "").trim() === num);
    }
    if (!found && name) {
      const lower = name.toLowerCase();
      found = S.clients.entries.find(c => (c.name || "").trim().toLowerCase() === lower);
    }
    if (found && found.name) return found.name.trim();
  }
  // Fallback: return cleaned name (without #NUM prefix)
  return name;
}

function suiviClassifyEcheance(s) {
  const t = (s || "").toLowerCase();
  if (/acompte|accompte|1er|premier/.test(t)) return "acompte";
  if (/reste/.test(t)) return "reste";
  if (/frais|d[ée]bours/.test(t)) return "frais";
  return "other";
}

function suiviMigrate() {
  if (!S.suivi.devis) S.suivi.devis = {};

  for (const e of S.suivi.entries) {
    if (STATUT_LEGACY[e.statut]) e.statut = STATUT_LEGACY[e.statut];
    if (e.statutAvantRefus && STATUT_LEGACY[e.statutAvantRefus]) {
      e.statutAvantRefus = STATUT_LEGACY[e.statutAvantRefus];
    }
    // Purge des champs paid/paidAt jamais câblés (refonte Suivi étape 4) :
    // la vérité du paiement est désormais portée par e.statut === "termine".
    if ("paid" in e)   delete e.paid;
    if ("paidAt" in e) delete e.paidAt;
  }

  const ungrouped = S.suivi.entries.filter(e => !e.devisId);
  if (ungrouped.length === 0) {
    // Even when nothing to group, refs may still need recomputing
    suiviRecomputeRefs();
    return;
  }

  const byKey = new Map();
  for (const e of ungrouped) {
    const k = `${e.client || ""}|${e.date || ""}`;
    if (!byKey.has(k)) byKey.set(k, []);
    byKey.get(k).push(e);
  }

  const assign = (entry, ref) => {
    const id = uid();
    entry.devisId = id;
    S.suivi.devis[id] = { ref: ref || "" };
    delete entry.ref;
    return id;
  };

  for (const entries of byKey.values()) {
    const acomptes = [], restes = [], frais = [], others = [];
    for (const e of entries) {
      const c = suiviClassifyEcheance(e.echeance);
      if (c === "acompte") acomptes.push(e);
      else if (c === "reste") restes.push(e);
      else if (c === "frais") frais.push(e);
      else others.push(e);
    }
    acomptes.sort((a, b) => num(a.montant) - num(b.montant));
    restes.sort((a, b) => num(a.montant) - num(b.montant));

    const created = [];
    const pairCount = Math.min(acomptes.length, restes.length);
    for (let i = 0; i < pairCount; i++) {
      const id = uid();
      const ref = acomptes[i].ref || restes[i].ref || "";
      acomptes[i].devisId = id;
      restes[i].devisId = id;
      delete acomptes[i].ref;
      delete restes[i].ref;
      S.suivi.devis[id] = { ref };
      created.push(id);
    }
    for (let i = pairCount; i < acomptes.length; i++) created.push(assign(acomptes[i], acomptes[i].ref));
    for (let i = pairCount; i < restes.length;   i++) created.push(assign(restes[i],   restes[i].ref));
    for (const e of others) created.push(assign(e, e.ref));
    if (frais.length) {
      if (created.length) {
        for (const e of frais) {
          e.devisId = created[0];
          delete e.ref;
        }
      } else {
        for (const e of frais) assign(e, e.ref);
      }
    }
  }
  // After grouping is done, auto-recompute any missing/malformed refs
  suiviRecomputeRefs();
}

// Auto-recompute Suivi refs at load time (and any time we want).
// For each devis group: if ref is empty or doesn't match the canonical "DEVIS-NUM-DATE"
// pattern, regenerate it using:
//   - NUM = client num (from S.clients fiche, matched by raw client string)
//   - DATE = earliest line date in the group
// Operates silently. No alert. Safe to run multiple times (idempotent).
function suiviRecomputeRefs() {
  if (!S.suivi || !S.suivi.devis || !Array.isArray(S.suivi.entries)) return;
  // Group entries by devisId
  const byDevisId = new Map();
  for (const e of S.suivi.entries) {
    if (!e.devisId) continue;
    if (!byDevisId.has(e.devisId)) byDevisId.set(e.devisId, []);
    byDevisId.get(e.devisId).push(e);
  }
  // Pattern: DEVIS-<NUM>-<YYYY-MM-DD>
  const validRefPattern = /^DEVIS-\d+-\d{4}-\d{2}-\d{2}$/i;
  for (const [devisId, lignes] of byDevisId.entries()) {
    if (!S.suivi.devis[devisId]) S.suivi.devis[devisId] = { ref: "" };
    const currentRef = (S.suivi.devis[devisId].ref || "").trim();
    if (currentRef && validRefPattern.test(currentRef)) continue; // already valid, skip
    // Earliest date among lignes (fallback: first non-empty)
    const dates = lignes.map(l => l.date).filter(Boolean).sort();
    const date = dates[0] || "";
    if (!date) continue; // no usable date → skip silently
    // Find the client num — use cleanClientLabel logic but keep the num
    const rawClient = lignes.find(l => l.client)?.client || "";
    let num = "";
    const m = String(rawClient).trim().match(/^#(\d+)\s*(.*)$/);
    if (m) num = m[1];
    // Try to match a fiche client (by num first, then by name) and use its num
    if (S.clients && Array.isArray(S.clients.entries)) {
      const cleanedName = m ? m[2].trim() : rawClient.trim();
      let found = null;
      if (num) found = S.clients.entries.find(c => (c.num || "").trim() === num);
      if (!found && cleanedName) {
        const lower = cleanedName.toLowerCase();
        found = S.clients.entries.find(c => (c.name || "").trim().toLowerCase() === lower);
      }
      if (found && found.num) num = String(found.num).trim();
    }
    if (!num) continue; // no usable num → skip silently (don't generate broken refs)
    S.suivi.devis[devisId].ref = `DEVIS-${num}-${date}`;
  }
}

// ▼ suiviAdd — archive le devis : 2 entries Suivi + 2 snapshots
function suiviAdd() {
  const m = S.mission;
  const cat = (S.tarifs.catalog || DEFAULT_CATALOG).find(c => c.k === m.object);
  const t = totals();
  const hoursTotal = (m.lignes || []).filter(l => l.type === "heures").reduce((s, l) => s + num(l.duree) * (l.unit === "j" ? HOURS_PER_DAY : 1), 0);
  const date = m.objectDate || new Date().toISOString().slice(0, 10);
  const client = m.client.name || "";
  const prestation = cat ? cat.l : "";
  const devisId = uid();

  // Snapshot the rendered devis HTML so we can re-display it later from Suivi
  // Capture aussi la feuille débours si elle existe (rendue dans le DOM même si
  // l'onglet preview actif n'est pas Débours — on la rend juste pour le snapshot).
  let snapshotHtml = "";
  let snapshotDeboursHtml = "";
  try {
    const el = document.getElementById("devisPreview");
    if (el) {
      const clone = el.cloneNode(true);
      clone.querySelectorAll(".dp-actions").forEach(n => n.remove());
      snapshotHtml = clone.innerHTML;
    }
    // Génère le HTML débours à la volée (pas besoin que l'onglet soit actif).
    const deboursHtml = rDeboursPreview();
    if (deboursHtml && !deboursHtml.includes("dp-empty")) {
      const tmp = document.createElement("div");
      tmp.innerHTML = deboursHtml;
      const deboursEl = tmp.querySelector("#deboursPreview") || tmp.firstElementChild;
      if (deboursEl) {
        deboursEl.querySelectorAll(".dp-actions").forEach(n => n.remove());
        snapshotDeboursHtml = deboursEl.innerHTML;
      }
    }
  } catch (e) {
    console.warn("Snapshot devis/débours failed", e);
  }

  S.suivi.devis[devisId] = {
    ref: m.ref || "",
    snapshotHtml,
    snapshotDeboursHtml,
    snapshotAt: new Date().toISOString(),
    snapshotTotal: t.total,
    snapshotDebours: t.debours || 0,
    snapshotClient: client,
    snapshotHash: (typeof devisHash === "function") ? devisHash() : ""
  };

  const mkLine = (echeance, montant, heures) => ({
    id: uid(), devisId, date, client, prestation,
    montant: montant.toFixed(2),
    heures:  heures.toFixed(2),
    echeance,
    paiement: montant.toFixed(2),
    ca: montant.toFixed(2),
    salaire: "0", ursaf: "0", tresorerie: "0", frais: "0",
    commentaires: "", statut: "envoye"
  });

  const acompte = mkLine("Acompte 30 %", t.acompte, hoursTotal * 0.30);
  const reste   = mkLine("Reste à payer 70 %", t.reste, hoursTotal * 0.70);
  S.suivi.entries.unshift(acompte, reste);

  save();
  render();
}
