      page-break-inside: auto !important;
      margin-top: 0 !important;
      padding-top: 0 !important;
      border-top: 0 !important;
    }

    /* Hide app chrome */
    .sb, header, nav, footer { display: none !important; }
  }

  /* Photographe textarea + conditions textarea in Mission */
  .multi-text{width:100%;max-width:520px;min-height:80px;padding:9px 12px;border:1px solid var(--border-light);border-radius:6px;background:var(--surface);color:var(--text);font:inherit;font-size:13px;line-height:1.5;resize:vertical}
  .multi-text:focus{outline:none;border-color:var(--primary)}

  /* Locked textarea wrapper (with veil overlay) */
  .locked-wrap{position:relative;max-width:520px}
  .locked-wrap textarea{padding-right:42px}
  .locked-wrap textarea:disabled{opacity:1;cursor:not-allowed;color:var(--text);background:var(--surface)}
  .locked-wrap.is-locked::after{content:"";position:absolute;inset:0;background:rgba(255,255,255,.18);border-radius:6px;pointer-events:none}
  .locked-wrap.is-locked textarea{filter:brightness(0.92)}
  .locked-wrap .lock-corner{position:absolute;top:6px;right:6px;background:var(--surface-2);border:1px solid var(--border-light);color:var(--text-muted);cursor:pointer;border-radius:4px;width:28px;height:28px;font-size:13px;line-height:1;display:flex;align-items:center;justify-content:center;font-weight:700;z-index:2}
  .locked-wrap .lock-corner:hover{color:var(--primary);border-color:var(--primary)}
  .locked-wrap .lock-corner-popup{position:absolute;top:38px;right:6px;background:var(--surface-2);border:1px solid var(--border-light);border-radius:6px;box-shadow:var(--shadow);z-index:30;min-width:200px;padding:4px;display:none}
  .locked-wrap .lock-corner-popup.open{display:block}
  .locked-wrap .lock-corner-popup button{width:100%;text-align:left;background:transparent;border:0;color:var(--text);padding:8px 12px;font:inherit;font-size:13px;cursor:pointer;border-radius:4px}
  .locked-wrap .lock-corner-popup button:hover{background:var(--surface-hi)}

  /* Échéances UI */
  .ech-list{display:flex;flex-direction:column;gap:6px;max-width:560px}
  .ech-row{display:flex;align-items:center;gap:10px;background:transparent;border:0;border-radius:0;padding:2px 0}
  .ech-row input.lbl{flex:1;height:var(--input-h);border:1px solid transparent;background:var(--surface-2);color:var(--text);font:inherit;font-size:13px;padding:0 10px;border-radius:6px;min-width:0;transition:border-color .12s,box-shadow .12s}
  .ech-row input.lbl:hover{border-color:var(--border-light)}
  .ech-row input.lbl:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  .ech-row .pct-wrap{display:flex;align-items:center;gap:3px;height:var(--input-h);background:var(--surface-2);border:1px solid transparent;border-radius:6px;padding:0 8px;width:90px;transition:border-color .12s,box-shadow .12s;flex-shrink:0;box-sizing:border-box}
  .ech-row .pct-wrap:hover{border-color:var(--border-light)}
  .ech-row .pct-wrap:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  .ech-row .pct-wrap input{width:50px;height:100%;border:0;background:transparent;text-align:right;color:var(--text);font:inherit;font-size:13px;font-variant-numeric:tabular-nums;padding:0}
  .ech-row .pct-wrap input:focus{outline:none}
  .ech-row .pct-wrap .unit{color:var(--text-dim);font-size:13px}
  /* (i) info button on échéance rows — tooltip shows acompte suggestion */
  .ech-info-icon{position:relative;background:transparent;border:1px solid var(--border-light);color:var(--text-muted);width:24px;height:24px;border-radius:50%;cursor:help;font-size:11px;font-weight:700;font-style:italic;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;padding:0;line-height:1}
  .ech-info-icon:hover,.ech-info-icon:focus{border-color:var(--primary);color:var(--primary);background:var(--primary-soft);outline:none}
  .ech-info-tooltip{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:0 12px 32px rgba(0,0,0,.45);padding:10px 14px;width:300px;font-size:12px;font-style:normal;font-weight:400;text-align:left;color:var(--text-muted);line-height:1.5;letter-spacing:normal;display:none;z-index:1000;pointer-events:none;white-space:normal}
  .ech-info-tooltip strong{color:var(--text);font-weight:600}
  .ech-info-icon:hover .ech-info-tooltip,.ech-info-icon:focus .ech-info-tooltip{display:block}
  .ech-info-spacer{width:24px;flex-shrink:0;display:block}
  .ech-row .del{background:transparent;border:0;color:var(--text-dim);cursor:pointer;font-size:15px;padding:4px 8px;border-radius:4px}
  .ech-row .del:hover{background:var(--danger-soft);color:var(--danger)}
  .ech-row.ech-total{padding-top:10px;margin-top:6px;border-top:1px solid var(--border-light);font-weight:600;font-size:13px;align-items:center}
  .ech-row.ech-total .lbl-total{flex:1;color:var(--text);padding:0 10px}
  .ech-row.ech-total .pct-total{width:90px;padding:0 8px;text-align:right;font-variant-numeric:tabular-nums;color:var(--text);box-sizing:border-box;flex-shrink:0}
  .ech-row.ech-total .del-spacer{width:31px}
  .ech-row.ech-total.ok .pct-total{color:var(--success)}
  .ech-row.ech-total.warn .pct-total{color:var(--warning)}
  /* Remise input with (i) info button */
  .remise-input-wrap{display:flex;align-items:center;gap:8px}
  .remise-input-wrap input{flex:1}
  .remise-tooltip{position:absolute;top:calc(100% + 8px);left:0;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:0 12px 32px rgba(0,0,0,.45);padding:14px 16px;width:340px;font-size:12px;font-style:normal;font-weight:400;text-align:left;color:var(--text-muted);line-height:1.5;letter-spacing:normal;display:none;z-index:1000;pointer-events:none}
  .ech-info-icon:hover .remise-tooltip,.ech-info-icon:focus .remise-tooltip{display:block}
  .ech-info-icon{position:relative}
  .remise-tt-marge-actuelle{font-size:14px;font-weight:600;text-align:center;padding:8px 0;margin-bottom:10px;border-bottom:1px solid var(--border-soft);letter-spacing:.02em}
  .remise-tt-marge-actuelle strong{font-size:18px;font-weight:800}
  .remise-tt-marge-amt{font-size:11px;font-weight:400;opacity:.8;margin-left:6px}
  .remise-tt-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px;border-bottom:1px solid var(--border-soft);padding-bottom:6px}
  .remise-tt-table{width:100%;border-collapse:collapse;margin-bottom:8px;font-variant-numeric:tabular-nums}
  .remise-tt-table:last-of-type{margin-bottom:0}
  .remise-tt-table tr td{padding:2px 0;color:var(--text);font-size:12px}
  .remise-tt-table tr td:last-child{text-align:right}
  .remise-tt-table tr.muted td{color:var(--text-muted);font-size:11.5px;padding-left:6px}
  .remise-tt-table tr.section-title td{font-size:10.5px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;padding-top:8px;padding-bottom:4px}
  .remise-tt-table tr.danger td{color:var(--danger,#e74c3c)}
  .remise-tt-table tr.danger td strong{color:var(--danger,#e74c3c)}
  .remise-tt-summary{margin-top:10px;padding-top:8px;border-top:1px solid var(--border-soft);font-size:12px;color:var(--text);line-height:1.5}
  .remise-tt-summary strong{color:var(--primary)}
  .ech-warn{margin-top:6px;font-size:13px;color:var(--warning);max-width:380px}
  .ech-actions{display:flex;gap:8px;margin-top:10px;max-width:380px}
  .ech-actions .btn:last-child{margin-left:auto}
  .ech-sum{font-size:13px;text-align:right;margin-top:4px;font-variant-numeric:tabular-nums;max-width:520px}
  .ech-sum.ok{color:var(--success)}
  .ech-sum.warn{color:var(--warning)}

  /* Contact picker (if multiple contacts) */
  .contact-picker{margin-top:6px;max-width:520px;background:var(--warning-soft);border:1px solid var(--warning);border-radius:6px;padding:10px 12px}
  .contact-picker.contact-picker-compact{background:var(--surface-2);border-color:var(--border);padding:8px 12px;max-width:680px}

  /* Client + inline contact (point 5) */
  .client-line{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .client-line-picker{flex:0 0 auto;min-width:0}
  .client-line-contact{flex:1 1 320px;min-width:280px;max-width:480px;display:flex;align-items:center}
  /* Match cli-pick .selected exactly so client + contact boxes line up perfectly */
  .contact-inline{display:flex;align-items:center;gap:10px;height:var(--input-h);background:var(--surface-2);border:1px solid transparent;border-radius:6px;padding:0 12px;font-size:13px;color:var(--text);width:100%;box-sizing:border-box;transition:border-color .12s}
  .contact-inline:hover{border-color:var(--border-light)}
  .contact-inline-lbl{color:var(--text-muted);font-size:13px;font-variant-numeric:tabular-nums;flex-shrink:0}
  .contact-inline-val{flex:1;color:var(--text);font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
  .contact-inline-change{background:transparent;border:0;color:var(--primary);font-size:13px;cursor:pointer;padding:2px 8px;border-radius:4px;flex-shrink:0}
  .contact-inline-change:hover{background:var(--primary-soft)}

  /* Modal overlay */
  .modal-overlay{position:fixed;inset:0;background:rgba(8,15,28,.72);backdrop-filter:blur(3px);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px}
  .modal-card{background:var(--bg-2);border:1px solid var(--border);border-radius:10px;padding:20px 22px;max-width:560px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,.5)}
  .modal-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px}
  .modal-sub{font-size:13px;color:var(--text-muted);margin-bottom:14px}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
  .contact-list{display:flex;flex-direction:column;gap:6px}
  .contact-list-item{display:flex;flex-direction:column;align-items:flex-start;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px 14px;cursor:pointer;text-align:left;font:inherit;color:var(--text);transition:all .12s}
  .contact-list-item:hover{background:var(--surface-hi);border-color:var(--primary)}
  .contact-list-item.selected{background:var(--primary-soft);border-color:var(--primary)}
  .contact-list-name{font-weight:600;font-size:13px;color:var(--text)}
  .contact-list-meta{display:flex;flex-wrap:wrap;gap:10px;font-size:13px;color:var(--text-muted)}

  /* Large editor modal (point 6) */
  .modal-card.modal-card-lg{max-width:1100px;max-height:70vh;display:flex;flex-direction:column}
  .text-editor-toolbar{display:flex;gap:4px;flex-wrap:wrap;padding:8px;background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-bottom:8px}
  .text-editor-toolbar .te-btn{background:transparent;border:1px solid transparent;color:var(--text-muted);padding:5px 9px;border-radius:4px;cursor:pointer;font:inherit;font-size:13px;font-weight:600}
  .text-editor-toolbar .te-btn:hover{background:var(--surface-hi);color:var(--text);border-color:var(--border)}
  .text-editor-toolbar .te-sep{width:1px;background:var(--border);margin:2px 4px}
  /* RICH-TEXT EDITOR (Word-style) */
  /* Hide live actions (Imprimer, + Enregistrer dans Suivi) when devis is shown inside the snapshot modal */
  .view-devis-snapshot .dp-actions{display:none !important}
  /* Read-only display under each encadré in Mission */
  .rich-display-wrap{position:relative;max-width:880px}
  .rich-display{padding:10px 42px 10px 14px;border:1px solid transparent;border-radius:6px;background:var(--surface-2);color:var(--text);font-size:13px;line-height:1.55;min-height:110px;max-height:140px;overflow-y:auto;display:block;white-space:normal;cursor:pointer;transition:border-color .12s}
  .rich-display:hover{border-color:var(--border-light)}
  .rich-display .rich-display-summary{display:block}
  .rich-display:empty::before{content:attr(data-placeholder);color:var(--text-dim)}
  .rich-display-placeholder{color:var(--text-dim);font-style:italic}
  .rich-display p{margin:0 0 6px}
  .rich-display p:last-child{margin-bottom:0}
  .rich-display-edit{position:absolute;top:6px;right:6px;background:transparent;border:0;color:var(--text-muted);cursor:pointer;border-radius:4px;width:26px;height:26px;font-size:13px;line-height:1;display:flex;align-items:center;justify-content:center;font-weight:700;z-index:2;transition:color .12s,background .12s}
  .rich-display-edit:hover{color:var(--primary);background:var(--surface)}

  /* Editor modal toolbar */
  .rte-toolbar{display:flex;gap:3px;flex-wrap:wrap;align-items:center;padding:6px 8px;background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-bottom:8px}
  .rte-btn{background:transparent;border:1px solid transparent;color:var(--text);padding:5px 9px;border-radius:4px;cursor:pointer;font:inherit;font-size:13px;font-weight:500;min-width:30px;line-height:1.3}
  .rte-btn:hover{background:var(--surface-hi);border-color:var(--border)}
  .rte-btn:active{background:var(--primary-soft)}
  .rte-sep{width:1px;background:var(--border);margin:2px 4px;align-self:stretch}
  .rte-select{background:var(--surface-2);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:4px 6px;font:inherit;font-size:13px;cursor:pointer}
  .rte-select.rte-size{width:100px}
  .rte-color-wrap{position:relative;display:inline-flex;align-items:center}
  .rte-color-btn{display:inline-flex;flex-direction:column;align-items:center;gap:2px;padding:4px 7px;pointer-events:none}
  .rte-color-letter{font-size:13px;font-weight:700;line-height:1}
  .rte-color-bar{width:20px;height:3px;background:#000;border-radius:1px}
  .rte-color-input{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer}

  /* Editor area */
  .rich-editor{flex:1;min-height:240px;max-height:50vh;width:100%;padding:14px 16px;border:1px solid var(--border-light);border-radius:6px;background:#fff;color:#000;font-size:13px;line-height:1.6;overflow-y:auto;outline:none;font-family:Arial, Helvetica, sans-serif}
  .rich-editor:focus{border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-soft)}
  .rich-editor p, .rich-editor div{margin:0 0 6px 0}
  .rich-editor ul, .rich-editor ol{margin:6px 0;padding-left:24px}
  .rich-editor a{color:#0066cc}

  /* Changelog (onglet Mises à jour) */
  .maj-list{display:flex;flex-direction:column;gap:8px;max-width:880px}
  .maj-entry{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
  .maj-entry.is-open{border-color:var(--border-light)}
  .maj-head{width:100%;display:grid;grid-template-columns:auto auto 1fr auto;gap:14px;align-items:center;padding:12px 16px;background:transparent;border:0;color:var(--text);cursor:pointer;font:inherit;text-align:left}
  .maj-head:hover{background:var(--surface-hi)}
  .maj-caret{color:var(--text-muted);font-size:13px;width:10px;display:inline-block}
  .maj-version{font-weight:700;color:var(--primary);font-size:13px;min-width:50px;font-variant-numeric:tabular-nums}
  .maj-title{color:var(--text);font-size:13px;font-weight:500}
  .maj-date{color:var(--text-dim);font-size:13px;font-variant-numeric:tabular-nums}
  .maj-items{margin:0;padding:4px 16px 14px 56px;list-style:none}
  .maj-items li{position:relative;padding:6px 0 6px 14px;font-size:13px;color:var(--text-muted);line-height:1.5}
  .maj-items li::before{content:"";position:absolute;left:0;top:14px;width:4px;height:4px;border-radius:50%;background:var(--text-dim)}

  /* Abonnements: "En cours" toggle (point 2) */
  .ab-end-cell{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .ab-encours-toggle{display:inline-flex;align-items:center;gap:5px;cursor:pointer;font-size:13px;color:var(--success);font-weight:600;text-transform:uppercase;letter-spacing:.04em;padding:4px 10px;background:var(--success-soft);border:1px solid var(--success);border-radius:4px;user-select:none}
  .ab-encours-toggle input[type="checkbox"]{accent-color:var(--success);cursor:pointer;margin:0}
  tr[style*="opacity:.65"] .ab-encours-toggle{color:var(--text-muted);background:var(--surface-2);border-color:var(--border-light);font-weight:500}

  /* Date-or-EnCours picker cell */
  .date-encours-cell{position:relative;display:inline-block}
  .date-encours-display{display:inline-flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border-light);color:var(--text);font:inherit;font-size:13px;padding:6px 10px;border-radius:5px;cursor:pointer;min-width:140px;text-align:left}
  .date-encours-display:hover{border-color:var(--primary)}
  .date-encours-display.is-encours{background:var(--success-soft);border-color:var(--success)}
  .date-encours-display.is-encours .dec-pill{color:var(--success);font-weight:600;font-size:13px;text-transform:uppercase;letter-spacing:.04em}
  .date-encours-display .dec-date{font-variant-numeric:tabular-nums;color:var(--text)}
  .date-encours-display .dec-caret{margin-left:auto;color:var(--text-muted);font-size:13px}
  .date-encours-popover{position:absolute;top:calc(100% + 4px);left:0;background:var(--bg-2);border:1px solid var(--border);border-radius:8px;padding:10px;min-width:240px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:1000}
  .dec-encours-opt{width:100%;display:flex;flex-direction:column;align-items:flex-start;gap:3px;background:var(--success-soft);border:1px solid var(--success);color:var(--text);padding:10px 12px;border-radius:6px;cursor:pointer;font:inherit;text-align:left;margin-bottom:10px}
  .dec-encours-opt:hover{filter:brightness(1.05)}
  .dec-encours-opt.selected{background:var(--success);color:#fff}
  .dec-encours-opt.selected .dec-pill,.dec-encours-opt.selected .dec-opt-desc{color:#fff}
  .dec-encours-opt .dec-pill{color:var(--success);font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.04em}
  .dec-encours-opt .dec-opt-desc{color:var(--text-muted);font-size:13px}
  .dec-divider{display:flex;align-items:center;gap:8px;color:var(--text-dim);font-size:13px;text-transform:uppercase;letter-spacing:.06em;margin:6px 0;font-weight:600}
  .dec-divider::before,.dec-divider::after{content:"";flex:1;height:1px;background:var(--border)}
  .dec-date-input{width:100%;padding:8px 10px;border:1px solid var(--border);background:var(--surface);color:var(--text);font:inherit;font-size:13px;border-radius:5px;cursor:pointer}
  .dec-date-input:focus{outline:none;border-color:var(--primary)}
  .modal-textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-soft)}
  .contact-picker .ttl{font-size:13px;font-weight:600;color:var(--warning);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
  .contact-picker label{display:flex;align-items:center;gap:8px;padding:5px 8px;cursor:pointer;border-radius:4px;font-size:13px;color:var(--text)}
  .contact-picker label:hover{background:var(--surface-2)}
  .contact-picker input[type="radio"]{accent-color:var(--primary);cursor:pointer}
  .contact-pick-row{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;cursor:pointer;border-radius:5px;transition:background .12s}
  .contact-pick-row:hover{background:var(--surface-2)}
  .contact-pick-info{display:flex;flex-direction:column;gap:2px}
  .contact-pick-name{font-weight:600;color:var(--text);font-size:13px}
  .contact-pick-detail{font-size:13px;color:var(--text-muted)}

  /* Client edit: structured contact rows */
  .contacts-edit{display:flex;flex-direction:column;gap:6px;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;padding:8px}
  .contact-row{display:flex;align-items:flex-start;gap:8px;background:var(--surface);border:1px solid var(--border-soft);border-radius:5px;padding:7px 8px}
  .contact-row-num{flex-shrink:0;width:22px;height:22px;display:flex;align-items:center;justify-content:center;background:var(--primary-soft);color:var(--primary);border-radius:50%;font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;margin-top:4px}
  .contact-row-fields{flex:1;display:grid;grid-template-columns:1.2fr 1fr 1.5fr;gap:6px;min-width:0}
  .contact-row-fields input{padding:6px 9px;border:1px solid var(--border-light);border-radius:4px;background:var(--surface-2);color:var(--text);font:inherit;font-size:13px;min-width:0}
  .contact-row-fields input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-soft)}
  .contact-row-del{background:transparent;border:0;color:var(--text-dim);cursor:pointer;font-size:15px;line-height:1;padding:6px 9px;border-radius:4px;align-self:flex-start;margin-top:2px}
  .contact-row-del:hover{background:var(--danger-soft);color:var(--danger)}
  @media (max-width:700px){
    .contact-row-fields{grid-template-columns:1fr}
  }

  /* Lignes section */
  .lg-add{display:flex;gap:8px;margin-top:8px}
  .lg-add .btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;padding:7px 14px}
  .lg-list{display:flex;flex-direction:column;gap:8px;max-width:780px;margin-bottom:0}
  .lg-list:empty{margin-bottom:0}

async function saveToCloud() {
  if (!user) return;
  try {
    await db.collection("users").doc(user.uid).set({
      identite: S.identite,
      mission: S.mission,
      devis:   S.devis,
      suivi:   S.suivi,
      clients: S.clients,

      investissements: S.investissements,
      tarifs:  S.tarifs,
      bugs:    S.bugs
    }, { merge: true });
    const e = document.getElementById("savedFlash");
    if (e) { e.textContent = "Enregistré"; setTimeout(() => { if (e && e.textContent === "Enregistré") e.textContent = ""; }, 1500); }
  } catch (err) { console.error("saveToCloud", err); }
}

async function loadFromCloud() {
  if (!user) return;
  try {
    const snap = await db.collection("users").doc(user.uid).get();
    if (snap.exists) {
      const d = snap.data();
      if (d.mission) {
        const m = d.mission, dm = DEFAULT_S.mission;
        S.mission = {
          ...dm, ...m,
          client:      { ...dm.client,      ...(m.client      || {}) },
          prep:        { ...dm.prep,        ...(m.prep        || {}) },
          prod:        { ...dm.prod,        ...(m.prod        || {}) },
          postprod:    { ...dm.postprod,    ...(m.postprod    || {}) },
          deplacement: { ...dm.deplacement, ...(m.deplacement || {}) },
          autres:      { ...dm.autres,      ...(m.autres      || {}) }
        };
      }
      if (d.identite) {
        S.identite = { ...DEFAULT_S.identite, ...d.identite,
          rcPro:     { ...DEFAULT_S.identite.rcPro,     ...(d.identite.rcPro     || {}) },
          mediateur: { ...DEFAULT_S.identite.mediateur, ...(d.identite.mediateur || {}) }
        };
      }
      if (d.devis)   S.devis   = Object.assign({}, DEFAULT_S.devis,   d.devis);
      if (d.suivi)   S.suivi   = { ...DEFAULT_S.suivi, ...d.suivi, entries: Array.isArray(d.suivi.entries) ? d.suivi.entries : [], devis: (d.suivi.devis && typeof d.suivi.devis === "object") ? d.suivi.devis : {} };
      if (d.clients) S.clients = { ...DEFAULT_S.clients, ...d.clients, entries: Array.isArray(d.clients.entries) ? d.clients.entries : [] };
      if (d.compta)  S.compta  = Object.assign({}, DEFAULT_S.compta,  d.compta);
      if (d.abonnements) S.abonnements = { ...DEFAULT_S.abonnements, ...d.abonnements, entries: Array.isArray(d.abonnements.entries) ? d.abonnements.entries : [] };
      if (d.investissements) S.investissements = { ...DEFAULT_S.investissements, ...d.investissements, entries: Array.isArray(d.investissements.entries) ? d.investissements.entries : [] };
      if (d.tarifs && Array.isArray(d.tarifs.catalog) && d.tarifs.catalog.length) S.tarifs = { catalog: d.tarifs.catalog, heuresAnnuelles: d.tarifs.heuresAnnuelles || S.tarifs.heuresAnnuelles || "900", facteurSecurite: d.tarifs.facteurSecurite || S.tarifs.facteurSecurite || "0" };
      if (d.bugs)    S.bugs    = { items: Array.isArray(d.bugs.items) ? d.bugs.items : (Array.isArray(d.bugs.entries) ? d.bugs.entries.map(e => ({ id: e.id, text: e.title || "", steps: e.desc ? [e.desc] : [], validated: e.status === "fixed", createdAt: e.date ? new Date(e.date).getTime() || Date.now() : Date.now() })) : []) };
      suiviMigrate();
      recomputeRef();
      localStorage.setItem(SK, JSON.stringify(S));
    }
  } catch (err) { console.error("loadFromCloud", err); }
  render();
}

function upd(path, val) {
  const keys = path.split(".");
  let o = S;
  for (let i = 0; i < keys.length - 1; i++) o = o[keys[i]];
  o[keys[keys.length - 1]] = val;
  if (path === "mission.dateEmission") {
    recomputeRef();
    refreshRefDisplay();
  }
  save();
  if (path.startsWith("mission.prep") || path.startsWith("mission.prod") || path.startsWith("mission.postprod") || path.startsWith("mission.deplacement") || path.startsWith("mission.autres") || path.startsWith("mission.lignes") || path === "mission.remisePct" || path === "mission.object" || path === "mission.paiement.margeAvance" || path === "mission.urssafPct" || path === "mission.blackMode") {
    refreshTotals();
  }
}
window.upd = upd;

// Clamp remise input to [0, max]. Called by the Remise input.
// If user types over max, force it back to max immediately.
function updRemise(val, max) {
  let n = num(val);
  if (n < 0) n = 0;
  if (max !== undefined && n > max) n = max;
  S.mission.remisePct = String(n);
  save();
  // Re-render the remise field area so the input reflects the clamped value visually
  // (otherwise the input stays at the typed value until next render).
  refreshTotals();
  // If clamping happened (typed > max), force-update the input element
  const inp = document.querySelector('.remise-input-wrap input');
  if (inp && num(inp.value) !== n) inp.value = String(n);
}
window.updRemise = updRemise;

function refreshRefDisplay() {

  refreshTotals();
}

function updDeplDevis(val) {
  S.mission.deplacement.devis = val;
  // v1.39+ : Débours+Acompte supprimé. En Débours, paiementType est forcé à "fact-direct".
  if (val === "debours") {
    S.mission.deplacement.paiementType = "fact-direct";
  } else {
    // Switching to principal: "fact-direct" can't apply, default to "acompte"
    if (S.mission.deplacement.paiementType === "fact-direct" ||
        (S.mission.deplacement.paiementType !== "acompte" && S.mission.deplacement.paiementType !== "avance")) {
      S.mission.deplacement.paiementType = "acompte";
    }
  }
  save();
  render();
}

function recomputeRef() {
  let num = S.mission.client.num || "";
  if (S.mission.client.id) {
    const c = S.clients.entries.find(x => x.id === S.mission.client.id);
    if (c) num = c.num || num;
  }
  const date = S.mission.dateEmission || "";
  S.mission.ref = (num && date) ? `DEVIS-${num}-${date}` : "";
}

// ============ DEVIS PREVIEW (rendered at the bottom of Mission) ============
function rDevisPreview() {
  const d = S.mission;
  const t = totals();
  // Show preview only if there's enough info (client + at least one ligne)
  const hasClient = !!(d.client && (d.client.id || d.client.name));
  const hasContent = (d.lignes || []).length > 0 || num(d.deplacement.km) > 0 || num(d.deplacement.ticket) > 0 || num(d.deplacement.peages) > 0;
  if (!hasClient && !hasContent) {
    return `<div class="devis-preview"><div class="dp-empty">Le devis se générera ici automatiquement dès que tu auras sélectionné un client et ajouté au moins une ligne.</div></div>`;
  }

  const cat = (S.tarifs.catalog || DEFAULT_CATALOG).find(c => c.k === d.object);
  // Le tarif catalogue saisi est le prix final TTC (URSSAF incluse). Au black, on enlève l'URSSAF.
  // En mode "Dans taux horaire", on utilise tarifHEff qui inclut le déplacement.
  const tarifH = t.tarifHEff || t.tarifH;
  const sel = d.client.id ? S.clients.entries.find(x => x.id === d.client.id) : null;
  const cli = sel || d.client;

  // Build line items HTML — with numbering (1., 2., 3., …)
  // Au black (declare === false) → no URSSAF compensation, no marge avance.
  const _isDeclared = d.declare !== false;
  const ma = _isDeclared ? num((d.paiement || {}).margeAvance ?? 0) : 0;
  const mu = _isDeclared ? num(d.urssafPct ?? 22) : 0;
  let linesHtml = "";
  let lineNum = 0;
  for (const l of (d.lignes || [])) {
    if (l.type === "heures") {
      const h = num(l.duree) * (l.unit === "j" ? HOURS_PER_DAY : 1);
      const amount = h * tarifH;
      lineNum++;
      linesHtml += `<div class="dp-line">
        <div class="num">${lineNum}.</div>
        <div class="lbl">${esc(l.intitule || "(Sans intitulé)")}${l.description ? `<div class="desc">${esc(l.description)}</div>` : ""}</div>
        <div class="qty">${num(l.duree).toFixed(2).replace(".",",")} ${l.unit === "j" ? "jour(s) × 8h" : "h"} × ${tarifH.toFixed(2).replace(".",",")} €/h</div>
        <div class="amt">${fmt(amount)}</div>
      </div>`;
    } else if (l.type === "materiel" && l.devis !== "debours") {
      lineNum++;
      const info = ligneDisplayInfo(l.devis, l.paiementType, l.prix, ma, mu, true);
      linesHtml += `<div class="dp-line">
        <div class="num">${lineNum}.</div>
        <div class="lbl">${esc(l.intitule || "(Sans intitulé)")}<div class="desc">${l.description ? esc(l.description) : "Matériel"}</div></div>
        <div class="qty">${esc(info.breakdown)}</div>
        <div class="amt">${fmt(info.amount)}</div>
      </div>`;
    }
  }

  // Déplacement line — goes into either main lines (Principal+Afficher), débours, or invisible (lisser baked into hourly rate)
  const mode = d.deplacement.mode || "voiture";
  const deplDevisMode = t.effectiveDeplMode || "principal";
  // "principal" = shown as separate line (afficher mode), "lisser" = baked into tarifH (invisible),
  // "debours" = in débours bucket (separate section below)
  const deplShownAsMainLine = (deplDevisMode === "principal" && t.depl > 0);
  const deplLineNum = deplShownAsMainLine ? ++lineNum : null;
  // Apply URSSAF/avance markup for Principal mode (works for BOTH voiture and transport)
  const isDeplPrincipal = (d.deplacement.devis || "principal") === "principal";
  const deplInfo = (isDeplPrincipal && t.depl > 0)
    ? ligneDisplayInfo("principal", d.deplacement.paiementType, t.depl, ma, mu, true)
    : { amount: t.depl, breakdown: "", hasMarkup: false };
  const deplFinalAmount = deplInfo.amount;
  // Per user request: NO calculation detail in devis (no "100km × 0,40€/km", no "+péages", etc.)
  // Only the breakdown (URSSAF/avance) is shown if applicable, in the qty slot like materiel lines.
  const deplLineHtml = t.depl > 0 ? `<div class="dp-line">
    ${deplLineNum !== null ? `<div class="num">${deplLineNum}.</div>` : `<div class="num"></div>`}
    <div class="lbl">Déplacement</div>
    <div class="qty">${esc(deplInfo.breakdown)}</div>
    <div class="amt">${fmt(deplFinalAmount)}</div>
  </div>` : "";
  if (deplDevisMode === "principal") {
    linesHtml += deplLineHtml;
  }
  // "lisser" mode → no separate déplacement line (already baked into the hourly rate)

  // Débours items (separately)
  let deboursHtml = "";
  if (deplDevisMode === "debours") {
    deboursHtml += deplLineHtml;
  }
  for (const l of (d.lignes || [])) {
    if (l.type === "materiel" && l.devis === "debours") {
      deboursHtml += `<div class="dp-line">
        <div class="lbl">${esc(l.intitule || "(Sans intitulé)")}${l.description ? `<div class="desc">${esc(l.description)}</div>` : ""}</div>
        <div class="qty"></div>
        <div class="amt">${fmt(num(l.prix))}</div>
      </div>`;
    }
  }

  return `<div class="devis-preview" id="devisPreview">
    <div class="dp-top-row">
      ${d.logoUrl ? `<div class="dp-logo-wrap"><img src="${esc(d.logoUrl)}" alt="Logo" class="dp-logo"></div>` : `<div class="dp-logo-spacer"></div>`}
      <div class="dp-doc-ref">${esc(formatRef(d.ref, "devis"))}</div>
    </div>
    <div class="dp-header-grid">
      <div class="dp-header-left ${(d.photographe || "").trim() ? "" : "empty"}">${(d.photographe || "").trim() ? richDisplayHtml(d.photographe) : "Renseigner vos coordonnées dans la section « Photographe » de l'onglet Mission."}</div>
      <div class="dp-header-right">
        <div class="dp-meta-block">
          <div>Émission : <strong>${dateFR(d.dateEmission) || "—"}</strong></div>
          <div class="dp-validity-mention">Devis valable 30 jours à compter de la date d'émission.</div>
        </div>
        <div class="dp-client-block">
          <span class="name">${esc(cli.name || "(Sélectionner un client)")}</span>
          ${(() => {
            // Resolve current contact from contactId if any
            let pickedContact = null;
            if (S.mission.client.contactId && Array.isArray(cli.contacts)) {
              pickedContact = cli.contacts.find(c => c.id === S.mission.client.contactId);
            }
            // If no pick yet but client has contacts, use first non-empty
            if (!pickedContact && Array.isArray(cli.contacts)) {
              pickedContact = cli.contacts.find(c => c.name || c.phone || c.email) || cli.contacts[0];
            }
            const contactName = pickedContact ? pickedContact.name : (S.mission.client.contactSelected || (cli.contact || "").split(/[\n,;\/]+/)[0].trim());
            const contactPhone = pickedContact ? pickedContact.phone : (S.mission.client.phoneSelected || (cli.phone || "").split(/[\n,;\/]+/)[0].trim());
            const contactEmail = pickedContact ? pickedContact.email : (S.mission.client.emailSelected || (cli.email || "").split(/[\n,;\/]+/)[0].trim());
            return `
              ${contactName ? `<div>${esc(contactName)}</div>` : ""}
              ${cli.address ? `<div>${esc(cli.address)}</div>` : ""}
              ${cli.cityPostal ? `<div>${esc(cli.cityPostal)}</div>` : ""}
              ${contactEmail ? `<div>${esc(contactEmail)}</div>` : ""}
              ${contactPhone ? `<div>${esc(contactPhone)}</div>` : ""}
            `;
          })()}
        </div>
      </div>
    </div>

    ${cat ? `<div class="dp-objet">Objet : <strong>${esc(cat.l)}</strong></div>` : ""}

    <div class="dp-section">
      ${linesHtml || `<div class="dp-empty" style="padding:14px">Aucune ligne pour l'instant.</div>`}
    </div>

    <div class="dp-totals">

function rDeboursPreview() {

  }
  const sel = d.client.id ? S.clients.entries.find(x => x.id === d.client.id) : null;

  // Build débours items — same numbered layout as devis principal
  let linesHtml = "";

      linesHtml += `<div class="dp-line">
        <div class="num">${lineNum}.</div>
        <div class="lbl">${esc(l.intitule || "(Sans intitulé)")}<div class="desc">${l.description ? esc(l.description) : "Frais débours"}</div></div>

// ============ FACTURE PREVIEW ============
function rFacturePreview(opts) {
  // opts: { paidEntries: [{label, amount, date}] } — list of paid échéances. If null, treats as draft (paid=0).
  const d = S.mission;
  const t = totals();
  const hasClient = !!(d.client && (d.client.id || d.client.name));
  const hasContent = (d.lignes || []).length > 0;
  if (!hasClient || !hasContent) {
    return `<div class="devis-preview"><div class="dp-empty">La facture sera disponible une fois le devis rempli (client + au moins une ligne).<br><span style="font-size:13px;color:var(--text-dim)">Pour générer une facture avec un montant payé, va dans Suivi et marque les échéances comme payées.</span></div></div>`;
  }
  const sel = d.client.id ? S.clients.entries.find(x => x.id === d.client.id) : null;
  const cli = sel || d.client;
  const ref = (d.ref || "DEVIS-…-…").replace(/^DEVIS/, "FACTURE");

  const tarifH = t.tarifHEff || t.tarifH;
  const cat = (S.tarifs.catalog || DEFAULT_CATALOG).find(c => c.k === d.object);

  // Build line items HTML (same as devis, without débours)
  let linesHtml = "";
  for (const l of (d.lignes || [])) {
    if (l.type === "heures") {
      const h = num(l.duree) * (l.unit === "j" ? HOURS_PER_DAY : 1);
      const amount = h * tarifH;
      linesHtml += `<div class="dp-line">
        <div class="lbl">${esc(l.intitule || "(Sans intitulé)")}${l.description ? `<div class="desc">${esc(l.description)}</div>` : ""}</div>
        <div class="qty">${num(l.duree).toFixed(2).replace(".",",")} ${l.unit === "j" ? "jour(s) × 8h" : "h"} × ${tarifH.toFixed(2).replace(".",",")} €/h</div>
        <div class="amt">${fmt(amount)}</div>
      </div>`;
    } else if (l.type === "materiel" && l.devis !== "debours") {
      linesHtml += `<div class="dp-line">
        <div class="lbl">${esc(l.intitule || "(Sans intitulé)")}<div class="desc">${l.description ? esc(l.description) : "Matériel"}</div></div>
        <div class="qty"></div>
        <div class="amt">${fmt(num(l.prix))}</div>
      </div>`;
    }
  }
  // Déplacement line if mode is "principal"
  const deplDevisMode = t.effectiveDeplMode || "principal";
  if (deplDevisMode === "principal" && t.depl > 0) {
    linesHtml += `<div class="dp-line">
      <div class="lbl">Déplacement</div>
      <div class="qty"></div>
      <div class="amt">${fmt(t.depl)}</div>
    </div>`;
  }

  // Payment summary
  const paidEntries = (opts && Array.isArray(opts.paidEntries)) ? opts.paidEntries : [];
  const totalPaid = r2(paidEntries.reduce((s, p) => s + num(p.amount), 0));
  const restant = r2(t.total - totalPaid);
  const fullyPaid = restant <= 0.01;

  return `<div class="devis-preview" id="facturePreview">
    <div class="dp-top-row">
      ${d.logoUrl ? `<div class="dp-logo-wrap"><img src="${esc(d.logoUrl)}" alt="Logo" class="dp-logo"></div>` : `<div class="dp-logo-spacer"></div>`}
      <div class="dp-doc-ref" style="color:var(--success)">${esc(ref)}</div>
    </div>
    <div class="dp-header-grid">
      <div class="dp-header-left ${(d.photographe || "").trim() ? "" : "empty"}">${(d.photographe || "").trim() ? richDisplayHtml(d.photographe) : "Renseigner vos coordonnées dans la section « Photographe »."}</div>
      <div class="dp-header-right">
        <div class="dp-meta-block">
          <div>Émission : <strong>${dateFR(d.dateEmission) || "—"}</strong></div>
        </div>
        <div class="dp-client-block">
          <span class="name">${esc(cli.name || "(Sélectionner un client)")}</span>
          ${cli.address ? `<div>${esc(cli.address)}</div>` : ""}
          ${cli.cityPostal ? `<div>${esc(cli.cityPostal)}</div>` : ""}
        </div>
      </div>
    </div>

    <div class="dp-doc-title" style="color:var(--success)">FACTURE</div>

    ${cat ? `<div class="dp-section">
      <h4>Prestation</h4>
      <div class="dp-client"><div class="name">${esc(cat.l)}</div></div>
    </div>` : ""}

    <div class="dp-section">
      <h4>Détail</h4>
      ${linesHtml || `<div class="dp-empty" style="padding:14px">Aucune ligne.</div>`}
    </div>

    <div class="dp-totals">
      <div class="dp-line"><span class="lbl">Sous-total</span><span class="amt">${fmt(t.subtotal)}</span></div>
      ${t.remise > 0 ? `<div class="dp-line"><span class="lbl">Remise (${num(d.remisePct).toString().replace(".",",")} %)</span><span class="amt">−${fmt(t.remise)}</span></div>` : ""}
      <div class="dp-line grand"><span class="lbl">Total HT</span><span class="amt">${fmt(t.total)}</span></div>
    </div>

    <div class="dp-receipt">
      <h4>Récapitulatif paiement</h4>
      ${paidEntries.length > 0 ? `<div class="dp-receipt-list">
        ${paidEntries.map(p => `<div class="dp-receipt-line">
          <span class="lbl">${esc(p.label)}${p.date ? ` — <span class="dim">${esc(p.date)}</span>` : ""}</span>
          <span class="amt">${fmt(p.amount)}</span>
        </div>`).join("")}
      </div>` : ""}
      <div class="dp-receipt-line total"><span class="lbl">Total payé</span><span class="amt" style="color:var(--success)">${fmt(totalPaid)}</span></div>
      <div class="dp-receipt-line restant ${fullyPaid ? 'paid' : ''}"><span class="lbl">${fullyPaid ? "✓ Soldée" : "Reste à payer"}</span><span class="amt" style="color:${fullyPaid ? 'var(--success)' : 'var(--warning)'}">${fmt(restant)}</span></div>
    </div>

    <div class="dp-footer">Auto-entrepreneur · TVA non applicable, art. 293 B du CGI</div>

    <div class="dp-actions">
      <button class="btn ghost" onclick="window.print()">🖨️ Imprimer</button>
    </div>
  </div>`;
}

// ============ TABBED PREVIEW WRAPPER ============
function rPreviewTabs() {

function cliPickEnsurePortal() {
  let p = document.getElementById("cliPickPortal");
  if (!p) {
    p = document.createElement("div");
    p.id = "cliPickPortal";
    document.body.appendChild(p);
  }
  return p;
}

function cliPickPositionPortal() {
  const inp = document.getElementById("cliPickInput");
  const p = cliPickEnsurePortal();
  if (!inp) return;
  const r = inp.getBoundingClientRect();
  p.style.top = (r.bottom + 4) + "px";
  p.style.left = r.left + "px";
  p.style.width = r.width + "px";
}

function cliPickRenderPortal() {
  const p = cliPickEnsurePortal();
  const q = cliPickQuery.trim().toLowerCase();
  const matches = q ? S.clients.entries.filter(e =>
    (e.name||"").toLowerCase().includes(q) ||
    (e.num||"").toLowerCase().includes(q) ||
    (e.contact||"").toLowerCase().includes(q) ||
    (e.email||"").toLowerCase().includes(q)
  ).slice(0, 200) : S.clients.entries.slice(0, 200);
  const showCreate = q && !S.clients.entries.some(e => (e.name||"").toLowerCase() === q);

function bugBuildText() {
  const items = ((S.bugs && S.bugs.items) || []).filter(it => !it.validated && (it.text || "").trim());
  if (!items.length) return "";
  let txt = "";
  items.forEach((it, i) => {
    txt += `${i + 1}. ${(it.text || "").trim()}\n`;
    (it.steps || []).forEach(s => {
      const st = (s || "").trim();
      if (st) txt += `   - ${st}\n`;
    });
  });
  return txt.trimEnd();
}

function bugCopy() {
  const txt = bugBuildText();
  const btn = document.getElementById("bug-copy-btn");
  if (!txt) {
    if (btn) {
      const old = btn.textContent;
      btn.textContent = "Aucune action en cours";
      setTimeout(() => { btn.textContent = old; }, 1500);
    }
    return;
  }
  const done = () => {
    if (btn) {
      const old = btn.textContent;
      btn.textContent = "✓ Copié !";
      btn.classList.add("copied");
      setTimeout(() => { btn.textContent = old; btn.classList.remove("copied"); }, 1800);
    }
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(txt).then(done).catch(() => bugCopyFallback(txt, done));
  } else {
    bugCopyFallback(txt, done);
  }
}
window.bugCopy = bugCopy;

function bugCopyFallback(txt, done) {
  try {
    const ta = document.createElement("textarea");
    ta.value = txt;
    ta.style.position = "fixed";
    ta.style.left = "-9999px";
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    done();
  } catch (e) {
    prompt("Copie manuellement :", txt);
  }
}

// ============ PAIEMENT INFO HELPER ============
// Given a (devis, paiementType, marge%, urssaf%, amount), return a structured explanation
// of what this combination means: who invoices, marge possibility, URSSAF impact, when to use it.
// ============ PAIEMENT INFO HELPER ============
// Compute the "displayed amount" for a materiel ligne (or transport amount), with URSSAF
// compensation and marge avance baked in when applicable.
//
// FORMULA (inverse / true URSSAF compensation):
//   step 1 — apply avance markup:    baseAvance = base × (1 + avance%)
//   step 2 — apply URSSAF inverse:   total = baseAvance / (1 - urssaf%)
//
// Result: charging `total` to the client, after URSSAF takes its share, the photographer
// nets exactly `baseAvance` (i.e., the original price + their avance margin).
//
// Returns { amount, breakdown, hasMarkup, baseAmount, avanceAmt, urssafAmt }.
function ligneDisplayInfo(devis, paiementType, basePrix, margeAvancePct, margeUrssafPct, clientFacing) {
  const base = r2(num(basePrix));
  const isDebours = devis === "debours";
  // Débours items: no markup, no URSSAF (hors CA)
  if (isDebours) {
    return { amount: base, breakdown: "", hasMarkup: false, baseAmount: base, avanceAmt: 0, urssafAmt: 0 };
  }
  const isAvance = paiementType === "avance";
  const avancePct = num(margeAvancePct);
  const urssafPct = num(margeUrssafPct);
  // Step 1: avance markup (only for Avance items)
  const baseAvance = isAvance ? r2(base * (1 + avancePct / 100)) : base;
  // Step 2: URSSAF inverse compensation (always, on Principal items)
  const urssafFactor = 1 - urssafPct / 100;
  const total = (urssafFactor > 0) ? r2(baseAvance / urssafFactor) : baseAvance;
  const avanceAmt = r2(baseAvance - base);
  const urssafAmt = r2(total - baseAvance);
  const hasMarkup = (urssafAmt > 0 || avanceAmt > 0);
  // Build breakdown:
  //   - clientFacing=true (devis preview): hide all markup details (URSSAF + avance) — client just sees the final amount.
  //   - clientFacing=false (form): show full breakdown for the photographer.
  let breakdown = "";
  if (hasMarkup && !clientFacing) {
    const parts = [`${num(base).toFixed(2).replace(".", ",")} €`];
    if (avanceAmt > 0) parts.push(`+ ${avancePct.toString().replace(".", ",")} % avance`);
    if (urssafAmt > 0) parts.push(`+ URSSAF ${urssafPct.toString().replace(".", ",")} %`);
    breakdown = parts.join(" ");
  }
  return { amount: total, breakdown, hasMarkup, baseAmount: base, avanceAmt, urssafAmt };
}

function paiementInfoFor(devis, paiementType, margeAvancePct, margeUrssafPct, lineAmount) {
  const isDebours = devis === "debours";
  const isAcompte = paiementType === "acompte";
  const isAvance = paiementType === "avance";
  const isFactDirect = paiementType === "fact-direct";

  if (!isDebours && isAcompte) {
    const urssafPct = num(margeUrssafPct);
    const urssafFactor = 1 - urssafPct / 100;
    const final = (urssafFactor > 0) ? r2(lineAmount / urssafFactor) : lineAmount;
    const urssafAmt = r2(final - lineAmount);
    return {
      title: "Principal + Acompte",
      facture: "Le fournisseur te facture à ton nom.",
      marge: "0 % · 0,00 €",
      urssaf: `${urssafPct.toString().replace(".", ",")} % · ${fmt(urssafAmt)}`,
      quand: "Tu veux que le client paie cette dépense via l'acompte à la commande, pour ne pas avancer ta trésorerie."
    };
  }
  if (!isDebours && isAvance) {
    const avancePct = num(margeAvancePct);
    const urssafPct = num(margeUrssafPct);
    const baseAvance = r2(lineAmount * (1 + avancePct / 100));
    const urssafFactor = 1 - urssafPct / 100;
    const final = (urssafFactor > 0) ? r2(baseAvance / urssafFactor) : baseAvance;
    const avanceAmt = r2(baseAvance - lineAmount);
    const urssafAmt = r2(final - baseAvance);
    return {
      title: "Principal + Avance",
      facture: "Le fournisseur te facture à ton nom. Tu avances la dépense.",
      marge: `${avancePct.toString().replace(".", ",")} % · ${fmt(avanceAmt)}`,
      urssaf: `${urssafPct.toString().replace(".", ",")} % · ${fmt(urssafAmt)}`,
      quand: "Tu avances ta trésorerie. La marge avance te rémunère pour le risque, la compensation URSSAF couvre les cotisations sur cette ligne."
    };
  }
  if (isDebours) {
    // v1.39+ : seul Débours+Fact.Direct subsiste (Acompte supprimé)
    return {
      title: "Débours",
      facture: "Le fournisseur facture directement ton client final (mandat de débours requis, art. 267 II CGI). Tu n'interviens pas dans le paiement.",
      marge: "0 % · 0,00 €",
      urssaf: `0 % · 0,00 € (hors CA, hors URSSAF)`,
      quand: "Le client paie le fournisseur en direct. La ligne est juste indicative sur le devis. Idéal quand le fournisseur accepte de facturer ton client final."
    };
  }
  // Should not happen but safe fallback
  return {
    title: "Combinaison invalide",
    facture: "—", marge: "—", urssaf: "—", quand: "Choisis une combinaison valide.",
    warn: true
  };
}

// ============ TOOLTIP MECHANISM ============
// On (i) hover, build content from current state and show a positioned tooltip.
// Values reflect the current S.mission state, not a stale render — fresh on every hover.
let _paiementTooltipEl = null;
function _ensureTooltipEl() {
  if (_paiementTooltipEl) return _paiementTooltipEl;
  const el = document.createElement("div");
  el.className = "paiement-tooltip-wrap";
  el.style.display = "none";
  document.body.appendChild(el);
  _paiementTooltipEl = el;
  return el;
}

window.showPaiementInfo = function(evt, kind, id) {
  const el = _ensureTooltipEl();
  let info = null;
  const m = S.mission || {};
  const p = m.paiement || {};
  const isDeclared = m.declare !== false;
  const margeAvance = isDeclared ? num(p.margeAvance ?? 0) : 0;
  const margeUrssaf = isDeclared ? num(m.urssafPct ?? 22) : 0;
  if (kind === "ligne") {
    const l = S.mission.lignes.find(x => x.id === id);
    if (l && l.type === "materiel") {
      info = paiementInfoFor(l.devis, l.paiementType, margeAvance, margeUrssaf, r2(num(l.prix)));
    }
  } else if (kind === "depl") {
    const ts = totals();
    info = paiementInfoFor(S.mission.deplacement.devis, S.mission.deplacement.paiementType, margeAvance, margeUrssaf, ts.depl);
  }
  if (!info) { el.style.display = "none"; return; }
  el.innerHTML = renderPaiementInfo(info);
  el.style.display = "block";
  // Position relative to the (i) icon
  const target = evt.currentTarget || evt.target;
  const rect = target.getBoundingClientRect();
  const tooltipW = 380;
  const margin = 12;
  let left = rect.right + 8;
  if (left + tooltipW > window.innerWidth - margin) left = Math.max(margin, rect.left - tooltipW - 8);
  let top = rect.top - 4;
  // Wait one frame to measure tooltip height for vertical positioning
  requestAnimationFrame(() => {
    const h = el.offsetHeight;
    if (top + h > window.innerHeight - margin) top = Math.max(margin, window.innerHeight - h - margin);
    el.style.top = top + "px";
  });
  el.style.left = left + "px";
  el.style.top = top + "px";
};
window.hidePaiementInfo = function() {
  if (_paiementTooltipEl) _paiementTooltipEl.style.display = "none";
};

          <input type="number" step="0.01" placeholder="0,00" value="${esc(l.prix)}" oninput="ligneUpd('${l.id}','prix',this.value)">

        <div class="seg lg-toggle">
          <button class="${(l.devis||'principal')==='principal'?'on':''}" onclick="ligneSetDevis('${l.id}','principal')">Principal</button>
          <button class="${l.devis==='debours'?'on warn':''}" onclick="ligneSetDevis('${l.id}','debours')">Débours</button>
        </div>
        ${paiementModeHtml}
        <button class="lg-info-icon" onmouseenter="showPaiementInfo(event, 'ligne', '${l.id}')" onmouseleave="hidePaiementInfo()" onfocus="showPaiementInfo(event, 'ligne', '${l.id}')" onblur="hidePaiementInfo()" tabindex="0" aria-label="Voir les conséquences fiscales de ce choix">i</button>

// Round to 2 decimals, killing IEEE-754 float garbage
function r2(v) { return Math.round((+v + Number.EPSILON) * 100) / 100; }

// Format a stored ref (e.g. "DEVIS-12-2026-04-26") into a human-readable display
// ("Devis n° 12-2026-04-26" / "Débours n° ..." / "Facture n° ...").
// Storage keeps the raw form for backward compat, display always uses this.
function formatRef(ref, type) {
  const labels = { devis: "Devis", debours: "Débours", facture: "Facture" };
  const label = labels[type] || "Devis";
  if (!ref || ref === "DEVIS-…-…") return `${label} n° …`;
  const stripped = ref.replace(/^(DEVIS|DEBOURS|FACTURE)-/i, "");
  return `${label} n° ${stripped}`;
}

  { k: "60j_fdm",     l: "60 jours fin de mois" },
  { k: "10_mois_suiv", l: "Le 10 du mois suivant" },

];
function delaiPaiementLabel(k) {

  return d ? d.l : "";
}

function totals() {
  const d = S.mission;
  // Hourly rate logic. The catalog price `cat.p` is the photographer's gross billed price
  // (CA déclaré, URSSAF incluse). For French auto-entrepreneur, URSSAF = X% du CA :
  //   net before matos = gross × (1 - URSSAF%)
  //   gross = net / (1 - URSSAF%)
  // Au black, the photographer can pass the URSSAF saved as a discount to the client:
  //   tarif au black = gross × (1 - URSSAF%) — équivalent net
  const cat = (S.tarifs.catalog || DEFAULT_CATALOG).find(c => c.k === d.object);
  const _baseTotal = cat ? num(cat.p) : 0;
  const _isDecTot = d.declare !== false;
  const _urssafFactorTot = 1 - (num(d.urssafPct ?? 22)) / 100; // e.g., 0.78 for 22%
  // Tarif horaire :
  //   - Déclaré : tarif catalogue tel quel (gross facturé)
  //   - Au black "taux fixe" : même prix que déclaré (photographe garde l'URSSAF)
  //   - Au black "taux réduit" : prix réduit (= net déclaré, le client économise l'URSSAF)
  const _blackMode = d.blackMode || "reduit";
  const tarifH = _isDecTot
    ? _baseTotal
    : (_baseTotal > 0
        ? (_blackMode === "fixe" ? _baseTotal : r2(_baseTotal * _urssafFactorTot))
        : 0);
  const HOURS_PER_DAY = 8;
  // Marge rates: au black ⇒ no compensation (everything raw).
  // URSSAF rate read from the unique source of truth (mission.urssafPct).
  const margeAvancePct = _isDecTot ? num(d.paiement?.margeAvance ?? 0) : 0;
  const margeUrssafPct = _isDecTot ? num(d.urssafPct ?? 22) : 0;
  // First pass: walk lignes — accumulate hours and per-line final amounts.
  // For Principal items, use ligneDisplayInfo() to compute the final (post-URSSAF, post-avance)
  // amount with the inverse formula. The sum is what the client owes.
  let totalHeures = 0, materielPrincipalFinal = 0, debours = 0;
  // totalAcompteMateriel: base-price sum of acompte items (used for acompte suggestion %).
  // totalAvanceBase: base-price sum of avance items (for hint texts).
  // totalFactDirect: separate bucket — fact-direct items don't enter HT or débours.
  // totalAvanceMontant + totalUrssafMontant: derived sums of markup amounts (for hints/tooltips).
  let totalAcompteMateriel = 0, totalAvanceBase = 0, totalFactDirect = 0;
  let totalAvanceMontant = 0, totalUrssafMontant = 0, totalPrincipalBase = 0;
  const heuresHList = [];
  for (const l of d.lignes || []) {
    if (l.type === "heures") {
      const h = num(l.duree) * (l.unit === "j" ? HOURS_PER_DAY : 1);
      totalHeures = r2(totalHeures + h);
      heuresHList.push(h);
    } else if (l.type === "materiel") {
      const p = r2(num(l.prix));
      if (l.devis === "debours") {
        // Débours: hors CA, no markup. Acompte → débours bucket; Fact.Direct → its own bucket.
        if (l.paiementType === "fact-direct") {
          totalFactDirect = r2(totalFactDirect + p);
        } else {
          debours = r2(debours + p);
          if (l.paiementType === "acompte") totalAcompteMateriel = r2(totalAcompteMateriel + p);
        }
      } else {
        // Principal: apply the markup formula (avance first, then URSSAF inverse)
        const info = ligneDisplayInfo(l.devis, l.paiementType, l.prix, margeAvancePct, margeUrssafPct, false);
        materielPrincipalFinal = r2(materielPrincipalFinal + info.amount);
        totalPrincipalBase = r2(totalPrincipalBase + p);
        totalAvanceMontant = r2(totalAvanceMontant + info.avanceAmt);
        totalUrssafMontant = r2(totalUrssafMontant + info.urssafAmt);
        if (l.paiementType === "acompte") totalAcompteMateriel = r2(totalAcompteMateriel + p);
        if (l.paiementType === "avance") totalAvanceBase = r2(totalAvanceBase + p);
      }
    }
  }
  // Déplacement — round each component
  const mode = d.deplacement.mode || "voiture";
  const tauxKm = num(d.deplacement.tauxKm) || 0.40;
  const trajet = r2(num(d.deplacement.trajetH) * 40);
  const depl = mode === "voiture"
    ? r2(r2(num(d.deplacement.km) * tauxKm) + r2(num(d.deplacement.peages)) + trajet)
    : r2(r2(num(d.deplacement.ticket)) + trajet);
  const deplMode = d.deplacement.devis || "principal";
  const deplAfficheMode = d.deplacement.afficheMode || "afficher";
  const deplGoesToDebours = deplMode === "debours";
  const deplGoesToPrincipal = deplMode === "principal";
  // "Lisser dans taux horaire" mode: bake déplacement into hourly rate (only meaningful when Principal + hours exist)
  const deplLisser = deplGoesToPrincipal && deplAfficheMode === "lisser" && totalHeures > 0;
  // Apply markup to déplacement when Principal (works for BOTH voiture and transport)
  let deplFinal = depl;
  if (depl > 0 && deplGoesToPrincipal) {
    const dInfo = ligneDisplayInfo("principal", d.deplacement.paiementType, depl, margeAvancePct, margeUrssafPct, false);
    deplFinal = dInfo.amount;
    totalPrincipalBase = r2(totalPrincipalBase + depl);
    totalAvanceMontant = r2(totalAvanceMontant + dInfo.avanceAmt);
    totalUrssafMontant = r2(totalUrssafMontant + dInfo.urssafAmt);
    if (d.deplacement.paiementType === "acompte") totalAcompteMateriel = r2(totalAcompteMateriel + depl);
    if (d.deplacement.paiementType === "avance") totalAvanceBase = r2(totalAvanceBase + depl);
  } else if (depl > 0 && deplGoesToDebours) {
    if (d.deplacement.paiementType === "fact-direct") {
      totalFactDirect = r2(totalFactDirect + depl);
    } else if (d.deplacement.paiementType === "acompte") {
      totalAcompteMateriel = r2(totalAcompteMateriel + depl);
    }
  }
  // Effective hourly rate (with déplacement baked in if "lisser" mode — uses FINAL amount with markup)
  let tarifHEff = tarifH;
  let deplPerHour = 0;
  if (deplLisser && deplFinal > 0) {
    deplPerHour = r2(deplFinal / totalHeures);
    tarifHEff = r2(tarifH + deplPerHour);
  }
  // Heures amount (per-ligne rounding for stable totals)
  let heuresAmount = 0;
  for (const h of heuresHList) {
    heuresAmount = r2(heuresAmount + r2(h * tarifHEff));
  }
  const lignesAmount = r2(heuresAmount + materielPrincipalFinal);
  if (deplGoesToDebours && d.deplacement.paiementType !== "fact-direct") debours = r2(debours + depl);
  const autres = 0;
  // Subtotal: heures (which includes lisser depl baked into tarifH) + materiel principal (final) +
  //           déplacement final IF Principal+Afficher (separate line in devis)
  // - Principal+Afficher: depl shown as separate line, added to subtotal
  // - Principal+Lisser+hours: depl baked into tarifH, NOT in subtotal separately (heuresAmount already includes it)
  // - Principal+Lisser+0 hours: degenerate case — show as separate line (otherwise depl disappears)
  const deplShownAsLine = deplGoesToPrincipal && (deplAfficheMode === "afficher" || (deplAfficheMode === "lisser" && totalHeures === 0));
  const effectiveDeplMode = deplShownAsLine ? "principal" : (deplLisser ? "lisser" : deplMode);
  const subtotal = r2(lignesAmount + (deplShownAsLine ? deplFinal : 0));
  const remise = r2(subtotal * num(d.remisePct) / 100);
  const total = r2(subtotal - remise);
  // Acompte suggested %: max(30, totalAcompteMateriel/total*100)
  const acompteSuggestedPct = total > 0
    ? Math.max(30, Math.ceil(totalAcompteMateriel / total * 100))
    : 30;
  // Échéances breakdown (% of total)
  const echeances = (d.echeances || []).map(e => ({
    id: e.id, label: e.label, pct: num(e.pct), amount: r2(total * num(e.pct) / 100)
  }));
  const echeancesTotal = r2(echeances.reduce((s, e) => s + num(e.pct), 0));
  return {
    lignes: lignesAmount, debours, depl, autres, totalFactDirect,
    subtotal, remise, total, totalHeures,
    tarifH, tarifHEff, deplPerHour, deplMode, effectiveDeplMode,
    acompte: r2(total * 0.30), reste: r2(total * 0.70),
    echeances, echeancesTotal,
    totalAcompteMateriel, totalAvance: totalAvanceBase, totalPrincipalBase,
    margeAvancePct, margeAvanceAmount: totalAvanceMontant,
    margeUrssafPct, margeUrssafAmount: totalUrssafMontant,
    acompteSuggestedPct,
    prep: 0, prod: lignesAmount, post: 0
  };
}

function rTauxBreakdown() {
  // Inline breakdown shown under "Temps de trajet" when "Lisser dans taux horaire" mode is active.
  const d = S.mission;
  const isLisser = (d.deplacement.devis || "principal") === "principal" && (d.deplacement.afficheMode || "afficher") === "lisser";
  if (!isLisser) return "";
  const t = totals();
  if (t.totalHeures === 0) {
    return `<div class="hint" style="margin-top:6px;color:var(--warning)">⚠ Pas d'heures dans le devis : le déplacement est facturé séparément en attendant (mode « lisser » nécessite des heures).</div>`;
  }
  const b = tarifBreakdown(true);
  if (!b) return `<div class="hint" style="margin-top:6px">Sélectionne un type de prestation pour voir la décomposition.</div>`;
  return `<div class="taux-breakdown">
    <label class="taux-breakdown-lbl">Tarif horaire mis à jour avec déplacement (lissé)</label>
    <div class="presta-decomp">${tarifBreakdownHtml(b)}</div>
  </div>`;
}

  // Update the badge on the Débours tab button (total débours amount)
  const t2 = totals();
  const deboursBtn = document.querySelector(".preview-tabs-nav button[onclick*=\"'debours'\"]");
  if (deboursBtn) {
    const hasDebours = t2.debours > 0;
    deboursBtn.innerHTML = `💸 Débours${hasDebours ? ` <span class="badge">${fmt(t2.debours)}</span>` : ""}`;
  }
  // Update the "Total" row at the bottom of the échéances list (no € value shown anymore)
  const totalRow = document.getElementById("echTotalRow");
  const totalPct = document.getElementById("echTotalPct");
  const warnEl = document.getElementById("echWarn");
  if (totalRow && totalPct) {
    const pctSum = t2.echeancesTotal;
    const ok = pctSum === 100;
    totalRow.className = `ech-row ech-total ${ok ? "ok" : "warn"}`;
    totalPct.textContent = `${pctSum.toString().replace(".",",")} %${ok ? " ✓" : ""}`;

  // Refresh per-line final cost indicators (in materiel form rows)
  refreshFinalCosts();
  // Refresh the remise tooltip live (so tooltip reflects current state without re-render)
  refreshRemiseTooltip();

let textEditorModal = null; // { field }

// Detect if a value is rich HTML or plain text
function isRichHtml(s) {
  if (!s) return false;
  return /<\/?(p|div|span|br|b|i|u|strong|em|ul|ol|li|font|h[1-6])\b/i.test(s);
}

// Convert plain text → safe HTML (preserve newlines as <br>)
function plainToHtml(s) {
  if (!s) return "";
  return esc(s).replace(/\n/g, "<br>");
}

// Used for read-only preview (in Mission and devis): outputs HTML
// If value already contains HTML tags, render as-is. Else convert plain → HTML.
function richDisplayHtml(s) {
  if (!s) return "";
  return isRichHtml(s) ? s : plainToHtml(s);
}

// ============ CGV (structured sections) ============
// Each CGV is composed of an optional preamble paragraph + an array of {id, title, body} sections.
// renderCgvSections() turns this data into the HTML used in the devis preview / printed output.
function renderCgvSections(preambule, sections) {
  const safePreamb = (preambule || "").trim().replace(/\n+/g, " ");
  const list = Array.isArray(sections) ? sections : [];
  const validSections = list.filter(s => s && (s.title || s.body));
  if (!safePreamb && validSections.length === 0) return "";
  let html = "";
  if (safePreamb) {
    html += `<p class="cgv-paragraph">${esc(safePreamb)}</p>`;
  }
  validSections.forEach((s, i) => {
    const title = (s.title || "").trim();
    const body = (s.body || "").trim().replace(/\n+/g, " ");
    // Auto-add a period after the title if missing (juridical convention: "1. Title. Body...")
    const titleDisplay = title && !/[.!?:]$/.test(title) ? title + "." : title;
    const titlePart = title
      ? `<strong class="cgv-section-title">${i + 1}. ${esc(titleDisplay)}</strong> `
      : `<strong class="cgv-section-title">${i + 1}.</strong> `;
    html += `<p class="cgv-section">${titlePart}${esc(body)}</p>`;
  });
  return html;
}

// parseCgvText: one-shot migration helper that turns legacy free-text CGV into {preambule, sections[]}.
// Used at app load to migrate existing data, and never called again afterwards.
function parseCgvText(rawText) {
  if (!rawText || !String(rawText).trim()) return { preambule: "", sections: [] };
  let text = String(rawText)
    .replace(/<\/p>\s*<p[^>]*>/gi, "\n\n")
    .replace(/<br\s*\/?>/gi, "\n")
    .replace(/<\/?p[^>]*>/gi, "")
    .replace(/&nbsp;/g, " ");
  text = text.replace(/\r\n?/g, "\n").trim();
  const paragraphs = text.split(/\n\s*\n/).map(p => p.trim()).filter(Boolean);
  const sections = [];
  const preambleParts = [];
  let foundFirstSection = false;
  for (const p of paragraphs) {
    const numMatch = p.match(/^(\d+)\.\s+([\s\S]+)$/);
    if (numMatch) {
      foundFirstSection = true;
      const rest = numMatch[2];
      let title, body;
      const newlineIdx = rest.indexOf("\n");
      if (newlineIdx > 0 && newlineIdx <= 80) {
        title = rest.substring(0, newlineIdx).trim();
        body = rest.substring(newlineIdx + 1).trim();
      } else {
        const sentMatch = rest.match(/^([^.\n]{2,80})\.\s+([\s\S]+)$/);
        if (sentMatch) {
          title = sentMatch[1].trim();
          body = sentMatch[2].trim();
        } else {
          title = rest.length <= 80 ? rest.replace(/\.$/, "").trim() : rest.substring(0, 60).trim() + "…";
          body = rest.length <= 80 ? "" : rest;
        }
      }
      sections.push({ id: uid(), title, body });
    } else if (!foundFirstSection) {
      // Preamble (only paragraphs before the first numbered section count as preamble)
      preambleParts.push(p);
    } else {
      // Unnumbered paragraph after sections — append to last section's body
      if (sections.length > 0) {
        sections[sections.length - 1].body = (sections[sections.length - 1].body || "") + "\n\n" + p;
      } else {
        preambleParts.push(p);
      }
    }
  }
  return { preambule: preambleParts.join("\n\n"), sections };
}

  save();
  render();
};

// Compute the suggested PDF filename for the currently open print modal
function computePrintFilename() {
  let dv = null, kind = "Devis";
  if (typeof viewDevisModal !== "undefined" && viewDevisModal) {
    dv = S.suivi.devis && S.suivi.devis[viewDevisModal.devisId];
    kind = "Devis";
  } else if (typeof viewFactureModal !== "undefined" && viewFactureModal) {
    dv = S.suivi.devis && S.suivi.devis[viewFactureModal.devisId];
    kind = "Facture";
  } else if (typeof activePreviewTab !== "undefined" && activePreviewTab === "debours") {
    // Printing the débours tab from Mission preview
    kind = "Débours";
  }
  if (!dv) {
    // Fallback: building from current mission
    const m = S.mission || {};
    const cli = (m.client && (m.client.name || "Client")) || "Client";
    const ref = m.ref || "DEVIS";
    const refClean = ref.replace(/^(DEVIS|DEBOURS|FACTURE)-?/i, "");
    return sanitizeFilename(`${cli} - ${kind} ${refClean}`);
  }
  // Try to get prestation from the first suivi entry of this devis
  const devisId = (viewDevisModal && viewDevisModal.devisId) || (viewFactureModal && viewFactureModal.devisId);
  const firstEntry = (S.suivi.entries || []).find(e => e.devisId === devisId);
  const prestation = (firstEntry && firstEntry.prestation) || "";
  const client = dv.snapshotClient || "Client";
  const ref = dv.ref || "DEVIS";
  // Strip "DEVIS-" prefix from ref to be more readable: "14-2026-04-26"
  const refClean = ref.replace(/^(DEVIS|DEBOURS|FACTURE)-?/i, "");
  let name = `${client} - ${kind} ${refClean}`;
  if (prestation) name += ` - ${prestation}`;
  return sanitizeFilename(name);
}

function sanitizeFilename(s) {
  // Strip illegal chars, collapse whitespace
  return String(s)
    .replace(/[<>:"/\\|?*\x00-\x1f]/g, "")
    .replace(/\s+/g, " ")
    .trim()
    .slice(0, 120);
}

// Show a one-time print tip, then trigger print with custom filename
let printTipShown = false;
let savedDocumentTitle = "";

function _doPrint() {
  // Set a temporary title that browsers use as default PDF filename
  savedDocumentTitle = document.title;
  const newTitle = computePrintFilename();
  document.title = newTitle;
  // Restore on afterprint (or fallback timeout)
  const restore = () => {
    if (savedDocumentTitle) document.title = savedDocumentTitle;
    savedDocumentTitle = "";
    window.removeEventListener("afterprint", restore);
  };
  window.addEventListener("afterprint", restore);
  setTimeout(restore, 8000); // safety fallback
  window.print();
}

window.printWithTip = function() {
  if (printTipShown) {
    setTimeout(_doPrint, 50);
    return;
  }
  printTipShown = true;
  printTipModalOpen = true;
  render();
};
window.printTipDismiss = function(proceed) {
  printTipModalOpen = false;
  render();
  if (proceed) setTimeout(_doPrint, 100);
};
