<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🌊 Devis Photo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a1628;--bg-2:#0f2240;--bg-3:#06101d;
    --surface:#122a4d;--surface-2:#1a3a66;--surface-hi:#224a7a;
    --border:#224a7a;--border-light:#2c5a92;--border-soft:#1a3a66;
    --text:#e8f0fb;--text-muted:#8fa8c9;--text-dim:#5e7a9c;
    --primary:#4a9eff;--primary-dark:#2b7ad9;--primary-soft:rgba(74,158,255,.12);
    --accent:#5eead4;
    --success:#22c55e;--success-dark:#16a34a;--success-soft:rgba(34,197,94,.14);
    --danger:#ef4444;--danger-dark:#dc2626;--danger-soft:rgba(239,68,68,.14);
    --warning:#f59e0b;--warning-dark:#d97706;--warning-soft:rgba(245,158,11,.12);
    --shadow:0 4px 20px rgba(0,0,0,.4);--shadow-sm:0 1px 3px rgba(0,0,0,.3);
  }
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-track{background:var(--bg-3)}
  ::-webkit-scrollbar-thumb{background:var(--surface-hi);border-radius:4px}
  ::-webkit-scrollbar-thumb:hover{background:var(--border-light)}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Inter',system-ui,-apple-system,sans-serif;background:linear-gradient(180deg,var(--bg) 0%,var(--bg-3) 100%);background-attachment:fixed;color:var(--text)}
  #app{display:flex;min-height:100vh}
  .sb{width:220px;background:var(--bg-2);color:var(--text);border-right:1px solid var(--border);display:flex;flex-direction:column}
  .sb h1{font-size:13px;padding:18px 16px 10px;margin:0;color:var(--accent);letter-spacing:.05em;text-transform:uppercase;font-weight:700}
  .sb button.tab{display:block;width:100%;background:none;border:0;color:inherit;padding:10px 16px;text-align:left;cursor:pointer;font:inherit;font-size:14px}
  .sb button.tab:hover{background:var(--surface)}
  .sb button.tab.active{background:var(--surface);color:#fff;border-left:3px solid var(--primary);padding-left:13px}
  .sb .user{margin-top:auto;padding:12px 16px;font-size:12px;color:var(--text-muted);border-top:1px solid var(--border)}
  .sb .user a{color:inherit}
  main{flex:1;padding:24px 32px;max-width:1100px}
  h2{margin-top:0}
  h3{margin-top:24px;margin-bottom:8px;font-size:13px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);padding-bottom:4px}
  .row{display:flex;gap:12px;margin-bottom:8px;flex-wrap:wrap}
  .field{display:flex;flex-direction:column;flex:1;min-width:160px}
  .field.sm{max-width:140px}
  .field label{font-size:12px;color:var(--text-muted);margin-bottom:4px}
  .field input,.field textarea,.field select{padding:8px 10px;border:1px solid var(--border-light);border-radius:6px;font:inherit;background:var(--surface);color:var(--text)}
  .field textarea{min-height:60px;resize:vertical}
  .btn{background:var(--primary);color:#fff;border:0;padding:10px 16px;border-radius:6px;cursor:pointer;font:inherit;font-weight:500;transition:all .15s}
  .btn:hover{background:var(--primary-dark);box-shadow:0 2px 8px rgba(74,158,255,.3)}
  .btn.ghost{background:var(--surface);color:var(--text);border:1px solid var(--border-light)}
  .btn.ghost:hover{background:var(--surface-2);border-color:var(--primary)}
  .login{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:20px;background:linear-gradient(180deg,var(--bg) 0%,var(--bg-3) 100%)}
  .login h1{font-size:32px;font-weight:700;letter-spacing:-.02em;background:linear-gradient(135deg,var(--primary) 0%,var(--accent) 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin:0}
  .login .btn{padding:12px 22px;font-size:14px;font-weight:600;box-shadow:0 4px 14px rgba(74,158,255,.35)}
  .saved{font-size:12px;color:var(--success);margin-left:12px;font-weight:normal}
  .empty{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:32px;text-align:center;color:var(--text-dim);font-size:14px}
  .totals{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 18px;margin-top:24px;box-shadow:var(--shadow-sm)}
  .totals .line{display:flex;justify-content:space-between;padding:5px 0;font-size:14px}
  .totals .line.total{border-top:1px solid var(--border);margin-top:6px;padding-top:10px;font-weight:600;font-size:16px;color:var(--primary)}
  .totals .line.muted{color:var(--text-muted);font-size:13px}
  .hint{font-size:11px;color:var(--text-dim);margin:-4px 0 8px}
  table.hist{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-top:8px;font-size:13px;box-shadow:var(--shadow-sm)}
  table.hist th{background:var(--surface-2);text-align:left;padding:10px 12px;font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);font-weight:600}
  table.hist td{padding:6px 8px;border-bottom:1px solid var(--border-soft);vertical-align:middle}
  table.hist tr:last-child td{border-bottom:0}
  table.hist input,table.hist select{width:100%;padding:6px 8px;border:1px solid transparent;border-radius:4px;font:inherit;font-size:13px;background:transparent;color:var(--text)}
  table.hist input:hover,table.hist select:hover{border-color:var(--border)}
  table.hist input:focus,table.hist select:focus{outline:none;border-color:var(--primary);background:var(--surface-2)}
  table.hist td.amount input{text-align:right;font-variant-numeric:tabular-nums}
  table.hist td.actions{text-align:center;width:36px}
  table.hist td.actions button{background:none;border:0;color:var(--text-dim);cursor:pointer;font-size:16px;padding:4px 6px;border-radius:4px}
  table.hist td.actions button:hover{background:var(--danger-soft);color:var(--danger)}
  table.hist tfoot td{padding:10px 12px;border-top:1px solid var(--border);background:var(--surface-2);font-weight:600;font-size:13px;text-align:right;font-variant-numeric:tabular-nums;color:var(--text)}
  table.hist tfoot td:first-child{text-align:left}
  table.hist tfoot tr.grandtotal td{background:var(--surface-hi);font-size:14px;border-top:2px solid var(--primary);color:var(--primary)}
  table.hist tbody tr.subtotal td{padding:8px 12px;background:var(--surface-2);font-weight:600;font-size:13px;border-top:1px solid var(--border);text-align:right;font-variant-numeric:tabular-nums;color:var(--text-muted)}
  table.hist tbody tr.subtotal td:first-child{text-align:left}
  td.statut{text-align:center}
  .pst{display:inline-block;width:12px;height:12px;border-radius:50%;vertical-align:middle;flex-shrink:0}
  .pst[data-s="envoye"]{background:var(--primary);box-shadow:0 0 6px rgba(74,158,255,.5)}
  .pst[data-s="accepte"]{background:var(--success);box-shadow:0 0 6px rgba(34,197,94,.5)}
  .pst[data-s="attente"]{background:var(--warning);box-shadow:0 0 6px rgba(245,158,11,.5)}
  .pst[data-s="termine"]{background:var(--text-dim)}
  .pst[data-s="refuse"]{background:var(--danger);box-shadow:0 0 6px rgba(239,68,68,.5)}
  .legend{display:flex;gap:16px;flex-wrap:wrap;align-items:center;margin:6px 0 10px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text-muted)}
  .legend .item{display:flex;align-items:center;gap:6px}
  table.hist th.sortable{cursor:pointer;user-select:none;white-space:nowrap}
  table.hist th.sortable:hover{background:var(--surface-hi)}
  table.hist th .arr{font-size:10px;opacity:.3;margin-left:4px}
  table.hist th .arr.on{opacity:1;color:var(--primary)}
  table.hist tr.suv-row{cursor:pointer}
  table.hist tr.suv-row:hover td{background:var(--surface-2)}
  table.hist tr.suv-row.expanded td{background:var(--primary-soft)}
  table.hist tr.suv-row td{padding:9px 12px;font-size:13px}
  table.hist tr.suv-row td.amt{text-align:right;font-variant-numeric:tabular-nums}
  table.hist td.cb,table.hist th:first-child{text-align:center;width:34px;padding:6px 4px}
  table.hist td.cb input,table.hist th input[type="checkbox"]{cursor:pointer;width:16px;height:16px}
  table.hist tr.suv-detail td{background:transparent;padding:0;border-bottom:0}
  table.hist tr.suv-row.clickable{cursor:pointer}
  table.hist tr.suv-multi td{font-weight:500}
  .suv-caret{display:inline-block;color:var(--text-dim);font-size:11px;margin-right:2px}
  table.hist tbody.devis-grp{border-bottom:1px solid var(--border);transition:background .12s ease, box-shadow .12s ease}
  table.hist tbody.devis-grp:last-child{border-bottom:0}
  table.hist tbody.devis-grp tr td{background:var(--surface)}
  table.hist tbody.devis-grp:hover tr.suv-row td{background:var(--surface-2)}
  table.hist tbody.devis-grp.expanded{box-shadow:inset 4px 0 0 var(--primary)}
  table.hist tbody.devis-grp.expanded tr.suv-row td,
  table.hist tbody.devis-grp.expanded tr.suv-sub td,
  table.hist tbody.devis-grp.expanded tr.suv-detail td{background:var(--primary-soft)}
  table.hist tbody.devis-grp.editing{box-shadow:inset 4px 0 0 var(--warning)}
  table.hist tbody.devis-grp.editing tr.suv-row td,
  table.hist tbody.devis-grp.editing tr.suv-detail td{background:var(--warning-soft)}
  table.hist tbody.devis-grp.sel:not(.editing):not(.expanded){box-shadow:inset 4px 0 0 var(--warning)}
  table.hist tbody.devis-grp.sel tr.suv-row td{background:var(--warning-soft)}
  table.hist tbody.devis-grp.sel.expanded tr.suv-row td{background:rgba(245,158,11,.18)}
  table.hist tr.suv-sub td{padding:6px 12px;font-size:12.5px;color:var(--text-muted);border-bottom:0}
  table.hist tr.suv-sub td.statut{padding-left:30px}
  table.hist tr.suv-sub td.sub-lib{color:var(--text);font-style:italic}
  table.hist tr.suv-sub td.amt{color:var(--text);padding-right:12px}
  table.hist tr.suv-row td.amt,table.hist tr.suv-sub td.amt{font-variant-numeric:tabular-nums;text-align:right;padding-right:12px}
  table.hist td.actions:has(.suv-row-actions){text-align:right;width:auto;min-width:200px;padding:4px 8px}
  .suv-row-actions{display:inline-flex;gap:8px;align-items:center;justify-content:flex-end;opacity:0;transition:opacity .12s ease;pointer-events:none}
  table.hist tbody.devis-grp.expanded .suv-row-actions,
  table.hist tbody.devis-grp.editing .suv-row-actions{opacity:1;pointer-events:auto}
  table.hist tr.suv-detail .suv-row-actions{opacity:1;pointer-events:auto}
  .btn.btn-vert{background:var(--success);color:#fff}.btn.btn-vert:hover{background:var(--success-dark);box-shadow:0 2px 8px rgba(34,197,94,.3)}
  .btn.btn-rouge{background:var(--danger);color:#fff}.btn.btn-rouge:hover{background:var(--danger-dark);box-shadow:0 2px 8px rgba(239,68,68,.3)}
  .btn.btn-gris{background:var(--text-dim);color:#fff}.btn.btn-gris:hover{background:var(--text-muted)}
  .btn.btn-bleu{background:var(--primary);color:#fff}.btn.btn-bleu:hover{background:var(--primary-dark)}
  .btn.btn-icon{background:transparent;border:0;min-width:0;padding:3px 5px;font-size:15px;font-weight:600;line-height:1;border-radius:3px;color:var(--text-muted)}
  .btn.btn-icon:hover{background:rgba(255,255,255,.08);color:var(--text)}
  .btn.btn-icon.btn-vert{background:transparent;color:var(--success)}
  .btn.btn-icon.btn-vert:hover{background:var(--success-soft);color:var(--success)}
  .btn.btn-icon.btn-rouge{background:transparent;color:var(--danger)}
  .btn.btn-icon.btn-rouge:hover{background:var(--danger-soft);color:var(--danger)}
  .btn.btn-icon.btn-bleu{background:transparent;color:var(--primary)}
  .btn.btn-icon.btn-bleu:hover{background:var(--primary-soft);color:var(--primary)}
  .btn.btn-icon.ghost{background:transparent;border:0;color:var(--text-dim)}
  .btn.btn-icon.ghost:hover{background:rgba(255,255,255,.08);color:var(--text)}
  .btn-act{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;border:0;font-size:12.5px;font-weight:600;color:#fff;cursor:pointer;line-height:1;white-space:nowrap;font-family:inherit;box-shadow:0 1px 2px rgba(0,0,0,.08)}
  .btn-act .ico{font-size:13px;font-weight:700;line-height:1}
  .btn-act.act-vert{background:var(--success)}
  .btn-act.act-vert:hover{background:var(--success-dark);box-shadow:0 2px 6px rgba(34,197,94,.4)}
  .btn-act.act-rouge{background:var(--danger)}
  .btn-act.act-rouge:hover{background:var(--danger-dark);box-shadow:0 2px 6px rgba(239,68,68,.4)}
  .ico-btn{background:transparent;color:var(--text-dim);border:0;border-radius:3px;padding:3px 5px;cursor:pointer;font-size:15px;line-height:1;font-weight:600;min-width:0}
  .ico-btn:hover{background:rgba(255,255,255,.08);color:var(--text)}
  .ico-btn[title*="Supprimer"]:hover{background:var(--danger-soft);color:var(--danger)}
  td.ref-cell{color:var(--text);font-variant-numeric:tabular-nums}
  td.ref-cell .muted{color:var(--text-dim)}
  .suv-panel{padding:12px 16px}
  .suv-actions{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);align-items:center}
  .suv-compact-row{display:flex;gap:6px;flex-wrap:wrap;align-items:flex-end;margin-bottom:8px}
  .suv-compact-row label{display:flex;flex-direction:column;font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.03em;flex:0 0 auto}
  .suv-compact-row label span{margin-bottom:2px}
  .suv-compact-row label input,.suv-compact-row label .ro,.suv-compact-row label textarea{padding:4px 6px;border:1px solid var(--border-light);border-radius:4px;font:inherit;font-size:12.5px;color:var(--text);background:var(--surface-2);width:80px}
  .suv-compact-row label .ro{background:var(--bg-2);color:var(--text-muted);font-variant-numeric:tabular-nums}
  .suv-compact-row label.lib{flex:1;min-width:160px}
  .suv-compact-row label.lib input{width:100%}
  .suv-compact-row label.wide{flex:1}
  .suv-compact-row label.wide textarea{width:100%;min-height:48px;resize:vertical}
  .suv-compact-row label input:focus,.suv-compact-row label textarea:focus{outline:none;border-color:var(--primary)}
  .filter-group{display:flex;gap:6px;align-items:center}
  .filter-group label{font-size:12px;color:var(--text-muted)}
  .filter-group select{padding:8px 10px;border:1px solid var(--border-light);border-radius:6px;font:inherit;background:var(--surface);color:var(--text);cursor:pointer}
  .filter-group select:focus{outline:none;border-color:var(--primary)}
  .toolbar{display:flex;gap:8px;align-items:center;margin:14px 0 4px;flex-wrap:wrap}
  .toolbar .spacer{flex:1}
  .toolbar .search{flex:1;min-width:200px;max-width:340px;padding:8px 12px;border:1px solid var(--border-light);border-radius:6px;font:inherit;background:var(--surface);color:var(--text)}
  .toolbar .search:focus{outline:none;border-color:var(--primary)}
  table.hist tr.cli-row.clickable{cursor:pointer}
  table.hist tr.cli-row.clickable:hover td{background:var(--surface-2)}
  table.hist tr.cli-row.clickable.expanded td{background:var(--primary-soft)}
  table.hist tr.cli-detail td{background:var(--surface-2);padding:0;border-bottom:1px solid var(--border)}
  .cli-panel{padding:14px 18px}
  .cli-info{display:flex;gap:14px;padding:4px 0;font-size:13px}
  .cli-label{min-width:130px;color:var(--text-muted);font-size:11px;text-transform:uppercase;letter-spacing:.04em;align-self:center}
  .cli-actions{display:flex;gap:8px;margin-top:12px}
  .stats{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 4px}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--text-muted);min-width:120px;box-shadow:var(--shadow-sm)}
  .stat strong{display:block;font-size:18px;color:var(--text);font-weight:600;margin-top:2px;font-variant-numeric:tabular-nums}
  .seg{display:inline-flex;background:var(--surface);border:1px solid var(--border-light);border-radius:8px;padding:3px;gap:2px;align-self:flex-start}
  .seg button{background:transparent;border:0;padding:7px 16px;border-radius:5px;color:var(--text-muted);cursor:pointer;font:inherit;font-size:13px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
  .seg button:hover{color:var(--text)}
  .seg button.on{background:var(--primary);color:#fff;box-shadow:0 1px 3px rgba(74,158,255,.3)}
  .seg button.on.warn{background:var(--warning);box-shadow:0 1px 3px rgba(245,158,11,.3)}

  /* Smaller, capped fields */
  .field input,.field textarea,.field select{font-size:13px;padding:7px 10px}
  .field label{font-size:11px;letter-spacing:.02em}
  main h2{font-size:18px;font-weight:600;margin:0 0 4px;color:var(--text)}
  main h3{font-size:11px;font-weight:600;margin-top:18px;margin-bottom:6px;color:var(--text-muted)}
  .hint{font-size:11px;color:var(--text-dim);margin:-2px 0 6px}

  /* Cap field width so single-field rows don't span full main */
  .row .field{max-width:320px}
  .row .field.lg{max-width:520px}
  .row .field.xl{max-width:none}

  /* Client picker */
  .cli-pick{position:relative;max-width:320px}
  .cli-pick .selected{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface);border:1px solid var(--border-light);border-radius:6px;font-size:13px}
  .cli-pick .selected .name{flex:1;color:var(--text);font-weight:500}
  .cli-pick .selected .num{color:var(--text-muted);font-size:11px;font-variant-numeric:tabular-nums}
  .cli-pick .selected .change{background:transparent;border:0;color:var(--primary);font-size:12px;cursor:pointer;padding:2px 6px;border-radius:4px}
  .cli-pick .selected .change:hover{background:var(--primary-soft)}
  .cli-search-wrap{position:relative}
  .cli-search-wrap .ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:13px;pointer-events:none;z-index:1}
  .cli-search-wrap input{width:100%;padding:9px 12px 9px 32px;border:1px solid var(--border-light);border-radius:6px;background:var(--surface);color:var(--text);font:inherit;font-size:13px}
  .cli-search-wrap input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  /* The dropdown is portaled to body and uses position:fixed - escapes ALL parent stacking contexts */
  #cliPickPortal{display:none;position:fixed;background:var(--surface-2);border:1px solid var(--primary);border-radius:6px;max-height:420px;overflow-y:auto;z-index:9999;box-shadow:0 12px 32px rgba(0,0,0,.6)}
  #cliPickPortal.open{display:block}
  #cliPickPortal .item{padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border-soft);font-size:13px;color:var(--text)}
  #cliPickPortal .item:last-child{border-bottom:0}
  #cliPickPortal .item:hover{background:var(--surface-hi)}
  #cliPickPortal .item .num{color:var(--text-muted);font-size:11px;margin-right:8px;font-variant-numeric:tabular-nums}
  #cliPickPortal .create{padding:9px 12px;cursor:pointer;color:var(--accent);background:var(--surface);font-size:13px;font-weight:500;border-top:1px solid var(--border)}
  #cliPickPortal .create:hover{background:var(--surface-hi)}
  #cliPickPortal .empty{padding:14px 12px;color:var(--text-dim);font-size:12px;font-style:italic}
  .cli-create-panel{margin-top:8px;padding:14px;background:var(--surface);border:1px solid var(--primary);border-radius:8px;max-width:520px}
  .cli-create-panel h4{margin:0 0 10px;font-size:12px;color:var(--accent);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
  .cli-create-panel .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .cli-create-panel .grid .full{grid-column:1/-1}
  .cli-create-panel .grid label{display:flex;flex-direction:column;font-size:11px;color:var(--text-muted);gap:3px}
  .cli-create-panel .grid label input{padding:7px 10px;border:1px solid var(--border-light);border-radius:5px;background:var(--surface-2);color:var(--text);font:inherit;font-size:13px}
  .cli-create-panel .grid label input:focus{outline:none;border-color:var(--primary)}
  .cli-create-panel .actions{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}

  /* Tarifs grid */
  .tarif-row{display:grid;grid-template-columns:1fr 110px 36px;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border-soft)}
  .tarif-row:last-child{border-bottom:0}
  .tarif-row .lbl{color:var(--text);font-size:13px;font-weight:500}
  .tarif-row input[type="text"]{background:transparent;border:1px solid transparent;border-radius:4px;padding:5px 7px;color:var(--text);font:inherit;font-size:13px;font-weight:500;width:100%}
  .tarif-row input[type="text"]:hover{border-color:var(--border)}
  .tarif-row input[type="text"]:focus{outline:none;border-color:var(--primary);background:var(--surface-2)}
  .tarif-row .rate{display:flex;align-items:center;gap:4px;background:var(--surface-2);border:1px solid var(--border-light);border-radius:5px;padding:0 8px}

const SK = "devis-photo-data-v2";
const DEFAULT_S = {
  mission: {
    ref: "", dateEmission: "", dateValidite: "",
    object: "", objectDate: "", objectLieu: "",
    client: { num: "", name: "", contact: "", address: "", phone: "", email: "" },
    prep:        { hours: "0", rate: "" },
    prod:        { hours: "0", rate: "" },
    postprod:    { hours: "0", rate: "" },
    deplacement: { mode: "voiture", km: "0", peages: "0", tauxKm: "0.40", trajetH: "0", ticket: "0" },

    notes: "",
    lignes: []
  },
  devis:    {},
  suivi:    { entries: [], devis: {} },

  abonnements: { entries: [] },
  investissements: { entries: [] },
  tarifs: { catalog: JSON.parse(JSON.stringify(DEFAULT_CATALOG)) },
  bugs: { items: [] }
};
let S = JSON.parse(localStorage.getItem(SK) || "null") || JSON.parse(JSON.stringify(DEFAULT_S));
if (!S.suivi || !Array.isArray(S.suivi.entries)) S.suivi = { entries: [], devis: {} };
if (!S.suivi.devis || typeof S.suivi.devis !== "object") S.suivi.devis = {};
if (!S.clients || !Array.isArray(S.clients.entries)) S.clients = { ...DEFAULT_S.clients };
if (!S.abonnements || !Array.isArray(S.abonnements.entries)) S.abonnements = { ...DEFAULT_S.abonnements };
if (!S.investissements || !Array.isArray(S.investissements.entries)) S.investissements = { ...DEFAULT_S.investissements };
if (!S.tarifs || !Array.isArray(S.tarifs.catalog) || !S.tarifs.catalog.length) S.tarifs = { catalog: JSON.parse(JSON.stringify(DEFAULT_CATALOG)) };
if (!S.bugs || (!Array.isArray(S.bugs.items) && !Array.isArray(S.bugs.entries) && typeof S.bugs.html !== "string")) S.bugs = { items: [] };
if (!Array.isArray(S.bugs.items)) S.bugs.items = [];
// Migrate from old structured entries (title/desc/status)
if (S.bugs.items.length === 0 && Array.isArray(S.bugs.entries) && S.bugs.entries.length) {
  S.bugs.items = S.bugs.entries.map(e => ({
    id: e.id || (Date.now().toString(36) + Math.random().toString(36).slice(2,7)),
    text: e.title || "",
    steps: e.desc ? [e.desc] : [],
    validated: e.status === "fixed",
    createdAt: e.date ? new Date(e.date).getTime() || Date.now() : Date.now()
  }));
  delete S.bugs.entries;
}
// Migrate from rich-text html (single item with stripped text)
if (S.bugs.items.length === 0 && typeof S.bugs.html === "string" && S.bugs.html.trim()) {
  const tmp = document.createElement("div");
  tmp.innerHTML = S.bugs.html;
  const text = (tmp.textContent || "").trim();
  if (text) {
    S.bugs.items = [{
      id: Date.now().toString(36) + "n",
      text: text.slice(0, 200),
      steps: text.length > 200 ? [text.slice(200)] : [],
      validated: false,
      createdAt: Date.now()
    }];
  }
  delete S.bugs.html;
}
if (S.mission) {
  S.mission = { ...DEFAULT_S.mission, ...S.mission,
    deplacement: { ...DEFAULT_S.mission.deplacement, ...(S.mission.deplacement || {}) }
  };
  if (!Array.isArray(S.mission.lignes)) S.mission.lignes = [];
  // Migrate old prep/prod/postprod into lignes if lignes is empty and old data has hours
  if (S.mission.lignes.length === 0) {
    const prep = S.mission.prep || {}, prod = S.mission.prod || {}, post = S.mission.postprod || {};
    if (parseFloat(prep.hours) > 0) S.mission.lignes.push({ id: Date.now().toString(36)+"a", type:"heures", intitule:"Préparation", duree: String(prep.hours), unit:"h", description:"" });
    if (parseFloat(prod.hours) > 0) S.mission.lignes.push({ id: Date.now().toString(36)+"b", type:"heures", intitule:"Shooting / production", duree: String(prod.hours), unit:"h", description:"" });
    if (parseFloat(post.hours) > 0) S.mission.lignes.push({ id: Date.now().toString(36)+"c", type:"heures", intitule:"Post-production", duree: String(post.hours), unit:"h", description:"" });
  }
  recomputeRef();
}
let user = null;

const num = v => { const n = parseFloat(String(v).replace(",", ".")); return isFinite(n) ? n : 0; };

function save() {

async function saveToCloud() {
  if (!user) return;
  try {
    await db.collection("users").doc(user.uid).set({
      mission: S.mission,
      devis:   S.devis,
      suivi:   S.suivi,
      clients: S.clients,
      compta:  S.compta,
      abonnements: S.abonnements,
      investissements: S.investissements,
      tarifs:  S.tarifs,
      bugs:    S.bugs
    }, { merge: true });
    const e = document.getElementById("savedFlash");
    if (e) { e.textContent = "Enregistré"; setTimeout(() => { if (e && e.textContent === "Enregistré") e.textContent = ""; }, 1500); }
  } catch (err) { console.error("saveToCloud", err); }
}

async function loadFromCloud() {
  if (!user) return;
  try {
    const snap = await db.collection("users").doc(user.uid).get();
    if (snap.exists) {
      const d = snap.data();
      if (d.mission) {
        const m = d.mission, dm = DEFAULT_S.mission;
        S.mission = {
          ...dm, ...m,
          client:      { ...dm.client,      ...(m.client      || {}) },
          prep:        { ...dm.prep,        ...(m.prep        || {}) },
          prod:        { ...dm.prod,        ...(m.prod        || {}) },
          postprod:    { ...dm.postprod,    ...(m.postprod    || {}) },
          deplacement: { ...dm.deplacement, ...(m.deplacement || {}) },
          autres:      { ...dm.autres,      ...(m.autres      || {}) }
        };
      }
      if (d.devis)   S.devis   = Object.assign({}, DEFAULT_S.devis,   d.devis);
      if (d.suivi)   S.suivi   = { ...DEFAULT_S.suivi, ...d.suivi, entries: Array.isArray(d.suivi.entries) ? d.suivi.entries : [], devis: (d.suivi.devis && typeof d.suivi.devis === "object") ? d.suivi.devis : {} };
      if (d.clients) S.clients = { ...DEFAULT_S.clients, ...d.clients, entries: Array.isArray(d.clients.entries) ? d.clients.entries : [] };
      if (d.compta)  S.compta  = Object.assign({}, DEFAULT_S.compta,  d.compta);
      if (d.abonnements) S.abonnements = { ...DEFAULT_S.abonnements, ...d.abonnements, entries: Array.isArray(d.abonnements.entries) ? d.abonnements.entries : [] };
      if (d.investissements) S.investissements = { ...DEFAULT_S.investissements, ...d.investissements, entries: Array.isArray(d.investissements.entries) ? d.investissements.entries : [] };
      if (d.tarifs && Array.isArray(d.tarifs.catalog) && d.tarifs.catalog.length) S.tarifs = { catalog: d.tarifs.catalog };
      if (d.bugs)    S.bugs    = { items: Array.isArray(d.bugs.items) ? d.bugs.items : (Array.isArray(d.bugs.entries) ? d.bugs.entries.map(e => ({ id: e.id, text: e.title || "", steps: e.desc ? [e.desc] : [], validated: e.status === "fixed", createdAt: e.date ? new Date(e.date).getTime() || Date.now() : Date.now() })) : []) };
      suiviMigrate();
      recomputeRef();
      localStorage.setItem(SK, JSON.stringify(S));
    }
  } catch (err) { console.error("loadFromCloud", err); }
  render();
}

function upd(path, val) {
  const keys = path.split(".");
  let o = S;
  for (let i = 0; i < keys.length - 1; i++) o = o[keys[i]];
  o[keys[keys.length - 1]] = val;
  if (path === "mission.dateEmission") {
    recomputeRef();
    refreshRefDisplay();
  }
  save();
  if (path.startsWith("mission.prep") || path.startsWith("mission.prod") || path.startsWith("mission.postprod") || path.startsWith("mission.deplacement") || path.startsWith("mission.autres") || path.startsWith("mission.lignes") || path === "mission.remisePct" || path === "mission.object") {
    refreshTotals();
  }
}
window.upd = upd;

function refreshRefDisplay() {
  // The reference now appears in the devis preview; refresh it
  refreshTotals();
}

function pickObject(k) {

function recomputeRef() {

// ============ DEVIS PREVIEW (rendered at the bottom of Mission) ============
function rDevisPreview() {
  const d = S.mission;
  const t = totals();
  // Show preview only if there's enough info (client + at least one ligne)
  const hasClient = !!(d.client && (d.client.id || d.client.name));
  const hasContent = (d.lignes || []).length > 0 || num(d.deplacement.km) > 0 || num(d.deplacement.ticket) > 0 || num(d.deplacement.peages) > 0;
  if (!hasClient && !hasContent) {
    return `<div class="devis-preview"><div class="dp-empty">Le devis se générera ici automatiquement dès que tu auras sélectionné un client et ajouté au moins une ligne.</div></div>`;
  }

  const cat = (S.tarifs.catalog || DEFAULT_CATALOG).find(c => c.k === d.object);
  const tarifH = cat ? num(cat.p) : 0;
  const sel = d.client.id ? S.clients.entries.find(x => x.id === d.client.id) : null;
  const cli = sel || d.client;

  // Build line items HTML
  let linesHtml = "";
  for (const l of (d.lignes || [])) {
    if (l.type === "heures") {
      const h = num(l.duree) * (l.unit === "j" ? HOURS_PER_DAY : 1);
      const amount = h * tarifH;
      linesHtml += `<div class="dp-line">
        <div class="lbl">${esc(l.intitule || "(Sans intitulé)")}${l.description ? `<div class="desc">${esc(l.description)}</div>` : ""}</div>
        <div class="qty">${num(l.duree).toFixed(2).replace(".",",")} ${l.unit === "j" ? "jour(s) × 8h" : "h"} × ${tarifH.toFixed(2).replace(".",",")} €/h</div>
        <div class="amt">${fmt(amount)}</div>
      </div>`;
    } else if (l.type === "materiel" && l.devis !== "debours") {
      linesHtml += `<div class="dp-line">
        <div class="lbl">${esc(l.intitule || "(Sans intitulé)")}<div class="desc">Matériel</div></div>
        <div class="qty"></div>
        <div class="amt">${fmt(num(l.prix))}</div>
      </div>`;
    }
  }

  // Déplacement line
  const mode = d.deplacement.mode || "voiture";
  const tauxKm = num(d.deplacement.tauxKm) || 0.40;
  const trajet = num(d.deplacement.trajetH) * 40;
  const deplDetail = mode === "voiture"
    ? `${num(d.deplacement.km).toFixed(1).replace(".",",")} km × ${tauxKm.toFixed(2).replace(".",",")} €/km${num(d.deplacement.peages) > 0 ? ` + ${fmt(num(d.deplacement.peages))} péages` : ""}${trajet > 0 ? ` + ${num(d.deplacement.trajetH)} h trajet` : ""}`
    : `Billets : ${fmt(num(d.deplacement.ticket))}${trajet > 0 ? ` + ${num(d.deplacement.trajetH)} h trajet` : ""}`;
  if (t.depl > 0) {
    linesHtml += `<div class="dp-line">
      <div class="lbl">Déplacement<div class="desc">${esc(deplDetail)}</div></div>
      <div class="qty"></div>
      <div class="amt">${fmt(t.depl)}</div>
    </div>`;
  }

  // Débours items (separately)
  let deboursHtml = "";
  for (const l of (d.lignes || [])) {
    if (l.type === "materiel" && l.devis === "debours") {
      deboursHtml += `<div class="dp-line">
        <div class="lbl">${esc(l.intitule || "(Sans intitulé)")}</div>
        <div class="qty"></div>
        <div class="amt">${fmt(num(l.prix))}</div>

      </div>

        <div>Validité : <strong>${dateFR(d.dateValidite) || "—"}</strong></div>
        ${cat ? `<div>Tarif horaire : <strong style="color:var(--primary)">${tarifH > 0 ? `${tarifH.toFixed(2).replace(".",",")} €/h` : "à définir"}</strong></div>` : ""}
      </div>
    </div>

    <div class="dp-section">
      <h4>Client</h4>
      <div class="dp-client">
        <div><span class="num">${esc(cli.num || "—")}</span><span class="name">${esc(cli.name || "(Sélectionner un client)")}</span></div>
        ${cli.contact ? `<div>${esc(cli.contact)}</div>` : ""}
        ${cli.address ? `<div>${esc(cli.address)}</div>` : ""}
        ${cli.email ? `<div>${esc(cli.email)}</div>` : ""}
        ${cli.phone ? `<div>${esc(cli.phone)}</div>` : ""}
      </div>
    </div>

    ${cat ? `<div class="dp-section">
      <h4>Prestation</h4>
      <div class="dp-client"><div class="name">${esc(cat.l)}</div></div>
    </div>` : ""}

    <div class="dp-section">
      <h4>Détail</h4>
      ${linesHtml || `<div class="dp-empty" style="padding:14px">Aucune ligne pour l'instant.</div>`}
    </div>

    <div class="dp-totals">
      <div class="dp-line"><span class="lbl">Sous-total</span><span class="amt">${fmt(t.subtotal)}</span></div>
      ${t.remise > 0 ? `<div class="dp-line"><span class="lbl">Remise (${esc(d.remisePct)} %)</span><span class="amt">−${fmt(t.remise)}</span></div>` : ""}
      <div class="dp-line grand"><span class="lbl">Total HT</span><span class="amt">${fmt(t.total)}</span></div>
      <div class="dp-line"><span class="lbl">Acompte 30 % à la commande</span><span class="amt">${fmt(t.acompte)}</span></div>

      <h4 style="color:var(--accent)">Frais de débours détaillés</h4>

    <div class="dp-footer">TVA non applicable, art. 293 B du CGI</div>

    <div class="dp-actions">
      <button class="btn ghost" onclick="window.print()">🖨️ Imprimer</button>

  const p = cliPickEnsurePortal();

    (e.contact||"").toLowerCase().includes(q) ||
    (e.email||"").toLowerCase().includes(q)

  it.text = v;

function bugAddStep(id) {
  const it = (S.bugs.items || []).find(x => x.id === id);
  if (!it) return;
  if (!Array.isArray(it.steps)) it.steps = [];
  it.steps.push("");
  save();

    const els = document.querySelectorAll(`[data-bug-step^="${id}-"]`);
    if (els.length) els[els.length - 1].focus();
  });
}

function bugUpdateStep(id, idx, v) {
  const it = (S.bugs.items || []).find(x => x.id === id);
  if (!it || !Array.isArray(it.steps)) return;
  it.steps[idx] = v;
  save();
}
window.bugUpdateStep = bugUpdateStep;

function bugDelStep(id, idx) {
  const it = (S.bugs.items || []).find(x => x.id === id);
  if (!it || !Array.isArray(it.steps)) return;
  it.steps.splice(idx, 1);
  save();
  render();
}
window.bugDelStep = bugDelStep;

function bugBuildText() {
  const items = ((S.bugs && S.bugs.items) || []).filter(it => !it.validated && (it.text || "").trim());
  if (!items.length) return "";
  let txt = "";
  items.forEach((it, i) => {
    txt += `${i + 1}. ${(it.text || "").trim()}\n`;
    (it.steps || []).forEach(s => {
      const st = (s || "").trim();
      if (st) txt += `   - ${st}\n`;
    });
  });
  return txt.trimEnd();
}

function bugCopy() {
  const txt = bugBuildText();
  const btn = document.getElementById("bug-copy-btn");
  if (!txt) {
    if (btn) {
      const old = btn.textContent;
      btn.textContent = "Aucune action en cours";
      setTimeout(() => { btn.textContent = old; }, 1500);
    }
    return;
  }
  const done = () => {
    if (btn) {
      const old = btn.textContent;
      btn.textContent = "✓ Copié !";
      btn.classList.add("copied");
      setTimeout(() => { btn.textContent = old; btn.classList.remove("copied"); }, 1800);
    }
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(txt).then(done).catch(() => bugCopyFallback(txt, done));
  } else {
    bugCopyFallback(txt, done);
  }
}
window.bugCopy = bugCopy;

function bugCopyFallback(txt, done) {
  try {
    const ta = document.createElement("textarea");
    ta.value = txt;
    ta.style.position = "fixed";
    ta.style.left = "-9999px";
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    done();
  } catch (e) {
    prompt("Copie manuellement :", txt);
  }
}

function totals() {
  const d = S.mission;
  // Hourly rate from selected prestation
  const cat = (S.tarifs.catalog || DEFAULT_CATALOG).find(c => c.k === d.object);
  const tarifH = cat ? num(cat.p) : 0;
  const HOURS_PER_DAY = 8;
  // Walk lignes
  let lignesAmount = 0, debours = 0, totalHeures = 0;
  for (const l of d.lignes || []) {
    if (l.type === "heures") {
      const h = num(l.duree) * (l.unit === "j" ? HOURS_PER_DAY : 1);
      totalHeures += h;
      lignesAmount += h * tarifH;
    } else if (l.type === "materiel") {
      const p = num(l.prix);
      if (l.devis === "debours") debours += p;
      else lignesAmount += p;
    }
  }
  // Déplacement
  const mode = d.deplacement.mode || "voiture";
  const tauxKm = num(d.deplacement.tauxKm) || 0.40;
  const trajet = num(d.deplacement.trajetH) * 40;
  const depl = mode === "voiture"
    ? num(d.deplacement.km) * tauxKm + num(d.deplacement.peages) + trajet
    : num(d.deplacement.ticket) + trajet;
  // Autres (kept as-is for misc charges)
  const autres = num(d.autres.montant);
  const subtotal = lignesAmount + depl + autres;
  const remise = subtotal * num(d.remisePct) / 100;
  const total = subtotal - remise;
  return {
    lignes: lignesAmount, debours, depl, autres,
    subtotal, remise, total, totalHeures, tarifH,
    acompte: total * 0.30, reste: total * 0.70,
    // legacy keys (kept for backward compat with totalsHtml)
    prep: 0, prod: lignesAmount, post: 0
  };
}

const STATUT_LEGACY = { paye: "termine", annule: "refuse" };

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

function entryRef(e) {
  const d = S.suivi.devis && S.suivi.devis[e.devisId];
  return (d && d.ref) || e.ref || "";
}
function entryRefSet(e, val) {
  if (!S.suivi.devis) S.suivi.devis = {};
  if (!e.devisId) e.devisId = uid();
  if (!S.suivi.devis[e.devisId]) S.suivi.devis[e.devisId] = { ref: "" };
  S.suivi.devis[e.devisId].ref = val;
}

function suiviClassifyEcheance(s) {
  const t = (s || "").toLowerCase();
  if (/acompte|accompte|1er|premier/.test(t)) return "acompte";
  if (/reste/.test(t)) return "reste";
  if (/frais|d[ée]bours/.test(t)) return "frais";
  return "other";
}

function suiviMigrate() {
  if (!S.suivi.devis) S.suivi.devis = {};

  for (const e of S.suivi.entries) {
    if (STATUT_LEGACY[e.statut]) e.statut = STATUT_LEGACY[e.statut];
  }

  const ungrouped = S.suivi.entries.filter(e => !e.devisId);
  if (ungrouped.length === 0) return;

  const byKey = new Map();
  for (const e of ungrouped) {
    const k = `${e.client || ""}|${e.date || ""}`;
    if (!byKey.has(k)) byKey.set(k, []);
    byKey.get(k).push(e);
  }

  const assign = (entry, ref) => {
    const id = uid();
    entry.devisId = id;
    S.suivi.devis[id] = { ref: ref || "" };
    delete entry.ref;
    return id;
  };

  for (const entries of byKey.values()) {
    const acomptes = [], restes = [], frais = [], others = [];
    for (const e of entries) {
      const c = suiviClassifyEcheance(e.echeance);
      if (c === "acompte") acomptes.push(e);
      else if (c === "reste") restes.push(e);
      else if (c === "frais") frais.push(e);
      else others.push(e);
    }
    acomptes.sort((a, b) => num(a.montant) - num(b.montant));
    restes.sort((a, b) => num(a.montant) - num(b.montant));

    const created = [];
    const pairCount = Math.min(acomptes.length, restes.length);
    for (let i = 0; i < pairCount; i++) {
      const id = uid();
      const ref = acomptes[i].ref || restes[i].ref || "";
      acomptes[i].devisId = id;
      restes[i].devisId = id;
      delete acomptes[i].ref;
      delete restes[i].ref;
      S.suivi.devis[id] = { ref };
      created.push(id);
    }
    for (let i = pairCount; i < acomptes.length; i++) created.push(assign(acomptes[i], acomptes[i].ref));
    for (let i = pairCount; i < restes.length;   i++) created.push(assign(restes[i],   restes[i].ref));
    for (const e of others) created.push(assign(e, e.ref));
    if (frais.length) {
      if (created.length) {
        for (const e of frais) {
          e.devisId = created[0];
          delete e.ref;
        }
      } else {
        for (const e of frais) assign(e, e.ref);
      }
    }
  }
}

function suiviAdd() {
  const m = S.mission;
  const cat = (S.tarifs.catalog || DEFAULT_CATALOG).find(c => c.k === m.object);
  const t = totals();
  const hoursTotal = (m.lignes || []).filter(l => l.type === "heures").reduce((s, l) => s + num(l.duree) * (l.unit === "j" ? HOURS_PER_DAY : 1), 0);
  const date = m.objectDate || new Date().toISOString().slice(0, 10);
  const client = m.client.name || "";
  const prestation = cat ? cat.l : "";
  const devisId = uid();
  S.suivi.devis[devisId] = { ref: m.ref || "" };

  const mkLine = (echeance, montant, heures) => ({
    id: uid(), devisId, date, client, prestation,
    montant: montant.toFixed(2),
    heures:  heures.toFixed(2),
    echeance,
    paiement: montant.toFixed(2),
    ca: montant.toFixed(2),
    salaire: "0", ursaf: "0", tresorerie: "0", frais: "0",
    commentaires: "", statut: "envoye"
  });

  const acompte = mkLine("Acompte 30 %", t.acompte, hoursTotal * 0.30);
  const reste   = mkLine("Reste à payer 70 %", t.reste, hoursTotal * 0.70);
  S.suivi.entries.unshift(acompte, reste);

  suiviGroupExpanded = devisId;
  suiviExpanded = null;
  save();
  render();
}

function suiviImportKey(e) {
  return [e.date || "", (e.client || "").trim(), num(e.paiement).toFixed(2), num(e.heures).toFixed(2)].join("|");
}

function suiviImport() {
  const existing = new Set(S.suivi.entries.map(suiviImportKey));
  const toImport = SUIVI_SEED.filter(s => !existing.has(suiviImportKey(s)));
  if (toImport.length === 0) {
    alert(`Toutes les prestations de l'Excel sont déjà importées (${SUIVI_SEED.length} au total).`);
    return;
  }
  if (!confirm(`Importer ${toImport.length} prestation(s) manquante(s) depuis l'Excel ?\n\n(${S.suivi.entries.length} déjà présente(s) sur ${SUIVI_SEED.length} dans l'Excel)`)) return;
  for (const s of toImport) S.suivi.entries.push({ id: uid(), ...s });
  suiviMigrate();
  save();
  render();
}
window.suiviImport = suiviImport;

function suiviMissingCount() {
  const existing = new Set(S.suivi.entries.map(suiviImportKey));
  return SUIVI_SEED.filter(s => !existing.has(suiviImportKey(s))).length;
}


function suiviDel(id) {
  const e = S.suivi.entries.find(x => x.id === id);
  const did = e && e.devisId;
  S.suivi.entries = S.suivi.entries.filter(e => e.id !== id);
  if (did && S.suivi.entries.every(x => x.devisId !== did)) {
    if (S.suivi.devis) delete S.suivi.devis[did];
  }
  save();
  render();
}
window.suiviDel = suiviDel;

function suiviAddLigne(devisId) {
  if (!S.suivi.devis[devisId]) S.suivi.devis[devisId] = { ref: "" };
  const lignes = suiviGroupLigne(devisId);
  const lead = lignes[0] || {};
  const refStatut = lignes.length ? entryStatut(lead) : "envoye";
  const id = uid();
  S.suivi.entries.push({
    id, devisId,
    date:        lead.date || new Date().toISOString().slice(0, 10),
    client:      lead.client || "",
    prestation:  lead.prestation || "",
    montant:     "0",
    heures:      "0",
    echeance:    "Paiement complémentaire",
    paiement:    "0",
    ca:          "0",
    salaire:     "0",
    ursaf:       "0",
    tresorerie:  "0",
    frais:       "0",
    commentaires:"",
    statut:      refStatut
  });
  suiviGroupExpanded = devisId;
  suiviExpanded = id;
  save();
  render();
}
window.suiviAddLigne = suiviAddLigne;

function suiviDelDevis(devisId) {
  S.suivi.entries = S.suivi.entries.filter(e => e.devisId !== devisId);
  if (S.suivi.devis) delete S.suivi.devis[devisId];
  suiviSelected.delete(devisId);
  if (suiviGroupExpanded === devisId) suiviGroupExpanded = null;
  save();
  render();
}
window.suiviDelDevis = suiviDelDevis;

function suiviUpd(id, field, val) {
  const e = S.suivi.entries.find(x => x.id === id);
  if (!e) return;
  e[field] = val;
  save();
}
window.suiviUpd = suiviUpd;

function suiviRefUpd(id, val) {
  const e = S.suivi.entries.find(x => x.id === id);
  if (!e) return;
  entryRefSet(e, val);
  save();
}
window.suiviRefUpd = suiviRefUpd;

function suiviDevisRefUpd(devisId, val) {
  if (!S.suivi.devis[devisId]) S.suivi.devis[devisId] = { ref: "" };
  S.suivi.devis[devisId].ref = val;
  save();
}
window.suiviDevisRefUpd = suiviDevisRefUpd;

function suiviStatut(id, val) {
  suiviUpd(id, "statut", val);
  render();
}
window.suiviStatut = suiviStatut;

function suiviGroupLigne(devisId) {
  return S.suivi.entries.filter(e => e.devisId === devisId);
}

function suiviDevisAccepter(devisId) {
  for (const e of suiviGroupLigne(devisId)) {
    delete e.statutAvantRefus;
    e.statut = "accepte";
  }
  save();
  render();
}
window.suiviDevisAccepter = suiviDevisAccepter;

function suiviDevisRefuser(devisId) {
  for (const e of suiviGroupLigne(devisId)) {
    e.statutAvantRefus = entryStatut(e);
    e.statut = "refuse";
  }
  save();
  render();
}
window.suiviDevisRefuser = suiviDevisRefuser;

function suiviLigneRealise(id) {
  const e = S.suivi.entries.find(x => x.id === id);
  if (!e) return;
  e.statut = "attente";
  save();
  render();
}
window.suiviLigneRealise = suiviLigneRealise;

function suiviLignePaye(id) {
  const e = S.suivi.entries.find(x => x.id === id);
  if (!e) return;
  e.statut = "termine";
  save();
  render();
}
window.suiviLignePaye = suiviLignePaye;

function suiviRevert(id) {
  const e = S.suivi.entries.find(x => x.id === id);
  if (!e) return;
  const s = entryStatut(e);
  if (s === "termine") {
    e.statut = "attente";
  } else if (s === "attente") {
    e.statut = "accepte";
  } else if (s === "accepte") {
    for (const x of suiviGroupLigne(e.devisId)) x.statut = "envoye";
  } else if (s === "refuse") {
    for (const x of suiviGroupLigne(e.devisId)) {
      x.statut = x.statutAvantRefus || "envoye";
      delete x.statutAvantRefus;
    }
  }
  save();
  render();
}
window.suiviRevert = suiviRevert;

function suiviDevisRevertAccept(devisId) {
  for (const x of suiviGroupLigne(devisId)) x.statut = "envoye";
  save();
  render();
}
window.suiviDevisRevertAccept = suiviDevisRevertAccept;

function suiviDevisRevertRefus(devisId) {
  for (const x of suiviGroupLigne(devisId)) {
    x.statut = x.statutAvantRefus || "envoye";
    delete x.statutAvantRefus;
  }
  save();
  render();
}
window.suiviDevisRevertRefus = suiviDevisRevertRefus;

function devisActionsHtml(g) {
  const stop = "event.stopPropagation();";
  if (g.statutGlobal === "envoye") {
    return `
      <button class="btn-act act-vert" title="Accepté — le devis est validé. Toutes les lignes passent à « Accepté »." onclick="${stop}suiviDevisAccepter('${g.devisId}')"><span class="ico">✓</span> Accepté</button>
      <button class="btn-act act-rouge" title="Refusé — le client a refusé. Toutes les lignes passent à « Refusé »." onclick="${stop}suiviDevisRefuser('${g.devisId}')"><span class="ico">✗</span> Refusé</button>`;
  }
  if (g.statutGlobal === "accepte") {
    return `<button class="btn btn-icon ghost" title="Revenir : Accepté → Envoyé (toutes les lignes du devis)" onclick="${stop}suiviDevisRevertAccept('${g.devisId}')">↩</button>`;
  }
  if (g.statutGlobal === "refuse") {
    return `<button class="btn btn-icon ghost" title="Annuler le refus du devis et restaurer l'état précédent" onclick="${stop}suiviDevisRevertRefus('${g.devisId}')">↩</button>`;
  }
  return "";
}

function suiviActionsHtml(e, opts) {
  const s = entryStatut(e);
  const did = e.devisId;
  const stop = "event.stopPropagation();";
  const hidePhase1 = opts && opts.hidePhase1;
  if (s === "envoye") {
    if (hidePhase1) return "";
    return `
      <button class="btn-act act-vert" title="Accepté — le devis est validé. Toutes les lignes passent à « Accepté »." onclick="${stop}suiviDevisAccepter('${did}')"><span class="ico">✓</span> Accepté</button>
      <button class="btn-act act-rouge" title="Refusé — le client a refusé. Toutes les lignes passent à « Refusé »." onclick="${stop}suiviDevisRefuser('${did}')"><span class="ico">✗</span> Refusé</button>`;
  }
  if (s === "accepte") {
    return `
      <button class="btn btn-icon btn-bleu" title="Réalisé — la prestation est livrée. Cette ligne passe à « Attente paiement »." onclick="${stop}suiviLigneRealise('${e.id}')">→</button>
      <button class="btn btn-icon btn-rouge" title="Annulé — annule tout le devis. Toutes les lignes passent à « Refusé »." onclick="${stop}suiviDevisRefuser('${did}')">✗</button>
      <button class="btn btn-icon ghost" title="Revenir : Accepté → Envoyé (toutes les lignes du devis)" onclick="${stop}suiviRevert('${e.id}')">↩</button>`;
  }
  if (s === "attente") {
    return `
      <button class="btn btn-icon btn-vert" title="Payé — le paiement est reçu. Cette ligne passe à « Terminé »." onclick="${stop}suiviLignePaye('${e.id}')">€</button>
      <button class="btn btn-icon ghost" title="Revenir : Attente paiement → Accepté (cette ligne)" onclick="${stop}suiviRevert('${e.id}')">↩</button>`;
  }
  if (s === "termine") {
    return `<button class="btn btn-icon ghost" title="Revenir : Terminé → Attente paiement (cette ligne)" onclick="${stop}suiviRevert('${e.id}')">↩</button>`;
  }
  if (s === "refuse") {
    return `<button class="btn btn-icon ghost" title="Annuler le refus du devis et restaurer l'état précédent" onclick="${stop}suiviRevert('${e.id}')">↩</button>`;
  }
  return "";
}

function devisStatutGlobal(lignes) {
  if (!lignes.length) return "envoye";
  const ss = lignes.map(entryStatut);
  if (ss.every(s => s === "termine")) return "termine";
  if (ss.some(s => s === "refuse")) return "refuse";
  if (ss.some(s => s === "attente")) return "attente";
  if (ss.every(s => s === "envoye")) return "envoye";
  return "accepte";
}

function suiviStats(groups) {
  const by = { envoye: 0, accepte: 0, attente: 0, termine: 0, refuse: 0 };
  let total = 0;
  for (const g of groups) {
    by[g.statutGlobal] = (by[g.statutGlobal] || 0) + 1;
    if (g.statutGlobal !== "refuse") total += g.total;
  }
  return { by, count: groups.length, total };
}

function suiviYears() {
  const ys = new Set();
  for (const e of S.suivi.entries) {
    const y = (e.date || "").slice(0, 4);
    if (y) ys.add(y);
  }
  return [...ys].sort().reverse();
}

const STATUT_ORDER = { envoye: 0, accepte: 1, attente: 2, termine: 3, refuse: 4 };

function suiviGroups() {
  const groups = new Map();
  for (const e of S.suivi.entries) {
    const did = e.devisId || ("__orphan_" + e.id);
    if (!groups.has(did)) groups.set(did, []);
    groups.get(did).push(e);
  }
  let list = [];
  for (const [devisId, lignes] of groups) {
    lignes.sort((a, b) => (a.date || "").localeCompare(b.date || ""));
    const statutGlobal = devisStatutGlobal(lignes);
    const total = lignes.reduce((s, e) => s + num(e.montant), 0);
    const dates = lignes.map(e => e.date || "").filter(Boolean);
    const dateMin = dates[0] || "";
    const dateMax = dates[dates.length - 1] || "";
    const ref = (S.suivi.devis && S.suivi.devis[devisId] && S.suivi.devis[devisId].ref) || "";
    const lead = lignes[0] || {};
    list.push({
      devisId, ref, lignes, statutGlobal, total,
      dateMin, dateMax,
      client: lead.client || "",
      prestation: lead.prestation || ""
    });
  }
  if (suiviFilterStatut !== "all") list = list.filter(g => g.statutGlobal === suiviFilterStatut);
  if (suiviFilterYear   !== "all") list = list.filter(g => g.lignes.some(e => (e.date || "").startsWith(suiviFilterYear)));
  const dir = suiviSort.dir === "asc" ? 1 : -1;
  const f = suiviSort.field;
  list.sort((a, b) => {
    if (f === "statut")     return ((STATUT_ORDER[a.statutGlobal] ?? 99) - (STATUT_ORDER[b.statutGlobal] ?? 99)) * dir;
    if (f === "date")       return (a.dateMax || "").localeCompare(b.dateMax || "") * dir;
    if (f === "ref")        return a.ref.localeCompare(b.ref, "fr", { numeric: true }) * dir;
    if (f === "montant")    return (a.total - b.total) * dir;
    if (f === "prestation") return a.prestation.localeCompare(b.prestation, "fr") * dir;
    return a.client.localeCompare(b.client, "fr") * dir;
  });
  return list;
}

function dateFR(iso) {

function clientsFilter(q) {
  const term = (q || "").trim().toLowerCase();
  const list = document.getElementById("clientsList");
  const noRes = document.getElementById("clientsNoResults");
  if (!list) return;
  let visible = 0;
  list.querySelectorAll("tr.cli-row").forEach(tr => {
    const hay = (tr.dataset.search || "").toLowerCase();
    const show = !term || hay.includes(term);
    tr.style.display = show ? "" : "none";
    const detail = tr.nextElementSibling;
    if (detail && detail.classList.contains("cli-detail")) {
      detail.style.display = show ? "" : "none";
    }
    if (show) visible++;
  });
  if (noRes) {
    if (term && visible === 0) {
      noRes.querySelectorAll(".term").forEach(el => el.textContent = q);
      noRes.style.display = "";
      list.style.display = "none";
    } else {
      noRes.style.display = "none";
      list.style.display = "";
    }
  }
}

          <div class="field"><label>Adresse</label><input value="${esc(e.address)}" oninput="clientsUpd('${e.id}','address',this.value)"></div>
          <div class="field"><label>CP - Ville</label><input value="${esc(e.cityPostal)}" oninput="clientsUpd('${e.id}','cityPostal',this.value)"></div>
        </div>
        <div class="row">
          <div class="field"><label>Rencontré via</label><input value="${esc(e.rencontre)}" oninput="clientsUpd('${e.id}','rencontre',this.value)"></div>
        </div>
        <div class="cli-actions">
          <button class="btn" onclick="clientsEditDone()">Terminer</button>
          <button class="btn ghost" onclick="clientsToggle('${e.id}')">Fermer</button>
        </div>
      ` : `
        <div class="cli-info"><span class="cli-label">Adresse</span><span>${esc(e.address) || "—"}</span></div>
        <div class="cli-info"><span class="cli-label">CP - Ville</span><span>${esc(e.cityPostal) || "—"}</span></div>
        <div class="cli-info"><span class="cli-label">Rencontré via</span><span>${esc(e.rencontre) || "—"}</span></div>
        <div class="cli-actions">
          <button class="btn" onclick="clientsEdit('${e.id}')">Modifier</button>
          <button class="btn ghost" onclick="clientsToggle('${e.id}')">Fermer</button>
        </div>
      `;
      detail = `<tr class="cli-detail"><td colspan="6"><div class="cli-panel">${body}</div></td></tr>`;
    }

    return summary + detail;
  }).join("");

  return `
    <h2>Clients <span id="savedFlash" class="saved"></span></h2>

    <div class="toolbar">
      <button class="btn" onclick="clientsAdd()">+ Ajouter un client</button>
      <input id="clientsSearchInput" class="search" type="text" placeholder="Rechercher…" oninput="clientsFilter(this.value)" autocomplete="off">
    </div>

    <div id="clientsNoResults" class="empty" style="display:none">
      Aucun contact ne correspond à « <span class="term"></span> ».
      <div style="margin-top:12px"><button class="btn" onclick="clientsCreateFromSearch()">+ Créer un contact « <span class="term"></span> »</button></div>
    </div>

    ${entries.length === 0 ? `<div class="empty">Aucun client enregistré. Cliquez sur « + Ajouter un client » pour commencer.</div>` : `
    <table class="hist" id="clientsList">
      <thead>
        <tr>
          <th style="width:80px">N°</th>
          <th>Nom / Société</th>
          <th>Contact</th>
          <th style="width:140px">Téléphone</th>
          <th style="width:220px">Email</th>
          <th></th>
        </tr>
      </thead>
      <tbody>${rowsHtml}</tbody>
    </table>`}
  `;
}

const MOIS_FR = ["janv.","févr.","mars","avr.","mai","juin","juil.","août","sept.","oct.","nov.","déc."];

function bilanCompute() {
  const byMonth = {};
  for (const e of S.suivi.entries) {
    const date = e.date || "";
    if (date.length < 7) continue;
    const ym = date.slice(0, 7);
    if (!byMonth[ym]) byMonth[ym] = { heures:0, paiement:0, ca:0, salaire:0, ursaf:0, tresorerie:0, frais:0 };
    const b = byMonth[ym];
    const paid = entryStatut(e) === "termine";
    if (paid) {
      b.heures     += num(e.heures);
      b.paiement   += num(e.paiement != null && e.paiement !== "" ? e.paiement : e.montant);
      b.ca         += num(e.ca       != null && e.ca       !== "" ? e.ca       : e.montant);
      b.salaire    += num(e.salaire);
      b.tresorerie += num(e.tresorerie);
      b.frais      += num(e.frais);
    }
    b.ursaf += num(e.ursaf);
  }
  const months = Object.keys(byMonth).sort((a, b) => b.localeCompare(a));
  return months.map(ym => {
    const b = byMonth[ym];
    return { ym, ...b, totalPro: b.ursaf + b.tresorerie + b.frais };
  });
}

function bilanRender() {
  const data = bilanCompute();
  if (data.length === 0) return { body: "", foot: "" };

  const monthLabel = ym => {
    const [y, m] = ym.split("-");
    return `${MOIS_FR[parseInt(m, 10) - 1]} ${y}`;
  };
  const cellH = v => `<td style="text-align:right;font-variant-numeric:tabular-nums;padding-right:14px">${num(v).toFixed(2).replace(".", ",")}</td>`;
  const cell  = v => `<td style="text-align:right;font-variant-numeric:tabular-nums;padding-right:14px">${fmt(v)}</td>`;

  const annual = {};
  const grand = { heures:0, paiement:0, ca:0, salaire:0, totalPro:0, ursaf:0, tresorerie:0, frais:0 };
  for (const r of data) {
    const y = r.ym.slice(0, 4);
    if (!annual[y]) annual[y] = { heures:0, paiement:0, ca:0, salaire:0, totalPro:0, ursaf:0, tresorerie:0, frais:0 };
    for (const k of Object.keys(grand)) { annual[y][k] += r[k]; grand[k] += r[k]; }
  }

  const rows = [];
  for (let i = 0; i < data.length; i++) {
    const r = data[i];
    const y = r.ym.slice(0, 4);
    rows.push(`
      <tr>
        <td>${esc(monthLabel(r.ym))}</td>
        ${cellH(r.heures)}
        ${cell(r.paiement)}
        ${cell(r.ca)}
        ${cell(r.salaire)}
        ${cell(r.totalPro)}
        ${cell(r.ursaf)}
        ${cell(r.tresorerie)}
        ${cell(r.frais)}
      </tr>
    `);
    const next = data[i + 1];
    if (!next || next.ym.slice(0, 4) !== y) {
      const a = annual[y];
      rows.push(`
        <tr class="subtotal">
          <td>Sous-total ${esc(y)}</td>
          ${cellH(a.heures)}
          ${cell(a.paiement)}
          ${cell(a.ca)}
          ${cell(a.salaire)}
          ${cell(a.totalPro)}
          ${cell(a.ursaf)}
          ${cell(a.tresorerie)}
          ${cell(a.frais)}
        </tr>
      `);
    }
  }

  const foot = `
    <tr class="grandtotal">
      <td>Total général</td>
      ${cellH(grand.heures)}
      ${cell(grand.paiement)}
      ${cell(grand.ca)}
      ${cell(grand.salaire)}
      ${cell(grand.totalPro)}
      ${cell(grand.ursaf)}
      ${cell(grand.tresorerie)}
      ${cell(grand.frais)}
    </tr>
  `;

  return { body: rows.join(""), foot };
}

      </thead>
      <tbody>${abRows}</tbody>
      ${abEntries.length ? `<tfoot><tr><td>Total</td><td style="text-align:right">${fmt(abTotalAnnuel)}</td><td style="text-align:right">${fmt(abTotalAnnuel/12)}</td><td></td></tr></tfoot>` : ""}

      <thead>

          <th>Descriptif</th>

      ${invEntries.length ? `<tfoot><tr><td>Total</td><td></td><td style="text-align:right">${fmt(invTotal)}</td><td></td></tr></tfoot>` : ""}

function rBG() {
  if (!S.bugs || !Array.isArray(S.bugs.items)) S.bugs = { items: [] };
  let h = `<h2>Notes <span id="savedFlash" class="saved"></span></h2>`;
  h += `<div class="fb-bar">
    <div class="fb-title">Notes & Remarques</div>
    <button class="fb-copy-btn" onclick="bugCopy()" id="bug-copy-btn">📋 Copier les actions en cours</button>
  </div>`;
  h += `<div class="fb-subtitle">Note ici les remarques ou bugs à transmettre à Claude. Chaque action peut recevoir des étapes complémentaires, être validée ou supprimée.</div>`;
  h += `<div class="fb-add-row">
    <input id="bugInput" placeholder="Nouvelle action / remarque…" value="${esc(bugQ || "")}" oninput="bugQSet(this.value)" onkeydown="if(event.key==='Enter'){event.preventDefault();bugAdd()}">
    <button onclick="bugAdd()">＋</button>
  </div>`;
  const items = [...S.bugs.items].sort((a, b) => {
    if (!!a.validated !== !!b.validated) return a.validated ? 1 : -1;
    return (b.createdAt || 0) - (a.createdAt || 0);
  });
  if (!items.length) {
    h += `<div class="empty">Aucune note pour l'instant.</div>`;
  }
  items.forEach(it => {
    h += `<div class="fb-card ${it.validated ? "fb-done" : ""}">`;
    h += `<div class="fb-hd">`;
    h += `<button class="fb-check ${it.validated ? "on" : ""}" onclick="bugToggleValid('${it.id}')" title="${it.validated ? "Marquer en cours" : "Valider"}">✓</button>`;
    h += `<input class="fb-text" value="${esc(it.text || "")}" placeholder="Note…" oninput="bugUpdateText('${it.id}',this.value)">`;
    h += `<button class="fb-del" onclick="bugDel('${it.id}')" title="Supprimer">×</button>`;
    h += `</div>`;
    (it.steps || []).forEach((st, idx) => {
      h += `<div class="fb-step">
        <span class="fb-step-bul">↳</span>
        <input class="fb-step-text" data-bug-step="${it.id}-${idx}" value="${esc(st || "")}" placeholder="Étape complémentaire…" oninput="bugUpdateStep('${it.id}',${idx},this.value)" onkeydown="if(event.key==='Enter'){event.preventDefault();bugAddStep('${it.id}')}">
        <button class="fb-step-del" onclick="bugDelStep('${it.id}',${idx})" title="Supprimer étape">✕</button>
      </div>`;
    });
    h += `<button class="fb-add-step" onclick="bugAddStep('${it.id}')">＋ étape</button>`;
    h += `</div>`;
  });
  return h;
}
