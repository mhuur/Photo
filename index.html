    }
    .devis-preview .dp-debours-block .dp-line .amt, .view-devis-snapshot .dp-debours-block .dp-line .amt {
      flex-shrink: 0 !important; white-space: nowrap !important;
    }
    .devis-preview .dp-fact-direct-block .dp-line, .view-devis-snapshot .dp-fact-direct-block .dp-line {
      display: flex !important; justify-content: space-between !important; align-items: flex-start !important;
      grid-template-columns: none !important; gap: 10pt !important;
    }
    .devis-preview .dp-fact-direct-block .dp-line .lbl, .view-devis-snapshot .dp-fact-direct-block .dp-line .lbl {
      flex: 1 !important; min-width: 0 !important;
    }
    .devis-preview .dp-debours-total, .view-devis-snapshot .dp-debours-total {
      display: flex !important; justify-content: space-between !important;
      padding-top: 4pt !important; margin-top: 3pt !important;
      border-top: 0.5pt dashed #888 !important;
      font-size: 9pt !important; font-weight: 700 !important; color: #1a1a1a !important;
    }
    /* Bloc "À régler directement au fournisseur" : sous les totaux, aligné droite, discret (print) */
    .devis-preview .dp-fact-direct-block, .view-devis-snapshot .dp-fact-direct-block {
      margin: 6pt 0 0 auto !important; max-width: 280pt !important; width: 100% !important;
      padding-top: 4pt !important; border-top: 0.4pt dashed #888 !important;
      page-break-inside: avoid !important;
    }
    .devis-preview .dp-fact-direct-line, .view-devis-snapshot .dp-fact-direct-line {
      display: flex !important; justify-content: space-between !important; gap: 10pt !important;
      font-size: 9pt !important; color: #555 !important;
    }
    .devis-preview .dp-fact-direct-line .amt, .view-devis-snapshot .dp-fact-direct-line .amt {
      font-variant-numeric: tabular-nums !important; flex-shrink: 0 !important;
    }
    .devis-preview .dp-fact-direct-note, .view-devis-snapshot .dp-fact-direct-note {
      font-size: 7pt !important; color: #555 !important; margin-top: 2pt !important;
      text-align: right !important; line-height: 1.3 !important;
    }

    /* === BODY 2-COLUMN GRID: lines+totals (left) + modalités+conditions (right) === */
    /* === TOTALS: full-width section, content right-aligned chunk === */
    .devis-preview .dp-totals, .view-devis-snapshot .dp-totals {
      margin-top: 12pt !important;
      padding-top: 8pt !important;
      border-top: 0.5pt solid #ccc !important;
      max-width: 220pt !important;
      margin-left: auto !important;
      width: 100% !important;
      page-break-inside: avoid !important;
    }

    /* Spacer pushes signature to bottom of page */
    .devis-preview .dp-spacer, .view-devis-snapshot .dp-spacer {
      flex: 1 1 auto !important;
      min-height: 16pt !important;
    }

    /* Signature row: pinned near bottom, full width */
    .devis-preview .dp-signature-row, .view-devis-snapshot .dp-signature-row {
      padding-top: 10pt !important;
      border-top: 0.5pt solid #ccc !important;
      font-size: 9pt !important;
      line-height: 1.6 !important;
      color: #1a1a1a !important;
      page-break-inside: avoid !important;
    }
    .devis-preview .dp-signature-row .dp-sig-mention, .view-devis-snapshot .dp-signature-row .dp-sig-mention {
      margin-top: 6pt !important;
      color: #666 !important;
      font-size: 7pt !important;
    }
    .devis-preview .dp-sig-line.short, .view-devis-snapshot .dp-sig-line.short {
      flex: 0 0 30pt !important;
      min-width: 30pt !important;
    }

    /* Payment info: right-aligned single column matching totals width */
    .devis-preview .dp-payment-info, .view-devis-snapshot .dp-payment-info {
      margin-top: 14pt !important;
      padding-top: 10pt !important;
      border-top: 0.5pt solid #ccc !important;
      max-width: 220pt !important;
      margin-left: auto !important;
      width: 100% !important;
      page-break-inside: avoid !important;
    }
    .devis-preview .dp-payment-info h4, .view-devis-snapshot .dp-payment-info h4 {
      margin: 0 0 8pt !important;
      border: 0 !important;
      padding: 0 !important;
      font-size: 7pt !important;
      font-weight: 400 !important;
      color: #888 !important;
    }
    .devis-preview .dp-bank, .view-devis-snapshot .dp-bank {
      margin-top: 8pt !important;
      padding-top: 6pt !important;
      border-top: 0.3pt dashed #bbb !important;
    }
    .devis-preview .dp-paiement-line, .view-devis-snapshot .dp-paiement-line {
      display: flex !important;
      justify-content: space-between !important;
      padding: 2pt 0 !important;
      font-size: 9pt !important;
      color: #333 !important;
    }
    .devis-preview .dp-paiement-line .lbl, .view-devis-snapshot .dp-paiement-line .lbl {
      color: #333 !important;
    }
    .devis-preview .dp-paiement-line .pct, .view-devis-snapshot .dp-paiement-line .pct {
      color: #888 !important;
      font-size: 7pt !important;
    }
    .devis-preview .dp-paiement-line .amt, .view-devis-snapshot .dp-paiement-line .amt {
      font-variant-numeric: tabular-nums !important;
      font-weight: 400 !important;
      color: #1a1a1a !important;
    }
    .devis-preview .dp-payment-text, .view-devis-snapshot .dp-payment-text {
      font-size: 9pt !important;
      line-height: 1.45 !important;
      color: #333 !important;
      white-space: pre-wrap !important;
    }
    .devis-preview .dp-paiement-line.dp-delai, .view-devis-snapshot .dp-paiement-line.dp-delai {
      margin-top: 6pt !important;
      padding-top: 6pt !important;
      border-top: 0.3pt dashed #bbb !important;
      color: #555 !important;
      font-size: 7pt !important;
    }
    .devis-preview .dp-paiement-line.dp-delai .lbl, .view-devis-snapshot .dp-paiement-line.dp-delai .lbl {
      color: #888 !important;
      font-weight: 400 !important;
      font-size: 7pt !important;
    }
    .devis-preview .dp-paiement-line.dp-delai .amt, .view-devis-snapshot .dp-paiement-line.dp-delai .amt {
      font-weight: 400 !important;
      color: #1a1a1a !important;
      font-variant-numeric: normal !important;
    }
    .devis-preview .dp-bank, .view-devis-snapshot .dp-bank {
      font-size: 9pt !important;
    }
    .devis-preview .dp-bank-line, .view-devis-snapshot .dp-bank-line {
      display: flex !important;
      align-items: baseline !important;
      gap: 8pt !important;
      padding: 2pt 0 !important;
    }
    .devis-preview .dp-bank-line .lbl, .view-devis-snapshot .dp-bank-line .lbl {
      color: #888 !important;
      font-size: 7pt !important;
      font-weight: 400 !important;
      min-width: 42pt !important;
      flex-shrink: 0 !important;
    }
    .devis-preview .dp-bank-line .val, .view-devis-snapshot .dp-bank-line .val {
      color: #1a1a1a !important;
      font-variant-numeric: tabular-nums !important;
      word-break: break-all !important;
    }
    .devis-preview .dp-bank-line.iban .val, .view-devis-snapshot .dp-bank-line.iban .val {
      letter-spacing: .02em !important;
    }

    /* === CONDITIONS / SIGNATURE === */
    .devis-preview .dp-conditions, .view-devis-snapshot .dp-conditions {
      margin-top: 0 !important;
      padding-top: 0 !important;
      border-top: 0 !important;
      font-size: 9pt !important;
      line-height: 1.5 !important;
      color: #333 !important;
      page-break-inside: avoid !important;
    }
    .devis-preview .dp-conditions.signature, .view-devis-snapshot .dp-conditions.signature {
      margin-top: 0 !important;
      border: 0 !important;
      padding: 0 !important;
    }
    .devis-preview .dp-conditions.signature h4, .view-devis-snapshot .dp-conditions.signature h4 {
      display: none !important;
    }
    .devis-preview .dp-sig-default, .view-devis-snapshot .dp-sig-default {
      font-size: 9pt !important;
      line-height: 1.8 !important;
      color: #1a1a1a !important;
    }
    .devis-preview .dp-sig-row, .view-devis-snapshot .dp-sig-row {
      display: flex !important;
      align-items: baseline !important;
      gap: 8pt !important;
      margin-bottom: 6pt !important;
    }
    .devis-preview .dp-sig-line, .view-devis-snapshot .dp-sig-line {
      flex: 1 !important;
      border-bottom: 0.5pt dotted #888 !important;
      min-width: 100pt !important;
      height: 1em !important;
    }
    .devis-preview .dp-sig-box, .view-devis-snapshot .dp-sig-box {
      margin-top: 4pt !important;
      height: 50pt !important;
      border: 0.5pt dashed #888 !important;
      border-radius: 2pt !important;
    }
    /* Page 1 footer — constant size, same encadré style as CGV header/footer */
    .devis-preview .dp-footer, .view-devis-snapshot .dp-footer {
      margin: 6pt 0 0 !important;
      padding: 3pt 0 !important;
      border-top: 0.4pt solid #ccc !important;
      border-bottom: 0.4pt solid #ccc !important;
      font-size: 6.5pt !important;
      color: #666 !important;
      text-align: center !important;
      font-style: italic !important;
      line-height: 1.4 !important;
      min-height: 12pt !important;
      flex-shrink: 0 !important;
    }

    /* === CGV PAGE 2: HEADER + 2-COL BODY + FOOTER === */
    /* CGV page wrapper as flex column to pin mentions footer at the absolute bottom */
    .devis-preview .dp-conditions.cgv, .view-devis-snapshot .dp-conditions.cgv {
      display: flex !important;
      flex-direction: column !important;
      /* A4 (297mm) - top margin 18mm - bottom margin 20mm = 259mm de contenu utile */
      min-height: calc(297mm - 38mm) !important;
    }
    /* CGV header — same encadré as mentions footer (small, italic, centered, bordered top+bottom) */
    .devis-preview .dp-cgv-header, .view-devis-snapshot .dp-cgv-header {
      margin: 0 0 6pt 0 !important;
      padding: 3pt 0 !important;
      border-top: 0.4pt solid #ccc !important;
      border-bottom: 0.4pt solid #ccc !important;
      text-align: center !important;
      font-size: 6.5pt !important;
      line-height: 1.4 !important;
      color: #666 !important;
      min-height: 12pt !important;
      flex-shrink: 0 !important;
    }
    .devis-preview .dp-cgv-header .dp-cgv-title, .view-devis-snapshot .dp-cgv-header .dp-cgv-title {
      font-weight: 700 !important;
      color: #1a1a1a !important;
      text-transform: uppercase !important;
      letter-spacing: .04em !important;
      font-style: normal !important;
    }
    .devis-preview .dp-cgv-header .dp-cgv-sep, .view-devis-snapshot .dp-cgv-header .dp-cgv-sep {
      color: #999 !important;
      margin: 0 3pt !important;
      font-style: normal !important;
    }
    .devis-preview .dp-cgv-header .dp-cgv-ref, .view-devis-snapshot .dp-cgv-header .dp-cgv-ref {
      font-style: italic !important;
      color: #666 !important;
    }
    /* CGV body: 2 cols, sections inside columns. flex:1 to fill page between header and footer */
    .devis-preview .dp-cgv-body, .view-devis-snapshot .dp-cgv-body {
      column-count: 2 !important;
      column-gap: 14pt !important;
      column-rule: 0.3pt solid #d8d8d8 !important;
      column-fill: balance !important;
      font-size: 8.5pt !important;
      line-height: 1.4 !important;
      color: #1a1a1a !important;
      text-align: justify !important;
      hyphens: auto !important;
      -webkit-hyphens: auto !important;
      flex: 1 1 auto !important;
      orphans: 2 !important;
      widows: 2 !important;
      height: 100% !important;
    }
    /* Preamble — full width above the columns (same typography as sections, just no title) */
    .devis-preview .dp-cgv-body .cgv-paragraph, .view-devis-snapshot .dp-cgv-body .cgv-paragraph {
      column-span: all !important;
      -webkit-column-span: all !important;
      margin: 0 0 5pt !important;
      font-size: 8.5pt !important;
      line-height: 1.4 !important;
      color: #1a1a1a !important;
      text-align: justify !important;
      font-style: normal !important;
    }
    /* Numbered section: bold inline title + body, same typography as preamble */
    .devis-preview .dp-cgv-body .cgv-section, .view-devis-snapshot .dp-cgv-body .cgv-section {
      margin: 0 0 4pt !important;
      font-size: 8.5pt !important;
      line-height: 1.4 !important;
      color: #1a1a1a !important;
      text-align: justify !important;
      break-inside: avoid !important;
      page-break-inside: avoid !important;
    }
    .devis-preview .dp-cgv-body .cgv-section-title, .view-devis-snapshot .dp-cgv-body .cgv-section-title {
      font-weight: 700 !important;
      color: #1a1a1a !important;
    }
    /* CGV mentions footer — pinned at bottom via flex parent + margin-top auto-ish */
    .devis-preview .dp-cgv-mentions, .view-devis-snapshot .dp-cgv-mentions {
      margin: 6pt 0 0 !important;
      padding: 3pt 0 !important;
      border-top: 0.4pt solid #ccc !important;
      border-bottom: 0.4pt solid #ccc !important;
      font-size: 6.5pt !important;
      color: #666 !important;
      font-style: italic !important;
      line-height: 1.4 !important;
      text-align: center !important;
      min-height: 12pt !important;
      flex-shrink: 0 !important;
    }

    /* === DÉBOURS / FACTURE doc title === */
    .devis-preview .dp-doc-title, .view-devis-snapshot .dp-doc-title {
      font-size: 18pt !important;
      font-weight: 800 !important;
      letter-spacing: -.02em !important;
      margin: 0 0 4pt 0 !important;
      text-transform: uppercase !important;
      color: #1a1a1a !important;
    }
    .devis-preview .dp-doc-sub, .view-devis-snapshot .dp-doc-sub {
      font-size: 8pt !important;
      color: #666 !important;
      margin-bottom: 12pt !important;
    }

    /* Empty preview — never print empty placeholders */
    .devis-preview .dp-empty, .view-devis-snapshot .dp-empty { display: none !important; }
    .devis-preview .dp-header-left.empty, .view-devis-snapshot .dp-header-left.empty { visibility: hidden !important; }
    .devis-preview .dp-objet:empty, .view-devis-snapshot .dp-objet:empty { display: none !important; }

    /* ===== ONE-PAGE FIT: PREVENT INTERNAL PAGE BREAKS ===== */
    /* Force everything before CGV to stay on the first page */
    .devis-preview > *:not(.devis-page-break):not(.cgv),
    .view-devis-snapshot > *:not(.devis-page-break):not(.cgv) {
      page-break-after: avoid !important;
      page-break-inside: avoid !important;
    }
    /* The header grid, totals block, conditions blocks should never split */
    .devis-preview .dp-header-grid, .view-devis-snapshot .dp-header-grid,
    .devis-preview .dp-totals, .view-devis-snapshot .dp-totals,
    .devis-preview .dp-conditions:not(.cgv), .view-devis-snapshot .dp-conditions:not(.cgv) {
      page-break-inside: avoid !important;
    }

    /* CGV: ALWAYS on its own page === */
    .devis-page-break {
      display: none !important;
    }
    .devis-page-break::before { display: none !important; }
    .devis-preview .dp-conditions.cgv, .view-devis-snapshot .dp-conditions.cgv {
      page-break-before: always !important;
      page-break-inside: auto !important;
      margin-top: 0 !important;
      padding-top: 0 !important;
      border-top: 0 !important;
    }

    /* Hide app chrome */
    .sb, header, nav, footer { display: none !important; }
  }

  /* Photographe textarea + conditions textarea in Mission */
  .multi-text{width:100%;max-width:520px;min-height:80px;padding:9px 12px;border:1px solid var(--border-light);border-radius:6px;background:var(--surface);color:var(--text);font:inherit;font-size:13px;line-height:1.5;resize:vertical}
  .multi-text:focus{outline:none;border-color:var(--primary)}

  /* Locked textarea wrapper (with veil overlay) */
  .locked-wrap{position:relative;max-width:520px}
  .locked-wrap textarea{padding-right:42px}
  .locked-wrap textarea:disabled{opacity:1;cursor:not-allowed;color:var(--text);background:var(--surface)}
  .locked-wrap.is-locked::after{content:"";position:absolute;inset:0;background:rgba(255,255,255,.18);border-radius:6px;pointer-events:none}
  .locked-wrap.is-locked textarea{filter:brightness(0.92)}
  .locked-wrap .lock-corner{position:absolute;top:6px;right:6px;background:var(--surface-2);border:1px solid var(--border-light);color:var(--text-muted);cursor:pointer;border-radius:4px;width:28px;height:28px;font-size:13px;line-height:1;display:flex;align-items:center;justify-content:center;font-weight:700;z-index:2}
  .locked-wrap .lock-corner:hover{color:var(--primary);border-color:var(--primary)}
  .locked-wrap .lock-corner-popup{position:absolute;top:38px;right:6px;background:var(--surface-2);border:1px solid var(--border-light);border-radius:6px;box-shadow:var(--shadow);z-index:30;min-width:200px;padding:4px;display:none}
  .locked-wrap .lock-corner-popup.open{display:block}
  .locked-wrap .lock-corner-popup button{width:100%;text-align:left;background:transparent;border:0;color:var(--text);padding:8px 12px;font:inherit;font-size:13px;cursor:pointer;border-radius:4px}
  .locked-wrap .lock-corner-popup button:hover{background:var(--surface-hi)}

  /* Échéances UI */
  .ech-list{display:flex;flex-direction:column;gap:6px;max-width:560px}
  .ech-row{display:flex;align-items:center;gap:10px;background:transparent;border:0;border-radius:0;padding:2px 0}
  .ech-row input.lbl{flex:1;height:var(--input-h);border:1px solid transparent;background:var(--surface-2);color:var(--text);font:inherit;font-size:13px;padding:0 10px;border-radius:6px;min-width:0;transition:border-color .12s,box-shadow .12s}
  .ech-row input.lbl:hover{border-color:var(--border-light)}
  .ech-row input.lbl:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  .ech-row .pct-wrap{display:flex;align-items:center;gap:3px;height:var(--input-h);background:var(--surface-2);border:1px solid transparent;border-radius:6px;padding:0 8px;width:90px;transition:border-color .12s,box-shadow .12s;flex-shrink:0;box-sizing:border-box}
  .ech-row .pct-wrap:hover{border-color:var(--border-light)}
  .ech-row .pct-wrap:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  .ech-row .pct-wrap input{width:50px;height:100%;border:0;background:transparent;text-align:right;color:var(--text);font:inherit;font-size:13px;font-variant-numeric:tabular-nums;padding:0}
  .ech-row .pct-wrap input:focus{outline:none}
  .ech-row .pct-wrap .unit{color:var(--text-dim);font-size:13px}
  /* (i) info button on échéance rows — tooltip shows acompte suggestion */
  .ech-info-icon{position:relative;background:transparent;border:1px solid var(--border-light);color:var(--text-muted);width:22px;height:22px;border-radius:50%;cursor:help;font-size:13px;font-weight:600;font-style:italic;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;padding:0;line-height:1}
  .ech-info-icon:hover,.ech-info-icon:focus{border-color:var(--primary);color:var(--primary);background:var(--primary-soft);outline:none}
  .ech-info-tooltip{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:0 12px 32px rgba(0,0,0,.45);padding:10px 14px;width:300px;font-size:12px;font-style:normal;font-weight:400;text-align:left;color:var(--text-muted);line-height:1.5;letter-spacing:normal;display:none;z-index:1000;pointer-events:none;white-space:normal}
  .ech-info-tooltip strong{color:var(--text);font-weight:600}
  .ech-info-icon:hover .ech-info-tooltip,.ech-info-icon:focus .ech-info-tooltip{display:block}
  .ech-info-spacer{width:24px;flex-shrink:0;display:block}
  .ech-row .del{background:transparent;border:0;color:var(--text-dim);cursor:pointer;font-size:15px;padding:4px 8px;border-radius:4px}
  .ech-row .del:hover{background:var(--danger-soft);color:var(--danger)}
  .ech-row.ech-total{padding-top:10px;margin-top:6px;border-top:1px solid var(--border-light);font-weight:600;font-size:13px;align-items:center}
  .ech-row.ech-total .lbl-total{flex:1;color:var(--text);padding:0 10px}
  .ech-row.ech-total .pct-total{width:90px;padding:0 8px;text-align:right;font-variant-numeric:tabular-nums;color:var(--text);box-sizing:border-box;flex-shrink:0}
  .ech-row.ech-total .del-spacer{width:31px}
  .ech-row.ech-total.ok .pct-total{color:var(--success)}
  .ech-row.ech-total.warn .pct-total{color:var(--warning)}
  /* Remise input with (i) info button */
  .remise-input-wrap{display:flex;align-items:center;gap:6px}
  .remise-input-wrap input{flex:1;min-width:0}
  .remise-tooltip{position:absolute;top:calc(100% + 8px);left:0;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:0 12px 32px rgba(0,0,0,.45);padding:14px 16px;width:340px;font-size:12px;font-style:normal;font-weight:400;text-align:left;color:var(--text-muted);line-height:1.5;letter-spacing:normal;display:none;z-index:1000;pointer-events:none}
  .ech-info-icon:hover .remise-tooltip,.ech-info-icon:focus .remise-tooltip{display:block}
  .ech-info-icon{position:relative}
  .remise-tt-marge-actuelle{font-size:14px;font-weight:600;text-align:center;padding:8px 0;margin-bottom:10px;border-bottom:1px solid var(--border-soft);letter-spacing:.02em}
  .remise-tt-marge-actuelle strong{font-size:18px;font-weight:800}
  .remise-tt-marge-amt{font-size:11px;font-weight:400;opacity:.8;margin-left:6px}
  .remise-tt-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px;border-bottom:1px solid var(--border-soft);padding-bottom:6px}
  .remise-tt-table{width:100%;border-collapse:collapse;margin-bottom:8px;font-variant-numeric:tabular-nums}
  .remise-tt-table:last-of-type{margin-bottom:0}
  .remise-tt-table tr td{padding:2px 0;color:var(--text);font-size:12px}
  .remise-tt-table tr td:last-child{text-align:right}
  .remise-tt-table tr.muted td{color:var(--text-muted);font-size:11.5px;padding-left:6px}
  .remise-tt-table tr.section-title td{font-size:10.5px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;padding-top:8px;padding-bottom:4px}
  .remise-tt-table tr.danger td{color:var(--danger,#e74c3c)}
  .remise-tt-table tr.danger td strong{color:var(--danger,#e74c3c)}
  .remise-tt-summary{margin-top:10px;padding-top:8px;border-top:1px solid var(--border-soft);font-size:12px;color:var(--text);line-height:1.5}
  .remise-tt-summary strong{color:var(--primary)}
  .ech-warn{margin-top:6px;font-size:13px;color:var(--warning);max-width:380px}
  .ech-actions{display:flex;gap:8px;margin-top:10px;max-width:380px}
  .ech-actions .btn:last-child{margin-left:auto}
  .ech-sum{font-size:13px;text-align:right;margin-top:4px;font-variant-numeric:tabular-nums;max-width:520px}
  .ech-sum.ok{color:var(--success)}
  .ech-sum.warn{color:var(--warning)}

  /* Contact picker (if multiple contacts) */
  .contact-picker{margin-top:6px;max-width:520px;background:var(--warning-soft);border:1px solid var(--warning);border-radius:6px;padding:10px 12px}
  .contact-picker.contact-picker-compact{background:var(--surface-2);border-color:var(--border);padding:8px 12px;max-width:680px}

  /* Client + inline contact (point 5) */
  .client-line{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .client-line-picker{flex:0 0 auto;min-width:0}
  .client-line-contact{flex:1 1 320px;min-width:280px;max-width:480px;display:flex;align-items:center}
  /* Match cli-pick .selected exactly so client + contact boxes line up perfectly */
  .contact-inline{display:flex;align-items:center;gap:10px;height:var(--input-h);background:var(--surface-2);border:1px solid transparent;border-radius:6px;padding:0 12px;font-size:13px;color:var(--text);width:100%;box-sizing:border-box;transition:border-color .12s}
  .contact-inline:hover{border-color:var(--border-light)}
  .contact-inline-lbl{color:var(--text-muted);font-size:13px;font-variant-numeric:tabular-nums;flex-shrink:0}
  .contact-inline-val{flex:1;color:var(--text);font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
  .contact-inline-change{background:transparent;border:0;color:var(--primary);font-size:13px;cursor:pointer;padding:2px 8px;border-radius:4px;flex-shrink:0}
  .contact-inline-change:hover{background:var(--primary-soft)}

  /* Modal overlay */
  .modal-overlay{position:fixed;inset:0;background:rgba(8,15,28,.72);backdrop-filter:blur(3px);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px}
  .modal-card{background:var(--bg-2);border:1px solid var(--border);border-radius:10px;padding:20px 22px;max-width:560px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,.5)}
  .modal-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px}
  .modal-sub{font-size:13px;color:var(--text-muted);margin-bottom:14px}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
  .contact-list{display:flex;flex-direction:column;gap:6px}
  .contact-list-item{display:flex;flex-direction:column;align-items:flex-start;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px 14px;cursor:pointer;text-align:left;font:inherit;color:var(--text);transition:all .12s}
  .contact-list-item:hover{background:var(--surface-hi);border-color:var(--primary)}
  .contact-list-item.selected{background:var(--primary-soft);border-color:var(--primary)}
  .contact-list-name{font-weight:600;font-size:13px;color:var(--text)}
  .contact-list-meta{display:flex;flex-wrap:wrap;gap:10px;font-size:13px;color:var(--text-muted)}

  /* Large editor modal (point 6) */
  .modal-card.modal-card-lg{max-width:1100px;max-height:70vh;display:flex;flex-direction:column}
  .text-editor-toolbar{display:flex;gap:4px;flex-wrap:wrap;padding:8px;background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-bottom:8px}
  .text-editor-toolbar .te-btn{background:transparent;border:1px solid transparent;color:var(--text-muted);padding:5px 9px;border-radius:4px;cursor:pointer;font:inherit;font-size:13px;font-weight:600}
  .text-editor-toolbar .te-btn:hover{background:var(--surface-hi);color:var(--text);border-color:var(--border)}
  .text-editor-toolbar .te-sep{width:1px;background:var(--border);margin:2px 4px}
  /* RICH-TEXT EDITOR (Word-style) */
  /* Hide live actions (Imprimer, + Enregistrer dans Suivi) when devis is shown inside the snapshot modal */
  .view-devis-snapshot .dp-actions{display:none !important}
  /* Read-only display under each encadré in Mission */
  .rich-display-wrap{position:relative;max-width:880px}
  .rich-display{padding:10px 42px 10px 14px;border:1px solid transparent;border-radius:6px;background:var(--surface-2);color:var(--text);font-size:13px;line-height:1.55;min-height:110px;max-height:140px;overflow-y:auto;display:block;white-space:normal;cursor:pointer;transition:border-color .12s}
  .rich-display:hover{border-color:var(--border-light)}
  .rich-display .rich-display-summary{display:block}
  .rich-display:empty::before{content:attr(data-placeholder);color:var(--text-dim)}
  .rich-display-placeholder{color:var(--text-dim);font-style:italic}
  .rich-display p{margin:0 0 6px}
  .rich-display p:last-child{margin-bottom:0}
  .rich-display-edit{position:absolute;top:6px;right:6px;background:transparent;border:0;color:var(--text-muted);cursor:pointer;border-radius:4px;width:26px;height:26px;font-size:13px;line-height:1;display:flex;align-items:center;justify-content:center;font-weight:700;z-index:2;transition:color .12s,background .12s}
  .rich-display-edit:hover{color:var(--primary);background:var(--surface)}

  /* Editor modal toolbar */
  .rte-toolbar{display:flex;gap:3px;flex-wrap:wrap;align-items:center;padding:6px 8px;background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-bottom:8px}
  .rte-btn{background:transparent;border:1px solid transparent;color:var(--text);padding:5px 9px;border-radius:4px;cursor:pointer;font:inherit;font-size:13px;font-weight:500;min-width:30px;line-height:1.3}
  .rte-btn:hover{background:var(--surface-hi);border-color:var(--border)}
  .rte-btn:active{background:var(--primary-soft)}
  .rte-sep{width:1px;background:var(--border);margin:2px 4px;align-self:stretch}
  .rte-select{background:var(--surface-2);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:4px 6px;font:inherit;font-size:13px;cursor:pointer}
  .rte-select.rte-size{width:100px}
  .rte-color-wrap{position:relative;display:inline-flex;align-items:center}
  .rte-color-btn{display:inline-flex;flex-direction:column;align-items:center;gap:2px;padding:4px 7px;pointer-events:none}
  .rte-color-letter{font-size:13px;font-weight:700;line-height:1}
  .rte-color-bar{width:20px;height:3px;background:#000;border-radius:1px}
  .rte-color-input{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer}

  /* Editor area */
  .rich-editor{flex:1;min-height:240px;max-height:50vh;width:100%;padding:14px 16px;border:1px solid var(--border-light);border-radius:6px;background:#fff;color:#000;font-size:13px;line-height:1.6;overflow-y:auto;outline:none;font-family:Arial, Helvetica, sans-serif}
  .rich-editor:focus{border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-soft)}
  .rich-editor p, .rich-editor div{margin:0 0 6px 0}
  .rich-editor ul, .rich-editor ol{margin:6px 0;padding-left:24px}
  .rich-editor a{color:#0066cc}

  /* Changelog (onglet Mises à jour) */

  /* Abonnements: "En cours" toggle (point 2) */
  .ab-end-cell{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .ab-encours-toggle{display:inline-flex;align-items:center;gap:5px;cursor:pointer;font-size:13px;color:var(--success);font-weight:600;text-transform:uppercase;letter-spacing:.04em;padding:4px 10px;background:var(--success-soft);border:1px solid var(--success);border-radius:4px;user-select:none}
  .ab-encours-toggle input[type="checkbox"]{accent-color:var(--success);cursor:pointer;margin:0}
  tr[style*="opacity:.65"] .ab-encours-toggle{color:var(--text-muted);background:var(--surface-2);border-color:var(--border-light);font-weight:500}

  /* Date-or-EnCours picker cell */
  .date-encours-cell{position:relative;display:inline-block}
  .date-encours-display{display:inline-flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border-light);color:var(--text);font:inherit;font-size:13px;padding:6px 10px;border-radius:5px;cursor:pointer;min-width:140px;text-align:left}
  .date-encours-display:hover{border-color:var(--primary)}
  .date-encours-display.is-encours{background:var(--success-soft);border-color:var(--success)}
  .date-encours-display.is-encours .dec-pill{color:var(--success);font-weight:600;font-size:13px;text-transform:uppercase;letter-spacing:.04em}
  .date-encours-display .dec-date{font-variant-numeric:tabular-nums;color:var(--text)}
  .date-encours-display .dec-caret{margin-left:auto;color:var(--text-muted);font-size:13px}
  .date-encours-popover{position:absolute;top:calc(100% + 4px);left:0;background:var(--bg-2);border:1px solid var(--border);border-radius:8px;padding:10px;min-width:240px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:1000}
  .dec-encours-opt{width:100%;display:flex;flex-direction:column;align-items:flex-start;gap:3px;background:var(--success-soft);border:1px solid var(--success);color:var(--text);padding:10px 12px;border-radius:6px;cursor:pointer;font:inherit;text-align:left;margin-bottom:10px}
  .dec-encours-opt:hover{filter:brightness(1.05)}
  .dec-encours-opt.selected{background:var(--success);color:#fff}
  .dec-encours-opt.selected .dec-pill,.dec-encours-opt.selected .dec-opt-desc{color:#fff}
  .dec-encours-opt .dec-pill{color:var(--success);font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.04em}
  .dec-encours-opt .dec-opt-desc{color:var(--text-muted);font-size:13px}
  .dec-divider{display:flex;align-items:center;gap:8px;color:var(--text-dim);font-size:13px;text-transform:uppercase;letter-spacing:.06em;margin:6px 0;font-weight:600}
  .dec-divider::before,.dec-divider::after{content:"";flex:1;height:1px;background:var(--border)}
  .dec-date-input{width:100%;padding:8px 10px;border:1px solid var(--border);background:var(--surface);color:var(--text);font:inherit;font-size:13px;border-radius:5px;cursor:pointer}
  .dec-date-input:focus{outline:none;border-color:var(--primary)}
  .modal-textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-soft)}
  .contact-picker .ttl{font-size:13px;font-weight:600;color:var(--warning);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
  .contact-picker label{display:flex;align-items:center;gap:8px;padding:5px 8px;cursor:pointer;border-radius:4px;font-size:13px;color:var(--text)}
  .contact-picker label:hover{background:var(--surface-2)}
  .contact-picker input[type="radio"]{accent-color:var(--primary);cursor:pointer}
  .contact-pick-row{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;cursor:pointer;border-radius:5px;transition:background .12s}
  .contact-pick-row:hover{background:var(--surface-2)}
  .contact-pick-info{display:flex;flex-direction:column;gap:2px}
  .contact-pick-name{font-weight:600;color:var(--text);font-size:13px}
  .contact-pick-detail{font-size:13px;color:var(--text-muted)}

  /* Client edit: structured contact rows */
  .contacts-edit{display:flex;flex-direction:column;gap:6px;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;padding:8px}
  .contact-row{display:flex;align-items:flex-start;gap:8px;background:var(--surface);border:1px solid var(--border-soft);border-radius:5px;padding:7px 8px}
  .contact-row-num{flex-shrink:0;width:22px;height:22px;display:flex;align-items:center;justify-content:center;background:var(--primary-soft);color:var(--primary);border-radius:50%;font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;margin-top:4px}
  .contact-row-fields{flex:1;display:grid;grid-template-columns:1.2fr 1fr 1.5fr;gap:6px;min-width:0}
  .contact-row-fields input{padding:6px 9px;border:1px solid var(--border-light);border-radius:4px;background:var(--surface-2);color:var(--text);font:inherit;font-size:13px;min-width:0}
  .contact-row-fields input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-soft)}
  .contact-row-del{background:transparent;border:0;color:var(--text-dim);cursor:pointer;font-size:15px;line-height:1;padding:6px 9px;border-radius:4px;align-self:flex-start;margin-top:2px}
  .contact-row-del:hover{background:var(--danger-soft);color:var(--danger)}
  @media (max-width:700px){
    .contact-row-fields{grid-template-columns:1fr}
  }

  /* Lignes section */
  .lg-add{display:flex;gap:8px;margin-top:8px}
  .lg-add .btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;padding:7px 14px}
  .lg-list{display:flex;flex-direction:column;gap:8px;max-width:780px;margin-bottom:0}
  .lg-list:empty{margin-bottom:0}
  .lg-section-mat{margin-top:30px}
  .lg-row-wrap{display:flex;flex-direction:column;gap:6px}
  .lg-row{display:flex;align-items:center;gap:10px}
  .lg-justif{display:inline-flex;align-items:center;gap:4px;height:var(--input-h);padding:0 12px;border:1px solid var(--border);background:var(--surface-2);color:var(--text-muted);border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;flex-shrink:0;font-variant-numeric:tabular-nums;transition:background .12s,color .12s,border-color .12s}
  .lg-justif:hover{border-color:var(--primary);color:var(--text)}
  .lg-justif.on{background:var(--success-soft,#e8f5e9);color:var(--success,#2e7d32);border-color:var(--success,#2e7d32);font-weight:600}
  .lg-cession-detail{padding:10px 14px;background:var(--surface-2);border-radius:6px;display:flex;flex-direction:column;gap:8px;margin-left:0;margin-top:2px}
  .lg-cession-detail .row{margin:0;gap:10px}
  .lg-cession-detail .field label{font-size:11px;color:var(--text-muted);margin-bottom:2px}
  .lg-cession-detail input[type="text"]{height:var(--input-h);padding:0 10px;border:1px solid transparent;border-radius:6px;background:var(--surface);color:var(--text);font:inherit;font-size:13px}
  .lg-cession-detail input[type="text"]:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  .lg-cession-detail .lg-desc{margin:0;min-height:32px}
  .lg-title{flex:1;min-width:160px;height:var(--input-h);padding:0 10px;border:1px solid transparent;border-radius:6px;background:var(--surface-2);color:var(--text);font:inherit;font-size:13px;font-weight:500;transition:border-color .12s,box-shadow .12s}
  .lg-title:hover{border-color:var(--border-light)}
  .lg-title:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  .lg-num{width:80px;height:var(--input-h);padding:0 10px;border:1px solid transparent;border-radius:6px;background:var(--surface-2);color:var(--text);font:inherit;font-size:13px;text-align:right;font-variant-numeric:tabular-nums;transition:border-color .12s,box-shadow .12s;flex-shrink:0}
  .lg-num:hover{border-color:var(--border-light)}
  .lg-num:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  .lg-prix{display:flex;align-items:center;gap:4px;width:90px;height:var(--input-h);background:var(--surface-2);border:1px solid transparent;border-radius:6px;padding:0 10px;transition:border-color .12s,box-shadow .12s;flex-shrink:0;box-sizing:border-box}
  .lg-prix:hover{border-color:var(--border-light)}
  .lg-prix:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  .lg-prix input{flex:1;width:100%;height:100%;border:0;background:transparent;color:var(--text);font:inherit;font-size:13px;font-variant-numeric:tabular-nums;text-align:right;padding:0;min-width:0}
  .lg-prix input:focus{outline:none}
  .lg-prix .unit{color:var(--text-dim);font-size:13px;flex-shrink:0}
  .lg-toggle{min-width:170px;flex-shrink:0}
  .lg-toggle button{flex:1;padding:0 14px;font-size:13px;font-weight:500;justify-content:center}
  .lg-toggle-pmt{min-width:150px;flex-shrink:0}
  .lg-toggle-pmt button{flex:1;padding:0 14px;font-size:13px;font-weight:500}
  /* Static pill version: single non-clickable button shown when only one valid mode (Débours → Fact. Direct) */
  .lg-toggle-pmt.static{cursor:default}
  .lg-toggle-pmt.static button{cursor:default;opacity:.85}
  .lg-toggle-pmt.static button:disabled{background:var(--primary-soft);color:var(--primary);border-color:var(--primary-soft)}
  /* Info icon (i) — opens a tooltip on hover/focus */
  .lg-info-icon{background:transparent;border:1px solid var(--border-light);color:var(--text-muted);width:22px;height:22px;border-radius:50%;cursor:help;font-size:13px;font-weight:600;font-style:italic;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;padding:0;line-height:1}
  .lg-info-icon:hover,.lg-info-icon:focus{border-color:var(--primary);color:var(--primary);background:var(--primary-soft);outline:none}
  /* Tooltip element appended to body, positioned via JS */
  .paiement-tooltip-wrap{position:fixed;z-index:9999;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:0 12px 32px rgba(0,0,0,.45);padding:0;width:380px;max-width:calc(100vw - 24px);font-size:12px;pointer-events:none}
  .paiement-info-card{padding:12px 16px;font-size:12px;color:var(--text-muted);line-height:1.5}
  .paiement-info-card.warn{background:rgba(231,76,60,.08);color:var(--text);border-radius:8px}
  .paiement-info-title{font-weight:700;color:var(--text);margin-bottom:8px;font-size:13px;letter-spacing:.02em;border-bottom:1px solid var(--border-soft);padding-bottom:6px}
  .paiement-info-grid{display:grid;grid-template-columns:max-content 1fr;gap:6px 12px;align-items:start}
  .paiement-info-lbl{font-weight:600;color:var(--text-muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;padding-top:1px}
  .paiement-info-grid > span:not(.paiement-info-lbl){color:var(--text);font-size:12px}
  /* Au black mode warning banner */
  .black-warning{margin:8px 0 14px;padding:12px 16px;background:rgba(231,76,60,.08);border-left:3px solid var(--danger,#e74c3c);border-radius:0 6px 6px 0;font-size:13px;color:var(--text);line-height:1.5;max-width:880px}
  .black-warning strong{color:var(--danger,#e74c3c)}
  /* Invisible right-edge spacer used by depl row to match the expand+del button widths
     of materiel rows above, so toggles align vertically across rows. */
  .lg-btn-spacer{width:30px;height:var(--input-h);flex-shrink:0;display:block}
  /* Déplacement: same max-width as .lg-list (780px) so the row has the same effective
     width as materiel rows. Without this, depl row spans wider than materiel and the
     toggles get pushed further right. */
  .depl-wrap{max-width:780px}
  .depl-subtoggle-row{display:flex;align-items:center;gap:10px;margin-top:8px}
  .depl-subtoggle-row .lg-toggle{min-width:300px}
  .depl-subtoggle-row .lg-toggle button{font-size:13px;font-weight:500;padding:0 14px}
  /* Déplacement: structure miroir EXACTE des lignes matériel pour aligner les toggles
     verticalement. depl-title-slot mimétise .lg-title (flex:1, min-width:160px) et
     contient le toggle Voiture/Transports. lg-prix-spacer mimétise .lg-prix (90px).
     Ensuite les toggles tombent dans les mêmes colonnes. */
  .depl-title-slot{flex:1 1 0;min-width:160px;height:var(--input-h);display:flex;align-items:center}
  .lg-prix-spacer{width:90px;flex-shrink:0}
  .lg-expand{background:transparent;border:0;color:var(--text-dim);font-size:14px;line-height:1;cursor:pointer;height:var(--input-h);width:30px;display:flex;align-items:center;justify-content:center;padding:0;border-radius:4px;flex-shrink:0;transition:transform .15s,color .12s,background .12s}
  .lg-expand:hover{background:rgba(255,255,255,.06);color:var(--text)}
  .lg-expand.open{transform:rotate(90deg);color:var(--primary)}
  .lg-expand.has{color:var(--primary)}
  .lg-del{background:transparent;border:0;color:var(--text-dim);font-size:18px;line-height:1;cursor:pointer;height:var(--input-h);width:30px;display:flex;align-items:center;justify-content:center;padding:0;border-radius:4px;flex-shrink:0}
  .lg-del:hover{background:var(--danger-soft);color:var(--danger)}

// ▼ save() — flush localStorage + déclenche saveToCloud (debounce 800ms)
function save() {
  localStorage.setItem(SK, JSON.stringify(S));
  clearTimeout(cloudT);
  cloudT = setTimeout(saveToCloud, 800);
}

// ▼ saveToCloud — Firestore set merge (top-level keys de S)
async function saveToCloud() {
  if (!user) return;
  try {
    await db.collection("users").doc(user.uid).set({
      identite: S.identite,
      mission: S.mission,
      devis:   S.devis,
      suivi:   S.suivi,
      clients: S.clients,
      compta:  S.compta,
      abonnements: S.abonnements,
      investissements: S.investissements,
      tarifs:  S.tarifs,
      bugs:    S.bugs
    }, { merge: true });
    const e = document.getElementById("savedFlash");
    if (e) { e.textContent = "Enregistré"; setTimeout(() => { if (e && e.textContent === "Enregistré") e.textContent = ""; }, 1500); }
  } catch (err) { console.error("saveToCloud", err); }
}

// ▼ loadFromCloud — merge Firestore → S avec DEFAULT_S comme fallback
async function loadFromCloud() {
  if (!user) return;
  try {
    const snap = await db.collection("users").doc(user.uid).get();
    if (snap.exists) {
      const d = snap.data();
      if (d.mission) {
        const m = d.mission, dm = DEFAULT_S.mission;
        S.mission = {
          ...dm, ...m,
          client:      { ...dm.client,      ...(m.client      || {}) },
          prep:        { ...dm.prep,        ...(m.prep        || {}) },
          prod:        { ...dm.prod,        ...(m.prod        || {}) },
          postprod:    { ...dm.postprod,    ...(m.postprod    || {}) },
          deplacement: { ...dm.deplacement, ...(m.deplacement || {}) },
          autres:      { ...dm.autres,      ...(m.autres      || {}) }
        };
      }
      if (d.identite) {
        S.identite = { ...DEFAULT_S.identite, ...d.identite,
          rcPro:     { ...DEFAULT_S.identite.rcPro,     ...(d.identite.rcPro     || {}) },
          mediateur: { ...DEFAULT_S.identite.mediateur, ...(d.identite.mediateur || {}) },
          bank:      { ...DEFAULT_S.identite.bank,      ...(d.identite.bank      || {}) }
        };
      }
      if (d.devis)   S.devis   = Object.assign({}, DEFAULT_S.devis,   d.devis);
      if (d.suivi)   S.suivi   = { ...DEFAULT_S.suivi, ...d.suivi, entries: Array.isArray(d.suivi.entries) ? d.suivi.entries : [], devis: (d.suivi.devis && typeof d.suivi.devis === "object") ? d.suivi.devis : {} };
      if (d.clients) S.clients = { ...DEFAULT_S.clients, ...d.clients, entries: Array.isArray(d.clients.entries) ? d.clients.entries : [] };
      if (d.compta)  S.compta  = Object.assign({}, DEFAULT_S.compta,  d.compta);
      if (d.abonnements) S.abonnements = { ...DEFAULT_S.abonnements, ...d.abonnements, entries: Array.isArray(d.abonnements.entries) ? d.abonnements.entries : [] };
      if (d.investissements) S.investissements = { ...DEFAULT_S.investissements, ...d.investissements, entries: Array.isArray(d.investissements.entries) ? d.investissements.entries : [] };
      if (d.tarifs && Array.isArray(d.tarifs.catalog) && d.tarifs.catalog.length) S.tarifs = { catalog: d.tarifs.catalog, heuresAnnuelles: d.tarifs.heuresAnnuelles || S.tarifs.heuresAnnuelles || "900", facteurSecurite: d.tarifs.facteurSecurite || S.tarifs.facteurSecurite || "0" };
      if (d.bugs)    S.bugs    = { items: Array.isArray(d.bugs.items) ? d.bugs.items : (Array.isArray(d.bugs.entries) ? d.bugs.entries.map(e => ({ id: e.id, text: e.title || "", steps: e.desc ? [e.desc] : [], validated: e.status === "fixed", createdAt: e.date ? new Date(e.date).getTime() || Date.now() : Date.now() })) : []) };
      suiviMigrate();
      recomputeRef();
      localStorage.setItem(SK, JSON.stringify(S));
    }
  } catch (err) { console.error("loadFromCloud", err); }
  render();
}

// ▼ upd — point d'entrée unique pour mutation de S
function upd(path, val) {
  const keys = path.split(".");
  let o = S;
  for (let i = 0; i < keys.length - 1; i++) o = o[keys[i]];
  o[keys[keys.length - 1]] = val;
  if (path === "mission.dateEmission") {
    recomputeRef();
    refreshRefDisplay();
  }
  save();
  if (path.startsWith("mission.prep") || path.startsWith("mission.prod") || path.startsWith("mission.postprod") || path.startsWith("mission.deplacement") || path.startsWith("mission.autres") || path.startsWith("mission.lignes") || path === "mission.remisePct" || path === "mission.object" || path === "mission.objectText" || path === "mission.paiement.margeAvance" || path === "mission.urssafPct" || path === "mission.blackMode" || path === "mission.dureeValidite") {
    refreshTotals();
  }
}
window.upd = upd;

// Clamp remise input to [0, max]. Called by the Remise input.

// Compute the next chronologically-unique reference for the current mission.
// Format : DEVIS-YYYY-MM-NNN, NNN reset chaque mois (arrêté 3 déc. 1987).
// La séquence cherche le NNN max parmi les devis déjà émis (S.suivi.devis) du mois courant
// et ajoute 1 — sauf si la mission elle-même est déjà dans le suivi (auquel cas on garde son ref).
// ▼ recomputeRef — génère DEVIS-YYYY-MM-NNN
function recomputeRef() {
  const date = S.mission.dateEmission || "";
  if (!date || date.length < 7) {
    S.mission.ref = "";
    return;
  }
  // Si la mission est déjà finalisée (dans suivi), ne pas écraser sa référence.
  const existing = (S.suivi && S.suivi.devis && typeof S.suivi.devis === "object") ? S.suivi.devis : {};
  for (const k of Object.keys(existing)) {
    const r = existing[k] && existing[k].ref;
    if (r && r === S.mission.ref && S.mission.ref) return;
  }
  const ym = date.slice(0, 7); // "YYYY-MM"
  const re = new RegExp("^DEVIS-" + ym.replace("-", "\\-") + "-(\\d+)$");
  let maxN = 0;
  for (const k of Object.keys(existing)) {
    const r = (existing[k] && existing[k].ref) || "";
    const m = r.match(re);
    if (m) {
      const n = parseInt(m[1], 10);
      if (n > maxN) maxN = n;
    }
  }
  const next = maxN + 1;
  S.mission.ref = "DEVIS-" + ym + "-" + String(next).padStart(3, "0");
}

function statusLabel(identite) {
  const id = identite || {};

    "micro-bnc":      "Micro-entrepreneur",

    "eurl":           "EURL",

    "sarl":           "SARL",

  };
  let label = map[id.formeJuridique] || map["micro-bnc"];
  const isEIish = id.formeJuridique === "ei" || id.formeJuridique === "micro-bnc";
  if (id.mentionEI && isEIish) label = label + " · EI";

// Format SIRET as "XXX XXX XXX XXXXX" if 14 digits, else return as-is.
function formatSiret(siret) {
  const s = String(siret || "").replace(/\s/g, "");
  if (s.length === 14 && /^\d{14}$/.test(s)) {
    return s.slice(0,3) + " " + s.slice(3,6) + " " + s.slice(6,9) + " " + s.slice(9);
  }
  return s;
}

// Update SIRET in S.identite + refresh status indicator without losing focus.
window.updSiretWithCheck = function(raw) {
  const cleaned = String(raw || "").replace(/\s/g, "");
  upd("identite.siret", cleaned);
  const status = document.getElementById("siretStatus");
  if (!status) return;
  if (cleaned.length === 0) {
    status.textContent = "Le SIRET est obligatoire sur tout devis (R123-237 C. com.)";
    status.style.color = "var(--text-dim)";
  } else if (validSiret(cleaned)) {
    status.textContent = "✓ SIRET valide (Luhn OK)";
    status.style.color = "var(--success,#2e7d32)";
  } else if (cleaned.length < 14) {
    status.textContent = `${cleaned.length}/14 chiffres`;
    status.style.color = "var(--text-dim)";
  } else {
    status.textContent = "✗ Clé Luhn invalide — vérifie le numéro";
    status.style.color = "#c0392b";
  }
};

// Validate a French SIRET (14 digits + Luhn checksum). Returns true if valid.
function validSiret(siret) {
  const s = String(siret || "").replace(/\s/g, "");
  if (!/^\d{14}$/.test(s)) return false;
  let sum = 0;
  for (let i = 0; i < 14; i++) {
    let n = parseInt(s[i], 10);
    if (i % 2 === 0) {
      n *= 2;
      if (n > 9) n -= 9;
    }
    sum += n;
  }
  return sum % 10 === 0;
}

// Build the emitter header HTML from S.identite. Falls back to legacy richtext if no structured field is filled.
// Returns the inner HTML of the emitter block (caller wraps in .dp-header-emetteur or .dp-header-left).
// ▼ genHeaderEmetteur — entête imprimé (logo + identité)
function genHeaderEmetteur(identite, photographeRichtext) {
  const id = identite || {};
  const hasStructured = !!(id.nom || id.prenom || id.denomination || id.siret);
  if (!hasStructured) {
    return (photographeRichtext || "").trim() ? richDisplayHtml(photographeRichtext) : "";
  }
  const displayName = (id.denomination || `${id.prenom || ""} ${id.nom || ""}`.trim()) || "—";
  const cityLine = [id.cp, id.ville].filter(Boolean).join(" ").trim();
  const meta = [];
  const isEIish = id.formeJuridique === "ei" || id.formeJuridique === "micro-bnc";
  meta.push(statusLabel(id));            // ex: "Micro-entrepreneur" ou "Micro-entrepreneur · EI"
  if (id.siret) meta.push("SIRET " + formatSiret(id.siret));
  if (id.ape)   meta.push("APE " + id.ape);
  if (id.rcs)   meta.push("RCS " + id.rcs);
  if (id.capitalSocial) meta.push("Capital " + fmt(id.capitalSocial));
  const lines = [
    `<div class="dp-emetteur-name">${esc(displayName)}</div>`,
    id.profession ? `<div class="dp-emetteur-profession">${esc(id.profession)}</div>` : "",
    id.adresse   ? `<div>${esc(id.adresse)}</div>`   : "",
    cityLine     ? `<div>${esc(cityLine)}</div>`     : "",
    id.email     ? `<div>${esc(id.email)}</div>`     : "",
    id.telephone ? `<div>${esc(id.telephone)}</div>` : "",
    id.siteWeb   ? `<div>${esc(id.siteWeb)}</div>`   : "",
    meta.length  ? `<div class="dp-emetteur-meta">${meta.map(esc).join(" · ")}</div>` : ""
  ].filter(Boolean);
  return lines.join("");
}

// Compute the validity end date (ISO) from emission + duration in days.
function validityDate(dateEmission, dureeValidite) {
  if (!dateEmission || dateEmission.length < 10) return "";
  const d = new Date(dateEmission + "T00:00:00");
  if (isNaN(d.getTime())) return "";
  const days = Math.max(1, parseInt(dureeValidite) || 30);
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}

// Compute the validity text shown on the devis ("Devis valable jusqu'au DD/MM/YYYY (N jours).").
function validityText(dateEmission, dureeValidite) {
  const days = Math.max(1, parseInt(dureeValidite) || 30);
  const endIso = validityDate(dateEmission, days);
  if (endIso) return `Devis valable jusqu'au ${dateFR(endIso)} (${days} jours).`;
  return `Devis valable ${days} jours à compter de la date d'émission.`;
}

// ============ DEVIS PREVIEW (rendered at the bottom of Mission) ============
// ▼ rDevisPreview — preview imprimée du devis principal
function rDevisPreview() {
  const d = S.mission;
  const t = totals();
  // Show preview only if there's enough info (client + at least one ligne)
  const hasClient = !!(d.client && (d.client.id || d.client.name));
  const hasContent = (d.lignes || []).length > 0 || num(d.deplacement.km) > 0 || num(d.deplacement.ticket) > 0 || num(d.deplacement.peages) > 0;
  if (!hasClient && !hasContent) {
    return `<div class="devis-preview"><div class="dp-empty">Le devis se générera ici automatiquement dès que tu auras sélectionné un client et ajouté au moins une ligne.</div></div>`;
  }

  const cat = (S.tarifs.catalog || DEFAULT_CATALOG).find(c => c.k === d.object);
  // Le tarif catalogue saisi est le prix final TTC (URSSAF incluse). Au black, on enlève l'URSSAF.
  // En mode "Dans taux horaire", on utilise tarifHEff qui inclut le déplacement.
  const tarifH = t.tarifHEff || t.tarifH;
  const sel = d.client.id ? S.clients.entries.find(x => x.id === d.client.id) : null;
  const cli = sel || d.client;

  // Build line items HTML — with numbering (1., 2., 3., …)
  // Au black (declare === false) → no URSSAF compensation, no marge avance.
  const _isDeclared = d.declare !== false;
  const ma = _isDeclared ? num((d.paiement || {}).margeAvance ?? 0) : 0;
  const mu = _isDeclared ? num(d.urssafPct ?? 22) : 0;
  let linesHtml = "";
  let lineNum = 0;
  for (const l of (d.lignes || [])) {
    if (l.type === "heures") {
      const h = num(l.duree) * (l.unit === "j" ? HOURS_PER_DAY : 1);
      // Skip lignes vides (durée à 0 ET pas d'intitulé/description) — bruit visuel sinon.
      if (h === 0 && !l.intitule && !l.description) continue;
      const amount = h * tarifH;
      lineNum++;
      linesHtml += `<div class="dp-line">
        <div class="num">${lineNum}.</div>
        <div class="lbl">${esc(l.intitule || "(Sans intitulé)")}${l.description ? `<div class="desc">${esc(l.description)}</div>` : ""}</div>
        <div class="qty">${num(l.duree).toFixed(2).replace(".",",")} ${l.unit === "j" ? "jour(s) × 8h" : "h"} × ${tarifH.toFixed(2).replace(".",",")} €/h</div>
        <div class="amt">${fmt(amount)}</div>
      </div>`;
    } else if (l.type === "materiel" && l.devis !== "debours") {
      const p = num(l.prix);
      if (p === 0 && !l.intitule && !l.description) continue;
      lineNum++;
      const info = ligneDisplayInfo(l.devis, l.paiementType, l.prix, ma, mu, true);
      linesHtml += `<div class="dp-line">
        <div class="num">${lineNum}.</div>
        <div class="lbl">${esc(l.intitule || "(Sans intitulé)")}<div class="desc">${l.description ? esc(l.description) : "Matériel"}</div></div>
        <div class="qty">${esc(info.breakdown)}</div>
        <div class="amt">${fmt(info.amount)}</div>
      </div>`;
    } else if (l.type === "cession") {
      const p = num(l.prix);
      if (p === 0 && !l.intitule && !l.description && !l.duree && !l.territoire && !l.supports) continue;
      lineNum++;
      const detailParts = [
        l.duree      ? "Durée : " + l.duree           : "",
        l.territoire ? "Territoire : " + l.territoire : "",
        l.supports   ? "Supports : " + l.supports     : "",
        l.exclusivite ? "Cession exclusive" : "Non exclusive"
      ].filter(Boolean);
      const detail = detailParts.join(" · ");
      linesHtml += `<div class="dp-line">
        <div class="num">${lineNum}.</div>
        <div class="lbl">${esc(l.intitule || "Cession de droits")}<div class="desc">${esc(detail)}${l.description ? " — " + esc(l.description) : ""}</div></div>
        <div class="qty">forfait</div>
        <div class="amt">${fmt(num(l.prix))}</div>
      </div>`;
    }
  }

  // Déplacement line — goes into either main lines (Principal+Afficher), débours, or invisible (lisser baked into hourly rate)
  const mode = d.deplacement.mode || "voiture";
  const deplDevisMode = t.effectiveDeplMode || "principal";
  // "principal" = shown as separate line (afficher mode), "lisser" = baked into tarifH (invisible),
  // "debours" = in débours bucket (separate section below)
  const deplShownAsMainLine = (deplDevisMode === "principal" && t.depl > 0);
  const deplLineNum = deplShownAsMainLine ? ++lineNum : null;
  // Apply URSSAF/avance markup for Principal mode (works for BOTH voiture and transport)
  const isDeplPrincipal = (d.deplacement.devis || "principal") === "principal";
  const deplInfo = (isDeplPrincipal && t.depl > 0)
    ? ligneDisplayInfo("principal", d.deplacement.paiementType, t.depl, ma, mu, true)
    : { amount: t.depl, breakdown: "", hasMarkup: false };
  const deplFinalAmount = deplInfo.amount;
  // Per user request: NO calculation detail in devis (no "100km × 0,40€/km", no "+péages", etc.)
  // Only the breakdown (URSSAF/avance) is shown if applicable, in the qty slot like materiel lines.
  const deplLineHtml = t.depl > 0 ? `<div class="dp-line">
    ${deplLineNum !== null ? `<div class="num">${deplLineNum}.</div>` : `<div class="num"></div>`}
    <div class="lbl">Déplacement</div>
    <div class="qty">${esc(deplInfo.breakdown)}</div>
    <div class="amt">${fmt(deplFinalAmount)}</div>
  </div>` : "";
  if (deplDevisMode === "principal") {
    linesHtml += deplLineHtml;
  }
  // "lisser" mode → no separate déplacement line (already baked into the hourly rate)

  // Débours items (separately) — exclut les lignes fact-direct qui sont dans leur propre bloc.
  let deboursHtml = "";
  const deplPmt = d.deplacement.paiementType || "acompte";
  if (deplDevisMode === "debours" && deplPmt !== "fact-direct") {
    deboursHtml += deplLineHtml;
  }
  for (const l of (d.lignes || [])) {
    if (l.type !== "materiel" || l.devis !== "debours") continue;
    if (l.paiementType === "fact-direct") continue; // bloc Facturation directe séparé
    const p = num(l.prix);
    if (p === 0 && !l.intitule && !l.description) continue;
    deboursHtml += `<div class="dp-line">
      <div class="lbl">${esc(l.intitule || "(Sans intitulé)")}${l.description ? `<div class="desc">${esc(l.description)}</div>` : ""}</div>
      <div class="qty"></div>
      <div class="amt">${fmt(num(l.prix))}</div>
    </div>`;
  }

  return `<div class="devis-preview" id="devisPreview">
    <div class="dp-top-row">
      ${d.logoUrl ? `<div class="dp-logo-wrap"><img src="${esc(d.logoUrl)}" alt="Logo" class="dp-logo"></div>` : `<div class="dp-logo-spacer"></div>`}
    </div>
    <div class="dp-header-grid">
      ${(() => {
        const inner = genHeaderEmetteur(S.identite, d.photographe);
        if (inner.trim()) return `<div class="dp-header-left">${inner}</div>`;
        return `<div class="dp-header-left empty">Renseigner ton identité dans l'onglet « Profil ».</div>`;
      })()}
      <div class="dp-header-right">
        <div class="dp-meta-block dp-meta-box">
          <div class="dp-meta-ref">${esc(formatRef(d.ref, "devis"))}</div>
          <div class="dp-meta-row"><span class="lbl">Émission</span><strong>${dateFR(d.dateEmission) || "—"}</strong></div>
          ${(() => {
            // La date concrète est calculée à partir de la durée saisie. Si on n'a pas (encore)
            // de date d'émission, fallback sur la mention "valable N jours".
            const days = Math.max(1, parseInt(d.dureeValidite) || 30);
            const endIso = validityDate(d.dateEmission, days);
            if (endIso) {
              return `<div class="dp-meta-row"><span class="lbl">Valable jusqu'au</span><strong>${esc(dateFR(endIso))}</strong></div>`;
            }
            return `<div class="dp-validity-mention">${esc(validityText(d.dateEmission, days))}</div>`;
          })()}
        </div>
        <div class="dp-client-block dp-client-box">
          <div class="dp-client-label">Destinataire</div>
          <span class="name">${esc(cli.name || "(Sélectionner un client)")}</span>
          ${(() => {
            // Resolve current contact from contactId if any
            let pickedContact = null;
            if (S.mission.client.contactId && Array.isArray(cli.contacts)) {
              pickedContact = cli.contacts.find(c => c.id === S.mission.client.contactId);
            }
            // If no pick yet but client has contacts, use first non-empty
            if (!pickedContact && Array.isArray(cli.contacts)) {
              pickedContact = cli.contacts.find(c => c.name || c.phone || c.email) || cli.contacts[0];
            }
            const contactName = pickedContact ? pickedContact.name : (S.mission.client.contactSelected || (cli.contact || "").split(/[\n,;\/]+/)[0].trim());
            const contactPhone = pickedContact ? pickedContact.phone : (S.mission.client.phoneSelected || (cli.phone || "").split(/[\n,;\/]+/)[0].trim());
            const contactEmail = pickedContact ? pickedContact.email : (S.mission.client.emailSelected || (cli.email || "").split(/[\n,;\/]+/)[0].trim());
            return `
              ${contactName ? `<div>${esc(contactName)}</div>` : ""}
              ${cli.address ? `<div>${esc(cli.address)}</div>` : ""}
              ${cli.cityPostal ? `<div>${esc(cli.cityPostal)}</div>` : ""}
              ${contactEmail ? `<div>${esc(contactEmail)}</div>` : ""}
              ${contactPhone ? `<div>${esc(contactPhone)}</div>` : ""}
            `;
          })()}
        </div>
      </div>
    </div>

    ${(() => {
      // Priorité au texte libre saisi par l'utilisateur ; à défaut, libellé catalogue.
      const txt = (d.objectText || "").trim();
      const label = txt || (cat ? cat.l : "");
      return label ? `<div class="dp-objet">Objet : <strong>${esc(label)}</strong></div>` : "";
    })()}

    <div class="dp-section">
      ${linesHtml || `<div class="dp-empty" style="padding:14px">Aucune ligne pour l'instant.</div>`}
    </div>

    <div class="dp-totals">
      ${t.remise > 0 ? `
      <div class="dp-line"><span class="lbl">Sous-total</span><span class="amt">${fmt(t.subtotal)}</span></div>
      <div class="dp-line"><span class="lbl">Remise (${num(d.remisePct).toString().replace(".",",")} %)</span><span class="amt">−${fmt(t.remise)}</span></div>` : ""}
      <div class="dp-line grand"><span class="lbl">Total HT</span><span class="amt">${fmt(t.total)}</span></div>
      <div class="dp-totals-tva">${esc(tvaMention(S.identite))}</div>
    </div>

    ${(deboursHtml || t.debours > 0) ? `<div class="dp-debours-block">
      <div class="dp-debours-head">
        <span class="dp-debours-title">Débours</span>
        <span class="dp-debours-note">refacturés à l'identique sur justificatifs — art. 267-II-2° CGI, hors TVA</span>
      </div>
      ${deboursHtml || ""}
      <div class="dp-debours-total"><span class="lbl">Total débours</span><span class="amt">${fmt(t.debours)}</span></div>
    </div>` : ""}

    ${t.totalFactDirect > 0 ? `<div class="dp-fact-direct-block">
      <div class="dp-fact-direct-line">
        <span class="lbl">À régler directement au fournisseur</span>
        <span class="amt">${fmt(t.totalFactDirect)}</span>
      </div>
      <div class="dp-fact-direct-note">Hors devis — vous réglez ces frais directement auprès du prestataire concerné.</div>
    </div>` : ""}

    ${(() => {
      const p = d.paiement || {};
      const b = (S.identite && S.identite.bank) || {};
      const hasBank = !!(b.banque || b.iban || b.bic || b.titulaire);
      const legacy = (d.conditionsPaiement || "").trim();
      const hasEcheances = (t.echeances || []).length > 0;
      if (!hasBank && !legacy && !hasEcheances) return "";
      return `<div class="dp-payment-info">
        <h4>Modalités de paiement</h4>
        ${hasEcheances ? `<div class="dp-payment-block">
          ${(t.echeances || []).map(e => `<div class="dp-paiement-line">
            <span class="lbl">${esc(e.label)} <span class="pct">(${num(e.pct).toString().replace(".",",")} %)</span></span>
            <span class="amt">${fmt(e.amount)}</span>
          </div>`).join("")}
        </div>` : ""}
        ${p.delai ? `<div class="dp-paiement-line dp-delai"><span class="lbl">Délai de paiement</span><span class="amt">${esc(delaiPaiementLabel(p.delai))}</span></div>` : ""}
        ${hasBank ? `<div class="dp-payment-block dp-bank">
          ${b.banque ? `<div class="dp-bank-line"><span class="lbl">Banque</span><span class="val">${esc(b.banque)}</span></div>` : ""}
          ${b.titulaire ? `<div class="dp-bank-line"><span class="lbl">Titulaire</span><span class="val">${esc(b.titulaire)}</span></div>` : ""}
          ${b.iban ? `<div class="dp-bank-line iban"><span class="lbl">IBAN</span><span class="val">${esc(b.iban)}</span></div>` : ""}
          ${b.bic ? `<div class="dp-bank-line"><span class="lbl">BIC</span><span class="val">${esc(b.bic)}</span></div>` : ""}
        </div>` : ""}
        ${legacy && !hasBank ? `<div class="dp-payment-text">${richDisplayHtml(legacy)}</div>` : ""}
      </div>`;
    })()}

    <div class="dp-spacer"></div>

    <div class="dp-signature-row">
      ${(d.signatureBlock || "").trim()
        ? richDisplayHtml(d.signatureBlock)
        : `<div class="dp-sig-default">
            <div class="dp-sig-row"><span>Fait à</span><span class="dp-sig-line"></span><span>, le</span><span class="dp-sig-line short"></span><span>/</span><span class="dp-sig-line short"></span><span>/</span><span class="dp-sig-line short"></span></div>
            <div class="dp-sig-mention">Signature précédée de la mention « Bon pour accord »</div>
          </div>`}
    </div>

    ${retractationBlock(S.identite, d)}
    ${mediateurBlock(S.identite, (d.client || {}).type)}

    ${(() => {
      const cgvSections = Array.isArray(d.cgvSections) ? d.cgvSections.filter(s => s && (s.title || s.body)) : [];
      const hasCgv = cgvSections.length > 0 || (d.cgvPreambule || "").trim().length > 0;
      return hasCgv ? "" : `<div class="dp-cgv-fallback">Conditions générales de vente disponibles sur simple demande.</div>`;
    })()}


    ${(() => {
      const cgvSections = Array.isArray(d.cgvSections) ? d.cgvSections.filter(s => s && (s.title || s.body)) : [];
      const hasCgv = cgvSections.length > 0 || (d.cgvPreambule || "").trim().length > 0;
      if (!hasCgv) return "";
      // Mention pénalités L441-10 / D441-5 : obligatoire B2B uniquement.
      // Masquée si le client est explicitement B2C (mention sans fondement légal pour un particulier).
      const effType = (d.client || {}).type || (S.identite || {}).clienteleType || "mixte";
      const showPenalties = effType !== "b2c";
      const penaltyArticle = showPenalties
        ? `<p class="cgv-section cgv-penalty-mention"><strong class="cgv-section-title">Pénalités de retard et indemnité de recouvrement.</strong> Conformément aux articles L441-10 et D441-5 du Code de commerce, tout retard de paiement entraîne l'application de pénalités calculées à 3× le taux d'intérêt légal en vigueur, ainsi qu'une indemnité forfaitaire pour frais de recouvrement de 40 €.</p>`
        : "";
      return `<div class="devis-page-break"></div>
      <div class="dp-conditions cgv">
        <div class="dp-cgv-header">
          <span class="dp-cgv-title">Conditions générales de vente</span><span class="dp-cgv-sep"> — </span><span class="dp-cgv-ref">Annexe au ${esc(formatRef(d.ref, "devis"))}</span>
        </div>
        <div class="dp-cgv-body">${renderCgvSections(d.cgvPreambule, d.cgvSections)}${penaltyArticle}</div>
      </div>`;
    })()}

    <div class="dp-page-footer-preview" aria-hidden="true">
      <span class="lft">Original — ne tient pas lieu de facture</span>
      <span class="ctr">Photographe à Nantes — disponible partout en France</span>
      <span class="rgt">Page 1 / N</span>
    </div>
  </div>`;
}

// ============ DÉBOURS PREVIEW ============
// ▼ rDeboursPreview — preview feuille débours
function rDeboursPreview() {
  const d = S.mission;
  const t = totals();

  // Collecte les items en fact-direct côté débours (le client paie directement le fournisseur).
  // Ils ne comptent pas dans `t.debours` mais sont listés à part pour informer le client.
  const factDirectItems = [];
  const deplPmt = d.deplacement.paiementType || "acompte";
  const deplIsDebours = (d.deplacement.devis || "principal") === "debours";
  if (deplIsDebours && t.depl > 0 && deplPmt === "fact-direct") {
    factDirectItems.push({ intitule: "Déplacement", description: "Trajet payé directement par le client", prix: t.depl });
  }
  for (const l of (d.lignes || [])) {
    if (l.type !== "materiel" || l.devis !== "debours") continue;
    if (l.paiementType !== "fact-direct") continue;
    const p = num(l.prix);
    if (p === 0 && !l.intitule && !l.description) continue;
    factDirectItems.push({ intitule: l.intitule, description: l.description, prix: p });
  }
  const totalFactDirectDebours = factDirectItems.reduce((s, x) => s + num(x.prix), 0);

  // Cas vide : ni débours refacturés, ni items fact-direct.
  if (t.debours <= 0 && factDirectItems.length === 0) {
    return `<div class="devis-preview"><div class="dp-empty">Pas de frais débours sur ce devis.<br><span style="font-size:13px;color:var(--text-dim)">Ajoutez du matériel en mode « Débours » dans Description prestation, ou choisissez « Débours » pour le déplacement.</span></div></div>`;
  }

  const sel = d.client.id ? S.clients.entries.find(x => x.id === d.client.id) : null;
  const cli = sel || d.client;
  const ref = formatRef(d.ref, "debours");
  const cat = (S.tarifs.catalog || DEFAULT_CATALOG).find(c => c.k === d.object);

  // Build débours items — same numbered layout as devis principal.
  // Les fact-direct sont listés séparément après le bloc Total à rembourser.
  let linesHtml = "";
  let lineNum = 0;
  // Déplacement débours line (refacturé)
  if (deplIsDebours && t.depl > 0 && deplPmt !== "fact-direct") {
    lineNum++;
    linesHtml += `<div class="dp-line">
      <div class="num">${lineNum}.</div>
      <div class="lbl">Déplacement</div>
      <div class="qty"></div>
      <div class="amt">${fmt(t.depl)}</div>
    </div>`;
  }
  // Materiel débours lines (refacturés)
  for (const l of (d.lignes || [])) {
    if (l.type !== "materiel" || l.devis !== "debours") continue;
    if (l.paiementType === "fact-direct") continue;
    const p = num(l.prix);
    if (p === 0 && !l.intitule && !l.description) continue;
    lineNum++;
    const justifBadge = l.justificatifJoint
      ? `<span class="dp-justif-badge">✓ Justificatif joint</span>`
      : `<span class="dp-justif-badge dp-justif-pending">Justificatif à fournir</span>`;
    linesHtml += `<div class="dp-line">
      <div class="num">${lineNum}.</div>
      <div class="lbl">${esc(l.intitule || "(Sans intitulé)")}<div class="desc">${l.description ? esc(l.description) : "Frais débours"} · ${justifBadge}</div></div>
      <div class="qty"></div>
      <div class="amt">${fmt(num(l.prix))}</div>
    </div>`;
  }

  // Bloc "À régler directement au fournisseur" — items fact-direct côté débours.
  // Réutilise la charte .dp-debours-block (cohérente avec le bloc Débours du devis principal).
  let factDirectHtml = "";
  if (factDirectItems.length > 0) {
    factDirectHtml = `<div class="dp-debours-block">
      <div class="dp-debours-head">
        <span class="dp-debours-title">À régler directement au fournisseur</span>
        <span class="dp-debours-note">hors refacturation — le client règle directement le prestataire concerné</span>
      </div>
      ${factDirectItems.map((it, i) => `<div class="dp-line">
        <div class="lbl">${esc(it.intitule || "(Sans intitulé)")}${it.description ? `<div class="desc">${esc(it.description)}</div>` : ""}</div>
        <div class="amt">${fmt(num(it.prix))}</div>
      </div>`).join("")}
      <div class="dp-debours-total"><span class="lbl">Total à régler directement</span><span class="amt">${fmt(totalFactDirectDebours)}</span></div>
    </div>`;
  }

  return `<div class="devis-preview" id="deboursPreview">
    <div class="dp-top-row">
      ${d.logoUrl ? `<div class="dp-logo-wrap"><img src="${esc(d.logoUrl)}" alt="Logo" class="dp-logo"></div>` : `<div class="dp-logo-spacer"></div>`}
    </div>
    <div class="dp-header-grid">
      ${(() => {
        const inner = genHeaderEmetteur(S.identite, d.photographe);
        if (inner.trim()) return `<div class="dp-header-left">${inner}</div>`;
        return `<div class="dp-header-left empty">Renseigner ton identité dans l'onglet « Profil ».</div>`;
      })()}
      <div class="dp-header-right">
        <div class="dp-meta-block dp-meta-box">
          <div class="dp-meta-ref">${esc(ref)}</div>
          <div class="dp-meta-row"><span class="lbl">Émission</span><strong>${dateFR(d.dateEmission) || "—"}</strong></div>
          <div class="dp-validity-mention">Document à conserver avec les justificatifs.</div>
        </div>
        <div class="dp-client-block dp-client-box">
          <div class="dp-client-label">Destinataire</div>
          <span class="name">${esc(cli.name || "(Sélectionner un client)")}</span>
          ${(() => {
            let pickedContact = null;
            if (S.mission.client.contactId && Array.isArray(cli.contacts)) {
              pickedContact = cli.contacts.find(c => c.id === S.mission.client.contactId);
            }
            if (!pickedContact && Array.isArray(cli.contacts)) {
              pickedContact = cli.contacts.find(c => c.name || c.phone || c.email) || cli.contacts[0];
            }
            const contactName = pickedContact ? pickedContact.name : (S.mission.client.contactSelected || (cli.contact || "").split(/[\n,;\/]+/)[0].trim());
            const contactPhone = pickedContact ? pickedContact.phone : (S.mission.client.phoneSelected || (cli.phone || "").split(/[\n,;\/]+/)[0].trim());
            const contactEmail = pickedContact ? pickedContact.email : (S.mission.client.emailSelected || (cli.email || "").split(/[\n,;\/]+/)[0].trim());
            return `
              ${contactName ? `<div>${esc(contactName)}</div>` : ""}
              ${cli.address ? `<div>${esc(cli.address)}</div>` : ""}
              ${cli.cityPostal ? `<div>${esc(cli.cityPostal)}</div>` : ""}
              ${contactEmail ? `<div>${esc(contactEmail)}</div>` : ""}
              ${contactPhone ? `<div>${esc(contactPhone)}</div>` : ""}
            `;
          })()}
        </div>
      </div>
    </div>

    ${cat ? `<div class="dp-objet">Objet : <strong>${esc((d.objectText || "").trim() || cat.l)}</strong></div>` : ""}

    ${t.debours > 0 ? `<div class="dp-section">
      ${linesHtml}
    </div>

    <div class="dp-totals">
      <div class="dp-line grand"><span class="lbl">Total à rembourser</span><span class="amt">${fmt(t.debours)}</span></div>
      <div class="dp-totals-tva">Refacturation au centime près sur justificatifs · ${esc(tvaMention(S.identite))}</div>
    </div>` : ""}

    ${factDirectHtml}

    ${(() => {
      const b = (S.identite && S.identite.bank) || {};
      const hasBank = !!(b.banque || b.iban || b.bic || b.titulaire);
      if (!hasBank) return "";
      return `<div class="dp-payment-info">
