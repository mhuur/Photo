<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🌊 Devis Photo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a1628;--bg-2:#0f2240;--bg-3:#06101d;
    --surface:#122a4d;--surface-2:#1a3a66;--surface-hi:#224a7a;
    --border:#224a7a;--border-light:#2c5a92;--border-soft:#1a3a66;
    --text:#e8f0fb;--text-muted:#8fa8c9;--text-dim:#5e7a9c;
    --primary:#4a9eff;--primary-dark:#2b7ad9;--primary-soft:rgba(74,158,255,.12);
    --accent:#5eead4;
    --success:#22c55e;--success-dark:#16a34a;--success-soft:rgba(34,197,94,.14);
    --danger:#ef4444;--danger-dark:#dc2626;--danger-soft:rgba(239,68,68,.14);
    --warning:#f59e0b;--warning-dark:#d97706;--warning-soft:rgba(245,158,11,.12);
    --shadow:0 4px 20px rgba(0,0,0,.4);--shadow-sm:0 1px 3px rgba(0,0,0,.3);
    --input-h:34px;
  }
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-track{background:var(--bg-3)}
  ::-webkit-scrollbar-thumb{background:var(--surface-hi);border-radius:4px}
  ::-webkit-scrollbar-thumb:hover{background:var(--border-light)}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Inter',system-ui,-apple-system,sans-serif;background:linear-gradient(180deg,var(--bg) 0%,var(--bg-3) 100%);background-attachment:fixed;color:var(--text);font-variant-numeric:tabular-nums}
  #app{display:flex;min-height:100vh}
  .sb{width:220px;background:var(--bg-2);color:var(--text);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0;z-index:100}
  .sb h1{font-size:13px;padding:18px 16px 10px;margin:0;color:var(--accent);letter-spacing:.05em;text-transform:uppercase;font-weight:700}
  .sb button.tab{display:block;width:100%;background:none;border:0;color:inherit;padding:10px 16px;text-align:left;cursor:pointer;font:inherit;font-size:13px}
  .sb button.tab:hover{background:var(--surface)}
  .sb button.tab.active{background:var(--surface);color:#fff;border-left:3px solid var(--primary);padding-left:13px}
  .sb .user{margin-top:auto;padding:12px 16px;font-size:13px;color:var(--text-muted);border-top:1px solid var(--border)}
  .sb .user a{color:inherit}
  main{flex:1;padding:24px 32px;max-width:1100px;position:relative}
  h2{margin-top:0}
  h3{margin-top:24px;margin-bottom:8px;font-size:13px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);padding-bottom:4px}
  .row{display:flex;gap:14px;margin-bottom:14px;flex-wrap:wrap}
  .row-section-break{margin-top:8px}
  /* Edit accordion (Édition du devis section) — collapsible groups */
  .edit-accordion-list{display:flex;flex-direction:column;gap:8px;margin-top:6px;margin-bottom:18px;max-width:880px}
  .edit-section{background:var(--surface-2);border:1px solid var(--border-soft);border-radius:8px;overflow:hidden;transition:border-color .15s}
  .edit-section.open{border-color:var(--border-light)}
  .edit-section-header{width:100%;display:flex;align-items:center;gap:10px;padding:10px 14px;background:transparent;border:0;color:var(--text);font:inherit;font-size:13px;font-weight:600;cursor:pointer;text-align:left;transition:background .12s}
  .edit-section-header:hover{background:rgba(255,255,255,.03)}
  .edit-section-header:focus{outline:none;background:rgba(255,255,255,.04)}
  .edit-section-chevron{font-size:11px;color:var(--text-muted);transition:transform .18s ease;flex-shrink:0;width:14px;display:inline-flex;align-items:center;justify-content:center}
  .edit-section.open .edit-section-chevron{transform:rotate(90deg);color:var(--primary)}
  .edit-section-title{flex:1;letter-spacing:.01em}
  .edit-section-action{margin-left:auto;padding:5px 12px;font-size:11px;font-weight:500;letter-spacing:0;text-transform:none;flex-shrink:0}
  .edit-section-body{padding:4px 14px 14px;border-top:1px solid var(--border-soft);background:var(--surface)}
  .edit-section-body[hidden]{display:none}
  .edit-section-body > h4:first-child{margin-top:8px}
  .field{display:flex;flex-direction:column;flex:1;min-width:160px}
  .field.sm{max-width:140px}
  .field label{font-size:13px;color:var(--text-muted);margin-bottom:4px}
  .field input:not([type="checkbox"]):not([type="radio"]),.field select{height:var(--input-h)}
  .field input,.field textarea,.field select{padding:8px 10px;border:1px solid transparent;border-radius:6px;font:inherit;background:var(--surface-2);color:var(--text);transition:border-color .12s,box-shadow .12s;font-variant-numeric:tabular-nums}
  .field input:hover,.field textarea:hover,.field select:hover{border-color:var(--border-light)}
  .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  .field textarea{min-height:60px;resize:vertical}
  .btn{background:var(--primary);color:#fff;border:0;padding:10px 16px;border-radius:6px;cursor:pointer;font:inherit;font-weight:500;transition:all .15s}
  .btn:hover{background:var(--primary-dark);box-shadow:0 2px 8px rgba(74,158,255,.3)}
  .btn.ghost{background:var(--surface);color:var(--text);border:1px solid var(--border-light)}
  .btn.ghost:hover{background:var(--surface-2);border-color:var(--primary)}
  .login{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:20px;background:linear-gradient(180deg,var(--bg) 0%,var(--bg-3) 100%)}
  .login h1{font-size:32px;font-weight:700;letter-spacing:-.02em;background:linear-gradient(135deg,var(--primary) 0%,var(--accent) 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin:0}
  .login .btn{padding:12px 22px;font-size:13px;font-weight:600;box-shadow:0 4px 14px rgba(74,158,255,.35)}
  .saved{font-size:13px;color:var(--success);margin-left:12px;font-weight:normal}
  .empty{background:transparent;border:1px solid var(--border-soft);border-radius:6px;padding:20px;text-align:center;color:var(--text-dim);font-size:13px}
  .totals{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 18px;margin-top:24px;box-shadow:var(--shadow-sm)}
  .totals .line{display:flex;justify-content:space-between;padding:5px 0;font-size:13px}
  .totals .line.total{border-top:1px solid var(--border);margin-top:6px;padding-top:10px;font-weight:600;font-size:15px;color:var(--primary)}
  .totals .line.muted{color:var(--text-muted);font-size:13px}
  .hint{font-size:13px;color:var(--text-dim);margin:-4px 0 8px}
  table.hist{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-top:8px;font-size:13px;box-shadow:var(--shadow-sm)}
  table.hist th{background:var(--surface-2);text-align:left;padding:10px 12px;font-size:13px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);font-weight:600}
  table.hist td{padding:6px 8px;border-bottom:1px solid var(--border-soft);vertical-align:middle}
  table.hist tr:last-child td{border-bottom:0}
  table.hist input,table.hist select{width:100%;padding:6px 8px;border:1px solid transparent;border-radius:4px;font:inherit;font-size:13px;background:transparent;color:var(--text)}
  table.hist input:hover,table.hist select:hover{border-color:var(--border)}
  table.hist input:focus,table.hist select:focus{outline:none;border-color:var(--primary);background:var(--surface-2)}
  table.hist td.amount input{text-align:right;font-variant-numeric:tabular-nums}
  table.hist td.actions{text-align:center;width:36px}
  table.hist td.actions button{background:none;border:0;color:var(--text-dim);cursor:pointer;font-size:15px;padding:4px 6px;border-radius:4px}
  table.hist td.actions button:hover{background:var(--danger-soft);color:var(--danger)}
  table.hist tfoot td{padding:10px 12px;border-top:1px solid var(--border);background:var(--surface-2);font-weight:600;font-size:13px;text-align:right;font-variant-numeric:tabular-nums;color:var(--text)}
  table.hist tfoot td:first-child{text-align:left}
  table.hist tfoot tr.grandtotal td{background:var(--surface-hi);font-size:15px;border-top:2px solid var(--primary);color:var(--primary)}
  table.hist tbody tr.subtotal td{padding:8px 12px;background:var(--surface-2);font-weight:600;font-size:13px;border-top:1px solid var(--border);text-align:right;font-variant-numeric:tabular-nums;color:var(--text-muted)}
  table.hist tbody tr.subtotal td:first-child{text-align:left}
  td.statut{text-align:center}
  .pst{display:inline-block;width:12px;height:12px;border-radius:50%;vertical-align:middle;flex-shrink:0}
  .pst[data-s="envoye"]{background:var(--primary);box-shadow:0 0 6px rgba(74,158,255,.5)}
  .pst[data-s="accepte"]{background:var(--success);box-shadow:0 0 6px rgba(34,197,94,.5)}
  .pst[data-s="attente"]{background:var(--warning);box-shadow:0 0 6px rgba(245,158,11,.5)}
  .pst[data-s="termine"]{background:var(--text-dim)}
  .pst[data-s="refuse"]{background:var(--danger);box-shadow:0 0 6px rgba(239,68,68,.5)}
  .legend{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin:6px 0 10px;padding:6px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text-muted)}
  .legend .item{display:flex;align-items:center;gap:6px}
  .legend-btn{background:transparent;border:1px solid transparent;color:var(--text-muted);padding:6px 12px;border-radius:6px;cursor:pointer;font:inherit;font-size:13px;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
  .legend-btn:hover{background:var(--surface-2);color:var(--text)}
  .legend-btn.on{background:var(--surface-hi);color:var(--text);border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-soft)}
  .legend-btn .all-icon{color:var(--primary);font-size:13px}
  /* Suivi: filter chips bar (multi-select pastilles, persisted) */
  .suv-chip-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:6px 0 14px}
  .suv-chip{background:var(--surface-2);border:1px solid var(--border-soft);color:var(--text-muted);padding:5px 12px;border-radius:999px;cursor:pointer;font:inherit;font-size:12.5px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:7px;line-height:1.2;letter-spacing:.01em}
  .suv-chip:hover{border-color:var(--border-light);color:var(--text);background:var(--surface)}
  .suv-chip.on{background:var(--primary-soft);border-color:var(--primary);color:var(--text);box-shadow:0 0 0 1px var(--primary) inset}
  .suv-chip-all{padding-left:12px}
  .suv-chip-all.on{background:var(--surface-hi);box-shadow:0 0 0 1px var(--text-muted) inset}
  .suv-chip-icon{color:var(--primary);font-size:11px;line-height:1}
  .suv-chip .pst{flex-shrink:0}
  /* Suivi: nowrap on ref + client cells */
  td.suv-nowrap{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:280px}
  table.hist th.sortable{cursor:pointer;user-select:none;white-space:nowrap}
  table.hist th.sortable:hover{background:var(--surface-hi)}
  table.hist th .arr{font-size:13px;opacity:.3;margin-left:4px}
  table.hist th .arr.on{opacity:1;color:var(--primary)}
  table.hist tr.suv-row{cursor:pointer}
  table.hist tr.suv-row:hover td{background:var(--surface-2)}
  table.hist tr.suv-row.expanded td{background:var(--primary-soft)}
  table.hist tr.suv-row td{padding:9px 12px;font-size:13px}
  table.hist tr.suv-row td.amt{text-align:right;font-variant-numeric:tabular-nums}
  table.hist td.cb,table.hist th:first-child{text-align:center;width:34px;padding:6px 4px}
  table.hist td.cb input,table.hist th input[type="checkbox"]{cursor:pointer;width:16px;height:16px}
  table.hist tr.suv-detail td{background:transparent;padding:0;border-bottom:0}
  table.hist tr.suv-row.clickable{cursor:pointer}
  table.hist tr.suv-multi td{font-weight:500}
  .suv-caret{display:inline-block;color:var(--text-dim);font-size:13px;margin-right:2px}
  table.hist tbody.devis-grp{border-bottom:1px solid var(--border);transition:background .12s ease, box-shadow .12s ease}
  table.hist tbody.devis-grp:last-child{border-bottom:0}
  table.hist tbody.devis-grp tr td{background:var(--surface)}
  table.hist tbody.devis-grp:hover tr.suv-row td{background:var(--surface-2)}
  table.hist tbody.devis-grp.expanded{box-shadow:inset 4px 0 0 var(--primary)}
  table.hist tbody.devis-grp.expanded tr.suv-row td,
  table.hist tbody.devis-grp.expanded tr.suv-sub td,
  table.hist tbody.devis-grp.expanded tr.suv-detail td{background:var(--primary-soft)}
  table.hist tbody.devis-grp.editing{box-shadow:inset 4px 0 0 var(--warning)}
  table.hist tbody.devis-grp.editing tr.suv-row td,
  table.hist tbody.devis-grp.editing tr.suv-detail td{background:var(--warning-soft)}
  table.hist tbody.devis-grp.sel:not(.editing):not(.expanded){box-shadow:inset 4px 0 0 var(--warning)}
  table.hist tbody.devis-grp.sel tr.suv-row td{background:var(--warning-soft)}
  table.hist tbody.devis-grp.sel.expanded tr.suv-row td{background:rgba(245,158,11,.18)}
  table.hist tr.suv-sub td{padding:6px 12px;font-size:13px;color:var(--text-muted);border-bottom:0}
  table.hist tr.suv-sub td.statut{padding-left:30px}
  table.hist tr.suv-sub td.sub-lib{color:var(--text);font-style:italic}
  table.hist tr.suv-sub td.amt{color:var(--text);padding-right:12px}
  table.hist tr.suv-row td.amt,table.hist tr.suv-sub td.amt{font-variant-numeric:tabular-nums;text-align:right;padding-right:12px}
  table.hist td.actions:has(.suv-row-actions){text-align:right;width:auto;min-width:200px;padding:4px 8px}
  .suv-row-actions{display:inline-flex;gap:8px;align-items:center;justify-content:flex-end;opacity:0;transition:opacity .12s ease;pointer-events:none}
  table.hist tbody.devis-grp.expanded .suv-row-actions,
  table.hist tbody.devis-grp.editing .suv-row-actions{opacity:1;pointer-events:auto}
  table.hist tr.suv-detail .suv-row-actions{opacity:1;pointer-events:auto}

  /* Wrapper: paid-toggle (always visible) + suv-row-actions (hidden until hover) sit side by side */
  .actions-cell{display:inline-flex;gap:8px;align-items:center;justify-content:flex-end;width:100%}

  /* Paid toggle pill (Suivi: marquer une échéance comme payée) — always visible */
  .paid-toggle{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:11px;background:var(--surface-2);border:1px solid var(--border);color:var(--text-muted);font-size:11px;font-weight:600;cursor:pointer;user-select:none;transition:background .12s,color .12s,border-color .12s;line-height:1;white-space:nowrap;flex-shrink:0}
  .paid-toggle input[type=checkbox]{display:none}
  .paid-toggle:hover{background:var(--surface);color:var(--text);border-color:var(--border-light)}
  .paid-toggle.on{background:var(--success-soft);border-color:var(--success);color:var(--success)}

  /* ========================================================================
     SUIVI v2 — palette violette pour "En cours", badge attente paiement,
     divider de filtres, timeline modale.
     ======================================================================== */
  :root{
    --violet:#a78bfa; --violet-dark:#8b5cf6;
    --violet-soft:rgba(167,139,250,.14);
  }
  /* Pill « en cours » (mix accepté/livré/payé sur les lignes du devis) */
  .pst[data-s="en_cours"]{background:var(--violet);box-shadow:0 0 6px rgba(167,139,250,.5)}

  /* Badge orange transversal « Paiement en attente » */
  .pmt-badge{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:11px;
    background:var(--warning-soft);border:1px solid var(--warning);color:var(--warning);
    font-size:11px;font-weight:600;line-height:1.4;white-space:nowrap;letter-spacing:.01em}

  /* Filter bar : chip orange séparé visuellement par un divider vertical */
  .suv-chip-divider{display:inline-block;width:1px;height:20px;background:var(--border-light);margin:0 8px;align-self:center}
  .suv-chip-attente{color:var(--warning);border-color:rgba(245,158,11,.35)}
  .suv-chip-attente:hover{color:var(--warning);border-color:var(--warning);background:rgba(245,158,11,.06)}
  .suv-chip-attente.on{background:var(--warning-soft);border-color:var(--warning);color:var(--warning);
    box-shadow:0 0 0 1px var(--warning) inset}

  /* Quick print actions, toujours visibles à droite de chaque ligne */
  .suv-quick-actions{display:inline-flex;gap:4px;align-items:center}
  .suv-quick-actions .qa-btn{background:transparent;border:1px solid transparent;color:var(--text-muted);
    padding:5px 9px;border-radius:6px;cursor:pointer;font:inherit;font-size:11px;font-weight:500;
    display:inline-flex;align-items:center;gap:4px;transition:all .12s;line-height:1.2}
  .suv-quick-actions .qa-btn:hover{background:var(--surface-hi);color:var(--text);border-color:var(--border-light)}
  .suv-quick-actions .qa-btn .qa-ico{font-size:13px}

  /* Timeline modal */
  .modal-card.modal-card-timeline{max-width:680px}
  .suv-tl-header{display:flex;flex-direction:column;gap:4px;padding-bottom:14px;border-bottom:1px solid var(--border);margin-bottom:6px}
  .suv-tl-header-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .suv-tl-ref{font-size:13px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;letter-spacing:.01em}
  .suv-tl-meta{display:flex;gap:14px;font-size:12px;color:var(--text-muted);flex-wrap:wrap;margin-top:4px}
  .suv-tl-meta strong{color:var(--text);font-weight:600;font-variant-numeric:tabular-nums}
  .suv-tl{display:flex;flex-direction:column;padding:10px 4px 6px;position:relative}
  .suv-tl::before{content:"";position:absolute;left:18px;top:24px;bottom:24px;width:2px;background:var(--border-soft);z-index:0}
  .suv-tl-step{display:grid;grid-template-columns:36px 1fr auto;gap:14px;align-items:center;padding:10px 0;position:relative;z-index:1}
  .suv-tl-dot{width:36px;height:36px;border-radius:50%;background:var(--surface-2);border:2px solid var(--border-light);
    display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text-dim);
    transition:all .2s;flex-shrink:0}
  .suv-tl-dot.done{background:var(--success-soft);border-color:var(--success);color:var(--success)}
  .suv-tl-dot.waiting{background:var(--warning-soft);border-color:var(--warning);color:var(--warning)}
  .suv-tl-dot.refused{background:var(--danger-soft);border-color:var(--danger);color:var(--danger)}
  .suv-tl-body{display:flex;flex-direction:column;gap:4px;min-width:0}
  .suv-tl-title{font-size:13px;font-weight:600;color:var(--text)}
  .suv-tl-flags{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .suv-tl-flag{display:inline-flex;align-items:center;gap:4px;padding:1px 7px;border-radius:8px;
    font-size:10px;font-weight:600;letter-spacing:.02em;text-transform:uppercase;line-height:1.5;
    border:1px solid;background:transparent}
  .suv-tl-flag.delivered{color:var(--success);border-color:rgba(34,197,94,.35);background:var(--success-soft)}
  .suv-tl-flag.paid{color:var(--success-dark);border-color:var(--success);background:var(--success-soft)}
  .suv-tl-flag.pending{color:var(--warning);border-color:var(--warning);background:var(--warning-soft)}
  .suv-tl-flag.idle{color:var(--text-dim);border-color:var(--border);background:transparent}
  .suv-tl-amount{font-weight:700;font-variant-numeric:tabular-nums;color:var(--text);font-size:13px;text-align:right;white-space:nowrap}
  .suv-tl-actions{grid-column:2 / 4;display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
  .suv-tl-empty{padding:24px;text-align:center;color:var(--text-dim);font-size:13px}
  .suv-tl-footer{display:flex;justify-content:space-between;align-items:center;gap:10px;
    padding-top:12px;margin-top:6px;border-top:1px solid var(--border);flex-wrap:wrap}
  .suv-tl-footer .left{display:flex;gap:6px;flex-wrap:wrap}

  /* État vide spécifique au filtre attente paiement */
  .empty-attente{border-color:var(--warning);background:rgba(245,158,11,.04);color:var(--text-muted)}

  .btn.btn-rouge{background:var(--danger);color:#fff}.btn.btn-rouge:hover{background:var(--danger-dark);box-shadow:0 2px 8px rgba(239,68,68,.3)}
  .btn.btn-gris{background:var(--text-dim);color:#fff}.btn.btn-gris:hover{background:var(--text-muted)}
  .btn.btn-bleu{background:var(--primary);color:#fff}.btn.btn-bleu:hover{background:var(--primary-dark)}
  .btn.btn-icon{background:transparent;border:0;min-width:0;padding:3px 5px;font-size:15px;font-weight:600;line-height:1;border-radius:3px;color:var(--text-muted)}
  .btn.btn-icon:hover{background:rgba(255,255,255,.08);color:var(--text)}
  .btn.btn-icon.btn-vert{background:transparent;color:var(--success)}
  .btn.btn-icon.btn-vert:hover{background:var(--success-soft);color:var(--success)}
  .btn.btn-icon.btn-rouge{background:transparent;color:var(--danger)}
  .btn.btn-icon.btn-rouge:hover{background:var(--danger-soft);color:var(--danger)}
  .btn.btn-icon.btn-bleu{background:transparent;color:var(--primary)}
  .btn.btn-icon.btn-bleu:hover{background:var(--primary-soft);color:var(--primary)}
  .btn.btn-icon.ghost{background:transparent;border:0;color:var(--text-dim)}
  .btn.btn-icon.ghost:hover{background:rgba(255,255,255,.08);color:var(--text)}
  .btn-act{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;border:0;font-size:13px;font-weight:600;color:#fff;cursor:pointer;line-height:1;white-space:nowrap;font-family:inherit;box-shadow:0 1px 2px rgba(0,0,0,.08)}
  .btn-act .ico{font-size:13px;font-weight:700;line-height:1}
  .btn-act.act-vert{background:var(--success)}
  .btn-act.act-vert:hover{background:var(--success-dark);box-shadow:0 2px 6px rgba(34,197,94,.4)}
  .btn-act.act-rouge{background:var(--danger)}
  .btn-act.act-rouge:hover{background:var(--danger-dark);box-shadow:0 2px 6px rgba(239,68,68,.4)}
  .ico-btn{background:transparent;color:var(--text-dim);border:0;border-radius:3px;padding:3px 5px;cursor:pointer;font-size:15px;line-height:1;font-weight:600;min-width:0}
  .ico-btn:hover{background:rgba(255,255,255,.08);color:var(--text)}
  .ico-btn[title*="Supprimer"]:hover{background:var(--danger-soft);color:var(--danger)}
  td.ref-cell{color:var(--text);font-variant-numeric:tabular-nums}
  td.ref-cell .muted{color:var(--text-dim)}
  .suv-panel{padding:12px 16px}
  .suv-actions{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);align-items:center}
  .suv-compact-row{display:flex;gap:6px;flex-wrap:wrap;align-items:flex-end;margin-bottom:8px}
  .suv-compact-row label{display:flex;flex-direction:column;font-size:13px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.03em;flex:0 0 auto}
  .suv-compact-row label span{margin-bottom:2px}
  .suv-compact-row label input,.suv-compact-row label .ro,.suv-compact-row label textarea{padding:4px 6px;border:1px solid var(--border-light);border-radius:4px;font:inherit;font-size:13px;color:var(--text);background:var(--surface-2);width:80px}
  .suv-compact-row label .ro{background:var(--bg-2);color:var(--text-muted);font-variant-numeric:tabular-nums}
  .suv-compact-row label.lib{flex:1;min-width:160px}
  .suv-compact-row label.lib input{width:100%}
  .suv-compact-row label.wide{flex:1}
  .suv-compact-row label.wide textarea{width:100%;min-height:48px;resize:vertical}
  .suv-compact-row label input:focus,.suv-compact-row label textarea:focus{outline:none;border-color:var(--primary)}
  .filter-group{display:flex;gap:6px;align-items:center}
  .filter-group label{font-size:13px;color:var(--text-muted)}
  .filter-group select{padding:8px 10px;border:1px solid var(--border-light);border-radius:6px;font:inherit;background:var(--surface);color:var(--text);cursor:pointer}
  .filter-group select:focus{outline:none;border-color:var(--primary)}
  .toolbar{display:flex;gap:8px;align-items:center;margin:14px 0 4px;flex-wrap:wrap}
  .toolbar .spacer{flex:1}
  .toolbar .search{flex:1;min-width:200px;max-width:340px;padding:8px 12px;border:1px solid var(--border-light);border-radius:6px;font:inherit;background:var(--surface);color:var(--text)}
  .toolbar .search:focus{outline:none;border-color:var(--primary)}
  table.hist tr.cli-row.clickable{cursor:pointer}
  table.hist tr.cli-row.clickable:hover td{background:var(--surface-2)}
  table.hist tr.cli-row.clickable.expanded td{background:var(--primary-soft)}
  table.hist tr.cli-detail td{background:var(--surface-2);padding:0;border-bottom:1px solid var(--border)}
  .cli-panel{padding:14px 18px}
  .cli-info{display:flex;gap:14px;padding:4px 0;font-size:13px}
  .cli-label{min-width:130px;color:var(--text-muted);font-size:13px;text-transform:uppercase;letter-spacing:.04em;align-self:center}
  .cli-actions{display:flex;gap:8px;margin-top:12px}
  .stats{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 4px}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--text-muted);min-width:120px;box-shadow:var(--shadow-sm)}
  .stat strong{display:block;font-size:15px;color:var(--text);font-weight:600;margin-top:2px;font-variant-numeric:tabular-nums}
  .seg{display:inline-flex;align-items:center;background:var(--surface-2);border:1px solid transparent;border-radius:8px;padding:3px;gap:2px;align-self:flex-start;height:var(--input-h);box-sizing:border-box;transition:border-color .12s}
  .seg:hover{border-color:var(--border-light)}
  .seg button{background:transparent;border:0;padding:0 14px;height:100%;border-radius:5px;color:var(--text-muted);cursor:pointer;font:inherit;font-size:13px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
  .seg button:hover{color:var(--text)}
  .seg button.on{background:var(--primary);color:#fff;box-shadow:0 1px 3px rgba(74,158,255,.3)}
  .seg button.on.warn{background:var(--warning);box-shadow:0 1px 3px rgba(245,158,11,.3)}

  /* Smaller, capped fields */
  .field input,.field textarea,.field select{font-size:13px;padding:7px 10px}
  .field label{font-size:13px;letter-spacing:.02em}
  main h2{font-size:15px;font-weight:600;margin:0 0 4px;color:var(--text)}
  main h3{font-size:15px;font-weight:700;margin:32px 0 14px 0;color:var(--text);padding-bottom:4px;border-bottom:1px solid var(--border)}
  main h3:first-of-type{margin-top:6px}
  main h4{font-size:13px;font-weight:normal;margin-top:22px;margin-bottom:6px;color:var(--text-muted);text-transform:none;letter-spacing:.02em}
  .encadres-grp{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:14px}
  .encadres-grp > h4:first-of-type{margin-top:0}

  /* Prestation decomposition table — flat (option B), no card wrapper */
  .presta-decomp{background:transparent;border:0;border-radius:0;padding:0;margin:8px 0 16px 0;max-width:560px}
  .presta-decomp table{width:100%;border-collapse:collapse;font-size:13px}
  .presta-decomp th{text-align:right;padding:4px 8px;color:var(--text-muted);font-weight:600;font-size:13px;border-bottom:1px solid var(--border);text-transform:none;letter-spacing:0}

  /* Statut field with (i) info button + tooltip on hover/focus */
  .seg-with-info{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .tarif-info{position:relative;display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:var(--surface-2);border:1px solid var(--border-light);color:var(--text-muted);font-size:12px;font-weight:700;font-style:italic;cursor:help;user-select:none;flex-shrink:0;padding:0;font-family:inherit;transition:color .12s,background .12s,border-color .12s}
  .tarif-info:hover,.tarif-info:focus{outline:none;color:var(--primary);border-color:var(--primary);background:var(--primary-soft)}
  .tarif-tooltip{position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border-light);border-radius:8px;padding:14px 16px;box-shadow:var(--shadow);z-index:100;display:none;min-width:340px;text-align:left;font-style:normal;font-weight:normal;color:var(--text);cursor:default}
  .tarif-tooltip::before{content:"";position:absolute;top:-6px;left:50%;transform:translateX(-50%) rotate(45deg);width:10px;height:10px;background:var(--surface);border-left:1px solid var(--border-light);border-top:1px solid var(--border-light)}
  .tarif-tooltip .tt-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px}
  .tarif-info:hover .tarif-tooltip,.tarif-info:focus .tarif-tooltip,.tarif-info:focus-within .tarif-tooltip{display:block}
  .tarif-tooltip .presta-decomp{margin:0;max-width:none}

  /* Wider 3-button toggle */
  .seg.seg-3 button{padding:0 12px}

  /* Inline breakdown shown below "Temps de trajet" when "taux" mode active */
  .taux-breakdown{margin-top:12px;max-width:600px}
  .taux-breakdown-lbl{display:block;font-size:13px;color:var(--text-muted);margin-bottom:6px;letter-spacing:.02em}
  .taux-breakdown .presta-decomp{margin:0}
  .presta-decomp th.presta-final{color:var(--primary)}
  .presta-decomp td{text-align:right;padding:8px;font-variant-numeric:tabular-nums;font-size:15px;font-weight:600}
  .presta-decomp td.net.ok{color:var(--success)}
  .presta-decomp td.net.bad{color:var(--danger)}
  .presta-decomp td.muted{color:var(--text-muted);font-weight:500}
  .presta-decomp td.strike{color:var(--text-dim);text-decoration:line-through;font-weight:500}
  .presta-decomp td.presta-final{font-size:15px;font-weight:800}
  .presta-decomp td.presta-final.declared{color:var(--primary)}
  .presta-decomp td.presta-final.black{color:var(--warning)}
  .hint{font-size:13px;color:var(--text-dim);margin:-2px 0 6px}

  /* Cap field width so single-field rows don't span full main */
  .row .field{max-width:320px}
  .row .field.lg{max-width:520px}
  .row .field.xl{max-width:none}
  .row .field.narrow{max-width:160px}
  .row .field.tiny{max-width:90px}

  /* Client picker */
  .cli-pick{position:relative;max-width:320px}
  .cli-pick .selected{display:flex;align-items:center;gap:10px;height:var(--input-h);padding:0 12px;background:var(--surface-2);border:1px solid transparent;border-radius:6px;font-size:13px;transition:border-color .12s}
  .cli-pick .selected:hover{border-color:var(--border-light)}
  .cli-pick .selected .name{flex:1;color:var(--text);font-weight:500}
  .cli-pick .selected .num{color:var(--text-muted);font-size:13px;font-variant-numeric:tabular-nums}
  .cli-pick .selected .change{background:transparent;border:0;color:var(--primary);font-size:13px;cursor:pointer;padding:2px 6px;border-radius:4px}
  .cli-pick .selected .change:hover{background:var(--primary-soft)}
  .cli-search-wrap{position:relative}
  .cli-search-wrap .ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:13px;pointer-events:none;z-index:1}
  .cli-search-wrap input{width:100%;padding:9px 12px 9px 32px;border:1px solid transparent;border-radius:6px;background:var(--surface-2);color:var(--text);font:inherit;font-size:13px;transition:border-color .12s,box-shadow .12s,background .12s}
  .cli-search-wrap input:hover{border-color:var(--border-light)}
  .cli-search-wrap input:focus{outline:none;border-color:var(--primary);background:var(--surface);box-shadow:0 0 0 3px var(--primary-soft)}
  .cli-search-wrap input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  /* The dropdown is portaled to body and uses position:fixed - escapes ALL parent stacking contexts */
  #cliPickPortal{display:none;position:fixed;background:var(--surface-2);border:1px solid var(--primary);border-radius:6px;max-height:420px;overflow-y:auto;z-index:9999;box-shadow:0 12px 32px rgba(0,0,0,.6)}
  #cliPickPortal.open{display:block}
  #cliPickPortal .item{padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border-soft);font-size:13px;color:var(--text)}
  #cliPickPortal .item:last-child{border-bottom:0}
  #cliPickPortal .item:hover{background:var(--surface-hi)}
  #cliPickPortal .item .num{color:var(--text-muted);font-size:13px;margin-right:8px;font-variant-numeric:tabular-nums}
  #cliPickPortal .create{padding:9px 12px;cursor:pointer;color:var(--accent);background:var(--surface);font-size:13px;font-weight:500;border-top:1px solid var(--border)}
  #cliPickPortal .create:hover{background:var(--surface-hi)}
  #cliPickPortal .empty{padding:14px 12px;color:var(--text-dim);font-size:13px;font-style:italic}
  .cli-create-panel{margin-top:8px;padding:14px;background:var(--surface);border:1px solid var(--primary);border-radius:8px;max-width:520px}
  .cli-create-panel h4{margin:0 0 10px;font-size:13px;color:var(--accent);font-weight:600}
  .cli-create-panel .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .cli-create-panel .grid .full{grid-column:1/-1}
  .cli-create-panel .grid label{display:flex;flex-direction:column;font-size:13px;color:var(--text-muted);gap:3px}
  .cli-create-panel .grid label input{padding:7px 10px;border:1px solid var(--border-light);border-radius:5px;background:var(--surface-2);color:var(--text);font:inherit;font-size:13px}
  .cli-create-panel .grid label input:focus{outline:none;border-color:var(--primary)}
  .cli-create-panel .actions{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}

  /* Tarifs grid */
  .tarif-row{display:grid;grid-template-columns:1fr 110px 36px;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border-soft)}
  .tarif-row:last-child{border-bottom:0}
  .tarif-row .lbl{color:var(--text);font-size:13px;font-weight:500}
  .tarif-row input[type="text"]{background:transparent;border:1px solid transparent;border-radius:4px;padding:5px 7px;color:var(--text);font:inherit;font-size:13px;font-weight:500;width:100%}
  .tarif-row input[type="text"]:hover{border-color:var(--border)}
  .tarif-row input[type="text"]:focus{outline:none;border-color:var(--primary);background:var(--surface-2)}
  .tarif-row .rate{display:flex;align-items:center;gap:4px;background:var(--surface-2);border:1px solid var(--border-light);border-radius:5px;padding:0 8px}
  .tarif-row .rate input{flex:1;border:0;background:transparent;text-align:right;color:var(--text);font:inherit;font-size:13px;font-variant-numeric:tabular-nums;padding:6px 0;width:100%;min-width:0}
  .tarif-row .rate input:focus{outline:none}
  .tarif-row .rate .unit{color:var(--text-dim);font-size:13px}
  .tarif-row .rate.empty{border-color:var(--warning);background:var(--warning-soft)}

  /* Bug tab */
  /* Notes (todolist-style: items + sous-étapes) */
  .fb-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;flex-wrap:wrap;max-width:720px}
  .fb-title{color:var(--accent);font-size:13px;font-weight:700}
  .fb-subtitle{color:var(--text-dim);font-size:13px;margin-bottom:10px;max-width:720px}
  .fb-add-row{display:flex;gap:6px;align-items:center;margin-bottom:14px;max-width:720px}
  .fb-add-row input{flex:1;padding:9px 12px;border:1px solid var(--border-light);border-radius:6px;background:var(--surface);color:var(--text);font:inherit;font-size:13px}
  .fb-add-row input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  .fb-add-row input::placeholder{color:var(--text-dim)}
  .fb-add-row button{border:0;border-radius:6px;padding:9px 16px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;background:var(--success);color:#fff;flex-shrink:0;transition:background .15s}
  .fb-add-row button:hover{background:var(--success-dark)}
  .fb-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px;max-width:720px;transition:opacity .15s,background .15s}
  .fb-card.fb-done{opacity:.55;background:var(--surface-2)}
  .fb-card.fb-done .fb-text{text-decoration:line-through;color:var(--text-dim)}
  .fb-card.fb-done .fb-step-text{text-decoration:line-through;color:var(--text-dim)}
  .fb-hd{display:flex;align-items:center;gap:8px}
  .fb-check{border:1.5px solid var(--border-light);background:transparent;color:transparent;width:20px;height:20px;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s;padding:0;font-size:13px;line-height:1}
  .fb-check:hover{border-color:var(--success)}
  .fb-check.on{background:var(--success);border-color:var(--success);color:#fff}
  .fb-text{flex:1;border:0;background:transparent;font-family:inherit;font-size:13px;font-weight:600;color:var(--text);outline:none;padding:5px 7px;border-radius:4px;min-width:0}
  .fb-text:hover{background:rgba(74,158,255,.06)}
  .fb-text:focus{background:rgba(74,158,255,.10)}
  .fb-del{border:0;background:transparent;color:var(--text-dim);cursor:pointer;flex-shrink:0;padding:5px 7px;border-radius:4px;transition:all .12s;font-size:13px;line-height:1}
  .fb-del:hover{color:var(--danger);background:var(--danger-soft)}
  .fb-step{display:flex;align-items:center;gap:6px;padding:2px 0 2px 28px;margin-top:3px}
  .fb-step-bul{color:var(--text-dim);font-size:13px;flex-shrink:0;font-weight:700}
  .fb-step-text{flex:1;border:0;background:transparent;font-family:inherit;font-size:13px;color:var(--text-muted);outline:none;padding:3px 6px;border-radius:3px;min-width:0}
  .fb-step-text:hover{background:rgba(74,158,255,.06)}
  .fb-step-text:focus{background:rgba(74,158,255,.10);color:var(--text)}
  .fb-step-del{border:0;background:transparent;color:var(--text-dim);cursor:pointer;font-size:13px;flex-shrink:0;padding:2px 5px;border-radius:3px;opacity:0;transition:all .12s}
  .fb-step:hover .fb-step-del{opacity:1}
  .fb-step-del:hover{color:var(--danger);background:var(--danger-soft)}
  .fb-add-step{margin:5px 0 0 28px;border:0;background:transparent;color:var(--primary);font-family:inherit;font-size:13px;cursor:pointer;padding:4px 10px;border-radius:4px;font-weight:600;transition:all .12s}
  .fb-add-step:hover{background:var(--primary-soft)}
  .fb-copy-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:6px;border:1px solid var(--border-light);background:var(--surface);color:var(--text-muted);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
  .fb-copy-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-soft)}
  .fb-copy-btn.copied{border-color:var(--success);color:var(--success);background:var(--success-soft)}

  /* Prestation row with rate beside */
  .presta-row{display:flex;gap:10px;align-items:stretch}
  .presta-row select{flex:1;min-width:0}
  .presta-rate{display:flex;align-items:center;padding:0 14px;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;color:var(--primary);font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;white-space:nowrap;min-width:90px;justify-content:center}
  .presta-rate.empty{color:var(--text-dim);font-size:13px;font-weight:500}

  /* Locked field with ⋮ menu (URSSAF) */
  .lock-field{display:flex;align-items:stretch;gap:0;max-width:120px;position:relative;height:var(--input-h)}
  .lock-field input{flex:1;width:50px;height:var(--input-h);text-align:center;font-variant-numeric:tabular-nums}
  .lock-field input:disabled{opacity:0.85;cursor:not-allowed;background:var(--surface-2);color:var(--text);position:relative}
  .lock-field:has(input:disabled){position:relative}
  .lock-field:has(input:disabled)::after{content:"";position:absolute;inset:0;background:rgba(255,255,255,.18);border-radius:6px;pointer-events:none}
  .lock-menu-btn{background:var(--surface-2);border:1px solid transparent;border-left:1px solid var(--border-soft);border-radius:0 6px 6px 0;color:var(--text-muted);cursor:pointer;padding:0 11px;font-size:15px;line-height:1;font-weight:700;transition:all .15s}
  .lock-menu-btn:hover{background:var(--surface);color:var(--primary)}
  .lock-field input{border-radius:6px 0 0 6px;border-right:0}
  .lock-popup{position:absolute;top:100%;right:0;margin-top:4px;background:var(--surface-2);border:1px solid var(--border-light);border-radius:6px;box-shadow:var(--shadow);z-index:30;min-width:180px;padding:4px;display:none}
  .lock-popup.open{display:block}
  .lock-popup button{width:100%;text-align:left;background:transparent;border:0;color:var(--text);padding:8px 12px;font:inherit;font-size:13px;cursor:pointer;border-radius:4px}
  .lock-popup button:hover{background:var(--surface-hi)}

  /* Devis preview (in-page, at the bottom of Mission) */
  /* Devis preview (in-page, at the bottom of Mission) */
  .devis-preview{margin-top:0;background:var(--surface);border:1px solid var(--border-light);border-radius:10px;padding:32px 36px;max-width:880px;box-shadow:0 6px 18px rgba(0,0,0,.18);display:flex;flex-direction:column}
  /* Top row: logo (left) + ref title (right), aligned baseline */
  .devis-preview .dp-top-row{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;margin-bottom:18px}
  .devis-preview .dp-logo-wrap{display:flex;justify-content:flex-start;flex-shrink:0}
  .devis-preview .dp-logo-spacer{flex-shrink:0;height:1px}
  .devis-preview .dp-logo{max-width:240px;max-height:90px;width:auto;height:auto;object-fit:contain;display:block}
  .devis-preview .dp-doc-ref{color:var(--text);font-weight:700;font-size:18px;font-variant-numeric:tabular-nums;letter-spacing:.01em;text-align:right;flex-shrink:0;align-self:flex-end;line-height:1.2}
  /* Logo field in form */
  .logo-field{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:14px;max-width:520px}
  /* CGV structured editor */
  .cgv-edit-list{display:flex;flex-direction:column;gap:10px;margin-bottom:6px}
  .cgv-edit-empty{padding:18px;background:var(--surface-2);border:1px dashed var(--border);border-radius:6px;color:var(--text-muted);font-size:13px;line-height:1.5;text-align:center}
  .cgv-edit-row{background:var(--surface-2);border:1px solid var(--border-soft);border-radius:6px;padding:10px 12px}
  .cgv-edit-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .cgv-edit-num{color:var(--primary);font-weight:700;font-variant-numeric:tabular-nums;font-size:14px;min-width:24px;flex-shrink:0}
  .cgv-edit-title{flex:1;background:var(--surface);border:1px solid var(--border-soft);color:var(--text);padding:6px 10px;border-radius:4px;font-size:13px;font-weight:600;height:var(--input-h,34px);outline:none}
  .cgv-edit-title:focus{border-color:var(--primary)}
  .cgv-edit-actions{display:flex;gap:4px;flex-shrink:0}
  .cgv-edit-actions .btn-icon{background:transparent;border:1px solid var(--border-soft);color:var(--text-muted);width:28px;height:28px;border-radius:4px;cursor:pointer;font-size:14px;line-height:1;display:inline-flex;align-items:center;justify-content:center;transition:all .15s}
  .cgv-edit-actions .btn-icon:hover:not(:disabled){border-color:var(--primary);color:var(--primary)}
  .cgv-edit-actions .btn-icon:disabled{opacity:.3;cursor:not-allowed}
  .cgv-edit-actions .btn-icon.danger:hover{border-color:var(--danger,#e74c3c);color:var(--danger,#e74c3c)}
  .cgv-edit-body{width:100%;background:var(--surface);border:1px solid var(--border-soft);color:var(--text);padding:8px 10px;border-radius:4px;font-size:13px;line-height:1.5;font-family:inherit;resize:vertical;min-height:64px;outline:none}
  .cgv-edit-body:focus{border-color:var(--primary)}
  .logo-field.has-logo{align-items:flex-start}
  .logo-field .logo-preview{max-width:200px;max-height:80px;width:auto;height:auto;object-fit:contain;background:var(--surface-2);border:1px solid var(--border-light);border-radius:6px;padding:8px}
  .logo-field .logo-actions{display:flex;gap:8px;flex-wrap:wrap}
  .devis-preview .dp-head{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;padding-bottom:16px;border-bottom:1px solid var(--border-light);margin-bottom:18px;flex-wrap:wrap}
  .devis-preview .dp-title{font-size:22px;font-weight:700;color:var(--text);margin:0}
  .devis-preview .dp-ref{color:var(--text-muted);font-size:13px;font-variant-numeric:tabular-nums;margin-top:4px}
  .devis-preview .dp-meta{font-size:13px;color:var(--text-muted);text-align:right;line-height:1.6}
  .devis-preview .dp-meta strong{color:var(--text);font-weight:600}
  .devis-preview .dp-section{margin-bottom:18px}
  .devis-preview h4{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin:0 0 10px;padding-bottom:0;border-bottom:0}
  .devis-preview .dp-client{font-size:13px;color:var(--text);line-height:1.6}
  .devis-preview .dp-client .name{font-weight:600;font-size:13px}
  .devis-preview .dp-client .num{color:var(--text-muted);font-variant-numeric:tabular-nums;margin-right:8px}
  .devis-preview .dp-line{display:grid;grid-template-columns:24px 1fr auto 90px;gap:14px;align-items:flex-start;padding:8px 0;font-size:13px}
  .devis-preview .dp-line:last-child{border-bottom:0}
  .devis-preview .dp-line .num{color:var(--text-muted);font-size:13px;font-variant-numeric:tabular-nums;font-weight:500;padding-top:1px}
  .devis-preview .dp-line .lbl{color:var(--text);min-width:0}
  .devis-preview .dp-line .lbl .desc{color:var(--text-dim);font-size:12px;margin-top:2px;font-weight:400}
  .devis-preview .dp-line .qty{color:var(--text-muted);font-size:12px;font-variant-numeric:tabular-nums;white-space:nowrap}
  .devis-preview .dp-line .amt{color:var(--text);font-weight:500;font-variant-numeric:tabular-nums;white-space:nowrap;min-width:90px;text-align:right}
  .devis-preview .dp-objet{font-size:13px;color:var(--text);margin:0 0 22px 0;padding:0;line-height:1.5}
  .devis-preview .dp-objet strong{font-weight:600}
  .devis-preview .dp-footer{margin-top:24px;padding-top:14px;border-top:1px solid var(--border-soft);text-align:center;line-height:1.5}
  .devis-preview .dp-footer-line{font-size:12px;color:var(--text-dim);font-style:italic;margin-bottom:4px}
  .devis-preview .dp-footer-mentions{font-size:11px;color:var(--text-dim);font-style:italic;line-height:1.4;opacity:.85}
  .devis-preview .dp-actions{display:flex;gap:10px;margin-top:18px;justify-content:flex-end}
  .devis-preview .dp-empty{text-align:center;padding:30px;color:var(--text-dim);font-size:13px}
  /* Default signature block when user hasn't filled signatureBlock */
  .devis-preview .dp-sig-default{font-size:13px;color:var(--text);line-height:1.8}
  .devis-preview .dp-sig-row{display:flex;align-items:baseline;gap:8px;margin-bottom:8px}
  .devis-preview .dp-sig-line{flex:1;border-bottom:1px dotted var(--border-light);min-width:140px;height:1em}
  .devis-preview .dp-sig-box{margin-top:6px;height:60px;border:1px dashed var(--border-light);border-radius:4px}

  /* Preview tabs (Devis / Débours / Facture) */
  .preview-tabs-wrap{margin-top:32px;max-width:880px}
  .preview-tabs-nav{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:0;padding:0 4px}
  .preview-tabs-nav button{background:transparent;border:0;border-bottom:2px solid transparent;color:var(--text-muted);padding:10px 18px;cursor:pointer;font:inherit;font-size:13px;font-weight:500;transition:color .12s,border-color .12s;display:inline-flex;align-items:center;gap:6px;margin-bottom:-1px;border-radius:6px 6px 0 0}
  .preview-tabs-nav button:hover{color:var(--text);background:var(--surface)}
  .preview-tabs-nav button.on{color:var(--primary);border-bottom-color:var(--primary);background:var(--primary-soft)}
  .preview-tabs-nav button .badge{font-size:11px;padding:1px 6px;background:var(--accent);color:#062b27;border-radius:8px;font-weight:600;margin-left:2px}
  .preview-tabs-nav button.on .badge{background:var(--primary);color:#fff}
  .preview-tabs-body{margin-top:0}
  .preview-tabs-body .devis-preview{margin-top:0;border-top-left-radius:0}

  /* Tarifs view: cell inputs match Mission style (flat, transparent at rest) */
  .tr-cell-input{width:100%;border:1px solid transparent;background:transparent;color:var(--text);font:inherit;padding:5px 8px;border-radius:4px;height:var(--input-h);box-sizing:border-box;transition:border-color .12s,background .12s}
  .tr-cell-input:hover{background:var(--surface-2)}
  .tr-cell-input:focus{outline:none;border-color:var(--primary);background:var(--surface-2)}
  .tr-cell-input.num{text-align:right;font-variant-numeric:tabular-nums;width:90px}
  .tr-cell-input.center{text-align:center}
  .tarif-input-wrap{display:inline-flex;align-items:center;gap:4px;justify-content:flex-end}
  .tr-tarif-input{width:64px;text-align:right;border:1px solid transparent;background:var(--surface-2);color:var(--text);padding:4px 8px;border-radius:4px;font-variant-numeric:tabular-nums;font-weight:600;height:var(--input-h);box-sizing:border-box;transition:border-color .12s,background .12s;font:inherit}
  .tr-tarif-input:hover{background:var(--surface)}
  .tr-tarif-input:focus{outline:none;border-color:var(--primary);background:var(--surface-2)}
  .tarif-input-wrap .unit{color:var(--text-dim);font-size:13px}
  /* Tarifs cells colors */
  table.hist td.net-cell{font-variant-numeric:tabular-nums;font-weight:600;text-align:right}
  table.hist td.net-cell.ok{color:var(--success)}
  table.hist td.net-cell.bad{color:var(--danger)}
  table.hist td.net-cell.dim{color:var(--text-dim)}
  table.hist td.muted-cell{font-variant-numeric:tabular-nums;color:var(--text-muted);text-align:right;padding-right:14px}
  table.hist td.muted-cell.dim{color:var(--text-dim)}
  table.hist td.tarif-cell{text-align:right}
  table.hist td.tr-amorti-cell{font-variant-numeric:tabular-nums;color:var(--success);text-align:right;padding-right:14px}
  table.hist td.tr-reste-cell{font-variant-numeric:tabular-nums;text-align:right;padding-right:14px}
  table.hist td.tr-reste-cell.pending{color:var(--warning)}
  table.hist td.tr-reste-cell.done{color:var(--text-dim)}
  table.hist td.center{text-align:center}
  table.hist tr.row-empty{background:rgba(245,158,11,.06)}
  table.hist tr.row-inactive{opacity:.65}
  table.hist tr.row-amorti{background:rgba(34,197,94,.04)}
  /* Status badges in Tarifs view (Investissements) */
  .tr-badge{padding:3px 8px;border-radius:10px;font-size:13px;font-weight:600;text-transform:uppercase;display:inline-block;line-height:1.4}
  .tr-badge.ok{background:var(--success-soft);color:var(--success)}
  .tr-badge.partial{background:var(--warning-soft);color:var(--warning)}
  .tr-badge.none{background:var(--danger-soft);color:var(--danger)}

  /* Doc title (DÉBOURS / FACTURE) inside the preview */
  .devis-preview .dp-doc-title{font-size:24px;font-weight:800;letter-spacing:-.01em;margin:18px 0 4px;text-transform:uppercase}
  .devis-preview .dp-doc-sub{font-size:13px;color:var(--text-muted);margin-bottom:14px}

  /* Receipt section in Facture preview */
  .devis-preview .dp-receipt{margin-top:18px;padding:14px 16px;background:var(--surface-2);border:1px solid var(--border-light);border-radius:8px}
  .devis-preview .dp-receipt h4{margin:0 0 10px;font-size:13px;font-weight:600;color:var(--text-muted);text-transform:none;letter-spacing:0;border:0;padding:0}
  .devis-preview .dp-receipt-list{margin-bottom:8px}
  .devis-preview .dp-receipt-line{display:flex;justify-content:space-between;align-items:baseline;padding:4px 0;font-size:13px}
  .devis-preview .dp-receipt-line .lbl{color:var(--text-muted)}
  .devis-preview .dp-receipt-line .lbl .dim{color:var(--text-dim)}
  .devis-preview .dp-receipt-line .amt{font-variant-numeric:tabular-nums;color:var(--text)}
  .devis-preview .dp-receipt-line.total{padding-top:8px;border-top:1px solid var(--border);font-weight:600}
  .devis-preview .dp-receipt-line.total .lbl{color:var(--text)}
  .devis-preview .dp-receipt-line.restant{font-weight:700;font-size:15px;padding-top:6px}
  .devis-preview .dp-receipt-line.restant .lbl{color:var(--text)}
  .devis-preview .dp-receipt-line.restant.paid{font-size:15px}

  /* Devis header 2-col: photographer left, client+meta right */
  .devis-preview .dp-header-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:22px;padding-bottom:18px;border-bottom:1px solid var(--border)}
  .devis-preview .dp-header-left{font-size:13px;color:var(--text);line-height:1.6;white-space:pre-wrap;padding-right:0}
  .devis-preview .dp-header-left.empty{color:var(--text-dim);font-style:italic;font-size:13px}
  .devis-preview .dp-header-right{display:flex;flex-direction:column;align-items:flex-end;gap:0}
  .devis-preview .dp-meta-block{text-align:right;font-size:13px;color:var(--text-muted);line-height:1.6;margin-bottom:0}
  .devis-preview .dp-meta-block .ref{color:var(--text);font-weight:700;font-size:16px;font-variant-numeric:tabular-nums;margin-bottom:10px;letter-spacing:.01em}
  .devis-preview .dp-validity-mention{font-style:italic;font-size:11px;color:var(--text-dim);margin-top:6px;line-height:1.4;max-width:240px;margin-left:auto}
  .devis-preview .dp-meta-block strong{color:var(--text);font-weight:600}
  .devis-preview .dp-client-block{text-align:right;font-size:13px;color:var(--text);line-height:1.6;padding:0;min-width:220px;margin-top:0}
  .devis-preview .dp-client-block .name{font-weight:600;font-size:13px;color:var(--text);display:block}
  @media (max-width:680px){
    .devis-preview .dp-header-grid{grid-template-columns:1fr}
    .devis-preview .dp-header-left{border-right:0;border-bottom:1px solid var(--border-soft);padding-right:0;padding-bottom:14px}
    .devis-preview .dp-header-right{align-items:flex-start}
    .devis-preview .dp-meta-block,.devis-preview .dp-client-block{text-align:left}
  }

  .devis-preview .dp-conditions{margin-top:0;padding:14px 0 0;border-top:1px solid var(--border-soft);font-size:13px;color:var(--text);line-height:1.7;white-space:pre-wrap}
  .devis-preview .dp-conditions h4{margin:0 0 8px;border:0;padding:0;font-size:13px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em}
  .devis-preview .dp-conditions.signature{padding:0;border:0;border-radius:0;margin-top:0}
  .devis-preview .dp-conditions.signature h4{display:none}
  .devis-preview .dp-conditions.cgv h4{color:var(--text-muted)}
  /* Totals: right-aligned chunk under detail lines (full-width section, content cadré à droite) */
  .devis-preview .dp-totals{margin-top:18px;padding-top:14px;border-top:1px solid var(--border-light);max-width:340px;margin-left:auto;width:100%}
  .devis-preview .dp-totals .dp-line{display:flex;justify-content:space-between;grid-template-columns:none;padding:5px 0;border-bottom:0;color:var(--text-muted)}
  .devis-preview .dp-totals .dp-line.grand{font-size:17px;font-weight:700;padding:10px 0 6px;margin-top:4px;border-top:1px solid var(--border)}
  .devis-preview .dp-totals .dp-line.grand .lbl,.devis-preview .dp-totals .dp-line.grand .amt{color:var(--text)}
  .devis-preview .dp-totals .dp-line.debours{color:var(--text-muted);font-style:italic;font-size:12px;margin-top:6px;padding-top:4px}
  .devis-preview .dp-totals .dp-line.debours .debours-note{color:var(--text-dim);font-size:11px;font-style:italic;font-weight:400}

  /* Payment info: right-aligned column, same width as totals, all stacked vertically */
  .devis-preview .dp-payment-info{margin-top:24px;padding-top:14px;border-top:1px solid var(--border-light);max-width:340px;margin-left:auto;width:100%}
  .devis-preview .dp-payment-info h4{margin:0 0 12px;border:0;padding:0;font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em}
  .devis-preview .dp-payment-block{font-size:13px;line-height:1.6;color:var(--text)}
  .devis-preview .dp-paiement-line{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;font-size:13px;color:var(--text)}
  .devis-preview .dp-paiement-line .lbl{color:var(--text)}
  .devis-preview .dp-paiement-line .pct{color:var(--text-muted);font-size:12px;margin-left:2px}
  .devis-preview .dp-paiement-line .amt{font-variant-numeric:tabular-nums;font-weight:500}
  .devis-preview .dp-paiement-line.dp-delai{margin-top:8px;padding-top:8px;border-top:1px dashed var(--border-soft);color:var(--text-muted);font-size:12px}
  .devis-preview .dp-paiement-line.dp-delai .lbl{color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;font-size:11px}
  .devis-preview .dp-paiement-line.dp-delai .amt{font-weight:500;color:var(--text);font-variant-numeric:normal}
  .devis-preview .dp-bank{margin-top:14px;padding-top:10px;border-top:1px dashed var(--border-soft);font-size:13px}
  .devis-preview .dp-bank-line{display:flex;align-items:baseline;gap:10px;padding:3px 0}
  .devis-preview .dp-bank-line .lbl{color:var(--text-muted);font-size:11px;text-transform:uppercase;letter-spacing:.05em;min-width:64px;flex-shrink:0}
  .devis-preview .dp-bank-line .val{color:var(--text);font-variant-numeric:tabular-nums;word-break:break-all}
  .devis-preview .dp-bank-line.iban .val{font-size:13px;letter-spacing:.02em}
  .devis-preview .dp-payment-text{font-size:12px;color:var(--text);line-height:1.6;white-space:pre-wrap;margin-top:10px;padding-top:8px;border-top:1px dashed var(--border-soft)}
  /* Spacer (pushes signature/footer to bottom on print) */
  .devis-preview .dp-spacer{min-height:32px;flex:1 1 auto}
  /* Signature row at bottom-left */
  .devis-preview .dp-signature-row{padding-top:14px;border-top:1px solid var(--border-soft);font-size:13px;line-height:1.6;color:var(--text)}
  .devis-preview .dp-signature-row .dp-sig-mention{margin-top:8px;color:var(--text-muted);font-size:12px;font-style:italic}
  .devis-preview .dp-sig-line.short{flex:0 0 50px;min-width:50px}
  /* Page 1 footer — constant size, same encadré as CGV header/footer */
  .devis-preview .dp-footer{margin:8px 0 0;padding:4px 0;border-top:1px solid var(--border-soft);border-bottom:1px solid var(--border-soft);font-size:9.5px;color:var(--text-muted);text-align:center;font-style:italic;line-height:1.4;min-height:18px;flex-shrink:0}
  /* Débours line in totals: shorter text */
  .devis-preview .dp-totals .dp-line.debours .debours-note{color:var(--text-dim);font-size:11px;font-style:italic;font-weight:400}
  /* CGV header (identity strip) */
  .devis-preview .dp-conditions.cgv{margin-top:18px;padding:14px 0 0;border-top:1px solid var(--border-soft);font-size:13px;color:var(--text);line-height:1.7}
  /* CGV page : flex column to pin mentions footer at the absolute bottom */
  .devis-preview .dp-conditions.cgv{display:flex;flex-direction:column}
  /* Header — same visual weight as the mentions footer (small, italic-light, centered, bordered) */
  .devis-preview .dp-cgv-header{margin:0 0 8px;padding:4px 0;border-top:1px solid var(--border-soft);border-bottom:1px solid var(--border-soft);text-align:center;font-size:9.5px;line-height:1.4;color:var(--text-muted);min-height:18px;flex-shrink:0}
  .devis-preview .dp-cgv-header .dp-cgv-title{font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.04em}
  .devis-preview .dp-cgv-header .dp-cgv-sep{color:var(--text-dim);margin:0 4px}
  .devis-preview .dp-cgv-header .dp-cgv-ref{font-style:italic;color:var(--text-muted)}
  /* CGV body — 2 columns. Preamble spans across columns at the top. Sections inside columns. */
  .devis-preview .dp-cgv-body{column-count:2;column-gap:16px;column-rule:1px solid var(--border-soft);font-size:10px;line-height:1.4;color:var(--text);text-align:justify;hyphens:auto;-webkit-hyphens:auto;flex:1 1 auto}
  .devis-preview .dp-cgv-body .cgv-paragraph{column-span:all;-webkit-column-span:all;margin:0 0 8px;font-size:10px;line-height:1.4;color:var(--text);text-align:justify;break-after:column}
  .devis-preview .dp-cgv-body .cgv-section{margin:0 0 5px;font-size:10px;line-height:1.4;color:var(--text);text-align:justify;break-inside:avoid;page-break-inside:avoid}
  .devis-preview .dp-cgv-body .cgv-section-title{font-weight:700;color:var(--text)}
  /* CGV mentions footer — same encadré as header */
  .devis-preview .dp-cgv-mentions{margin:8px 0 0;padding:4px 0;border-top:1px solid var(--border-soft);border-bottom:1px solid var(--border-soft);font-size:9.5px;color:var(--text-muted);font-style:italic;line-height:1.4;text-align:center;min-height:18px;flex-shrink:0}
  /* Fallback footer mentions (page 1, when no CGV) */
  .devis-preview .dp-footer .dp-footer-mentions-fallback{font-size:9px;color:var(--text-dim);margin-top:2px;line-height:1.3}

  /* Page break before CGV (page 2 when printed) */

  .devis-page-break{display:block;height:1px;margin:40px 0 30px;border-top:1px solid var(--border-light);position:relative}
  .devis-page-break::before{content:"page 2";position:absolute;top:-9px;left:50%;transform:translateX(-50%);background:var(--surface-2);padding:0 14px;font-size:11px;color:var(--text-dim);letter-spacing:.12em;text-transform:uppercase}
  @media print {
    @page { size: A4; margin: 12mm 14mm 16mm 14mm; }
    @page :first { @bottom-right { content: "Page " counter(page) " / " counter(pages); font-family: -apple-system, "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 8pt; color: #888; } }
    @page :left { @bottom-right { content: "Page " counter(page) " / " counter(pages); font-family: -apple-system, "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 8pt; color: #888; } }
    @page :right { @bottom-right { content: "Page " counter(page) " / " counter(pages); font-family: -apple-system, "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 8pt; color: #888; } }
    html, body { background: #fff !important; margin: 0 !important; padding: 0 !important; }

    /* === ISOLATION via display === */
    /* Hide app chrome */
    .sb { display: none !important; }
    /* Hide non-printable modal-overlays (text editor doesn't contain a devis-preview) */
    .modal-overlay:not(:has(.devis-preview)):not(:has(.view-devis-snapshot)) { display: none !important; }
    /* Hide main when a printable modal IS open (avoid printing twice) */
    body:has(.modal-overlay .view-devis-snapshot) main,
    body:has(.modal-overlay .devis-preview) main { display: none !important; }
    /* When printing from Mission tab (no modal): hide everything in main except the preview */
    main > * { display: none !important; }
    main > .preview-tabs-wrap { display: block !important; }
    main > .preview-tabs-wrap > * { display: none !important; }
    main > .preview-tabs-wrap > .preview-tabs-body { display: block !important; }

    /* Neutralize the modal wrapper of printable modals */
    .modal-overlay {
      position: static !important;
      background: #fff !important;
      inset: auto !important;
      padding: 0 !important;
