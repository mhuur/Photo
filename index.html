function rViewDevisModal() {
  if (!viewDevisModal) return "";
  const dv = S.suivi.devis && S.suivi.devis[viewDevisModal.devisId];
  if (!dv) return "";
  const ref = dv.ref || viewDevisModal.devisId;
  let snapshot = dv.snapshotHtml || "";
  // Inject current logo if absent from older snapshots
  const currentLogo = (S.mission && S.mission.logoUrl) || "";
  if (snapshot && currentLogo && !snapshot.includes('class="dp-logo"')) {
    snapshot = `<div class="dp-logo-wrap"><img src="${esc(currentLogo)}" alt="Logo" class="dp-logo"></div>${snapshot}`;
  }
  const when = dv.snapshotAt ? new Date(dv.snapshotAt).toLocaleString("fr-FR") : null;
  return `<div class="modal-overlay" onclick="if(event.target===this)viewDevisClose()">
    <div class="modal-card modal-card-lg">
      <div class="modal-title">${esc(formatRef(ref, "devis"))}</div>
      ${when ? `<div class="modal-sub">Émis le ${esc(when)}</div>` : ""}
      ${snapshot
        ? `<div class="devis-preview view-devis-snapshot">${snapshot}</div>`
        : `<div class="empty" style="padding:40px;text-align:center">
            Aucun snapshot disponible pour ce devis.<br><span style="font-size:13px;color:var(--text-dim)">Les snapshots sont créés à partir de l'émission depuis l'onglet Mission « + Enregistrer dans Suivi ».</span>
           </div>`}
      <div class="modal-actions">
        ${snapshot ? `<button class="btn ghost" onclick="printWithTip()">🖨️ Imprimer</button>` : ""}
        <button class="btn" onclick="viewDevisClose()">Fermer</button>
      </div>
    </div>
  </div>`;
}

function rViewFactureModal() {
  if (!viewFactureModal) return "";
  const devisId = viewFactureModal.devisId;
  const dv = S.suivi.devis && S.suivi.devis[devisId];
  const lignes = (S.suivi.entries || []).filter(e => e.devisId === devisId);
  const refRaw = (dv && dv.ref) || devisId;
  const factureRef = formatRef(refRaw, "facture");
  // Compute totals
  const totalDevis = lignes.reduce((s, e) => s + num(e.montant), 0);
  const paidLines = lignes.filter(e => e.paid);
  const totalPaid = paidLines.reduce((s, e) => s + num(e.montant), 0);
  const restant = r2(totalDevis - totalPaid);
  const fullyPaid = restant <= 0.01 && totalPaid > 0;
  let snapshot = (dv && dv.snapshotHtml) || "";
  // Inject current logo if absent from older snapshots
  const currentLogo = (S.mission && S.mission.logoUrl) || "";
  if (snapshot && currentLogo && !snapshot.includes('class="dp-logo"')) {
    snapshot = `<div class="dp-logo-wrap"><img src="${esc(currentLogo)}" alt="Logo" class="dp-logo"></div>${snapshot}`;
  }
  const client = (dv && dv.snapshotClient) || (lignes[0] && lignes[0].client) || "—";
  const when = (dv && dv.snapshotAt) ? new Date(dv.snapshotAt).toLocaleString("fr-FR") : null;

  // Build receipt section
  const receiptHtml = `<div class="dp-receipt" style="margin:18px 0 0">
    <h4>Récapitulatif paiement</h4>
    ${paidLines.length > 0 ? `<div class="dp-receipt-list">
      ${paidLines.map(p => `<div class="dp-receipt-line">
        <span class="lbl">${esc(p.echeance || "Paiement")}${p.paidAt ? ` — <span class="dim">payée le ${esc(dateFR(p.paidAt))}</span>` : ""}</span>
        <span class="amt">${fmt(p.montant)}</span>
      </div>`).join("")}
    </div>` : `<div class="dp-receipt-line"><span class="lbl dim" style="font-style:italic">Aucune échéance n'est marquée comme payée pour l'instant.</span></div>`}
    <div class="dp-receipt-line total"><span class="lbl">Total payé</span><span class="amt" style="color:var(--success)">${fmt(totalPaid)}</span></div>
    <div class="dp-receipt-line restant ${fullyPaid ? 'paid' : ''}"><span class="lbl">${fullyPaid ? "✓ Soldée" : "Reste à payer"}</span><span class="amt" style="color:${fullyPaid ? 'var(--success)' : 'var(--warning)'}">${fmt(restant)}</span></div>
  </div>`;

  // Build the facture body: snapshot HTML with the ref swapped from "Devis"/"DEVIS" → "Facture"/"FACTURE"
  let body;
  if (snapshot) {
    const snapshotFacture = snapshot
      .replace(/(<div class="ref"[^>]*>)([\s\S]*?)(<\/div>)/, (m, a, content, end) => {
        // Replace either old format ("DEVIS-...") or new format ("Devis n° ...")
        const newContent = content
          .replace(/^DEVIS\b/, "FACTURE")
          .replace(/^Devis\b/, "Facture");
        return `${a}${newContent}${end}`;
      });
    body = `<div class="devis-preview view-devis-snapshot">${snapshotFacture}${receiptHtml}</div>`;
  } else {
    body = `<div class="empty" style="padding:40px;text-align:center">
      Aucun snapshot devis disponible.<br><span style="font-size:13px;color:var(--text-dim)">La facture est générée à partir du snapshot du devis émis. Émets d'abord le devis depuis l'onglet Devis (« + Enregistrer dans Suivi »).</span>
    </div>`;
  }

  return `<div class="modal-overlay" onclick="if(event.target===this)viewFactureClose()">
    <div class="modal-card modal-card-lg">
      <div class="modal-title" style="color:var(--success)">🧾 ${esc(factureRef)} — ${esc(client)}</div>
      ${when ? `<div class="modal-sub">Devis émis le ${esc(when)} · ${paidLines.length}/${lignes.length} échéance${lignes.length > 1 ? "s" : ""} payée${paidLines.length > 1 ? "s" : ""}</div>` : ""}
      ${body}
      <div class="modal-actions">
        ${snapshot ? `<button class="btn ghost" onclick="printWithTip()">🖨️ Imprimer</button>` : ""}
        <button class="btn" onclick="viewFactureClose()">Fermer</button>
      </div>
    </div>
  </div>`;
}

// ============ REMISE COMPUTATION ============
// Compute remise max recommandée (with 10% safety margin) + détail des coûts.
// Returns { totalSansRemise, urssafActuelle, coutsReels: {matos, deplReel, avances, total},
//           margeBrute, margeAvecSecurite, remiseMaxPct, currentRemiseAmount, currentNet,
//           currentMargeApresRemise, isOverMax, declared }
function computeRemiseInfo() {
  const d = S.mission;
  const t = totals();
  const declared = d.declare !== false;
  const urssafFactor = declared ? (1 - num(d.urssafPct ?? 22) / 100) : 1; // au black: pas d'URSSAF
  // Coût matos horaire (depuis Frais & Tarifs) × heures totales
  let matosCost = 0;
  try {
    const tm = tauxMatos();
    matosCost = r2((tm.tauxAvecSecurite || 0) * t.totalHeures);
  } catch (e) { matosCost = 0; }
  // Déplacement réel (toujours le coût brut, jamais avec URSSAF/marge)
  // C'est ce que tu paies vraiment (essence, billets) indépendamment du mode
  const deplReel = t.depl || 0;
  // Sommes avancées (matériel + transport en mode Avance) — incompressible
  let avances = 0;
  for (const l of (d.lignes || [])) {
    if (l.type === "materiel" && l.devis !== "debours" && l.paiementType === "avance") {
      avances = r2(avances + r2(num(l.prix)));
    }
    if (l.type === "materiel" && l.devis !== "debours" && l.paiementType === "acompte") {
      // Aussi incompressible : tu dois le payer au fournisseur
      avances = r2(avances + r2(num(l.prix)));
    }
  }
  if ((d.deplacement.mode === "transports") && t.depl > 0 && (d.deplacement.devis || "principal") === "principal") {
    // Le déplacement réel est déjà compté dans deplReel ci-dessus, on ne double-compte pas
  }
  const totalSansRemise = t.subtotal; // total HT avant remise
  const urssafActuelle = r2(totalSansRemise * (1 - urssafFactor));
  const netActuel = r2(totalSansRemise * urssafFactor);
  // Coûts réels totaux : ce que tu DOIS dépenser (matos + déplacement + sommes avancées)
  const coutsReels = r2(matosCost + deplReel + avances);
  const margeBrute = r2(netActuel - coutsReels);
  // Marge en % du total HT (= proportion qui te reste après tous les coûts)
  const margeBrutePct = totalSansRemise > 0 ? r2(margeBrute / totalSansRemise * 100) : 0;
  // Calcul de la remise max (point mort exact, marge = 0):
  //   netApresRemise = totalSansRemise × (1-r) × urssafFactor
  //   margeApresRemise = netApresRemise - coutsReels >= 0
  //   ⟹ (1-r) >= coutsReels / (totalSansRemise × urssafFactor)
  //   ⟹ r <= 1 - coutsReels / (totalSansRemise × urssafFactor)
  let remiseMaxPct = 0;
  if (totalSansRemise > 0 && urssafFactor > 0) {
    const seuil = coutsReels / (totalSansRemise * urssafFactor);
    remiseMaxPct = Math.max(0, Math.floor((1 - seuil) * 100));
  }
  // Calculs au taux de remise actuel
  const currentRemisePct = num(d.remisePct);
  const currentRemiseAmount = r2(totalSansRemise * currentRemisePct / 100);
  const currentNet = r2((totalSansRemise - currentRemiseAmount) * urssafFactor);
  const currentMargeApresRemise = r2(currentNet - coutsReels);
  const isOverMax = currentRemisePct > remiseMaxPct;
  return {
    declared,
    totalSansRemise,
    urssafActuelle,
    netActuel,
    coutsReels: { matos: matosCost, deplReel, avances, total: coutsReels },
    margeBrute,
    margeBrutePct,
    remiseMaxPct,
    currentRemisePct,
    currentRemiseAmount,
    currentNet,
    currentMargeApresRemise,
    isOverMax,
    totalHeures: t.totalHeures
  };
}

// ============ REMISE TOOLTIP HTML (live-rebuilt on every refreshTotals) ============
function buildRemiseTooltipHtml(ri) {
  // Compute the live "marge actuelle" %: based on currentRemise, in real time.
  const liveMargePct = ri.totalSansRemise > 0
    ? r2(ri.currentMargeApresRemise / ri.totalSansRemise * 100)
    : 0;
  const margeColor = liveMargePct < 0 ? "#e74c3c" : (liveMargePct < 10 ? "#f59e0b" : "#22c55e");
  return `
    <div class="remise-tt-marge-actuelle" style="color:${margeColor}">
      Marge actuelle : <strong>${liveMargePct.toString().replace(".", ",")} %</strong>
      <span class="remise-tt-marge-amt">(${fmt(ri.currentMargeApresRemise)})</span>
    </div>
    <div class="remise-tt-title">💰 Décomposition de la marge</div>
    <table class="remise-tt-table">
      <tr><td>Total HT (avant remise)</td><td>${fmt(ri.totalSansRemise)}</td></tr>
      ${ri.declared
        ? `<tr class="muted"><td>− URSSAF (${num(S.mission.urssafPct ?? 22).toString().replace(".",",")} %)</td><td>−${fmt(ri.urssafActuelle)}</td></tr>`
        : `<tr class="muted"><td>− URSSAF</td><td>au black</td></tr>`}
      <tr><td>= Net encaissé</td><td>${fmt(ri.netActuel)}</td></tr>
    </table>
    <table class="remise-tt-table">
      <tr class="section-title"><td colspan="2">Coûts réels</td></tr>
      <tr class="muted"><td>· Matériel amorti (${ri.totalHeures.toFixed(1).replace(".",",")} h)</td><td>${fmt(ri.coutsReels.matos)}</td></tr>
      <tr class="muted"><td>· Déplacement réel</td><td>${fmt(ri.coutsReels.deplReel)}</td></tr>
      <tr class="muted"><td>· Sommes avancées</td><td>${fmt(ri.coutsReels.avances)}</td></tr>
      <tr><td>Total coûts</td><td>${fmt(ri.coutsReels.total)}</td></tr>
    </table>
    <table class="remise-tt-table">
      <tr><td>Marge brute (sans remise)</td><td><strong>${fmt(ri.margeBrute)}</strong></td></tr>
      ${ri.currentRemisePct > 0 ? `
      <tr class="${ri.isOverMax ? 'danger' : ''}"><td>Marge après remise actuelle</td><td><strong>${fmt(ri.currentMargeApresRemise)}</strong></td></tr>
      ` : ''}
    </table>
    <div class="remise-tt-summary">
      <strong>Remise max : ${ri.remiseMaxPct} %</strong> (point mort)<br>
      Au-delà tu paies de ta poche.
    </div>`;
}

// Refresh the remise tooltip + max attribute on the input, without re-rendering the form
// (so input focus and caret are preserved). Called from refreshTotals().
function refreshRemiseTooltip() {
  const ri = computeRemiseInfo();
  const tt = document.querySelector(".remise-tooltip");
  if (tt) tt.innerHTML = buildRemiseTooltipHtml(ri);
  // Update max attribute on the input + the onchange handler's max param
  const inp = document.querySelector(".remise-input-wrap input");
  if (inp) {
    inp.setAttribute("max", String(ri.remiseMaxPct));
    inp.setAttribute("oninput", `updRemise(this.value, ${ri.remiseMaxPct})`);
    // If the current value now exceeds the new max (e.g. user added more cost items), clamp it
    if (num(inp.value) > ri.remiseMaxPct) {
      inp.value = String(ri.remiseMaxPct);
      S.mission.remisePct = String(ri.remiseMaxPct);
      save();
    }
  }
}

function tarifBreakdown(includeDepl) {
  // Compute per-hour breakdown: Net / +Déplacement / +Matériel / +URSSAF / =Tarif facturé
  // includeDepl=true → also include deplacement spread (only effective if mode is "taux")
  //
  // CORRECT URSSAF FORMULA:
  // For French auto-entrepreneur, URSSAF cotisation = X % du CA. So:
  //   gross billed = CA, URSSAF prélevée = gross × X%, net = gross × (1 - X%).
  // Au black: the photographer can give a discount to the client equal to the URSSAF saved,
  //   so tarif au black = gross × (1 - X%).
  const d = S.mission;
  const declared = d.declare !== false;
  const cat = (S.tarifs.catalog || DEFAULT_CATALOG).find(c => c.k === d.object);
  if (!cat || !d.object) return null;
  const tm = tauxMatos();
  const final = num(cat.p);
  if (final <= 0) return null;
  const urssafPct = num(d.urssafPct ?? 22);
  const urssafFactor = 1 - urssafPct / 100; // e.g., 0.78 for 22%
  const blackMode = d.blackMode || "reduit";
  const matos = tm.tauxAvecSecurite;
  const t = totals();
  const dpH = (includeDepl && t.deplMode === "taux" && t.totalHeures > 0) ? t.deplPerHour : 0;
  // Tarif facturé per hour:
  //   declared      : final + dpH
  //   black "fixe"  : final + dpH (same as declared, photographer keeps the URSSAF)
  //   black "reduit": final × (1-urssaf%) + dpH (discount = URSSAF saved)
  const tarifApplique = declared
    ? r2(final + dpH)
    : (blackMode === "fixe"
        ? r2(final + dpH)
        : r2(r2(final * urssafFactor) + dpH));
  // URSSAF amount: declared = X% of (final + dpH); au black = X% of theoretical CA (= what they save)
  const urssafAmount = r2((final + dpH) * urssafPct / 100);
  // Net per hour after matos (and minus dpH which is a real cost):
  //   declared      : (final + dpH) × (1-urssaf%) - matos - dpH
  //   black "fixe"  : final - matos                  (no URSSAF; dpH already invoiced separately)
  //   black "reduit": final × (1-urssaf%) - matos    (no URSSAF; same net as declared)
  const net = declared
    ? r2(r2((final + dpH) * urssafFactor) - matos - dpH)
    : (blackMode === "fixe"
        ? r2(final - matos)
        : r2(r2(final * urssafFactor) - matos));
  return { net, matos, deplPerHour: dpH, urssafAmount, tarifApplique, declared, blackMode, hasDepl: dpH > 0 };
}

  if (!b) return "";
  const showD = b.hasDepl;
  return `<table>

}

// DEVIS v2 — Helpers : drag-reorder, section summaries, validation,
//                      snapshot dirty detection. Logique pure sauf event handlers.

// ----------------------------------------------------------------------------
// SECTION SUMMARIES — pures, pas d'accès DOM. Génèrent les chips compacts
// affichés dans les en-têtes d'accordéon ("3 lignes · 850 €").
// ----------------------------------------------------------------------------
function devisSectionSummaries() {
  const d = S.mission;
  const t = totals();

  // 1. Identification & client
  const cliName = (d.client && d.client.name) ||
    (d.client && d.client.id && (S.clients.entries.find(c => c.id === d.client.id) || {}).name) || "";
  const idSummary = cliName
    ? `<span class="amt">${esc(cliName)}</span>`
    : `<span class="warn">Aucun client</span>`;

  // 2. Prestations — compte des lignes facturables (heures + matériel principal)
  const lignesFact = (d.lignes || []).filter(l =>
    l.type === "heures" || (l.type === "materiel" && l.devis !== "debours")
  ).length;
  const prestaSummary = lignesFact > 0
    ? `<span>${lignesFact} ligne${lignesFact > 1 ? "s" : ""}</span><span class="dot"></span><span class="amt">${fmt(t.lignes)}</span>`
    : `<span class="warn">Aucune prestation</span>`;

  // 3. Déplacement & débours
  const deplDevis = d.deplacement.devis || "principal";
  const deboursLignes = (d.lignes || []).filter(l => l.type === "materiel" && l.devis === "debours").length;
  const deplBits = [];
  if (t.depl > 0) deplBits.push(deplDevis === "debours" ? `Débours ${fmt(t.depl)}` : `Trajet ${fmt(t.depl)}`);
  if (deboursLignes > 0) deplBits.push(`${deboursLignes} matériel${deboursLignes > 1 ? "s" : ""} débours`);
  const deplSummary = deplBits.length ? `<span class="amt">${esc(deplBits.join(" · "))}</span>` : `<span>Pas de déplacement</span>`;

  // 4. Ajustements — remise + URSSAF
  const remisePct = num(d.remisePct);
  const ri = computeRemiseInfo();
  const remiseClass = remisePct > ri.remiseMaxPct ? "warn" : (remisePct > 0 ? "amt" : "");
  const adjBits = [];
  if (remisePct > 0) adjBits.push(`<span class="${remiseClass}">${remisePct.toString().replace(".",",")}% remise</span>`);
  if (d.declare !== false) adjBits.push(`<span>URSSAF ${num(d.urssafPct ?? 22).toString().replace(".",",")}%</span>`);
  const adjSummary = adjBits.length ? adjBits.join('<span class="dot"></span>') : `<span>Par défaut</span>`;

  // 5. Modalités — somme des % + IBAN
  const pctSum = t.echeancesTotal;
  const ok100 = pctSum === 100;
  const echBit = ok100
    ? `<span class="amt">${(d.echeances || []).length} échéance${(d.echeances || []).length > 1 ? "s" : ""}</span>`
    : `<span class="err">${pctSum.toString().replace(".",",")}% (≠100)</span>`;
  const ibanBit = (d.paiement && d.paiement.iban) ? `<span>IBAN ✓</span>` : `<span class="warn">IBAN manquant</span>`;
  const modSummary = `${echBit}<span class="dot"></span>${ibanBit}`;

  // 6. Conditions & signature — sections CGV
  const cgvCount = (d.cgvSections || []).filter(s => s && (s.title || s.body)).length;
  const condSummary = cgvCount > 0
    ? `<span class="amt">${cgvCount} section${cgvCount > 1 ? "s" : ""} CGV</span>`
    : `<span class="warn">CGV vides</span>`;

  return {
    identification: idSummary,
    prestations:    prestaSummary,
    deplacement:    deplSummary,
    ajustements:    adjSummary,
    modalites:      modSummary,
    conditions:     condSummary
  };
}

// Refresh in place — appelée par refreshTotals() après chaque oninput
function refreshDevisHeaders() {
  const sums = devisSectionSummaries();
  for (const key of Object.keys(sums)) {
    const el = document.querySelector(`.edit-section[data-edit-section="${key}"] .edit-section-summary`);
    if (el) el.innerHTML = sums[key];
  }
  // Met à jour aussi le footer de la preview pane (validation + dirty)
  const status = document.querySelector(".devis-pane-footer");
  if (status) status.innerHTML = rDevisPaneFooterInner();
}

// ----------------------------------------------------------------------------
// VALIDATION — pure. Renvoie { errors, warnings, ok } pour le bandeau preview.
// ----------------------------------------------------------------------------
function validateDevis() {
  const d = S.mission;
  const t = totals();
  const errors = [];
  const warnings = [];

  if (!d.ref || d.ref === "DEVIS-…-…") errors.push("Référence du devis manquante");
  const cliName = (d.client && d.client.name) ||
    (d.client && d.client.id && (S.clients.entries.find(c => c.id === d.client.id) || {}).name);
  if (!cliName) errors.push("Aucun client sélectionné");

  const lignesFact = (d.lignes || []).filter(l =>
    l.type === "heures" || (l.type === "materiel" && l.devis !== "debours")
  );
  if (lignesFact.length === 0 && t.depl <= 0) errors.push("Aucune prestation facturable");

  if (t.echeancesTotal !== 100) {
    errors.push(`Les échéances totalisent ${t.echeancesTotal.toString().replace(".",",")} % (doit être 100 %)`);
  }

  // Warnings non-bloquants
  const ri = computeRemiseInfo();
  if (num(d.remisePct) > ri.remiseMaxPct) {
    warnings.push(`Remise ${num(d.remisePct)}% > marge max recommandée (${ri.remiseMaxPct}%)`);
  }
  if (!d.paiement || !d.paiement.iban) warnings.push("IBAN non renseigné dans Modalités de paiement");

  return { errors, warnings, ok: errors.length === 0 };
}

// ----------------------------------------------------------------------------
// SNAPSHOT DIRTY — détecte si le devis a divergé du dernier snapshot Suivi.
// Hash léger : JSON.stringify(mission). Stocké dans suivi.devis[id].snapshotHash
// (cf. Patch F dans suiviAdd).
// ----------------------------------------------------------------------------
function devisHash() {
  return JSON.stringify(S.mission);
}
function devisCurrentSuiviEntry() {
  const ref = S.mission.ref;
  if (!ref || !S.suivi || !S.suivi.devis) return null;
  for (const [id, snap] of Object.entries(S.suivi.devis)) {
    if (snap && snap.ref === ref) return { id, snap };
  }
  return null;
}
function devisIsDirty() {
  const e = devisCurrentSuiviEntry();
  if (!e) return false; // pas encore enregistré → pas "dirty", c'est juste neuf
  return !e.snap.snapshotHash || e.snap.snapshotHash !== devisHash();
}

window.suiviUpdateSnapshot = function() {
  const e = devisCurrentSuiviEntry();
  if (!e) return;
  if (!confirm("Mettre à jour le snapshot enregistré dans Suivi ? L'ancienne version sera remplacée.")) return;
  const previewEl = document.getElementById("devisPreview");
  if (previewEl) {
    const clone = previewEl.cloneNode(true);
    clone.querySelectorAll(".dp-actions").forEach(n => n.remove());
    e.snap.snapshotHtml = clone.innerHTML;
  }
  e.snap.snapshotAt = new Date().toISOString();
  e.snap.snapshotTotal = totals().total;
  e.snap.snapshotHash = devisHash();
  save();
  refreshDevisHeaders();
};

// ----------------------------------------------------------------------------
// DRAG-REORDER des lignes (heures + matériel principal séparément).
// HTML5 natif. Au drop : reorder S.mission.lignes, save, re-render partiel
// de la liste concernée seulement (focus préservé partout ailleurs).
// ----------------------------------------------------------------------------
let _dragLigneId = null;
window.devisDragStart = function(ev, id) {
  _dragLigneId = id;
  ev.dataTransfer.effectAllowed = "move";
  ev.dataTransfer.setData("text/plain", id); // requis par Firefox
  const wrap = ev.currentTarget.closest(".lg-row-wrap");
  if (wrap) wrap.classList.add("dragging");
};
window.devisDragEnd = function(ev) {
  const wrap = ev.currentTarget.closest(".lg-row-wrap");
  if (wrap) wrap.classList.remove("dragging");
  document.querySelectorAll(".lg-row-wrap.drag-over").forEach(el => el.classList.remove("drag-over"));
  _dragLigneId = null;
};
window.devisDragOver = function(ev) {
  if (!_dragLigneId) return;
  ev.preventDefault();
  ev.dataTransfer.dropEffect = "move";
  const wrap = ev.currentTarget.closest(".lg-row-wrap");
  if (!wrap || wrap.dataset.id === _dragLigneId) return;
  document.querySelectorAll(".lg-row-wrap.drag-over").forEach(el => el.classList.remove("drag-over"));
  wrap.classList.add("drag-over");
};
window.devisDrop = function(ev, targetId) {
  ev.preventDefault();
  const srcId = _dragLigneId;
  if (!srcId || srcId === targetId) return;
  const lignes = S.mission.lignes || [];
  const srcIdx = lignes.findIndex(l => l.id === srcId);
  const tgtIdx = lignes.findIndex(l => l.id === targetId);
  if (srcIdx < 0 || tgtIdx < 0) return;
  // Contrainte : on ne reorder qu'au sein du même type (heures ↔ heures, matériel ↔ matériel)
  if (lignes[srcIdx].type !== lignes[tgtIdx].type) return;
  const [moved] = lignes.splice(srcIdx, 1);
  const newTgtIdx = lignes.findIndex(l => l.id === targetId);
  lignes.splice(newTgtIdx, 0, moved);
  save();
  // Re-render partiel : seule la liste concernée
  const containerId = moved.type === "heures" ? "lgListHeures" : "lgListMateriel";
  const container = document.getElementById(containerId);
  if (container) {
    const filtered = (S.mission.lignes || []).filter(l =>
      l.type === moved.type && (moved.type === "heures" ? true : l.devis !== "debours")
    );
    container.innerHTML = filtered.length
      ? filtered.map(l => rLigneDraggable(l)).join("")
      : `<div class="lg-empty">Aucune ligne</div>`;
  }
  refreshTotals();
};

// rLigne wrapper qui ajoute le handle de drag — sans modifier rLigne() existant.
// Insère un span .lg-drag juste après l'ouverture de .lg-row, et rend le row draggable.
function rLigneDraggable(l) {
  const inner = rLigne(l);
  return inner.replace(
    /<div class="lg-row">/,
    `<div class="lg-row" draggable="true"
      ondragstart="devisDragStart(event,'${l.id}')"
      ondragend="devisDragEnd(event)"
      ondragover="devisDragOver(event)"
      ondrop="devisDrop(event,'${l.id}')">
      <span class="lg-drag" title="Glisser pour réordonner">⋮⋮</span>`
  );
}

}

// ============================================================================
// SUIVI v2 — Modèle de statuts à deux niveaux
// ----------------------------------------------------------------------------
// STATUTS_PRIN  : statut principal du devis (4 valeurs visibles + refusé)
//                 dérivé à la volée depuis les statuts de ligne existants
// attentePaiement : flag transversal superposable, dérivé sur la même base
// ============================================================================

const STATUTS = [
  ["envoye",   "Envoyé"],
  ["accepte",  "Accepté"],
  ["en_cours", "En cours"],
  ["termine",  "Terminé"],
  ["refuse",   "Refusé / Annulé"]
];
// Mapping legacy : un statut de ligne "attente" est interne (= livré non payé).
// Il n'apparaît plus comme statut principal — il alimente le flag attentePaiement.
const STATUT_LEGACY = { paye: "termine", annule: "refuse" };

function entryStatut(e) { const s = e && e.statut; return STATUT_LEGACY[s] || s || "envoye"; }
function statutLabel(k) { const s = STATUTS.find(x => x[0] === k); return s ? s[1] : k; }

function pastille(statut) {
  const k = STATUT_LEGACY[statut] || statut || "envoye";
  return `<span class="pst" data-s="${esc(k)}" title="${esc(statutLabel(k))}"></span>`;
}

// Dérive le statut principal d'un devis à partir des statuts de ses lignes.
// "en_cours" = au moins une ligne déjà touchée (accepté/livré/payé) mais pas toutes terminées.
function devisPrincipal(lignes) {
  if (!lignes.length) return "envoye";
  const ss = lignes.map(entryStatut);
  if (ss.some(s => s === "refuse"))         return "refuse";
  if (ss.every(s => s === "termine"))       return "termine";
  if (ss.every(s => s === "envoye"))        return "envoye";
  if (ss.every(s => s === "accepte"))       return "accepte";
  return "en_cours";
}

// Flag transversal : le devis a-t-il une ligne livrée non payée ?
function devisAttentePaiement(lignes) {
  return lignes.some(e => entryStatut(e) === "attente");
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

function entryRef(e) {
  const d = S.suivi.devis && S.suivi.devis[e.devisId];
  return (d && d.ref) || e.ref || "";
}
function entryRefSet(e, val) {
  if (!S.suivi.devis) S.suivi.devis = {};
  if (!e.devisId) e.devisId = uid();
  if (!S.suivi.devis[e.devisId]) S.suivi.devis[e.devisId] = { ref: "" };
  S.suivi.devis[e.devisId].ref = val;
}

// Cleans a raw client string from Suivi entries. Excel-imported names look like "#116 Euphorbia"
// or "#114 Influenci". This strips the "#NUM " prefix and tries to match an existing client
// fiche by num or name. Returns the canonical client name (from S.clients.entries) when
// matched, or the cleaned raw name as a fallback.
function cleanClientLabel(rawClient) {
  if (!rawClient) return "";
  const raw = String(rawClient).trim();
  // Match leading "#NUM" pattern (with optional space after)
  const m = raw.match(/^#(\d+)\s*(.*)$/);
  let num = "";
  let name = raw;
  if (m) {
    num = m[1];
    name = m[2].trim() || raw;
  }
  // Try to find a matching client fiche
  if (S.clients && Array.isArray(S.clients.entries)) {
    let found = null;
    if (num) {
      found = S.clients.entries.find(c => (c.num || "").trim() === num);
    }
    if (!found && name) {
      const lower = name.toLowerCase();
      found = S.clients.entries.find(c => (c.name || "").trim().toLowerCase() === lower);
    }
    if (found && found.name) return found.name.trim();
  }
  // Fallback: return cleaned name (without #NUM prefix)
  return name;
}

function suiviClassifyEcheance(s) {
  const t = (s || "").toLowerCase();
  if (/acompte|accompte|1er|premier/.test(t)) return "acompte";
  if (/reste/.test(t)) return "reste";
  if (/frais|d[ée]bours/.test(t)) return "frais";
  return "other";
}

function suiviMigrate() {
  if (!S.suivi.devis) S.suivi.devis = {};

  for (const e of S.suivi.entries) {
    if (STATUT_LEGACY[e.statut]) e.statut = STATUT_LEGACY[e.statut];
  }

  const ungrouped = S.suivi.entries.filter(e => !e.devisId);
  if (ungrouped.length === 0) {
    // Even when nothing to group, refs may still need recomputing
    suiviRecomputeRefs();
    return;
  }

  const byKey = new Map();
  for (const e of ungrouped) {
    const k = `${e.client || ""}|${e.date || ""}`;
    if (!byKey.has(k)) byKey.set(k, []);
    byKey.get(k).push(e);
  }

  const assign = (entry, ref) => {
    const id = uid();
    entry.devisId = id;
    S.suivi.devis[id] = { ref: ref || "" };
    delete entry.ref;
    return id;
  };

  for (const entries of byKey.values()) {
    const acomptes = [], restes = [], frais = [], others = [];
    for (const e of entries) {
      const c = suiviClassifyEcheance(e.echeance);
      if (c === "acompte") acomptes.push(e);
      else if (c === "reste") restes.push(e);
      else if (c === "frais") frais.push(e);
      else others.push(e);
    }
    acomptes.sort((a, b) => num(a.montant) - num(b.montant));
    restes.sort((a, b) => num(a.montant) - num(b.montant));

    const created = [];
    const pairCount = Math.min(acomptes.length, restes.length);
    for (let i = 0; i < pairCount; i++) {
      const id = uid();
      const ref = acomptes[i].ref || restes[i].ref || "";
      acomptes[i].devisId = id;
      restes[i].devisId = id;
      delete acomptes[i].ref;
      delete restes[i].ref;
      S.suivi.devis[id] = { ref };
      created.push(id);
    }
    for (let i = pairCount; i < acomptes.length; i++) created.push(assign(acomptes[i], acomptes[i].ref));
    for (let i = pairCount; i < restes.length;   i++) created.push(assign(restes[i],   restes[i].ref));
    for (const e of others) created.push(assign(e, e.ref));
    if (frais.length) {
      if (created.length) {
        for (const e of frais) {
          e.devisId = created[0];
          delete e.ref;
        }
      } else {
        for (const e of frais) assign(e, e.ref);
      }
    }
  }
  // After grouping is done, auto-recompute any missing/malformed refs
  suiviRecomputeRefs();
}

// Auto-recompute Suivi refs at load time (and any time we want).
// For each devis group: if ref is empty or doesn't match the canonical "DEVIS-NUM-DATE"
// pattern, regenerate it using:
//   - NUM = client num (from S.clients fiche, matched by raw client string)
//   - DATE = earliest line date in the group
// Operates silently. No alert. Safe to run multiple times (idempotent).
function suiviRecomputeRefs() {
  if (!S.suivi || !S.suivi.devis || !Array.isArray(S.suivi.entries)) return;
  // Group entries by devisId
  const byDevisId = new Map();
  for (const e of S.suivi.entries) {
    if (!e.devisId) continue;
    if (!byDevisId.has(e.devisId)) byDevisId.set(e.devisId, []);
    byDevisId.get(e.devisId).push(e);
  }
  // Pattern: DEVIS-<NUM>-<YYYY-MM-DD>
  const validRefPattern = /^DEVIS-\d+-\d{4}-\d{2}-\d{2}$/i;
  for (const [devisId, lignes] of byDevisId.entries()) {
    if (!S.suivi.devis[devisId]) S.suivi.devis[devisId] = { ref: "" };
    const currentRef = (S.suivi.devis[devisId].ref || "").trim();
    if (currentRef && validRefPattern.test(currentRef)) continue; // already valid, skip
    // Earliest date among lignes (fallback: first non-empty)
    const dates = lignes.map(l => l.date).filter(Boolean).sort();
    const date = dates[0] || "";
    if (!date) continue; // no usable date → skip silently
    // Find the client num — use cleanClientLabel logic but keep the num
    const rawClient = lignes.find(l => l.client)?.client || "";
    let num = "";
    const m = String(rawClient).trim().match(/^#(\d+)\s*(.*)$/);
    if (m) num = m[1];
    // Try to match a fiche client (by num first, then by name) and use its num
    if (S.clients && Array.isArray(S.clients.entries)) {
      const cleanedName = m ? m[2].trim() : rawClient.trim();
      let found = null;
      if (num) found = S.clients.entries.find(c => (c.num || "").trim() === num);
      if (!found && cleanedName) {
        const lower = cleanedName.toLowerCase();
        found = S.clients.entries.find(c => (c.name || "").trim().toLowerCase() === lower);
      }
      if (found && found.num) num = String(found.num).trim();
    }
    if (!num) continue; // no usable num → skip silently (don't generate broken refs)
    S.suivi.devis[devisId].ref = `DEVIS-${num}-${date}`;
  }
}

function suiviAdd() {
  const m = S.mission;
  const cat = (S.tarifs.catalog || DEFAULT_CATALOG).find(c => c.k === m.object);
  const t = totals();
  const hoursTotal = (m.lignes || []).filter(l => l.type === "heures").reduce((s, l) => s + num(l.duree) * (l.unit === "j" ? HOURS_PER_DAY : 1), 0);
  const date = m.objectDate || new Date().toISOString().slice(0, 10);
  const client = m.client.name || "";
  const prestation = cat ? cat.l : "";
  const devisId = uid();

  // Snapshot the rendered devis HTML so we can re-display it later from Suivi
  let snapshotHtml = "";
  try {
    const el = document.getElementById("devisPreview");
    if (el) {
      // Clone and strip interactive elements (.dp-actions) before capturing
      const clone = el.cloneNode(true);
      clone.querySelectorAll(".dp-actions").forEach(n => n.remove());
      snapshotHtml = clone.innerHTML;
    }
  } catch (e) {
    console.warn("Snapshot devis failed", e);
  }

  S.suivi.devis[devisId] = {
    ref: m.ref || "",
    snapshotHtml,
    snapshotAt: new Date().toISOString(),
    snapshotTotal: t.total,
    snapshotClient: client,
    snapshotHash: (typeof devisHash === "function") ? devisHash() : ""
  };

  const mkLine = (echeance, montant, heures) => ({
    id: uid(), devisId, date, client, prestation,
    montant: montant.toFixed(2),
    heures:  heures.toFixed(2),
    echeance,
    paiement: montant.toFixed(2),
    ca: montant.toFixed(2),
    salaire: "0", ursaf: "0", tresorerie: "0", frais: "0",
    commentaires: "", statut: "envoye"
  });

  const acompte = mkLine("Acompte 30 %", t.acompte, hoursTotal * 0.30);
  const reste   = mkLine("Reste à payer 70 %", t.reste, hoursTotal * 0.70);
  S.suivi.entries.unshift(acompte, reste);

  suiviGroupExpanded = devisId;
  suiviExpanded = null;
  save();
  render();
}

function suiviImportKey(e) {
  return [e.date || "", (e.client || "").trim(), num(e.paiement).toFixed(2), num(e.heures).toFixed(2)].join("|");
}

function suiviImport() {
  const existing = new Set(S.suivi.entries.map(suiviImportKey));
  const toImport = SUIVI_SEED.filter(s => !existing.has(suiviImportKey(s)));
  if (toImport.length === 0) {
    alert(`Toutes les prestations de l'Excel sont déjà importées (${SUIVI_SEED.length} au total).`);
    return;
  }
  if (!confirm(`Importer ${toImport.length} prestation(s) manquante(s) depuis l'Excel ?\n\n(${S.suivi.entries.length} déjà présente(s) sur ${SUIVI_SEED.length} dans l'Excel)`)) return;
  for (const s of toImport) S.suivi.entries.push({ id: uid(), ...s });
  suiviMigrate();
  save();
  render();
}
window.suiviImport = suiviImport;

function suiviMissingCount() {
  const existing = new Set(S.suivi.entries.map(suiviImportKey));
  return SUIVI_SEED.filter(s => !existing.has(suiviImportKey(s))).length;
}


function suiviDel(id) {
  const e = S.suivi.entries.find(x => x.id === id);
  const did = e && e.devisId;
  S.suivi.entries = S.suivi.entries.filter(e => e.id !== id);
  if (did && S.suivi.entries.every(x => x.devisId !== did)) {
    if (S.suivi.devis) delete S.suivi.devis[did];
  }
  save();
  render();
}
window.suiviDel = suiviDel;

function suiviAddLigne(devisId) {
  if (!S.suivi.devis[devisId]) S.suivi.devis[devisId] = { ref: "" };
  const lignes = suiviGroupLigne(devisId);
  const lead = lignes[0] || {};
  const refStatut = lignes.length ? entryStatut(lead) : "envoye";
  const id = uid();
  S.suivi.entries.push({
    id, devisId,
    date:        lead.date || new Date().toISOString().slice(0, 10),
    client:      lead.client || "",
    prestation:  lead.prestation || "",
    montant:     "0",

    salaire:     "0",
    ursaf:       "0",

    frais:       "0",
    commentaires:"",
    statut:      refStatut
  });
  suiviGroupExpanded = devisId;
  suiviExpanded = id;
  save();
  render();
}
window.suiviAddLigne = suiviAddLigne;

// À l'acceptation d'un devis : les lignes "acompte" passent en "attente" (paiement attendu),
// les autres lignes passent en "accepte". Cela matche la règle métier :
// « Accepté → Si acompte requis : passe à 'En attente de paiement' ; sinon : En cours ».
function suiviDevisAccepter(devisId) {
  for (const e of suiviGroupLigne(devisId)) {
    delete e.statutAvantRefus;
    e.statut = suiviClassifyEcheance(e.echeance) === "acompte" ? "attente" : "accepte";
  }
  save();
  render();
}
window.suiviDevisAccepter = suiviDevisAccepter;

function suiviDevisRefuser(devisId) {
  for (const e of suiviGroupLigne(devisId)) {
    e.statutAvantRefus = entryStatut(e);
    e.statut = "refuse";
  }
  save();
  render();
}
window.suiviDevisRefuser = suiviDevisRefuser;

function suiviLigneRealise(id) {
  const e = S.suivi.entries.find(x => x.id === id);
  if (!e) return;
  e.statut = "attente";
  save();
  render();
}
window.suiviLigneRealise = suiviLigneRealise;

function suiviLignePaye(id) {
  const e = S.suivi.entries.find(x => x.id === id);
  if (!e) return;
  e.statut = "termine";
  save();
  render();
}
window.suiviLignePaye = suiviLignePaye;

function suiviRevert(id) {
  const e = S.suivi.entries.find(x => x.id === id);
  if (!e) return;
  const s = entryStatut(e);
  if (s === "termine") {
    e.statut = "attente";
  } else if (s === "attente") {
    e.statut = "accepte";
  } else if (s === "accepte") {
    for (const x of suiviGroupLigne(e.devisId)) x.statut = "envoye";
  } else if (s === "refuse") {
    for (const x of suiviGroupLigne(e.devisId)) {
      x.statut = x.statutAvantRefus || "envoye";
      delete x.statutAvantRefus;
    }
  }
  save();
  render();
}
window.suiviRevert = suiviRevert;

function suiviDevisRevertAccept(devisId) {
  for (const x of suiviGroupLigne(devisId)) x.statut = "envoye";
  save();
  render();
}
window.suiviDevisRevertAccept = suiviDevisRevertAccept;

function suiviDevisRevertRefus(devisId) {
  for (const x of suiviGroupLigne(devisId)) {
    x.statut = x.statutAvantRefus || "envoye";
    delete x.statutAvantRefus;
  }
  save();
  render();
}
window.suiviDevisRevertRefus = suiviDevisRevertRefus;

function devisActionsHtml(g) {
  const stop = "event.stopPropagation();";
  if (g.statutGlobal === "envoye") {
    return `
      <button class="btn-act act-vert" title="Accepté — le devis est validé. Toutes les lignes passent à « Accepté »." onclick="${stop}suiviDevisAccepter('${g.devisId}')"><span class="ico">✓</span> Accepté</button>
      <button class="btn-act act-rouge" title="Refusé — le client a refusé. Toutes les lignes passent à « Refusé »." onclick="${stop}suiviDevisRefuser('${g.devisId}')"><span class="ico">✗</span> Refusé</button>`;
  }
  if (g.statutGlobal === "accepte") {
    return `<button class="btn btn-icon ghost" title="Revenir : Accepté → Envoyé (toutes les lignes du devis)" onclick="${stop}suiviDevisRevertAccept('${g.devisId}')">↩</button>`;
  }
  if (g.statutGlobal === "refuse") {
    return `<button class="btn btn-icon ghost" title="Annuler le refus du devis et restaurer l'état précédent" onclick="${stop}suiviDevisRevertRefus('${g.devisId}')">↩</button>`;
  }
  return "";
}

function suiviActionsHtml(e, opts) {
  const s = entryStatut(e);
  const did = e.devisId;
  const stop = "event.stopPropagation();";
  const hidePhase1 = opts && opts.hidePhase1;
  if (s === "envoye") {
    if (hidePhase1) return "";
    return `
      <button class="btn-act act-vert" title="Accepté — le devis est validé. Toutes les lignes passent à « Accepté »." onclick="${stop}suiviDevisAccepter('${did}')"><span class="ico">✓</span> Accepté</button>
      <button class="btn-act act-rouge" title="Refusé — le client a refusé. Toutes les lignes passent à « Refusé »." onclick="${stop}suiviDevisRefuser('${did}')"><span class="ico">✗</span> Refusé</button>`;
  }
  if (s === "accepte") {
    return `
      <button class="btn btn-icon btn-bleu" title="Réalisé — la prestation est livrée. Cette ligne passe à « Attente paiement »." onclick="${stop}suiviLigneRealise('${e.id}')">→</button>
      <button class="btn btn-icon btn-rouge" title="Annulé — annule tout le devis. Toutes les lignes passent à « Refusé »." onclick="${stop}suiviDevisRefuser('${did}')">✗</button>
      <button class="btn btn-icon ghost" title="Revenir : Accepté → Envoyé (toutes les lignes du devis)" onclick="${stop}suiviRevert('${e.id}')">↩</button>`;
  }
  if (s === "attente") {
    return `
      <button class="btn btn-icon btn-vert" title="Payé — le paiement est reçu. Cette ligne passe à « Terminé »." onclick="${stop}suiviLignePaye('${e.id}')">€</button>
      <button class="btn btn-icon ghost" title="Revenir : Attente paiement → Accepté (cette ligne)" onclick="${stop}suiviRevert('${e.id}')">↩</button>`;
  }
  if (s === "termine") {
    return `<button class="btn btn-icon ghost" title="Revenir : Terminé → Attente paiement (cette ligne)" onclick="${stop}suiviRevert('${e.id}')">↩</button>`;
  }
  if (s === "refuse") {
    return `<button class="btn btn-icon ghost" title="Annuler le refus du devis et restaurer l'état précédent" onclick="${stop}suiviRevert('${e.id}')">↩</button>`;
  }
  return "";
}

// Compatibilité avec l'ancien renderer si appelé ailleurs (alias vers devisPrincipal)
function devisStatutGlobal(lignes) { return devisPrincipal(lignes); }

function suiviStats(groups) {
  const by = { envoye: 0, accepte: 0, attente: 0, termine: 0, refuse: 0 };
  let total = 0;
  for (const g of groups) {
    by[g.statutGlobal] = (by[g.statutGlobal] || 0) + 1;
    if (g.statutGlobal !== "refuse") total += g.total;
  }
  return { by, count: groups.length, total };
}

function suiviStatsHtml(s) {
  const all = suiviGroupsAll();
  const attente = all.filter(g => g.attentePaiement).length;
  return `
    <div class="stat">Devis<strong>${s.count}</strong></div>
    <div class="stat">Envoyé<strong>${s.by.envoye || 0}</strong></div>
    <div class="stat">Accepté<strong>${s.by.accepte || 0}</strong></div>
    <div class="stat">En cours<strong>${s.by.en_cours || 0}</strong></div>
    <div class="stat">Terminé<strong>${s.by.termine || 0}</strong></div>
    <div class="stat" style="border-color:var(--warning);background:rgba(245,158,11,.06)">
      💰 Attente paiement<strong style="color:var(--warning)">${attente}</strong>
    </div>
    <div class="stat">Total facturé<strong>${fmt(s.total)}</strong></div>
  `;
}

function suiviDeleteSelected() {

  if (!confirm(`Supprimer ${n} devis sélectionné${n > 1 ? "s" : ""} (toutes les lignes incluses) ? Cette action est irréversible.`)) return;

    S.suivi.entries = S.suivi.entries.filter(e => e.devisId !== devisId);
    if (S.suivi.devis) delete S.suivi.devis[devisId];

  suiviSelected.clear();
  save();
  render();

const STATUT_ORDER = { envoye: 0, accepte: 1, en_cours: 2, termine: 3, refuse: 4 };

// Liste TOUS les groupes (sans filtre) — utile pour les compteurs des chips
function suiviGroupsAll() {
  const m = new Map();
  for (const e of S.suivi.entries) {
    const did = e.devisId || ("__orphan_" + e.id);
    if (!m.has(did)) m.set(did, []);
    m.get(did).push(e);
  }
  return [...m.entries()].map(([devisId, lignes]) => ({
    devisId, lignes,
    statutPrin: devisPrincipal(lignes),
    attentePaiement: devisAttentePaiement(lignes)
  }));
}

function suiviGroups() {
  const groups = new Map();
  for (const e of S.suivi.entries) {
    const did = e.devisId || ("__orphan_" + e.id);
    if (!groups.has(did)) groups.set(did, []);
    groups.get(did).push(e);
  }
  let list = [];
  for (const [devisId, lignes] of groups) {
    lignes.sort((a, b) => (a.date || "").localeCompare(b.date || ""));
    const statutPrin = devisPrincipal(lignes);
    const attentePaiement = devisAttentePaiement(lignes);
    const total = lignes.reduce((s, e) => s + num(e.montant), 0);
    const dates = lignes.map(e => e.date || "").filter(Boolean);
    const ref = (S.suivi.devis && S.suivi.devis[devisId] && S.suivi.devis[devisId].ref) || "";
    const lead = lignes[0] || {};
    list.push({
      devisId, ref, lignes,
      statutPrin, attentePaiement,
      statutGlobal: statutPrin,            // alias pour suiviStats hérité
      total,
      dateMin: dates[0] || "",
      dateMax: dates[dates.length - 1] || "",
      client: lead.client || "",
      prestation: lead.prestation || ""
    });
  }
  // Filtre principal (single-select, exclusif)
  if (suiviFilterPrincipal !== "all") list = list.filter(g => g.statutPrin === suiviFilterPrincipal);
  // Filtre année (existant)
  if (suiviFilterYear !== "all") list = list.filter(g => g.lignes.some(e => (e.date || "").startsWith(suiviFilterYear)));
  // Filtre transversal attente paiement (peut se combiner)
  if (suiviFilterAttente) list = list.filter(g => g.attentePaiement);

  // Tri
  const dir = suiviSort.dir === "asc" ? 1 : -1;
  const f = suiviSort.field;
  list.sort((a, b) => {
    if (f === "statut")  return ((STATUT_ORDER[a.statutPrin] ?? 99) - (STATUT_ORDER[b.statutPrin] ?? 99)) * dir;
    if (f === "date")    return (a.dateMax || "").localeCompare(b.dateMax || "") * dir;
    if (f === "ref")     return a.ref.localeCompare(b.ref, "fr", { numeric: true }) * dir;
    if (f === "montant") return (a.total - b.total) * dir;
    return a.client.localeCompare(b.client, "fr") * dir;
  });
  return list;
}

function suiviTauxHoraire(e) {
  const h = num(e.heures);
  return h > 0 ? num(e.montant) / h : 0;

}

function dateFR(iso) {
  if (!iso || iso.length < 10) return "—";
  const [y, m, d] = iso.split("-");

}

  return `<span class="arr on">${suiviSort.dir === "asc" ? "▲" : "▼"}</span>`;
}

// Génère le bouton contextuel d'une étape selon son statut courant
function suiviTimelineStepAction(e, isAcompte) {
  const s = entryStatut(e);
  const stop = "event.stopPropagation();";
  if (s === "envoye") {
    // Le devis n'est pas encore accepté — actions au niveau devis, pas étape
    return `<span style="color:var(--text-dim);font-size:11px">En attente d'acceptation du devis</span>`;
  }
  if (s === "accepte") {
    // Étape acceptée mais pas livrée
    if (isAcompte) {
      return `<button class="btn btn-vert" onclick="${stop}suiviLignePaye('${e.id}')">✓ Acompte reçu</button>`;
    }
    return `<button class="btn btn-bleu" onclick="${stop}suiviLigneRealise('${e.id}')">→ Marquer étape livrée</button>`;
  }
  if (s === "attente") {
    return `<button class="btn btn-vert" onclick="${stop}suiviLignePaye('${e.id}')">€ Marquer paiement reçu</button>
            <button class="btn ghost btn-icon" title="Annuler la livraison" onclick="${stop}suiviRevert('${e.id}')">↩</button>`;
  }
  if (s === "termine") {
    return `<button class="btn ghost btn-icon" title="Annuler le paiement (revenir à Attente)" onclick="${stop}suiviRevert('${e.id}')">↩</button>`;
  }
  if (s === "refuse") {
    return ``;
  }
  return ``;
}

// Représente une étape dans la timeline
function suiviTimelineStepHtml(e) {
  const s = entryStatut(e);
  const isAcompte = suiviClassifyEcheance(e.echeance) === "acompte";

  // Calcule l'état visuel des deux flags livré / payé
  let dotClass = "";
  let icon = "○";
  let flagsHtml = "";

  if (s === "refuse") {
    dotClass = "refused"; icon = "✗";
    flagsHtml = `<span class="suv-tl-flag idle">Refusé</span>`;
  } else if (s === "termine") {
    dotClass = "done"; icon = "✓";
    flagsHtml = `<span class="suv-tl-flag delivered">📦 Livré</span><span class="suv-tl-flag paid">💰 Payé</span>`;
  } else if (s === "attente") {
    dotClass = "waiting"; icon = "⏳";
    const livreLabel = isAcompte ? "Dû" : "Livré";
    flagsHtml = `<span class="suv-tl-flag delivered">📦 ${livreLabel}</span><span class="suv-tl-flag pending">💰 Paiement attendu</span>`;
  } else if (s === "accepte") {
    dotClass = ""; icon = "○";
    flagsHtml = `<span class="suv-tl-flag idle">Acceptée — non livrée</span>`;
  } else { // envoye
    dotClass = ""; icon = "○";
    flagsHtml = `<span class="suv-tl-flag idle">En attente d'acceptation</span>`;
  }

  return `
    <div class="suv-tl-step">
      <div class="suv-tl-dot ${dotClass}">${icon}</div>
      <div class="suv-tl-body">
        <div class="suv-tl-title">${esc(e.echeance || "Étape")}</div>
        <div class="suv-tl-flags">${flagsHtml}</div>
      </div>
      <div class="suv-tl-amount">${fmt(e.montant)}</div>
      ${suiviTimelineStepAction(e, isAcompte) ? `<div class="suv-tl-actions">${suiviTimelineStepAction(e, isAcompte)}</div>` : ''}
    </div>`;
}

function rSuiviTimelineModal() {
  if (!suiviTimelineModal) return "";
  const devisId = suiviTimelineModal.devisId;
  const lignes = S.suivi.entries.filter(e => e.devisId === devisId)
    .sort((a, b) => (a.date || "").localeCompare(b.date || ""));
  if (!lignes.length) {
    suiviTimelineModal = null;
    return "";
  }
  const dv = S.suivi.devis && S.suivi.devis[devisId];
  const ref = (dv && dv.ref) || "(sans référence)";
  const total = lignes.reduce((s, e) => s + num(e.montant), 0);
  const dates = lignes.map(e => e.date).filter(Boolean).sort();
  const dateMin = dates[0] || "";
  const dateMax = dates[dates.length - 1] || "";
  const dateLabel = dateMin === dateMax ? dateFR(dateMin) : `${dateFR(dateMin)} → ${dateFR(dateMax)}`;
  const statutPrin = devisPrincipal(lignes);
  const attente = devisAttentePaiement(lignes);
  const client = cleanClientLabel(lignes[0].client) || "—";

  // Actions au niveau devis (acceptation, refus, revert)

  let devisLevelAction = "";

    devisLevelAction = `

      <button class="btn-act act-rouge" onclick="${stop}suiviDevisRefuser('${devisId}')"><span class="ico">✗</span> Refusé</button>`;

    devisLevelAction = `<button class="btn ghost" onclick="${stop}suiviDevisRevertRefus('${devisId}')">↩ Annuler le refus</button>`;

  return `<div class="modal-overlay" onclick="if(event.target===this)suiviTimelineClose()">

      <div class="suv-tl-header">
        <div class="suv-tl-header-top">

        <div class="suv-tl-meta">
          <span>Client : <strong>${esc(client)}</strong></span>
          <span>Total : <strong>${fmt(total)}</strong></span>
          <span>Date : <strong>${esc(dateLabel)}</strong></span>
          <span>${lignes.length} étape${lignes.length > 1 ? 's' : ''}</span>
        </div>
        ${devisLevelAction ? `<div style="display:flex;gap:6px;margin-top:8px">${devisLevelAction}</div>` : ''}

    const dateLabel = g.dateMin === g.dateMax

      : `${esc(dateFR(g.dateMin))} → ${esc(dateFR(g.dateMax))}`;

    return `

        <tr class="suv-row clickable" onclick="suiviTimelineOpen('${g.devisId}')">

          <td class="amt">${fmt(g.total)}</td>
          <td class="actions" onclick="${stop}">
            <div class="suv-quick-actions">
              <button class="qa-btn" title="Voir / imprimer le devis émis"
                onclick="viewDevisOpen('${g.devisId}')"><span class="qa-ico">🖨</span>Devis</button>
              <button class="qa-btn" title="Voir / imprimer la note de débours"
                onclick="viewDeboursOpen('${g.devisId}')"><span class="qa-ico">🖨</span>Débours</button>

    .concat(years.map(y => `<option value="${esc(y)}" ${suiviFilterYear === y ? "selected" : ""}>${esc(y)}</option>`)).join("");

  // États vides spécialisés

    emptyHtml = `<div class="empty">Aucun devis enregistré. Depuis l'onglet Devis, clique sur « + Enregistrer dans Suivi ».</div>`;
  } else if (list.length === 0) {
    if (suiviFilterAttente && suiviFilterPrincipal === "all") {
      emptyHtml = `<div class="empty empty-attente">Aucun devis en attente de paiement. ✨</div>`;
    } else {
      emptyHtml = `<div class="empty">Aucun devis ne correspond aux filtres sélectionnés.</div>`;

  return `

}

// Import unique clients from SUIVI_SEED + S.suivi.entries
// Parse contacts from a Tosma-like cell: "Cyrille VANHULLE Théophile NOGRIX" → 2 contacts
// Heuristic: split on patterns where a Last name (UPPERCASE word) is followed by a Firstname (capitalized word)
function parseMultiContactNames(raw) {
  if (!raw) return [];
  const s = raw.trim();
  // First try: split on common separators (newlines, slashes, semicolons, commas)
  if (/[\n;\/]/.test(s) || s.includes(",")) {
    return s.split(/[\n,;\/]+/).map(x => x.trim()).filter(Boolean);
  }
  // Second try: detect "[Firstname] [LASTNAME] [Firstname] [LASTNAME]" pattern
  // A LASTNAME (all upper) followed by a Firstname (cap+lower) means a new contact starts
  const tokens = s.split(/\s+/);
  if (tokens.length < 4) return [s]; // too short to be multi-contact
  const groups = [];
  let current = [];
  for (let i = 0; i < tokens.length; i++) {
    current.push(tokens[i]);
    // If current token is ALL UPPERCASE (lastname) and next token starts with capital + lowercase (firstname),
    // we have a contact boundary
    const tk = tokens[i];
    const next = tokens[i + 1];
    const isLastname = tk.length >= 2 && tk === tk.toUpperCase() && /[A-ZÀ-Ÿ]/.test(tk);
    const nextIsFirstname = next && /^[A-ZÀ-Ÿ][a-zà-ÿ]/.test(next);
    if (isLastname && nextIsFirstname) {
      groups.push(current.join(" "));
      current = [];
    }
  }
  if (current.length) groups.push(current.join(" "));
  return groups.length >= 2 ? groups : [s];
}

// Parse multi-emails (whitespace-separated emails in one cell)
function parseMultiEmails(raw) {
  if (!raw) return [];
  // First try: split on newlines, commas, semicolons, slashes
  if (/[\n,;\/]/.test(raw)) {
    return raw.split(/[\n,;\/]+/).map(x => x.trim()).filter(Boolean);
  }
  // Then: split on whitespace if multiple @ are present
  const atCount = (raw.match(/@/g) || []).length;
  if (atCount >= 2) {
    return raw.split(/\s+/).map(x => x.trim()).filter(x => x.includes("@"));
  }
  return [raw.trim()];
}

// Parse multi-phones similarly
function parseMultiPhones(raw) {
  if (!raw) return [];
  if (/[\n,;\/]/.test(raw)) {
    return raw.split(/[\n,;\/]+/).map(x => x.trim()).filter(Boolean);
  }
  return [raw.trim()];
}

// Build a clean contacts array from raw fields by zipping parsed values
function buildContactsFromRaw(rawContact, rawPhone, rawEmail) {
  const names = parseMultiContactNames(rawContact);
  const phones = parseMultiPhones(rawPhone);
  const emails = parseMultiEmails(rawEmail);
  const max = Math.max(names.length, phones.length, emails.length, 1);
  const contacts = [];
  for (let i = 0; i < max; i++) {
    contacts.push({
      id: uid(),
      name: names[i] || "",
      phone: phones[i] || "",
      email: emails[i] || ""
    });
  }
  // Don't return entirely-empty array; ensure at least one slot
  return contacts.length ? contacts : [{ id: uid(), name: "", phone: "", email: "" }];
}

function clientsImportFromSuivi() {
  // Use CLIENTS_SEED (real data extracted from Excel) as authoritative source.
  // Fallback to SUIVI_SEED parsing only if CLIENTS_SEED unavailable.
  const seed = (typeof CLIENTS_SEED !== "undefined" && Array.isArray(CLIENTS_SEED)) ? CLIENTS_SEED : null;
  if (!seed) {
    alert("Seed clients indisponible (CLIENTS_SEED manquant).");
    return;
  }
  const existing = S.clients.entries;
  // Decide for each seed entry: skip (exists) / import (new) / update (exists but contacts empty)
  let added = 0, updated = 0, skipped = 0;
  for (const c of seed) {
    if (!c.name && !c.num) continue;
    // Match by num first, then by exact name (case-insensitive)
    const found = existing.find(x =>
      (c.num && (x.num || "").trim() === c.num)
      || (c.name && (x.name || "").trim().toLowerCase() === c.name.toLowerCase())
    );
    if (found) {
      // Existing client — only fill missing data, never overwrite user's edits
      const hasContent = Array.isArray(found.contacts) && found.contacts.some(k => k.name || k.phone || k.email);
      if (!hasContent && (c.contact || c.phone || c.email)) {
        found.contacts = buildContactsFromRaw(c.contact, c.phone, c.email);
        if (!found.address) found.address = c.address || "";
        if (!found.cityPostal) found.cityPostal = c.cityPostal || "";
        if (!found.rencontre) found.rencontre = c.via || "";
        if (!found.num) found.num = c.num || "";
        // Sync legacy
        syncClientLegacy(found);
        updated++;
      } else {
        skipped++;
      }
    } else {
      // New client
      const contacts = buildContactsFromRaw(c.contact, c.phone, c.email);
      const newClient = {
        id: uid(),
        num: c.num || "",
        name: c.name || "",
        contacts,
        contact: "", phone: "", email: "",
        address: c.address || "",
        cityPostal: c.cityPostal || "",
        rencontre: c.via || ""
      };
      syncClientLegacy(newClient);
      S.clients.entries.push(newClient);
      added++;
    }
  }
  // Sort clients by num then name for tidiness
  S.clients.entries.sort((a, b) => {
    const an = parseInt(a.num, 10);
    const bn = parseInt(b.num, 10);
    if (!isNaN(an) && !isNaN(bn) && an !== bn) return an - bn;
    if (!isNaN(an) && isNaN(bn)) return -1;
    if (isNaN(an) && !isNaN(bn)) return 1;
    return (a.name || "").localeCompare(b.name || "", "fr");
  });
  save();
  render();
  const parts = [];
  if (added) parts.push(`${added} ajouté${added > 1 ? "s" : ""}`);
  if (updated) parts.push(`${updated} complété${updated > 1 ? "s" : ""}`);
  if (skipped) parts.push(`${skipped} déjà à jour`);
  alert(parts.length ? `Import terminé : ${parts.join(", ")}.` : "Aucun changement.");
}

function clientsFilter(q) {
  const term = (q || "").trim().toLowerCase();
  const list = document.getElementById("clientsList");
  const noRes = document.getElementById("clientsNoResults");
  if (!list) return;
  let visible = 0;
  list.querySelectorAll("tr.cli-row").forEach(tr => {
    const hay = (tr.dataset.search || "").toLowerCase();
    const show = !term || hay.includes(term);
    tr.style.display = show ? "" : "none";
    const detail = tr.nextElementSibling;
    if (detail && detail.classList.contains("cli-detail")) {
      detail.style.display = show ? "" : "none";
    }
    if (show) visible++;
  });
  if (noRes) {
    if (term && visible === 0) {
      noRes.querySelectorAll(".term").forEach(el => el.textContent = q);
      noRes.style.display = "";
      list.style.display = "none";
    } else {
      noRes.style.display = "none";
      list.style.display = "";
    }
  }
}

// Compute amortization rates (per hour)
function tauxMatos() {
  const heures = num(S.tarifs.heuresAnnuelles) || 900;
  const heuresParMois = heures / 12;
  const today = new Date();
  const CURRENT_YEAR = today.getFullYear();
  const CURRENT_MONTH = today.getMonth() + 1; // 1..12
  const monthsElapsed = CURRENT_MONTH; // mois passés ou en cours dans l'année (avril → 4)

  // ABONNEMENTS — actifs aujourd'hui (date début passée, pas de date fin ou future)
  // Coût mensuel = annuel ÷ 12
  let mensuelActif = 0;
  for (const e of (S.abonnements.entries || [])) {
    const annual = num(e.annuel);
    if (annual <= 0) continue;
    const startDate = e.dateDebut || null;
    const endDate = e.dateFin || null;
    const isActiveNow = (!startDate || startDate <= today.toISOString().slice(0, 10))
                     && (!endDate   || endDate   >= today.toISOString().slice(0, 10));
    if (isActiveNow) mensuelActif += annual / 12;
  }
  // Total dépensé en abonnements depuis le 1er janvier de cette année (mois × mensuel)
  // Note : suppose que les abos actifs maintenant l'étaient toute l'année. Approximation acceptable.
  const abonnementsDepensesYTD = r2(monthsElapsed * mensuelActif);
  // Taux horaire abonnement = (mois écoulés × mensuel) ÷ heures du mois
  const tauxAbo = heuresParMois > 0 ? r2(abonnementsDepensesYTD / (monthsElapsed * heuresParMois)) : 0;
  // Equivalent simplifié : tauxAbo = mensuelActif / heuresParMois (les "monthsElapsed" se simplifient)
  // Mais on garde la formule explicite pour la lisibilité

  // MATÉRIEL — pour chaque équipement encore en cours d'amortissement, on compte les mensualités qui tomberont dans les 12 mois à venir.
  // Si l'équipement termine son amortissement dans X mois (X < 12), on ne compte que X mensualités.
  // Cela lisse la transition : pas de discontinuité au dernier mois.
  let materielAnnuel = 0;
  for (const inv of (S.investissements.entries || [])) {
    const prix = num(inv.prix);
    const duree = num(inv.dureeVie) || 5;
    if (duree <= 0 || prix <= 0) continue;
    if (!inv.date || !/^\d{4}-\d{2}/.test(inv.date)) continue;
    const totalMonths = duree * 12;
    const monthlyAmort = prix / totalMonths;
    const purchaseDate = new Date(inv.date);
    if (isNaN(purchaseDate.getTime())) continue;
    const monthsSincePurchase = (today.getFullYear() - purchaseDate.getFullYear()) * 12
                              + (today.getMonth() - purchaseDate.getMonth());
    if (monthsSincePurchase < 0) continue; // pas encore acheté
    const monthsLeft = totalMonths - monthsSincePurchase;
    if (monthsLeft <= 0) continue; // déjà entièrement amorti
    // Sur les 12 prochains mois : min(12, monthsLeft) mensualités
    const monthsToCount = Math.min(12, monthsLeft);
    materielAnnuel += monthlyAmort * monthsToCount;
  }
  materielAnnuel = r2(materielAnnuel);
  const tauxMatHoraire = heures > 0 ? r2(materielAnnuel / heures) : 0;

  // Total + facteur sécurité
  const tauxBrut = r2(tauxAbo + tauxMatHoraire);
  const facteur = num(S.tarifs.facteurSecurite) || 0;
  const tauxAvecSecurite = r2(tauxBrut * (1 + facteur / 100));

  return {
    heures,
    heuresParMois: r2(heuresParMois),
    monthsElapsed,
    mensuelActif: r2(mensuelActif),
    abonnementsDepensesYTD,
    materielAnnuel,
    tauxAbo,
    tauxInv: tauxMatHoraire,
    tauxBrut,
    facteur,
    tauxAvecSecurite,
    // tauxRetenu is now identical to tauxAvecSecurite (no rounding) — kept as alias for back-compat
    tauxRetenu: tauxAvecSecurite,
    // legacy keys retained for any other consumer
    abonnementsAnnuels: r2(mensuelActif * 12),
    investissementsAnnuels: materielAnnuel,
    totalAnnuel: r2(r2(mensuelActif * 12) + materielAnnuel),
    tauxTotal: tauxBrut,
    currentYear: CURRENT_YEAR
  };
}

function refreshTauxMatos() {
  // Save focus + caret position, re-render, then restore
  const active = document.activeElement;
  const id = active && active.id;

// ============ AMORTIZATION ANALYSIS ============
// For each year:
//   1. Sum trésorerie from Suivi entries (status: accepté/terminé/attente — money actually received).
//   2. Subtract abonnements actifs that year (annual cost).
//   3. Cumulate available cash.
//   4. Walk investissements chronologically, deduct each one's cost from cumulative cash.
//   5. Mark each as ✓ amorti if fully covered, partial otherwise.
function amortizationAnalysis() {
  const CURRENT_YEAR = new Date().getFullYear();
  // Step 1 — group treasury by year (received payments only)
  const RECEIVED_STATUSES = new Set(["accepte", "attente", "termine"]);
  const tresorerieByYear = {};
  for (const e of (S.suivi.entries || [])) {
    if (!RECEIVED_STATUSES.has(entryStatut(e))) continue;
    const year = (e.date || "").slice(0, 4);
    if (!year || !/^\d{4}$/.test(year)) continue;
    tresorerieByYear[year] = (tresorerieByYear[year] || 0) + num(e.tresorerie);
  }
  // Step 2 — abonnements per year (only when active during that year)
  const abonnementsByYear = {};
  for (const a of (S.abonnements.entries || [])) {
    const annual = num(a.annuel);
    if (annual <= 0) continue;
    const startYear = a.dateDebut ? parseInt(a.dateDebut.slice(0, 4), 10) : null;
    const endYear   = a.dateFin   ? parseInt(a.dateFin.slice(0, 4), 10)   : null;
    for (const y of Object.keys(tresorerieByYear)) {
      const yi = parseInt(y, 10);
      const wasActive = (startYear === null || yi >= startYear) && (endYear === null || yi <= endYear);
      if (wasActive) abonnementsByYear[y] = (abonnementsByYear[y] || 0) + annual;
    }
  }
  // Step 3 — for each investment, build per-year amortization schedule (option B: prorata on purchase year, full thereafter)
  const inv = [...(S.investissements.entries || [])].filter(x => num(x.prix) > 0);
  // amortByYear[year][invId] = amount amortized that year for that investment
  const amortByYear = {};
  // Map investment id → { schedule: { year: amount }, totalScheduled }
  const invSchedule = {};
  for (const item of inv) {
    const prix = r2(num(item.prix));
    const dureeAnnees = num(item.dureeVie) || 5;
    if (dureeAnnees <= 0) continue;
    const annualFull = prix / dureeAnnees; // theoretical annual amortization
    if (!item.date || !/^\d{4}-\d{2}/.test(item.date)) continue;
    const purchaseYear = parseInt(item.date.slice(0, 4), 10);
    const purchaseMonth = parseInt(item.date.slice(5, 7), 10) || 1;
    // Prorata for purchase year: (13 - purchaseMonth) / 12 months remaining in year
    const proratPurchaseYear = (13 - purchaseMonth) / 12;
    // Total months to amortize over (in months): dureeAnnees * 12
    // We distribute the full prix over months: dureeAnnees * 12 months starting from purchaseMonth/purchaseYear
    // For year Y > purchaseYear, full year (12 months) until amortization is complete
    // For year Y = purchaseYear, only (13-purchaseMonth) months
    // For the last year (when remainder runs out), we may have a partial last year too
    const monthlyAmort = prix / (dureeAnnees * 12);
    const schedule = {};
    let monthsLeft = dureeAnnees * 12;
    let y = purchaseYear;
    let monthsThisYear = 13 - purchaseMonth; // first year
    while (monthsLeft > 0) {
      const monthsToAmort = Math.min(monthsThisYear, monthsLeft);
      const yKey = String(y);
      schedule[yKey] = (schedule[yKey] || 0) + monthlyAmort * monthsToAmort;
      monthsLeft -= monthsToAmort;
      y++;
      monthsThisYear = 12; // subsequent years are full
    }
    // Round each schedule entry
    for (const k of Object.keys(schedule)) schedule[k] = r2(schedule[k]);
    invSchedule[item.id] = { schedule, prix, descriptif: item.descriptif, date: item.date };
    // Aggregate into amortByYear
    for (const [yk, val] of Object.entries(schedule)) {
      amortByYear[yk] = r2((amortByYear[yk] || 0) + val);
    }
  }
  // Step 4 — build year-by-year P&L
  // Years to consider: union of treasury years, abonnement years, amortization years
  const allYearsSet = new Set([
    ...Object.keys(tresorerieByYear),
    ...Object.keys(abonnementsByYear),
    ...Object.keys(amortByYear)
  ]);
  // Filter out years from the future (beyond current year + 1) to keep the table clean
  // — keep up to current year inclusive; future schedule is just info but useful so let's keep all years up to current
  const allYears = Array.from(allYearsSet).filter(y => parseInt(y, 10) <= CURRENT_YEAR).sort();
  let cumulSolde = 0;
  const yearRows = allYears.map(y => {
    const tres = r2(tresorerieByYear[y] || 0);
    const abo = r2(abonnementsByYear[y] || 0);
    const amort = r2(amortByYear[y] || 0);
    const solde = r2(tres - abo - amort);
    cumulSolde = r2(cumulSolde + solde);
    return { year: y, tres, abo, amort, solde, cumul: cumulSolde };
  });

  // Step 5 — per-investment status: cash-based allocation
  // Available cash = sum of (tresorerie - abonnements) over all years
  const totalCashDispo = r2(yearRows.reduce((s, r) => s + Math.max(0, r.tres - r.abo), 0));
  // Sort investments chronologically (oldest first)
  const invSortedAsc = [...inv].sort((a, b) => (a.date || "").localeCompare(b.date || ""));
  const today = new Date();
  let remainingCash = totalCashDispo;
  const invStatus = invSortedAsc.map(item => {
    const prix = r2(num(item.prix));
    const dureeAnnees = num(item.dureeVie) || 5;
    // Is this equipment still in amortization period (purchase + duration > today)?
    let stillAmortizing = true;
    if (item.date && /^\d{4}-\d{2}/.test(item.date)) {
      const purchaseDate = new Date(item.date);
      if (!isNaN(purchaseDate.getTime())) {
        const endDate = new Date(purchaseDate);
        endDate.setMonth(endDate.getMonth() + Math.round(dureeAnnees * 12));
        stillAmortizing = endDate > today;
      }
    }
    let amorti = 0, reste = prix;
    if (!stillAmortizing) {
      // Equipment is past its amortization period — show 100% amorti (it's done, period closed)
      amorti = prix;
      reste = 0;
    } else if (remainingCash >= prix) {
      amorti = prix;
      reste = 0;
      remainingCash = r2(remainingCash - prix);
    } else if (remainingCash > 0) {
      amorti = r2(remainingCash);
      reste = r2(prix - amorti);
      remainingCash = 0;
    }
    return { ...item, prix, amorti, reste, fullyAmorti: reste === 0, stillAmortizing };
  });

  const totalInvested = r2(invStatus.reduce((s, x) => s + x.prix, 0));
  const totalAmorti = r2(invStatus.reduce((s, x) => s + x.amorti, 0));

  return {
    yearRows,
    invStatus,
    totalInvested,
    totalAmorti,
    cumulSolde,
    totalCashDispo,
    cashLeftover: remainingCash,
    // Legacy keys kept for backward compat with existing UI references
    totalCashAvailable: r2(yearRows.reduce((s, r) => s + (r.tres - r.abo), 0))
  };
}

const MOIS_FR = ["janv.","févr.","mars","avr.","mai","juin","juil.","août","sept.","oct.","nov.","déc."];

function bilanCompute() {
  const byMonth = {};
  for (const e of S.suivi.entries) {
    const date = e.date || "";
    if (date.length < 7) continue;
    const ym = date.slice(0, 7);
    if (!byMonth[ym]) byMonth[ym] = { heures:0, paiement:0, ca:0, salaire:0, ursaf:0, tresorerie:0, frais:0 };
    const b = byMonth[ym];
    const paid = entryStatut(e) === "termine";
    if (paid) {
      b.heures     += num(e.heures);
      b.paiement   += num(e.paiement != null && e.paiement !== "" ? e.paiement : e.montant);
      b.ca         += num(e.ca       != null && e.ca       !== "" ? e.ca       : e.montant);
      b.salaire    += num(e.salaire);
      b.tresorerie += num(e.tresorerie);
      b.frais      += num(e.frais);
    }
    b.ursaf += num(e.ursaf);
  }
  const months = Object.keys(byMonth).sort((a, b) => b.localeCompare(a));
  return months.map(ym => {
    const b = byMonth[ym];
    return { ym, ...b, totalPro: b.ursaf + b.tresorerie + b.frais };
  });
}

function bilanRender() {
  const data = bilanCompute();
  if (data.length === 0) return { body: "", foot: "" };

  const monthLabel = ym => {
    const [y, m] = ym.split("-");
    return `${MOIS_FR[parseInt(m, 10) - 1]} ${y}`;
  };
  const cellH = v => `<td style="text-align:right;font-variant-numeric:tabular-nums;padding-right:14px">${num(v).toFixed(2).replace(".", ",")}</td>`;
  const cell  = v => `<td style="text-align:right;font-variant-numeric:tabular-nums;padding-right:14px">${fmt(v)}</td>`;

  const annual = {};
  const grand = { heures:0, paiement:0, ca:0, salaire:0, totalPro:0, ursaf:0, tresorerie:0, frais:0 };
  for (const r of data) {
    const y = r.ym.slice(0, 4);
    if (!annual[y]) annual[y] = { heures:0, paiement:0, ca:0, salaire:0, totalPro:0, ursaf:0, tresorerie:0, frais:0 };
    for (const k of Object.keys(grand)) { annual[y][k] += r[k]; grand[k] += r[k]; }
  }

  const rows = [];
  for (let i = 0; i < data.length; i++) {
    const r = data[i];
    const y = r.ym.slice(0, 4);
    rows.push(`
      <tr>
        <td>${esc(monthLabel(r.ym))}</td>
        ${cellH(r.heures)}
        ${cell(r.paiement)}
        ${cell(r.ca)}
        ${cell(r.salaire)}
        ${cell(r.totalPro)}
        ${cell(r.ursaf)}
        ${cell(r.tresorerie)}
        ${cell(r.frais)}
      </tr>
    `);
    const next = data[i + 1];
    if (!next || next.ym.slice(0, 4) !== y) {
      const a = annual[y];
      rows.push(`
        <tr class="subtotal">
          <td>Sous-total ${esc(y)}</td>
          ${cellH(a.heures)}
          ${cell(a.paiement)}
          ${cell(a.ca)}
          ${cell(a.salaire)}
          ${cell(a.totalPro)}
          ${cell(a.ursaf)}
          ${cell(a.tresorerie)}
          ${cell(a.frais)}
        </tr>
      `);
    }
  }

  const foot = `
    <tr class="grandtotal">
      <td>Total général</td>
      ${cellH(grand.heures)}
      ${cell(grand.paiement)}
      ${cell(grand.ca)}
      ${cell(grand.salaire)}
      ${cell(grand.totalPro)}
      ${cell(grand.ursaf)}
      ${cell(grand.tresorerie)}
      ${cell(grand.frais)}
    </tr>
  `;

  return { body: rows.join(""), foot };
}

function rTR() {
  // Prestations editing
  const cat = S.tarifs.catalog || DEFAULT_CATALOG;

  // Abonnements
  const abEntries = S.abonnements.entries;

  const abTotalAnnuel = abActif.reduce((s, e) => s + num(e.annuel), 0);

    return `

      <td><input type="date" value="${esc(e.dateDebut || "")}" oninput="editAbonnementAndRefresh('${e.id}','dateDebut',this.value)" class="tr-cell-input"></td>
      <td>${rDateOrEnCoursCell(e.id, e.dateFin)}</td>
      <td class="amount"><input type="number" step="0.01" value="${esc(e.annuel)}" oninput="editAbonnementAndRefresh('${e.id}','annuel',this.value); refreshAbonnementMensuel('${e.id}')" class="tr-cell-input num"></td>

    </tr>`;

  // Investissements (amortissement) — combined with real amortization analysis
  const am = amortizationAnalysis();
  const amortMap = {};
  for (const it of am.invStatus) amortMap[it.id] = it;
  const invEntries = [...S.investissements.entries].sort((a, b) => (b.date || "").localeCompare(a.date || ""));
  const invTotal = invEntries.reduce((s, e) => s + num(e.prix), 0);
  const invRows = invEntries.map(e => {
    const prix = num(e.prix);
    const duree = num(e.dureeVie) || 5;
    const annuel = duree > 0 ? r2(prix / duree) : 0;
    const am1 = amortMap[e.id] || { amorti: 0, reste: prix, fullyAmorti: false };
    const badge = am1.fullyAmorti
      ? `<span class="tr-badge ok">✓ Amorti</span>`
      : am1.amorti > 0
      ? `<span class="tr-badge partial">Partiel</span>`
      : `<span class="tr-badge none">Non</span>`;
    return `
    <tr class="${am1.fullyAmorti ? 'row-amorti' : ''}">
      <td><input type="date" value="${esc(e.date)}" oninput="editInvestissement('${e.id}','date',this.value)" class="tr-cell-input"></td>
      <td><input value="${esc(e.descriptif)}" oninput="editInvestissement('${e.id}','descriptif',this.value)" placeholder="Descriptif" class="tr-cell-input"></td>
      <td class="amount"><input type="number" step="0.01" value="${esc(e.prix)}" oninput="editInvestissement('${e.id}','prix',this.value)" class="tr-cell-input num"></td>
      <td class="amount"><input type="number" step="0.5" min="0.5" value="${esc(e.dureeVie || "5")}" oninput="editInvestissement('${e.id}','dureeVie',this.value)" class="tr-cell-input num center"></td>
      <td class="amount muted-cell">${fmt(annuel)}</td>
      <td class="amount tr-amorti-cell">${fmt(am1.amorti)}</td>
      <td class="amount tr-reste-cell ${am1.reste > 0 ? 'pending' : 'done'}">${fmt(am1.reste)}</td>
      <td class="center">${badge}</td>
      <td class="actions"><button title="Supprimer" onclick="if(confirm('Supprimer cet investissement ?'))deleteInvestissement('${e.id}')">×</button></td>
    </tr>`;
  }).join("");

  // Compute taux matos
  const tm = tauxMatos();
  const urssafPct = num(S.mission && S.mission.urssafPct) || 22;
  const urssafFactor = 1 - urssafPct / 100; // e.g., 0.78 for 22%
  // Catalog table shows what photographer nets per hour. Depends on declared/black mode:
  //   - declared    : net = gross × (1-URSSAF%) - matos
  //   - black "fixe" : net = gross - matos             (photographer keeps URSSAF)
  //   - black "reduit": net = gross × (1-URSSAF%) - matos (charge less, no URSSAF — same net as declared)
  const _isDeclared = S.mission && S.mission.declare !== false;
  const _blackMode = (S.mission && S.mission.blackMode) || "reduit";
  const tarifRows3col = cat.map((c, idx) => {
    const final = num(c.p);
    const sansUrssaf = (final > 0)
      ? (!_isDeclared && _blackMode === "fixe" ? final : r2(final * urssafFactor))
      : 0;
    const net = final > 0 ? r2(sansUrssaf - tm.tauxRetenu) : 0;
    return `
    <tr ${final === 0 ? 'class="row-empty"' : ''}>
      <td><input type="text" value="${esc(c.l)}" oninput="tarifEdit(${idx},'l',this.value)" placeholder="Libellé prestation" class="tr-cell-input"></td>
      <td class="amount net-cell ${final > 0 ? (net >= 0 ? 'ok' : 'bad') : 'dim'}">${final > 0 ? fmt(net) : "—"}</td>
      <td class="amount muted-cell ${final > 0 ? '' : 'dim'}">${final > 0 ? fmt(tm.tauxRetenu) : "—"}</td>
      <td class="amount tarif-cell">
        <div class="tarif-input-wrap">
          <input type="number" step="0.5" value="${esc(c.p || "")}" oninput="tarifEdit(${idx},'p',this.value)" placeholder="—" class="tr-tarif-input">
          <span class="unit">€/h</span>
        </div>
      </td>
    </tr>`;

  return `

      return yearTable + summary;
    })()}
  `;

let majExpanded = {}; // { version: bool }
window.majToggleVersion = function(version) {
  majExpanded[version] = !majExpanded[version];
  render();
};

function rMAJ() {
  let h = `<h2>Mises à jour <span id="savedFlash" class="saved"></span></h2>`;
  h += `<div class="hint" style="max-width:780px;margin-bottom:16px">Historique des modifications. Pour revenir à une version précédente, donne-moi son numéro (ex. « reviens à la version v1.2 »).</div>`;
  h += `<div class="maj-list">`;
  for (const v of CHANGELOG) {
    const isOpen = majExpanded[v.version] !== false; // open by default
    h += `<div class="maj-entry ${isOpen ? 'is-open' : ''}">
      <button class="maj-head" onclick="majToggleVersion('${esc(v.version)}')" type="button">
        <span class="maj-caret">${isOpen ? '▾' : '▸'}</span>
        <span class="maj-version">${esc(v.version)}</span>
        <span class="maj-title">${esc(v.title)}</span>
        <span class="maj-date">${esc(v.date)}</span>
      </button>
      ${isOpen ? `<ul class="maj-items">
        ${v.items.map(it => `<li>${esc(it)}</li>`).join("")}
      </ul>` : ""}
    </div>`;
  }
  h += `</div>`;
  return h;
}


function rBG() {
  if (!S.bugs || !Array.isArray(S.bugs.items)) S.bugs = { items: [] };
  let h = `<h2>Notes <span id="savedFlash" class="saved"></span></h2>`;
  h += `<div class="fb-bar">
    <div class="fb-title">Notes & Remarques</div>
    <button class="fb-copy-btn" onclick="bugCopy()" id="bug-copy-btn">📋 Copier les actions en cours</button>
  </div>`;
  h += `<div class="fb-subtitle">Note ici les remarques ou bugs à transmettre à Claude. Chaque action peut recevoir des étapes complémentaires, être validée ou supprimée.</div>`;
  h += `<div class="fb-add-row">
    <input id="bugInput" placeholder="Nouvelle action / remarque…" value="${esc(bugQ || "")}" oninput="bugQSet(this.value)" onkeydown="if(event.key==='Enter'){event.preventDefault();bugAdd()}">
    <button onclick="bugAdd()">＋</button>
  </div>`;
  const items = [...S.bugs.items].sort((a, b) => {
    if (!!a.validated !== !!b.validated) return a.validated ? 1 : -1;
    return (b.createdAt || 0) - (a.createdAt || 0);
  });
  if (!items.length) {
    h += `<div class="empty">Aucune note pour l'instant.</div>`;
  }
  items.forEach(it => {
    h += `<div class="fb-card ${it.validated ? "fb-done" : ""}">`;
    h += `<div class="fb-hd">`;
    h += `<button class="fb-check ${it.validated ? "on" : ""}" onclick="bugToggleValid('${it.id}')" title="${it.validated ? "Marquer en cours" : "Valider"}">✓</button>`;
    h += `<input class="fb-text" value="${esc(it.text || "")}" placeholder="Note…" oninput="bugUpdateText('${it.id}',this.value)">`;
    h += `<button class="fb-del" onclick="bugDel('${it.id}')" title="Supprimer">×</button>`;
    h += `</div>`;
    (it.steps || []).forEach((st, idx) => {
      h += `<div class="fb-step">
        <span class="fb-step-bul">↳</span>
        <input class="fb-step-text" data-bug-step="${it.id}-${idx}" value="${esc(st || "")}" placeholder="Étape complémentaire…" oninput="bugUpdateStep('${it.id}',${idx},this.value)" onkeydown="if(event.key==='Enter'){event.preventDefault();bugAddStep('${it.id}')}">
        <button class="fb-step-del" onclick="bugDelStep('${it.id}',${idx})" title="Supprimer étape">✕</button>
      </div>`;
    });
    h += `<button class="fb-add-step" onclick="bugAddStep('${it.id}')">＋ étape</button>`;
    h += `</div>`;
  });
  return h;
}

window.addEventListener('scroll', () => {
  const p = document.getElementById('cliPickPortal');
  if (p && p.classList.contains('open')) cliPickPositionPortal();
}, true);
window.addEventListener('resize', () => {
  const p = document.getElementById('cliPickPortal');
  if (p && p.classList.contains('open')) cliPickPositionPortal();
});

});
